<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewPack ERP</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #0f172a; min-height: 100vh; }
.text-mono { font-family: 'SF Mono', Monaco, Consolas, monospace; }

/* LOGIN */
.login-bg { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #16a34a 0%, #0891b2 100%); padding: 20px; }
.login-box { background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 25px 50px rgba(0,0,0,.15); width: 100%; max-width: 420px; }
.logo { font-size: 28px; font-weight: 900; color: #16a34a; margin-bottom: 4px; letter-spacing: -1px; }
.subtitle { font-size: 13px; color: #64748b; margin-bottom: 30px; }

/* APP LAYOUT */
.app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
.sidebar { background: #0f172a; color: #fff; padding: 20px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.sidebar-logo { font-size: 18px; font-weight: 900; color: #4ade80; padding: 0 20px 18px; border-bottom: 1px solid #1e293b; margin-bottom: 14px; }
.sidebar-section { font-size: 9px; color: #64748b; padding: 12px 20px 4px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: #cbd5e1; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-size: 13px; transition: all 0.15s; }
.nav-item:hover { background: #1e293b; color: #fff; }
.nav-item.active { background: #16a34a; color: #fff; font-weight: 600; }

.main { padding: 0; }
.topbar { background: #fff; padding: 14px 28px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
.topbar h1 { font-size: 20px; font-weight: 800; }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.user-info { font-size: 12px; color: #475569; text-align: right; }
.content { padding: 24px 28px; }

/* COMPONENTS */
.field { margin-bottom: 14px; }
.field-label { display: block; font-size: 11px; font-weight: 700; color: #475569; margin-bottom: 5px; letter-spacing: 0.05em; text-transform: uppercase; }
.input { width: 100%; padding: 10px 12px; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 14px; transition: border-color 0.15s; background: #fff; font-family: inherit; }
.input:focus { outline: none; border-color: #16a34a; }
.btn-primary { background: #16a34a; color: #fff; padding: 10px 18px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; }
.btn-primary:hover { background: #15803d; }
.btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
.btn-secondary { background: #f1f5f9; color: #0f172a; padding: 10px 18px; border: 1px solid #cbd5e1; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
.btn-secondary:hover { background: #e2e8f0; }
.icon-btn { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 6px 8px; border-radius: 6px; cursor: pointer; color: #475569; }
.icon-btn:hover { background: #e2e8f0; }

.grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
.stat-card { background: #fff; padding: 18px; border-radius: 12px; border: 1px solid #e2e8f0; }
.stat-icon { font-size: 24px; margin-bottom: 8px; }
.stat-value { font-size: 26px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.stat-label { font-size: 12px; color: #64748b; }

.panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
.panel-header { padding: 14px 18px; border-bottom: 1px solid #e2e8f0; font-weight: 700; font-size: 13px; background: #f8fafc; }

.tabs { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; }
.tab { padding: 10px 16px; border: none; background: none; cursor: pointer; font-size: 13px; color: #64748b; font-weight: 600; border-bottom: 3px solid transparent; margin-bottom: -1px; }
.tab.active { color: #16a34a; border-bottom-color: #16a34a; }
.tab:hover { color: #16a34a; }

.tab-btn { padding: 8px 14px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; font-size: 12px; color: #475569; font-weight: 600; border-radius: 8px; transition: all 0.15s; }
.tab-btn.active { background: #16a34a; color: #fff; border-color: #16a34a; }
.tab-btn:hover:not(.active) { background: #f1f5f9; }

.table-wrap { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: auto; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px 14px; background: #f8fafc; font-size: 11px; font-weight: 700; color: #475569; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; }
td { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
tr:hover td { background: #f8fafc; }

.toolbar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.dept-tag { display: inline-block; padding: 3px 8px; background: #f1f5f9; color: #475569; border-radius: 6px; font-size: 11px; font-weight: 600; }

.modal-bg { position: fixed; inset: 0; background: rgba(15,23,42,.6); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal { background: #fff; border-radius: 14px; width: 100%; max-width: 520px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,.25); }
.modal-header { padding: 18px 22px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
.modal-body { padding: 22px; overflow-y: auto; flex: 1; }

.toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 20px; border-radius: 10px; color: #fff; font-weight: 600; font-size: 14px; box-shadow: 0 10px 25px rgba(0,0,0,.15); z-index: 1000; max-width: 380px; animation: slideIn 0.3s; }
.toast.success { background: #16a34a; }
.toast.error { background: #dc2626; }
.toast.info { background: #3b82f6; }
@keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #e2e8f0; border-top-color: #16a34a; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.6; transform:scale(1.08); } }
.loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.loading-content { text-align: center; }
.loading-content .spinner { width: 40px; height: 40px; border-width: 3px; margin-bottom: 12px; }

@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}
</style>
</head>

  { codigo: 'P6-REF', nombre: 'Refilación/Embobinado', icono: '✂️', color: '#f59e0b' },
];
window.PROCESOS = PROCESOS;

// ============================================================
// TOLERANCIAS DE PRODUCCIÓN (configurables)
// ============================================================
// P1-EXT (extrusión): puede producir entre -2% y +5% de lo solicitado
// Otros procesos (P2, P3, P4, P6): mermas máximas del 3% sobre la entrada
const TOLERANCIAS = {
  EXTRUSION_MIN_PCT: 0.02,    // -2% (mínimo aceptable en extrusión)
  EXTRUSION_MAX_PCT: 0.05,    // +5% (máximo aceptable en extrusión)
  MERMA_MAX_PCT: 0.03,        // 3% (merma máxima en procesos posteriores)
  // Calidad final (sobre cantidad solicitada original)

  CAL_EXTRA_PCT: 0.05         // 5% (extra tolerable: aún libera TOTAL)
};
window.TOLERANCIAS = TOLERANCIAS;
const getProc = (cod) => PROCESOS.find(p => p.codigo === cod);
window.getProc = getProc;

// Sugerir ruta de procesos según tipo de producto (basado en código del tipo)
function sugerirRutaProcesos(producto) {
  if (!producto) return ['P1-EXT'];
  const tipo = producto.tipo || '';
  // Extrusión es base de TODO producto plástico
  const ruta = ['P1-EXT'];
  // Películas planas refiladas → P6-REF
  if (tipo.includes('REFILADA') || tipo === 'PELICULA PLANA REFILADA') {
    ruta.push('P6-REF');
  }
  // Bolsas en rollo → P4-BR
  if (tipo.includes('ROLLO') || tipo.includes('BR')) {
    ruta.push('P4-BR');
  } else if (tipo.includes('BOLSA') || tipo.includes('HOJA') || tipo.includes('CORTE') || tipo.includes('MANGA')) {
    // Bolsas sueltas y cortes → P3-BS
    ruta.push('P3-BS');
  }
  return ruta;
}

function calcularPesoMillar(producto) {
  if (!producto) return 0;
  const ancho = Number(producto.ancho) || 0;
  const fuelle = Number(producto.fuelle) || 0;
  const largo = Number(producto.largo) || 0;
  const calibre = Number(producto.calibre) || 0;
  if (!ancho || !largo || !calibre) return 0;
  const calibreDecimal = calibre / 10000; // 30 → 0.0030, 100 → 0.0100
  return (ancho + fuelle) * largo * FACTOR_PESO * calibreDecimal;
}
window.calcularPesoMillar = calcularPesoMillar;

function calcularPesoPieza(producto) {
  return calcularPesoMillar(producto) / 1000;
}
window.calcularPesoPieza = calcularPesoPieza;

// Convierte una cantidad cualquiera a kg dado un producto
// Devuelve null si no se puede convertir (ej: rollo/metro)
function convertirAKg(cantidad, um, producto) {
  if (!cantidad || !producto) return null;
  const umLow = (um || 'kg').toLowerCase();
  const cant = Number(cantidad) || 0;
  if (umLow === 'kg') return cant;
  if (umLow === 'millar') return cant * calcularPesoMillar(producto);
  if (umLow === 'pza') return cant * calcularPesoPieza(producto);
  return null; // rollo/m no se convierten
}
window.convertirAKg = convertirAKg;

// Formatea una conversión UM→Kg para mostrar al lado: "5,000 Pieza ≈ 350 kg"
function fmtConversionKg(cantidad, um, producto) {
  const kg = convertirAKg(cantidad, um, producto);
  if (kg === null) return '';
  const umLow = (um || 'kg').toLowerCase();
  if (umLow === 'kg') return ''; // no se muestra conversión si ya está en kg
  return `≈ ${kg.toLocaleString('es-MX', { maximumFractionDigits: 2 })} kg`;
}
window.fmtConversionKg = fmtConversionKg;

function fmtFecha(f) {
  if (!f) return '';
  const d = f.toDate ? f.toDate() : new Date(f);
  return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
}
function fmtFechaHora(f) {
  if (!f) return '';
  const d = f.toDate ? f.toDate() : new Date(f);
  return d.toLocaleString('es-MX', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
}
function fmtNum(n) {
  return Number(n || 0).toLocaleString('es-MX', { maximumFractionDigits: 2 });
}
function fmtCantidadUM(n, um) {
  const umLow = (um || 'kg').toLowerCase();
  const label = UM_LABELS[umLow] || um || 'Kg';
  // Para UM enteras, no mostrar decimales
  // Para millar, hasta 3 decimales (= precisión de 1 pza)
  // Para kg, hasta 2 decimales
  let maxDec;
  if (UM_ENTEROS.includes(umLow)) maxDec = 0;
  else if (umLow === 'millar') maxDec = 3;
  else maxDec = 2;
  const numStr = Number(n || 0).toLocaleString('es-MX', { maximumFractionDigits: maxDec });
  return numStr + ' ' + label;
}
window.fmtCantidadUM = fmtCantidadUM;
function moneda(n) {
  return '$' + Number(n || 0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

window.fmtFecha = fmtFecha;
window.fmtFechaHora = fmtFechaHora;
window.fmtNum = fmtNum;
window.moneda = moneda;

function toast(msg, tipo = 'success') {
  const el = document.createElement('div');
  el.className = 'toast ' + tipo;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
window.toast = toast;

// HELPER: Notificaciones automáticas entre áreas
// ============================================================
// Uso:
//   await notificar({
//     a: 'PLN',  // o ['PLN','CS'] para múltiples
//     titulo: '...',
//     mensaje: '...',
//     tipo: 'info' | 'success' | 'warning' | 'error',
//     folio_ref: 'PI-00050',
//     vista: 'programacion'  // opcional, para navegar
//   });
//
// Si se pasa batch, se agrega al batch (no escribe). Si no, hace addDoc directo.
window.notificar = async (opciones, batch = null) => {
  const { a, titulo, mensaje, tipo = 'info', folio_ref = '', vista = '' } = opciones;
  const destinos = Array.isArray(a) ? a : [a];
  
  for (const depto of destinos) {
    if (!depto) continue;
    const data = {
      titulo, mensaje,
      depto_destino: depto,
      tipo,
      folio_ref,
      vista_destino: vista,
      leida: false,
      origen_user: state.user?.id || null,
      origen_nombre: state.user?.nombre || state.user?.email || '—',
      created_at: serverTimestamp()
    };
    if (batch) {
      const ref = doc(collection(db, 'notificaciones'));
      batch.set(ref, data);
    } else {
      await addDoc(collection(db, 'notificaciones'), data);
    }
  }
};

window.abrirNotificacion = async (notifId) => {
  const n = state.notificaciones.find(x => x.id === notifId);
  if (!n) return;
  
  // Marcar como leída
  if (!n.leida) {
    try {
      await updateDoc(doc(db, 'notificaciones', notifId), { 
        leida: true, 
        leida_at: serverTimestamp() 
      });
    } catch(e) { console.warn('No se pudo marcar leída', e); }
  }
  
  // Navegar a la vista destino
  if (n.vista_destino) {
    state.vista = n.vista_destino;
    render();
  }
};

window.marcarTodasLeidas = async () => {
  const misNotifs = state.notificaciones.filter(n => 
    !n.leida && (n.depto_destino === state.user.depto || state.user.rol === 'admin')
  );
  if (misNotifs.length === 0) return;
  
  try {
    const batch = writeBatch(db);
    misNotifs.forEach(n => {
      batch.update(doc(db, 'notificaciones', n.id), { 
        leida: true, 
        leida_at: serverTimestamp() 
      });
    });
    await batch.commit();
    toast(`✅ ${misNotifs.length} notificación(es) marcadas como leídas`);
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  }
};

    throw new Error('Tu usuario no tiene perfil. Pídele al admin que lo cree.');
  }
  state.user = { id: uid, ...docSnap.data() };
  
  // Si está marcado como pendiente_activacion, marcar como activado (ya se autenticó exitosamente)
  if (state.user.pendiente_activacion === true) {
    try {
      await updateDoc(doc(db, 'usuarios', uid), {
        pendiente_activacion: false,
        activado_at: serverTimestamp(),
        updated_at: serverTimestamp()
      });
      state.user.pendiente_activacion = false;
    } catch (e) {
      console.warn('No se pudo marcar como activado:', e);
    }
  }
  
  // Verificar si el usuario está desactivado
  if (state.user.activo === false) {
    await signOut(auth);
    throw new Error('Tu cuenta está desactivada. Contacta al administrador.');
  }
  
  return state.user;
}

async function siguienteFolio(tipo) {
  const ref = doc(db, 'contadores', tipo);
  let nuevo;
  await runTransaction(db, async (tx) => {
    const snap = await tx.get(ref);
    const actual = snap.exists() ? Number(snap.data().ultimo) || 0 : 0;
    nuevo = actual + 1;
    tx.set(ref, { ultimo: nuevo }, { merge: true });
  });
  return nuevo;
}
window.siguienteFolio = siguienteFolio;

function attachLoginEvents() {
  $('#login-form').onsubmit = async (e) => {
    e.preventDefault();
    const btn = $('#login-btn');
    const err = $('#login-error');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Verificando...';
    err.style.display = 'none';
    try {
      await window.hacerLogin($('#login-email').value, $('#login-pass').value);
    } catch (e) {
      let mensaje = e.message;
      if (mensaje.includes('invalid-credential') || mensaje.includes('wrong-password') || mensaje.includes('user-not-found')) {
        mensaje = 'Correo o contraseña incorrectos';
      }
      err.textContent = mensaje;
      err.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'Iniciar sesión';
    }
  };
}

                  <div style="font-weight:${n.leida?'500':'700'};font-size:13px;color:${n.leida?'#475569':'#1e293b'};">${n.titulo}</div>
                  <div style="font-size:11px;color:#64748b;margin-top:3px;">${n.mensaje || ''}</div>
                  ${n.origen_nombre ? `<div style="font-size:10px;color:#94a3b8;margin-top:3px;">Por: ${n.origen_nombre}</div>` : ''}
                </div>
                <div style="text-align:right;flex-shrink:0;">
                  <div style="font-size:10px;color:#94a3b8;">${fmtFechaHora(n.created_at)}</div>
                  ${!n.leida ? `<div style="background:#3b82f6;color:#fff;font-size:9px;padding:1px 6px;border-radius:99px;margin-top:3px;display:inline-block;font-weight:700;">NUEVA</div>` : ''}
                </div>
              </div>
            `;
          }).join('');
        })()}
      </div>
    </div>
  `;
}

      <table>

        <tbody>

function renderProductosPT() {
  const filtro = (state.filtros.productos_pt || '').toLowerCase();
  const filtroUM = state.filtros.productos_pt_um || '';
  const filtroMat = state.filtros.productos_pt_material || '';
  const filtroTipo = state.filtros.productos_pt_tipo || '';
  
  let arr = state.productos_pt;
  if (filtro) arr = arr.filter(p => 
    (p.codigo + ' ' + (p.descripcion||'') + ' ' + (p.material||'') + ' ' + (p.tipo||'') + ' ' + (p.color||'') + ' ' + (p.aditivo||'')).toLowerCase().includes(filtro)
  );
  if (filtroUM) arr = arr.filter(p => (p.um || 'kg').toLowerCase() === filtroUM);
  if (filtroMat) arr = arr.filter(p => (p.material || '') === filtroMat);
  if (filtroTipo) arr = arr.filter(p => (p.tipo || '') === filtroTipo);
  
  // Estadísticas
  const statsUM = {};
  const materiales = new Set();
  const tipos = new Set();
  state.productos_pt.forEach(p => {
    const um = (p.um || 'kg').toLowerCase();
    statsUM[um] = (statsUM[um] || 0) + 1;
    if (p.material) materiales.add(p.material);
    if (p.tipo) tipos.add(p.tipo);
  });
  const matsOrdenados = [...materiales].sort();
  const tiposOrdenados = [...tipos].sort();
  
  const puedeEditar = ['CS','CEO','COMP','ADMIN'].includes(state.user.depto) || state.user.rol === 'admin';
  
  return `
    <div class="toolbar" style="flex-wrap:wrap;gap:10px;">
      <input class="input" id="filtro-productos-pt" style="max-width:340px;flex:1;min-width:240px;" placeholder="Buscar por código, descripción, color, aditivo..." value="${filtro}" autocomplete="off" />
      <select class="input" id="filtro-productos-pt-material" style="max-width:200px;">
        <option value="">Todos los materiales</option>
        ${matsOrdenados.map(m => `<option value="${m}" ${filtroMat === m ? 'selected' : ''}>${m}</option>`).join('')}
      </select>
      <select class="input" id="filtro-productos-pt-tipo" style="max-width:220px;">
        <option value="">Todos los tipos</option>
        ${tiposOrdenados.map(t => `<option value="${t}" ${filtroTipo === t ? 'selected' : ''}>${t}</option>`).join('')}
      </select>
      <select class="input" id="filtro-productos-pt-um" style="max-width:160px;">
        <option value="">Todas las UM</option>
        ${UM_OPCIONES.map(um => `<option value="${um}" ${filtroUM === um ? 'selected' : ''}>${UM_LABELS[um]} (${statsUM[um] || 0})</option>`).join('')}
      </select>
      ${(filtro || filtroUM || filtroMat || filtroTipo) ? `<button class="btn-secondary" onclick="limpiarFiltrosProductos()" style="padding:8px 12px;font-size:12px;">${ICONS.x} Limpiar</button>` : ''}
      ${puedeEditar ? `<button class="btn-primary" onclick="abrirModal('crear-producto-pt')">${ICONS.plus} Nuevo PT</button>` : ''}
      <span style="font-size:12px;color:#64748b;width:100%;">${arr.length} de ${state.productos_pt.length} productos</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Código</th><th>Descripción</th><th>Material</th><th>Tipo</th><th>Medida</th><th>Cal.</th><th>Color</th><th>Aditivo</th><th style="text-align:center;">UM</th><th style="text-align:right;">Cli.</th><th></th></tr></thead>
        <tbody>
          ${arr.length === 0 ? `<tr><td colspan="11" style="padding:40px;text-align:center;color:#94a3b8;">Sin productos que coincidan</td></tr>` :
            arr.slice(0, 100).map(p => {
              const medida = p.fuelle > 0 ? `${p.ancho}+${p.fuelle}x${p.largo}` : `${p.ancho}x${p.largo}`;
              const clis = state.cliente_productos.filter(cp => cp.producto_codigo === p.codigo).length;
              const umActual = (p.um || 'kg').toLowerCase();
              const umBadgeColor = { kg: '#16a34a', pza: '#3b82f6', millar: '#8b5cf6', rollo: '#f59e0b', m: '#ec4899' }[umActual] || '#64748b';
              const aditivo = p.aditivo || 'NINGUNO';
              const aditivoColor = aditivo === 'NINGUNO' ? '#94a3b8' : aditivo === 'VCI' ? '#7c3aed' : aditivo === 'ANTIESTATICO' ? '#ec4899' : aditivo === 'ANTIDERRAPANTE' ? '#f97316' : '#0891b2';
              return `<tr>
                <td class="text-mono" style="font-size:11px;font-weight:700;">${p.codigo}</td>
                <td style="font-size:11px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.descripcion}</td>
                <td style="font-size:11px;">${p.material || '—'}</td>
                <td style="font-size:11px;">${p.tipo || '—'}</td>
                <td style="font-size:11px;">${medida}</td>
                <td style="font-size:11px;">${p.calibre || '—'}</td>
                <td style="font-size:11px;">${p.color || '—'}</td>
                <td style="font-size:10px;">
                  ${aditivo === 'NINGUNO' ? `<span style="color:#94a3b8;">—</span>` : `<span style="font-weight:700;padding:2px 6px;border-radius:5px;background:${aditivoColor}22;color:${aditivoColor};">${aditivo}</span>`}
                </td>
                <td style="text-align:center;">
                  ${puedeEditar ? `
                    <select class="input prod-um-select" data-codigo="${p.codigo}" style="padding:3px 5px;font-size:10px;font-weight:700;color:${umBadgeColor};border-color:${umBadgeColor}33;background:${umBadgeColor}11;width:auto;min-width:70px;">
                      ${UM_OPCIONES.map(um => `<option value="${um}" ${umActual === um ? 'selected' : ''}>${UM_LABELS[um]}</option>`).join('')}
                    </select>
                  ` : `
                    <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:${umBadgeColor}22;color:${umBadgeColor};">${UM_LABELS[umActual]}</span>
                  `}
                </td>
                <td style="text-align:right;font-size:11px;">${clis}</td>
                <td style="text-align:right;">
                  ${puedeEditar ? `<button class="icon-btn" onclick="abrirModal('editar-producto-pt','${p.codigo}')" title="Editar">${ICONS.edit}</button>` : ''}
                </td>
              </tr>`;
            }).join('')
          }
        </tbody>
      </table>
      ${arr.length > 100 ? `<div style="padding:14px;text-align:center;color:#94a3b8;font-size:12px;">Mostrando 100 de ${arr.length}.</div>` : ''}
    </div>
  `;
}

function renderPedidos() {
  const tab = state.tabs.pedidos || 'pendientes';
  const pendientes = state.pedidos.filter(p => p.estatus === 'pendiente_aprobacion');
  const aprobados = state.pedidos.filter(p => p.estatus === 'aprobado');
  const ovsPend = state.ordenes_venta.filter(o => o.estatus === 'pendiente');
  const odpsActivas = state.ordenes_produccion.filter(o => ['pendiente_planeacion','programada','en_produccion'].includes(o.estatus));
  
  const ovsParaMi = state.user.almacen_asignado ? ovsPend.filter(o => o.cedis === state.user.almacen_asignado) : ovsPend;
  const puedeCrearPI = ['CS','CEO','ADMIN','COMP'].includes(state.user.depto) || state.user.rol === 'admin';
  const puedeAprobar = ['CEO','ADMIN'].includes(state.user.depto) || state.user.rol === 'admin';
  
  return `
    <div class="tabs">
      ${puedeCrearPI ? `<button class="tab ${tab === 'nuevo' ? 'active' : ''}" onclick="state.tabs.pedidos='nuevo';state.pedidoData=null;render();">${ICONS.plus} Nuevo PI</button>` : ''}
      <button class="tab ${tab === 'pendientes' ? 'active' : ''}" onclick="state.tabs.pedidos='pendientes';render();">⏳ Por aprobar (${pendientes.length})</button>
      <button class="tab ${tab === 'aprobados' ? 'active' : ''}" onclick="state.tabs.pedidos='aprobados';render();">✅ Aprobados (${aprobados.length})</button>
      <button class="tab ${tab === 'ovs' ? 'active' : ''}" onclick="state.tabs.pedidos='ovs';render();">${ICONS.send} OVs (${ovsParaMi.length})</button>
      <button class="tab ${tab === 'odps' ? 'active' : ''}" onclick="state.tabs.pedidos='odps';render();">${ICONS.factory} ODPs (${odpsActivas.length})</button>
    </div>
    ${tab === 'nuevo' ? renderFormPedido() :
      tab === 'pendientes' ? renderListaPedidos(pendientes, puedeAprobar) :
      tab === 'aprobados' ? renderListaPedidos(aprobados, puedeAprobar) :
      tab === 'ovs' ? renderListaOVs(ovsParaMi) :
      renderListaODPs(odpsActivas)
    }
  `;
}

function renderFormPedido() {
  const datos = state.pedidoData || { cliente_codigo: '', cliente_nombre: '', odc_cliente: '', fecha_requerida: '', cedis_asignado: '', observaciones: '', lineas: [], tipo_pi: 'cliente' };
  state.pedidoData = datos;
  if (!datos.tipo_pi) datos.tipo_pi = 'cliente';
  
  const esStockInterno = datos.tipo_pi === 'stock_interno';
  
  // Para PI de stock interno: cliente virtual fijo
  if (esStockInterno) {
    datos.cliente_codigo = 'STOCK';
    datos.cliente_nombre = 'STOCK INTERNO NEWPACK';
    if (!datos.odc_cliente || !datos.odc_cliente.startsWith('STOCK-')) {
      datos.odc_cliente = `STOCK-${Date.now().toString().slice(-6)}`;
    }
  }
  
  const productosCli = esStockInterno 
    ? state.productos_pt 
    : (datos.cliente_codigo ? window.productosDeCliente(datos.cliente_codigo) : []);
  const busq = (state.busqProd || '').toLowerCase();
  let prodsFiltrados = busq ? productosCli.filter(p => (p.codigo + ' ' + (p.descripcion||'')).toLowerCase().includes(busq)) : productosCli;
  
  return `
    <!-- TOGGLE TIPO DE PI -->
    <div style="background:#fff;border:2px solid ${esStockInterno ? '#3fd34b' : '#3b82f6'};border-radius:14px;padding:14px;margin-bottom:14px;">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <span style="font-weight:800;color:#475569;font-size:13px;">📋 TIPO DE PEDIDO INTERNO:</span>
        <button onclick="cambiarTipoPI('cliente')" style="padding:10px 18px;background:${!esStockInterno?'#3b82f6':'#fff'};color:${!esStockInterno?'#fff':'#475569'};border:2px solid ${!esStockInterno?'#3b82f6':'#cbd5e1'};border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;">
          👥 Cliente Externo
        </button>
        <button onclick="cambiarTipoPI('stock_interno')" style="padding:10px 18px;background:${esStockInterno?'#3fd34b':'#fff'};color:${esStockInterno?'#fff':'#475569'};border:2px solid ${esStockInterno?'#3fd34b':'#cbd5e1'};border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;">
          🏭 Producción para Stock
        </button>
        <span style="font-size:11px;color:#64748b;margin-left:auto;">
          ${esStockInterno 
            ? '🏭 Las tarimas quedarán disponibles en CEDIS para futuras OVs' 
            : '👥 Pedido normal con cliente final'}
        </span>
      </div>
    </div>
    
    <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:20px;align-items:start;">
      <div class="panel">
        <div class="panel-header">${esStockInterno ? '🏭 Datos del pedido para STOCK' : ICONS.cart + ' Datos del pedido'}</div>
        <div style="padding:18px;">
          ${esStockInterno ? `
            <div style="padding:12px;background:#dcfce7;border:1px solid #86efac;border-radius:10px;margin-bottom:14px;">
              <div style="font-weight:700;color:#166534;font-size:13px;">🏭 Producción para Stock Interno</div>
              <div style="font-size:11px;color:#475569;margin-top:4px;">
                Este PI no tiene cliente final. Las tarimas se producen y quedan disponibles en CEDIS-MTY para futuras OVs de clientes. <strong>NO se generan OVs.</strong>
              </div>
            </div>
          ` : ''}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="field">
              <label class="field-label">${esStockInterno ? 'Tipo' : 'Cliente *'}</label>
              ${esStockInterno ? `
                <input class="input" value="🏭 STOCK INTERNO NEWPACK" disabled style="background:#dcfce7;font-weight:700;color:#166534;" />
              ` : `
                <select class="input" id="ped-cliente">
                  <option value="">— Selecciona —</option>
                  ${state.clientes.map(c => `<option value="${c.codigo}" ${datos.cliente_codigo === c.codigo ? 'selected' : ''}>${c.codigo} — ${c.nombre.slice(0,40)}</option>`).join('')}
                </select>
              `}
            </div>
            <div class="field">
              <label class="field-label">CEDIS destino *</label>
              <select class="input" id="ped-cedis">
                ${state.almacenes.filter(a => a.tipo === 'cedis').map(a => `<option value="${a.codigo}" ${datos.cedis_asignado === a.codigo ? 'selected' : ''}>${a.nombre}</option>`).join('')}
              </select>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="field">
              <label class="field-label">${esStockInterno ? 'Referencia interna' : 'ODC del cliente'}</label>
              <input class="input" id="ped-odc" value="${datos.odc_cliente || ''}" ${esStockInterno ? 'placeholder="STOCK-XXXXX"' : ''} />
            </div>
            <div class="field"><label class="field-label">${esStockInterno ? 'Fecha objetivo' : 'Fecha requerida'}</label><input class="input" id="ped-fecha" type="date" value="${datos.fecha_requerida || ''}" /></div>
          </div>
          
          ${(!datos.cliente_codigo && !esStockInterno) ? `
            <div style="padding:30px;text-align:center;color:#94a3b8;background:#f8fafc;border-radius:10px;">
              👈 Selecciona un cliente para ver sus productos
            </div>
          ` : `
            <div class="field" style="margin-top:14px;">
              <label class="field-label">Buscar producto${esStockInterno ? ' (cualquier producto del catálogo)' : ' del cliente'}</label>
              <input class="input" id="ped-busq" placeholder="Código o descripción..." value="${state.busqProd || ''}" autocomplete="off" />
            </div>
            <div style="max-height:340px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:10px;">
              ${prodsFiltrados.length === 0 ? `
                <div style="padding:30px;text-align:center;color:#94a3b8;font-size:13px;">
                  ${productosCli.length === 0 ? (esStockInterno ? 'No hay productos en catálogo' : 'Cliente sin productos asignados') : 'No se encontraron productos'}
                </div>
              ` : prodsFiltrados.slice(0, 50).map(p => {
                const yaAgregado = datos.lineas.some(l => l.producto_codigo === p.codigo);
                return `
                  <div style="padding:12px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px;${yaAgregado ? 'background:#f0fdf4;' : ''}">
                    <div style="flex:1;min-width:0;">
                      <div class="text-mono" style="font-size:11px;font-weight:700;">${p.codigo}</div>
                      <div style="font-size:12px;color:#475569;margin-top:2px;">${p.descripcion}</div>
                    </div>
                    ${yaAgregado ? `<span style="padding:5px 8px;background:#16a34a;color:#fff;border-radius:6px;font-size:10px;font-weight:700;">✓</span>` :
                      `<button class="btn-primary" onclick="agregarLineaPedido('${p.codigo}')" style="padding:6px 10px;font-size:11px;">${ICONS.plus}</button>`}
                  </div>
                `;
              }).join('')}
            </div>
          `}
        </div>
      </div>
      
      <div class="panel" style="position:sticky;top:80px;">
        <div class="panel-header">🛒 Líneas (${datos.lineas.length})</div>
        <div style="padding:18px;">
          ${datos.lineas.length === 0 ? `
            <div style="padding:40px 20px;text-align:center;color:#94a3b8;background:#f8fafc;border-radius:10px;">
              🛒 Aún no agregas productos
            </div>
          ` : `
            <div style="display:flex;flex-direction:column;gap:10px;max-height:360px;overflow-y:auto;">
              ${datos.lineas.map((l, i) => {
                const umLinea = (l.um || 'kg').toLowerCase();
                const esEntera = UM_ENTEROS.includes(umLinea);
                const stepCant = esEntera ? '1' : '0.01';
                const umBadgeColor = { kg: '#16a34a', pza: '#3b82f6', millar: '#8b5cf6', rollo: '#f59e0b', m: '#ec4899' }[umLinea] || '#64748b';
                return `
                <div style="padding:12px;border:1px solid #e2e8f0;border-radius:10px;background:#f8fafc;">
                  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
                    <div style="flex:1;min-width:0;">
                      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                        <span class="text-mono" style="font-size:11px;font-weight:700;">${l.producto_codigo}</span>
                        <span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;background:${umBadgeColor}22;color:${umBadgeColor};">${UM_LABELS[umLinea]}</span>
                      </div>
                      <div style="font-size:12px;color:#475569;margin-top:2px;">${l.descripcion}</div>
                    </div>
                    <button onclick="quitarLineaPedido(${i})" class="icon-btn" style="background:#fee2e2;color:#dc2626;">${ICONS.trash}</button>
                  </div>
                  <div class="field" style="margin-bottom:8px;">
                    <label class="field-label">Cantidad en ${UM_LABELS[umLinea]} *</label>
                    <input class="input ped-cant" data-idx="${i}" type="number" min="0" step="${stepCant}" value="${l.cantidad_solicitada || ''}" placeholder="${esEntera ? 'Solo enteros' : '0.00'}" />
                    ${(umLinea === 'pza' || umLinea === 'millar') && l.cantidad_solicitada ? (() => {
                      const prod = window.getProductoPT(l.producto_codigo);
                      const conv = window.fmtConversionKg(l.cantidad_solicitada, umLinea, prod);
                      return conv ? `<div style="font-size:10px;color:#059669;margin-top:4px;font-weight:600;">🏭 Producción: ${conv}</div>` : '';
                    })() : ''}
                  </div>
                  <div class="field" style="margin-bottom:0;">
                    <label class="field-label">Origen *</label>
                    <select class="input ped-origen" data-idx="${i}">
                      <option value="stock" ${l.tipo_origen === 'stock' ? 'selected' : ''}>📦 De Stock</option>
                      <option value="producir" ${l.tipo_origen === 'producir' ? 'selected' : ''}>🏭 Producir</option>
                      <option value="mixto" ${l.tipo_origen === 'mixto' ? 'selected' : ''}>🔀 Mixto</option>
                    </select>
                  </div>
                  ${l.tipo_origen === 'mixto' ? `
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
                      <input class="input ped-stock" data-idx="${i}" type="number" min="0" step="${stepCant}" placeholder="Stock" value="${l.cantidad_stock || ''}" />
                      <input class="input ped-prod" data-idx="${i}" type="number" min="0" step="${stepCant}" placeholder="Producir" value="${l.cantidad_producir || ''}" />
                    </div>
                  ` : ''}
                </div>
              `;}).join('')}
            </div>
            <div class="field" style="margin-top:14px;">
              <label class="field-label">Observaciones</label>
              <textarea class="input" id="ped-obs" style="min-height:60px;">${datos.observaciones || ''}</textarea>
            </div>
            <div style="display:flex;gap:8px;margin-top:14px;">
              <button class="btn-secondary" onclick="cancelarPedido()" style="flex:1;justify-content:center;">Cancelar</button>
              <button class="btn-primary" onclick="enviarPedido()" style="flex:2;justify-content:center;">${ICONS.send} Enviar PI</button>
            </div>
          `}
        </div>
      </div>
    </div>
  `;
}

// VISTA: PROGRAMACIÓN DE PRODUCCIÓN (PLN/CEO/ADMIN)
// ============================================================
function renderProgramacion() {
  const u = state.user || {};
  const esPLN = ['PLN','CEO','ADMIN'].includes(u.depto) || u.rol === 'admin';
  
  const subTab = state.tabs.programacion || 'pendientes';
  const vistaModo = state.vistaModo?.programacion || 'lista'; // 'lista' | 'proceso'
  
  const odpsPend = state.ordenes_produccion.filter(o => o.estatus === 'pendiente_planeacion');
  const odpsProg = state.ordenes_produccion.filter(o => o.estatus === 'programada');
  const odpsEnProd = state.ordenes_produccion.filter(o => o.estatus === 'en_produccion');
  const odpsCompletadas = state.ordenes_produccion.filter(o => o.estatus === 'completada').slice(0, 30);
  
  const filtro = (state.filtros.programacion || '').toLowerCase();
  const filtroProc = state.filtros.programacion_proceso || '';
  const filtroMaq = state.filtros.programacion_maquina || '';
  
  // Lista actual según tab
  let arr = [];
  if (subTab === 'pendientes') arr = odpsPend;
  else if (subTab === 'programadas') arr = odpsProg;
  else if (subTab === 'en_produccion') arr = odpsEnProd;
  else if (subTab === 'completadas') arr = odpsCompletadas;
  
  if (filtro) arr = arr.filter(o => 
    (o.folio + ' ' + (o.cliente_nombre||'') + ' ' + (o.producto_codigo||'')).toLowerCase().includes(filtro)
  );
  if (filtroProc) arr = arr.filter(o => (o.ruta_procesos || []).includes(filtroProc));
  if (filtroMaq) arr = arr.filter(o => {
    const maquinas = Object.values(o.maquinas_asignadas || {});
    return maquinas.includes(filtroMaq) || o.maquina_codigo === filtroMaq;
  });
  
  // KPIs
  const kpiAtrasadas = arr.filter(o => {
    if (!o.fecha_entrega_programada) return false;
    return new Date(o.fecha_entrega_programada) < new Date() && o.estatus !== 'completada';
  }).length;
  
  return `
    <!-- TABS DE ESTATUS -->
    <div style="margin-bottom:14px;">
      <div style="display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid #e2e8f0;padding-bottom:8px;">
        <button class="tab-btn ${subTab === 'pendientes' ? 'active' : ''}" onclick="cambiarTab('programacion','pendientes')">⏳ Por programar (${odpsPend.length})</button>
        <button class="tab-btn ${subTab === 'programadas' ? 'active' : ''}" onclick="cambiarTab('programacion','programadas')">📅 Programadas (${odpsProg.length})</button>
        <button class="tab-btn ${subTab === 'en_produccion' ? 'active' : ''}" onclick="cambiarTab('programacion','en_produccion')">🔄 En producción (${odpsEnProd.length})</button>
        <button class="tab-btn ${subTab === 'completadas' ? 'active' : ''}" onclick="cambiarTab('programacion','completadas')">✅ Completadas (${state.ordenes_produccion.filter(o => o.estatus === 'completada').length})</button>
      </div>
    </div>
    
    <!-- TOGGLE VISTA -->
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;">
      <span style="font-size:12px;color:#64748b;font-weight:700;">📐 VISTA:</span>
      <button onclick="cambiarVistaProgramacion('lista')" style="padding:6px 12px;background:${vistaModo==='lista'?'#3b82f6':'#fff'};color:${vistaModo==='lista'?'#fff':'#475569'};border:2px solid ${vistaModo==='lista'?'#3b82f6':'#cbd5e1'};border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;">
        📋 Lista
      </button>
      <button onclick="cambiarVistaProgramacion('proceso')" style="padding:6px 12px;background:${vistaModo==='proceso'?'#3b82f6':'#fff'};color:${vistaModo==='proceso'?'#fff':'#475569'};border:2px solid ${vistaModo==='proceso'?'#3b82f6':'#cbd5e1'};border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;">
        🔥 Por proceso → máquina
      </button>
      ${kpiAtrasadas > 0 ? `<span style="background:#fef2f2;color:#dc2626;padding:4px 10px;border-radius:6px;font-weight:700;font-size:11px;border:1px solid #fecaca;margin-left:auto;">⚠ ${kpiAtrasadas} atrasada(s)</span>` : ''}
    </div>
    
    <!-- FILTROS -->
    <div class="toolbar" style="flex-wrap:wrap;">
      <input class="input" id="filtro-programacion" style="max-width:280px;flex:1;min-width:200px;" placeholder="🔍 Folio, cliente, producto..." value="${filtro}" autocomplete="off" />
      <select class="input" id="filtro-programacion-proceso" style="max-width:200px;">
        <option value="">Todos los procesos</option>
        ${PROCESOS.map(p => `<option value="${p.codigo}" ${filtroProc === p.codigo ? 'selected' : ''}>${p.icono} ${p.codigo} — ${p.nombre}</option>`).join('')}
      </select>
      <select class="input" id="filtro-programacion-maquina" style="max-width:180px;">
        <option value="">Todas las máquinas</option>
        ${(state.maquinas || []).filter(m => m.activa !== false && (!filtroProc || m.proceso_codigo === filtroProc)).sort((a,b) => a.codigo.localeCompare(b.codigo)).map(m => `<option value="${m.codigo}" ${filtroMaq === m.codigo ? 'selected' : ''}>${m.codigo}</option>`).join('')}
      </select>
      <span style="font-size:12px;color:#64748b;font-weight:600;">📊 ${arr.length} ODP(s)</span>
    </div>
    
    ${arr.length === 0 ? `
      <div style="padding:60px;text-align:center;color:#94a3b8;background:#fff;border-radius:14px;border:1px solid #e2e8f0;">
        <div style="font-size:42px;margin-bottom:10px;">${subTab === 'pendientes' ? '✨' : subTab === 'programadas' ? '📅' : subTab === 'en_produccion' ? '🔄' : '✅'}</div>
        <div style="font-weight:700;color:#475569;">${subTab === 'pendientes' ? 'No hay ODPs pendientes de programar' : 
          subTab === 'programadas' ? 'No hay ODPs programadas' :
          subTab === 'en_produccion' ? 'No hay ODPs en producción' : 
          'Sin ODPs completadas recientes'}</div>
      </div>
    ` : (vistaModo === 'proceso' ? renderProgramacionPorProceso(arr, subTab) : `
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${arr.map(o => renderTarjetaODP(o, subTab)).join('')}
      </div>
    `)}
  `;
}

// ============================================================
// VISTA: Programación agrupada por proceso → máquina
// ============================================================
function renderProgramacionPorProceso(odps, subTab) {
  // Agrupar ODPs por proceso y máquina
  // Cada ODP puede tener varios procesos (ruta_procesos) y máquinas (maquinas_asignadas)
  // Para "pendientes" todavía no tienen máquinas, así que las mostramos en "Sin asignar"
  
  // Estructura: { 'P1-EXT': { 'COEX01': [odps], 'COEX02': [odps], 'sin_maq': [odps] } }
  const grupos = {};
  
  PROCESOS.forEach(p => { grupos[p.codigo] = { _proc: p, maquinas: {} }; });
  grupos['_sin_proceso'] = { _proc: { codigo: '_sin', nombre: 'Sin proceso asignado', icono: '❓', color: '#94a3b8' }, maquinas: {} };
  
  odps.forEach(o => {
    const procs = o.ruta_procesos || [];
    if (procs.length === 0) {
      // ODP sin ruta
      if (!grupos['_sin_proceso'].maquinas['_sin_maq']) grupos['_sin_proceso'].maquinas['_sin_maq'] = [];
      grupos['_sin_proceso'].maquinas['_sin_maq'].push(o);
    } else {
      procs.forEach(procCod => {
        if (!grupos[procCod]) grupos[procCod] = { _proc: getProc(procCod) || { codigo: procCod, nombre: procCod, icono: '⚙️', color: '#64748b' }, maquinas: {} };
        const maq = (o.maquinas_asignadas && o.maquinas_asignadas[procCod]) || '_sin_maq';
        if (!grupos[procCod].maquinas[maq]) grupos[procCod].maquinas[maq] = [];
        grupos[procCod].maquinas[maq].push(o);
      });
    }
  });
  
  // Filtrar procesos sin ODPs
  const procesosConODPs = Object.entries(grupos).filter(([_, g]) => Object.keys(g.maquinas).length > 0);
  
  if (procesosConODPs.length === 0) {
    return `<div style="padding:60px;text-align:center;color:#94a3b8;">Sin ODPs para agrupar</div>`;
  }
  
  return `
    <div style="display:flex;flex-direction:column;gap:18px;">
      ${procesosConODPs.map(([procCod, g]) => {
        const totalOdps = Object.values(g.maquinas).reduce((s, arr) => s + arr.length, 0);
        const p = g._proc;
        const maquinasSorted = Object.entries(g.maquinas).sort(([a], [b]) => {
          if (a === '_sin_maq') return 1;
          if (b === '_sin_maq') return -1;
          return a.localeCompare(b);
        });
        
        return `
          <div style="background:#fff;border:2px solid ${p.color};border-radius:14px;overflow:hidden;">
            <!-- HEADER PROCESO -->
            <div style="padding:12px 18px;background:${p.color}15;border-bottom:1px solid ${p.color}33;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
              <div style="display:flex;align-items:center;gap:10px;">
                <span style="font-size:24px;">${p.icono}</span>
                <div>
                  <div style="font-weight:800;color:${p.color};font-size:16px;">${p.nombre}</div>
                  <div style="font-size:11px;color:#64748b;">${p.codigo}</div>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                <span style="background:${p.color};color:#fff;padding:5px 12px;border-radius:99px;font-weight:800;font-size:13px;">${totalOdps} ODP${totalOdps>1?'s':''}</span>
                <span style="font-size:11px;color:#64748b;">${maquinasSorted.length} máquina${maquinasSorted.length>1?'s':''}</span>
              </div>
            </div>
            
            <!-- MÁQUINAS DEL PROCESO -->
            <div style="padding:12px;display:grid;grid-template-columns:repeat(auto-fill, minmax(360px, 1fr));gap:12px;">
              ${maquinasSorted.map(([maqCod, maqOdps]) => {
                const maq = (state.maquinas || []).find(m => m.codigo === maqCod);
                const esSinAsignar = maqCod === '_sin_maq';
                const totalKg = maqOdps.reduce((s, o) => s + (Number(o.cantidad_kg_produccion || o.cantidad) || 0), 0);
                
                return `
                  <div style="border:1px solid ${esSinAsignar?'#fbbf24':'#e2e8f0'};border-radius:10px;overflow:hidden;background:${esSinAsignar?'#fffbeb':'#f8fafc'};">
                    <!-- Header máquina -->
                    <div style="padding:8px 12px;background:${esSinAsignar?'#fef3c7':'#fff'};border-bottom:1px solid ${esSinAsignar?'#fbbf24':'#e2e8f0'};display:flex;justify-content:space-between;align-items:center;">
                      <div>
                        <div class="text-mono" style="font-size:13px;font-weight:800;color:#1e293b;">
                          ${esSinAsignar ? '⚠ SIN ASIGNAR' : '🛠️ ' + maqCod}
                        </div>
                        ${maq && maq.capacidad_kg_hr ? `<div style="font-size:10px;color:#64748b;">${maq.capacidad_kg_hr} kg/hr · ${maq.nombre || ''}</div>` : ''}
                      </div>
                      <div style="text-align:right;">
                        <div style="font-weight:800;font-size:14px;color:${p.color};">${maqOdps.length}</div>
                        <div style="font-size:9px;color:#64748b;">${fmtNum(totalKg)} kg</div>
                      </div>
                    </div>
                    
                    <!-- Lista mini-cards ODPs -->
                    <div style="padding:8px;display:flex;flex-direction:column;gap:6px;max-height:480px;overflow-y:auto;">
                      ${maqOdps
                        .sort((a, b) => {
                          // Prioridad alta primero, luego por fecha entrega
                          const prioOrden = { alta: 0, normal: 1, baja: 2 };
                          const pa = prioOrden[a.prioridad] ?? 1;
                          const pb = prioOrden[b.prioridad] ?? 1;
                          if (pa !== pb) return pa - pb;
                          return (a.fecha_entrega_programada || '9999').localeCompare(b.fecha_entrega_programada || '9999');
                        })
                        .map(o => renderMiniCardODP(o, p, subTab))
                        .join('')}
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

// Tarjeta compacta para vista agrupada por proceso/máquina
function renderMiniCardODP(o, proc, subTab) {
  const prio = { alta: { ico: '🔴', col: '#dc2626' }, normal: { ico: '🟡', col: '#64748b' }, baja: { ico: '🟢', col: '#16a34a' } }[o.prioridad || 'normal'];
  const esStockInt = o.tipo_origen === 'stock_interno';
  
  // Fecha entrega
  const fechaTxt = o.fecha_entrega_programada || '—';
  const atrasada = o.fecha_entrega_programada && new Date(o.fecha_entrega_programada) < new Date() && o.estatus !== 'completada';
  
  return `
    <div style="background:#fff;border:1px solid #e2e8f0;border-left:3px solid ${prio.col};border-radius:6px;padding:8px 10px;cursor:pointer;" onclick="abrirModal('detalle-odp','${o.id}')">
      <div style="display:flex;justify-content:space-between;align-items:start;gap:8px;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
            <span class="text-mono" style="font-weight:800;font-size:12px;color:#1e293b;">${o.folio}</span>
            ${esStockInt ? `<span style="background:#3fd34b;color:#fff;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;">🏭 STOCK</span>` : ''}
            ${o.prioridad === 'alta' ? `<span style="font-size:11px;">${prio.ico}</span>` : ''}
            ${atrasada ? `<span style="background:#fee2e2;color:#dc2626;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:800;">ATRASADA</span>` : ''}
          </div>
          <div style="font-size:11px;color:#475569;margin-top:2px;font-weight:600;">
            ${esStockInt ? '🏭 Stock Interno' : (o.cliente_nombre || '—').substring(0, 24)}
          </div>
          <div class="text-mono" style="font-size:10px;color:#64748b;margin-top:2px;">${o.producto_codigo || ''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-weight:800;font-size:11px;color:#1e293b;">${fmtCantidadUM(o.cantidad, o.um)}</div>
          <div style="font-size:9px;color:${atrasada?'#dc2626':'#64748b'};font-weight:${atrasada?'700':'400'};">📅 ${fechaTxt}</div>
        </div>
      </div>
      ${subTab === 'pendientes' ? `
        <button onclick="event.stopPropagation();abrirModal('programar-odp','${o.id}')" style="margin-top:6px;width:100%;padding:4px;background:${proc.color};color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:10px;font-weight:700;">
          📅 Programar
        </button>
      ` : ''}
    </div>
  `;
}

window.cambiarVistaProgramacion = (modo) => {
  if (!state.vistaModo) state.vistaModo = {};
  state.vistaModo.programacion = modo;
  render();
};

function renderTarjetaODP(o, contexto) {
  const colores = {
    pendiente_planeacion: '#f59e0b',
    programada: '#3b82f6',
    en_produccion: '#8b5cf6',
    completada: '#16a34a',
    cancelada: '#dc2626'
  };
  const labels = {
    pendiente_planeacion: '⏳ Por programar',
    programada: '📅 Programada',
    en_produccion: '🔄 En producción',
    completada: '✅ Completada',
    cancelada: '❌ Cancelada'
  };
  const color = colores[o.estatus] || '#64748b';
  
  // Capturas y avance global
  const capturas = state.capturas_produccion.filter(c => c.odp_id === o.id);
  const lotesODP = state.lotes.filter(l => l.odp_id === o.id);
  const ruta = o.ruta_procesos || [];
  const procesosCompletados = o.procesos_completados || [];
  const procActual = o.proceso_actual;
  const idx = o.proceso_actual_idx ?? 0;
  
  // ⭐ NUEVO: Avance del proceso actual por capturas de turno
  const capturasProcActual = capturas.filter(c => c.proceso === procActual);
  const acumProcActualKg = capturasProcActual.reduce((s, c) => s + (Number(c.producido_kg) || 0), 0);
  const acumMermasKg = capturasProcActual.reduce((s, c) => s + (Number(c.mermas_kg) || 0), 0);
  
  // Meta del proceso actual
  const producto = state.productos_pt.find(p => p.codigo === o.producto_codigo);
  const um = (o.um || 'kg').toLowerCase();
  let metaProcKg;
  if (idx === 0) {
    metaProcKg = Number(o.cantidad_kg_produccion) || window.convertirAKg(o.cantidad, um, producto) || Number(o.cantidad) || 0;
  } else {
    const procesoAnterior = procesosCompletados[procesosCompletados.length - 1];
    metaProcKg = procesoAnterior ? (Number(procesoAnterior.cantidad_producida_kg) || 0) : 0;
  }
  const pctProcActual = metaProcKg > 0 ? Math.min(100, Math.round((acumProcActualKg / metaProcKg) * 100)) : 0;
  
  // Cálculo legacy
  let totalProducidoFinal = 0;
  let totalMermasFinal = 0;
  if (procesosCompletados.length > 0) {
    const ultimo = procesosCompletados[procesosCompletados.length - 1];
    totalProducidoFinal = Number(ultimo.cantidad_producida) || 0;
    totalMermasFinal = procesosCompletados.reduce((s, p) => s + (Number(p.mermas) || 0), 0);
  }
  const pct = o.cantidad > 0 ? Math.min(100, Math.round((totalProducidoFinal / o.cantidad) * 100)) : 0;
  
  // Máquina asignada al proceso actual
  const maquinaActual = (o.maquinas_asignadas && o.maquinas_asignadas[procActual]) || o.maquina_codigo || '';
  
  return `
    <div class="panel" style="border-left:4px solid ${color};">
      <div style="padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
        <div style="flex:1;min-width:280px;">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;">
            <span class="text-mono" style="font-weight:800;font-size:15px;">${o.folio}</span>
            <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;background:${color}22;color:${color};">${labels[o.estatus]}</span>
            ${o.prioridad === 'alta' ? `<span style="font-size:10px;padding:2px 8px;border-radius:99px;background:#fee2e2;color:#dc2626;font-weight:700;">🔴 URGENTE</span>` : ''}
            ${maquinaActual ? `<span style="font-size:10px;padding:2px 8px;border-radius:99px;background:#1e293b;color:#fff;font-weight:700;" class="text-mono">🛠️ ${maquinaActual}</span>` : ''}
            ${o.pedido_folio ? `<span style="font-size:10px;color:#64748b;">desde ${o.pedido_folio}</span>` : ''}
          </div>
          <div style="font-size:13px;font-weight:600;">${o.cliente_nombre || '—'}</div>
          <div class="text-mono" style="font-size:11px;color:#64748b;margin-top:2px;">${o.producto_codigo}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:18px;font-weight:800;">${fmtCantidadUM(o.cantidad, o.um)}</div>
          ${o.cantidad_kg_produccion && (o.um === 'pza' || o.um === 'millar') ? `
            <div style="font-size:11px;color:#059669;font-weight:700;margin-top:2px;">🏭 ${fmtNum(o.cantidad_kg_produccion)} kg producción</div>
          ` : ''}
          ${totalProducidoFinal > 0 ? `
            <div style="font-size:11px;color:#475569;margin-top:2px;">Producido: <strong>${fmtCantidadUM(totalProducidoFinal, o.um)}</strong> (${pct}%)</div>
            ${totalMermasFinal > 0 ? `<div style="font-size:10px;color:#dc2626;">Mermas: ${fmtCantidadUM(totalMermasFinal, o.um)}</div>` : ''}
          ` : ''}
        </div>
      </div>
      
      ${ruta.length > 0 ? `
        <div style="padding:12px 18px;background:#f8fafc;border-top:1px solid #e2e8f0;">
          <div style="font-size:10px;font-weight:700;color:#64748b;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px;">Ruta de procesos</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;">
            ${ruta.map((codProc, i) => {
              const proc = getProc(codProc);
              if (!proc) return '';
              const completado = procesosCompletados.find(p => p.codigo === codProc);
              const enCurso = procActual === codProc && o.estatus === 'en_produccion';
              const bg = completado ? proc.color : (enCurso ? proc.color + '22' : '#f1f5f9');
              const txt = completado ? '#fff' : (enCurso ? proc.color : '#94a3b8');
              const border = enCurso ? `2px dashed ${proc.color}` : '1px solid transparent';
              const maqAsig = (o.maquinas_asignadas && o.maquinas_asignadas[codProc]) || '';
              return `
                <div style="display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:99px;background:${bg};color:${txt};font-size:11px;font-weight:700;border:${border};">
                  <span>${completado ? '✓' : enCurso ? '🔄' : '○'}</span>
                  <span>${proc.icono}</span>
                  <span>${proc.codigo}</span>
                  ${maqAsig ? `<span class="text-mono" style="opacity:0.85;font-size:10px;background:rgba(0,0,0,0.15);padding:1px 5px;border-radius:4px;">${maqAsig}</span>` : ''}
                </div>
                ${i < ruta.length - 1 ? `<span style="color:#cbd5e1;font-size:10px;">→</span>` : ''}
              `;
            }).join('')}
          </div>
          ${o.fecha_inicio_programada ? `<div style="font-size:11px;color:#475569;margin-top:8px;">📅 Inicio plan: ${o.fecha_inicio_programada}${o.fecha_entrega_programada ? ` • 🎯 Entrega: ${o.fecha_entrega_programada}` : ''}</div>` : ''}
        </div>
      ` : ''}
      
      <!-- ⭐ NUEVO: AVANCE DEL PROCESO ACTUAL POR TURNOS -->
      ${(o.estatus === 'en_produccion' || (o.estatus === 'programada' && capturasProcActual.length > 0)) ? `
        <div style="padding:12px 18px;background:linear-gradient(90deg, ${color}08, transparent);border-top:1px solid #e2e8f0;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-size:11px;font-weight:800;color:${color};letter-spacing:0.05em;text-transform:uppercase;">
              📊 Avance ${getProc(procActual)?.icono || ''} ${getProc(procActual)?.nombre || procActual}
            </span>
            <span style="font-size:12px;font-weight:800;color:${pctProcActual >= 95 ? '#16a34a' : color};">${pctProcActual}%</span>
          </div>
          <div style="height:10px;background:#e2e8f0;border-radius:6px;overflow:hidden;margin-bottom:6px;">
            <div style="width:${pctProcActual}%;height:100%;background:${pctProcActual >= 95 ? '#16a34a' : color};transition:width 0.3s;"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#475569;">
            <span>✅ <strong>${fmtNum(acumProcActualKg)} kg</strong> acumulados${acumMermasKg > 0 ? ` · ⚠ ${fmtNum(acumMermasKg)} kg mermas` : ''}</span>
            <span>🎯 Meta: <strong>${fmtNum(metaProcKg)} kg</strong> · Faltan: ${fmtNum(Math.max(0, metaProcKg - acumProcActualKg))} kg</span>
          </div>
          ${capturasProcActual.length > 0 ? `
            <div style="margin-top:8px;padding:8px;background:#fff;border:1px solid #e2e8f0;border-radius:6px;">
              <div style="font-size:10px;font-weight:700;color:#64748b;margin-bottom:5px;">📋 ${capturasProcActual.length} turno(s) capturado(s):</div>
              <div style="display:flex;flex-direction:column;gap:3px;max-height:120px;overflow-y:auto;">
                ${capturasProcActual.slice().sort((a,b) => {
                  const ta = a.created_at?.seconds || 0;
                  const tb = b.created_at?.seconds || 0;
                  return tb - ta;
                }).map(c => {
                  const grupo = TURNOS.find(t => t.codigo === c.grupo);
                  return `
                    <div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:4px 6px;border-left:3px solid ${grupo?.color || '#94a3b8'};background:#f8fafc;border-radius:3px;">
                      <div>
                        ${c.fecha || ''} · ${c.turno === 'dia' ? '☀️' : '🌙'} 
                        <span style="background:${grupo?.color || '#94a3b8'};color:#fff;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;margin:0 4px;">${c.grupo || '?'}</span>
                        <span style="color:#475569;">${c.operador || ''}</span>
                      </div>
                      <div>
                        <strong style="color:#16a34a;">${fmtNum(c.producido_kg||0)} kg</strong>
                        ${c.mermas_kg ? `<span style="color:#dc2626;font-size:10px;margin-left:4px;">⚠${fmtNum(c.mermas_kg)}</span>` : ''}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          ` : ''}
        </div>
      ` : ''}
      
      ${pct > 0 && o.estatus !== 'en_produccion' ? `
        <div style="padding:0 18px 12px;">
          <div style="background:#e2e8f0;height:8px;border-radius:99px;overflow:hidden;">
            <div style="background:${color};height:100%;width:${pct}%;transition:width 0.3s;"></div>
          </div>
        </div>
      ` : ''}
      
      ${lotesODP.length > 0 ? `
        <div style="padding:8px 18px 12px;font-size:11px;color:#475569;">
          🏷️ Lotes: ${lotesODP.map(l => `<span class="text-mono" style="font-weight:600;background:#f1f5f9;padding:2px 6px;border-radius:4px;margin-right:4px;">${l.codigo}</span>`).join('')}
        </div>
      ` : ''}
      
      <div style="padding:10px 18px;border-top:1px solid #e2e8f0;display:flex;gap:8px;flex-wrap:wrap;">
        ${o.estatus === 'pendiente_planeacion' ? `
          <button class="btn-primary" onclick="abrirModal('programar-odp','${o.id}')" style="padding:8px 14px;">${ICONS.edit} Programar</button>
        ` : ''}
        ${o.estatus === 'programada' ? `
          <button class="btn-primary" onclick="abrirModal('capturar-turno','${o.id}')" style="padding:8px 14px;background:#3b82f6;">📝 Capturar mi turno</button>
          <button class="btn-secondary" onclick="abrirModal('programar-odp','${o.id}')" style="padding:8px 14px;">${ICONS.edit} Reprogramar</button>
        ` : ''}
        ${o.estatus === 'en_produccion' ? `
          <button class="btn-primary" onclick="abrirModal('capturar-turno','${o.id}')" style="padding:8px 14px;background:#3b82f6;">📝 Capturar mi turno</button>
          ${pctProcActual >= 95 ? `
            <button class="btn-primary" onclick="abrirModal('completar-proceso','${o.id}')" style="padding:8px 14px;background:#16a34a;">${ICONS.check} Cerrar ${getProc(procActual)?.nombre || procActual} (${pctProcActual}%)</button>
          ` : `
            <button onclick="abrirModal('completar-proceso','${o.id}')" style="padding:8px 14px;background:#fff;color:#f59e0b;border:1px solid #f59e0b;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;">⚠ Cerrar antes de meta (${pctProcActual}%)</button>
          `}
        ` : ''}
        <button class="btn-secondary" onclick="abrirModal('detalle-odp','${o.id}')" style="padding:8px 14px;margin-left:auto;">${ICONS.list} Detalle</button>
      </div>
    </div>
  `;
}

// VISTA: CAPTURA DE PRODUCCIÓN (PRO/CEO/ADMIN)

function renderCapturaProduccion() {
  const odpsActivas = state.ordenes_produccion.filter(o => 
    ['programada', 'en_produccion'].includes(o.estatus)
  );
  
  const filtro = (state.filtros.captura || '').toLowerCase();
  let arr = odpsActivas;
  if (filtro) arr = arr.filter(o => 
    (o.folio + ' ' + (o.cliente_nombre||'') + ' ' + (o.producto_codigo||'')).toLowerCase().includes(filtro)
  );
  
  // Agrupar por proceso actual
  const porProceso = {};
  arr.forEach(o => {
    const procCod = o.proceso_actual || 'sin-proceso';
    if (!porProceso[procCod]) porProceso[procCod] = [];
    porProceso[procCod].push(o);
  });
  
  return `
    <div class="toolbar">
      <input class="input" id="filtro-captura" style="max-width:380px;" placeholder="Buscar ODP, cliente, producto..." value="${filtro}" autocomplete="off" />
      <span style="font-size:12px;color:#64748b;">${arr.length} ODPs activas</span>
    </div>
    
    ${arr.length === 0 ? `
      <div style="padding:60px;text-align:center;color:#94a3b8;background:#fff;border-radius:14px;border:1px solid #e2e8f0;">
        🔄 No hay producción activa. PLN debe programar ODPs primero.
      </div>
    ` : Object.keys(porProceso).sort().map(procCod => {
      const proc = getProc(procCod);
      const titulo = proc ? `${proc.icono} ${proc.codigo} — ${proc.nombre}` : '⚪ Sin proceso definido';
      const color = proc?.color || '#64748b';
      return `
        <div style="margin-bottom:24px;">
          <div style="font-size:14px;font-weight:800;color:${color};margin-bottom:10px;display:flex;align-items:center;gap:8px;padding:8px 12px;background:${color}11;border-radius:8px;border-left:4px solid ${color};">
            ${titulo} <span style="font-size:11px;color:#94a3b8;font-weight:500;margin-left:auto;">${porProceso[procCod].length} ODP${porProceso[procCod].length === 1 ? '' : 's'}</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:12px;">
            ${porProceso[procCod].map(o => renderTarjetaODP(o, 'captura')).join('')}
          </div>
        </div>
      `;
    }).join('')}
  `;
}

function renderCalidad() {
  const subTab = state.tabs.calidad || 'pendientes';
  const odpsPendientes = state.ordenes_produccion.filter(o => o.estatus === 'pendiente_calidad');
  const odpsLiberadas = state.ordenes_produccion.filter(o => 
    ['liberada_empaque','pendiente_almacen','en_almacen_planta','en_transito_cedis','en_cedis_mty','en_cedis_mex','embarcada','entregada'].includes(o.estatus)
  );
  const odpsRechazadas = state.ordenes_produccion.filter(o => o.estatus === 'rechazada');
  
  let arr = [];
  if (subTab === 'pendientes') arr = odpsPendientes;
  else if (subTab === 'liberadas') arr = odpsLiberadas.slice(0, 50);
  else if (subTab === 'rechazadas') arr = odpsRechazadas.slice(0, 30);
  
  const filtro = (state.filtros.calidad || '').toLowerCase();
  if (filtro) arr = arr.filter(o => 
    (o.folio + ' ' + (o.cliente_nombre||'') + ' ' + (o.producto_codigo||'')).toLowerCase().includes(filtro)
  );
  
  return `
    <div style="margin-bottom:18px;">
      <div style="display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid #e2e8f0;padding-bottom:8px;">
        <button class="tab-btn ${subTab === 'pendientes' ? 'active' : ''}" onclick="cambiarTab('calidad','pendientes')">🟡 Por liberar (${odpsPendientes.length})</button>
        <button class="tab-btn ${subTab === 'liberadas' ? 'active' : ''}" onclick="cambiarTab('calidad','liberadas')">✅ Liberadas (${odpsLiberadas.length})</button>
        <button class="tab-btn ${subTab === 'rechazadas' ? 'active' : ''}" onclick="cambiarTab('calidad','rechazadas')">❌ Rechazadas (${odpsRechazadas.length})</button>
      </div>
    </div>
    
    <div class="toolbar">
      <input class="input" id="filtro-calidad" style="max-width:380px;" placeholder="Buscar por folio, cliente, producto..." value="${filtro}" autocomplete="off" />
      <span style="font-size:12px;color:#64748b;">${arr.length} ODPs</span>
    </div>
    
    ${arr.length === 0 ? `
      <div style="padding:60px;text-align:center;color:#94a3b8;background:#fff;border-radius:14px;border:1px solid #e2e8f0;">
        ${subTab === 'pendientes' ? '🎉 No hay producción pendiente de liberación' : 
          subTab === 'liberadas' ? '✅ Sin liberaciones recientes' :
          '✓ Sin rechazos'}
      </div>
    ` : `
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${arr.map(o => renderTarjetaCalidad(o, subTab)).join('')}
      </div>
    `}
  `;
}

function renderTarjetaCalidad(o, contexto) {
  const um = (o.um || 'kg').toLowerCase();
  const ruta = o.ruta_procesos || [];
  const procesosCompletados = o.procesos_completados || [];
  const cantidadProducida = o.cantidad_producida_final || 0;
  const cantidadOriginal = o.cantidad || 0;
  const pctCalidad = cantidadOriginal > 0 ? (cantidadProducida / cantidadOriginal * 100).toFixed(1) : 0;
  const pctClass = pctCalidad >= 90 ? '#16a34a' : '#dc2626';
  const lote = state.lotes.find(l => l.odp_id === o.id);
  
  const colores = {
    pendiente_calidad: '#f59e0b',
    liberada_empaque: '#16a34a',
    rechazada: '#dc2626'
  };
  const labels = {
    pendiente_calidad: '🟡 Pendiente liberación',
    liberada_empaque: '🟢 Liberada → empaque',
    pendiente_almacen: '📦 Pendiente almacén',
    en_almacen_planta: '🏭 En almacén planta',
    rechazada: '❌ Rechazada'
  };
  const color = colores[o.estatus] || '#64748b';
  
  return `
    <div class="panel" style="border-left:4px solid ${color};">
      <div style="padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
        <div style="flex:1;min-width:280px;">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;">
            <span class="text-mono" style="font-weight:800;font-size:15px;">${o.folio}</span>
            <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;background:${color}22;color:${color};">${labels[o.estatus] || o.estatus}</span>

function renderSeguimiento() {
  const filtro = (state.filtros.seguimiento || '').toLowerCase();
  const filtroCli = state.filtros.seguimiento_cliente || '';
  const tabActivo = state.filtros.seguimiento_tab || 'activos'; // activos | completados | cancelados | urgentes
  
  // Pre-calcular fase para todos los pedidos UNA SOLA VEZ (caché en memoria)
  const todosPedidos = state.pedidos.map(p => ({
    p,
    fase: calcularFasePI(p)
  }));
  
  // Categorizar
  const todosActivos = todosPedidos.filter(x => 
    !x.fase.cancelado && x.fase.porcentaje < 100 && x.p.estatus !== 'cancelado'
  );
  const todosCompletados = todosPedidos.filter(x => 
    x.fase.porcentaje === 100 && !x.fase.cancelado && x.p.estatus !== 'cancelado'
  );
  const todosCancelados = todosPedidos.filter(x => 
    x.fase.cancelado || x.p.estatus === 'cancelado'
  );
  
  // PIs urgentes (con fecha de entrega vencida y no completados)
  const hoy = new Date().toISOString().split('T')[0];
  const todosUrgentes = todosActivos.filter(x => 
    x.p.fecha_entrega && x.p.fecha_entrega <= hoy
  );
  
  // Filtrar por tab
  let arrConFase = [];
  if (tabActivo === 'activos') arrConFase = todosActivos;
  else if (tabActivo === 'completados') arrConFase = todosCompletados;
  else if (tabActivo === 'cancelados') arrConFase = todosCancelados;
  else if (tabActivo === 'urgentes') arrConFase = todosUrgentes;
  
  // Aplicar filtros texto y cliente
  if (filtro) arrConFase = arrConFase.filter(({p}) => 
    (p.folio + ' ' + (p.cliente_nombre||'') + ' ' + (p.cliente_codigo||'') + ' ' + (p.odc_cliente||'')).toLowerCase().includes(filtro)
  );
  if (filtroCli) arrConFase = arrConFase.filter(({p}) => p.cliente_codigo === filtroCli);
  
  // Ordenar: por fecha más reciente primero
  arrConFase.sort((a, b) => {
    const fa = a.p.created_at?.seconds || 0;
    const fb = b.p.created_at?.seconds || 0;
    return fb - fa;
  });
  
  const clientesConPedidos = [...new Set(state.pedidos.map(p => p.cliente_codigo))]
    .map(cod => state.clientes.find(c => c.codigo === cod))
    .filter(Boolean)
    .sort((a,b) => a.nombre.localeCompare(b.nombre));
  
  return `
    <!-- BÚSQUEDA + FILTROS -->
    <div style="padding:18px;background:#fff;border:2px solid #3b82f6;border-radius:14px;margin-bottom:14px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.08);">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
        <div style="font-size:24px;">🔍</div>
        <div style="flex:1;">
          <input class="input" id="filtro-seguimiento" style="width:100%;padding:14px;font-size:16px;font-weight:600;border:2px solid #cbd5e1;border-radius:10px;" placeholder="Escribe PI-XXXXX, nombre del cliente, código de producto..." value="${filtro}" autocomplete="off" />
        </div>
        ${(filtro || filtroCli) ? `<button onclick="limpiarFiltroSeguimiento()" style="padding:10px 14px;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;border-radius:8px;cursor:pointer;font-weight:700;">✗ Limpiar</button>` : ''}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <select class="input" id="filtro-seguimiento-cliente" style="max-width:320px;font-size:13px;">
          <option value="">📋 Todos los clientes (${clientesConPedidos.length})</option>
          ${clientesConPedidos.map(c => `<option value="${c.codigo}" ${filtroCli === c.codigo ? 'selected' : ''}>${c.codigo} - ${c.nombre}</option>`).join('')}
        </select>
        <span style="font-size:12px;color:#64748b;font-weight:600;margin-left:auto;">📊 Mostrando ${arrConFase.length} de ${todosPedidos.length}</span>
      </div>
    </div>
    
    <!-- TABS PRINCIPALES -->
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;">
      <button onclick="setTabSeguimiento('activos')" style="padding:10px 18px;background:${tabActivo==='activos'?'#3b82f6':'#fff'};color:${tabActivo==='activos'?'#fff':'#475569'};border:1px solid ${tabActivo==='activos'?'#3b82f6':'#e2e8f0'};border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px;">
        🔄 Activos <span style="background:${tabActivo==='activos'?'#fff':'#3b82f6'};color:${tabActivo==='activos'?'#3b82f6':'#fff'};padding:2px 8px;border-radius:99px;font-size:11px;font-weight:800;">${todosActivos.length}</span>
      </button>
      ${todosUrgentes.length > 0 ? `
        <button onclick="setTabSeguimiento('urgentes')" style="padding:10px 18px;background:${tabActivo==='urgentes'?'#dc2626':'#fff'};color:${tabActivo==='urgentes'?'#fff':'#dc2626'};border:1px solid #dc2626;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px;animation:${tabActivo==='urgentes'?'none':'pulse 1.5s ease-in-out infinite'};">
          🚨 Urgentes <span style="background:${tabActivo==='urgentes'?'#fff':'#dc2626'};color:${tabActivo==='urgentes'?'#dc2626':'#fff'};padding:2px 8px;border-radius:99px;font-size:11px;font-weight:800;">${todosUrgentes.length}</span>
        </button>
      ` : ''}
      <button onclick="setTabSeguimiento('completados')" style="padding:10px 18px;background:${tabActivo==='completados'?'#16a34a':'#fff'};color:${tabActivo==='completados'?'#fff':'#16a34a'};border:1px solid #16a34a;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px;">
        🏁 Completados <span style="background:${tabActivo==='completados'?'#fff':'#16a34a'};color:${tabActivo==='completados'?'#16a34a':'#fff'};padding:2px 8px;border-radius:99px;font-size:11px;font-weight:800;">${todosCompletados.length}</span>
      </button>
      ${todosCancelados.length > 0 ? `
        <button onclick="setTabSeguimiento('cancelados')" style="padding:10px 18px;background:${tabActivo==='cancelados'?'#94a3b8':'#fff'};color:${tabActivo==='cancelados'?'#fff':'#475569'};border:1px solid #cbd5e1;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px;">
          ❌ Cancelados <span style="background:${tabActivo==='cancelados'?'#fff':'#94a3b8'};color:${tabActivo==='cancelados'?'#475569':'#fff'};padding:2px 8px;border-radius:99px;font-size:11px;font-weight:800;">${todosCancelados.length}</span>
        </button>
      ` : ''}
    </div>
    
    ${arrConFase.length === 0 ? `
      <div style="padding:80px 20px;text-align:center;color:#94a3b8;background:#fff;border-radius:14px;border:1px solid #e2e8f0;">
        <div style="font-size:48px;margin-bottom:12px;">${tabActivo === 'completados' ? '🏁' : tabActivo === 'cancelados' ? '❌' : '📋'}</div>
        <div style="font-weight:700;color:#475569;font-size:16px;">${
          (filtro || filtroCli) ? 'No hay pedidos que coincidan con los filtros' : 
          tabActivo === 'activos' ? 'Sin pedidos activos' :
          tabActivo === 'completados' ? 'Aún no hay pedidos completados' :
          tabActivo === 'urgentes' ? 'Sin pedidos urgentes 🎉' : 'Sin pedidos cancelados'
        }</div>
        <div style="font-size:13px;margin-top:6px;">${(filtro || filtroCli) ? 'Prueba con otra búsqueda o limpia los filtros' : ''}</div>
      </div>
    ` : `
      <div style="display:flex;flex-direction:column;gap:14px;">
        ${arrConFase.slice(0, 50).map(({p, fase}) => renderTarjetaSeguimiento(p, fase)).join('')}
      </div>
      ${arrConFase.length > 50 ? `<div style="padding:14px;text-align:center;color:#94a3b8;font-size:12px;">Mostrando 50 de ${arrConFase.length} pedidos</div>` : ''}
    `}
  `;
}
