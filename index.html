<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewPack ERP</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #0f172a; min-height: 100vh; }
.text-mono { font-family: 'SF Mono', Monaco, Consolas, monospace; }

/* LOGIN */
.login-bg { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #16a34a 0%, #0891b2 100%); padding: 20px; }
.login-box { background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 25px 50px rgba(0,0,0,.15); width: 100%; max-width: 420px; }
.logo { font-size: 28px; font-weight: 900; color: #16a34a; margin-bottom: 4px; letter-spacing: -1px; }
.subtitle { font-size: 13px; color: #64748b; margin-bottom: 30px; }

/* APP LAYOUT */
.app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
.sidebar { background: #0f172a; color: #fff; padding: 20px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.sidebar-logo { font-size: 18px; font-weight: 900; color: #4ade80; padding: 0 20px 18px; border-bottom: 1px solid #1e293b; margin-bottom: 14px; }
.sidebar-section { font-size: 9px; color: #64748b; padding: 12px 20px 4px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: #cbd5e1; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-size: 13px; transition: all 0.15s; }
.nav-item:hover { background: #1e293b; color: #fff; }
.nav-item.active { background: #16a34a; color: #fff; font-weight: 600; }

.main { padding: 0; }
.topbar { background: #fff; padding: 14px 28px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
.topbar h1 { font-size: 20px; font-weight: 800; }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.user-info { font-size: 12px; color: #475569; text-align: right; }
.content { padding: 24px 28px; }

/* COMPONENTS */
.field { margin-bottom: 14px; }
.field-label { display: block; font-size: 11px; font-weight: 700; color: #475569; margin-bottom: 5px; letter-spacing: 0.05em; text-transform: uppercase; }
.input { width: 100%; padding: 10px 12px; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 14px; transition: border-color 0.15s; background: #fff; font-family: inherit; }
.input:focus { outline: none; border-color: #16a34a; }
.btn-primary { background: #16a34a; color: #fff; padding: 10px 18px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; }
.btn-primary:hover { background: #15803d; }
.btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
.btn-secondary { background: #f1f5f9; color: #0f172a; padding: 10px 18px; border: 1px solid #cbd5e1; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
.btn-secondary:hover { background: #e2e8f0; }
.icon-btn { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 6px 8px; border-radius: 6px; cursor: pointer; color: #475569; }
.icon-btn:hover { background: #e2e8f0; }

.grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
.stat-card { background: #fff; padding: 18px; border-radius: 12px; border: 1px solid #e2e8f0; }
.stat-icon { font-size: 24px; margin-bottom: 8px; }
.stat-value { font-size: 26px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.stat-label { font-size: 12px; color: #64748b; }

.panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
.panel-header { padding: 14px 18px; border-bottom: 1px solid #e2e8f0; font-weight: 700; font-size: 13px; background: #f8fafc; }

.tabs { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; }
.tab { padding: 10px 16px; border: none; background: none; cursor: pointer; font-size: 13px; color: #64748b; font-weight: 600; border-bottom: 3px solid transparent; margin-bottom: -1px; }
.tab.active { color: #16a34a; border-bottom-color: #16a34a; }
.tab:hover { color: #16a34a; }

.tab-btn { padding: 8px 14px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; font-size: 12px; color: #475569; font-weight: 600; border-radius: 8px; transition: all 0.15s; }
.tab-btn.active { background: #16a34a; color: #fff; border-color: #16a34a; }
.tab-btn:hover:not(.active) { background: #f1f5f9; }

.table-wrap { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: auto; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px 14px; background: #f8fafc; font-size: 11px; font-weight: 700; color: #475569; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; }
td { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
tr:hover td { background: #f8fafc; }

.toolbar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.dept-tag { display: inline-block; padding: 3px 8px; background: #f1f5f9; color: #475569; border-radius: 6px; font-size: 11px; font-weight: 600; }

.modal-bg { position: fixed; inset: 0; background: rgba(15,23,42,.6); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal { background: #fff; border-radius: 14px; width: 100%; max-width: 520px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,.25); }
.modal-header { padding: 18px 22px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
.modal-body { padding: 22px; overflow-y: auto; flex: 1; }

.toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 20px; border-radius: 10px; color: #fff; font-weight: 600; font-size: 14px; box-shadow: 0 10px 25px rgba(0,0,0,.15); z-index: 1000; max-width: 380px; animation: slideIn 0.3s; }
.toast.success { background: #16a34a; }
.toast.error { background: #dc2626; }
.toast.info { background: #3b82f6; }
@keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #e2e8f0; border-top-color: #16a34a; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.loading-content { text-align: center; }
.loading-content .spinner { width: 40px; height: 40px; border-width: 3px; margin-bottom: 12px; }

@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}
</style>
</head>
<body>

<div id="app"></div>

<!-- Firebase desde CDN (no necesitas instalar nada) -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { 
  getFirestore, collection, doc, setDoc, addDoc, updateDoc, getDoc, getDocs, 
  query, where, orderBy, limit, onSnapshot, serverTimestamp, runTransaction, writeBatch, increment
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

// ============================================================
// CONFIGURACIÓN — REEMPLAZA CON LA TUYA
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyAR0YilcqTuDHs109pKmAXT_fceW_lXhI0",
  authDomain: "newpack-erp.firebaseapp.com",
  projectId: "newpack-erp",
  storageBucket: "newpack-erp.firebasestorage.app",
  messagingSenderId: "16389080236",
  appId: "1:16389080236:web:ce374561ef84b79adc8b09",
  measurementId: "G-5887FYNLC8"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

// Hacer disponible globalmente para acciones de UI
window.fb = { auth, db, signInWithEmailAndPassword, signOut, doc, setDoc, addDoc, updateDoc, getDoc, getDocs, collection, query, where, orderBy, limit, onSnapshot, runTransaction, writeBatch, increment, serverTimestamp };

// ============================================================
// ESTADO GLOBAL
// ============================================================
const state = {
  user: null,
  vista: 'dashboard',
  almacenes: [],
  clientes: [],
  productos_pt: [],
  cliente_productos: [],
  pedidos: [],
  pedido_lineas: [],
  ordenes_venta: [],
  ordenes_produccion: [],
  capturas_produccion: [],
  lotes: [],
  tarimas: [],
  packing_lists: [],
  comentarios_pedidos: [],
  notificaciones: [],
  modal: null,
  modalData: null,
  filtros: {},
  tabs: {},
  pedidoData: null,
  busqProd: '',
  loadingInicial: true,
  loadingAccion: false,
  unsubscribers: [] // listeners de real-time para limpiar al cerrar sesión
};
window.state = state;

// ============================================================
// PRODUCCIÓN: turnos y configuración
// ============================================================
const TURNOS = [
  { codigo: 'T1', nombre: 'Turno 1 (06:00-14:00)', hora_inicio: '06:00', color: '#f59e0b' },
  { codigo: 'T2', nombre: 'Turno 2 (14:00-22:00)', hora_inicio: '14:00', color: '#3b82f6' },
  { codigo: 'T3', nombre: 'Turno 3 (22:00-06:00)', hora_inicio: '22:00', color: '#7c3aed' },
];
window.TURNOS = TURNOS;

// ============================================================
// PRODUCCIÓN: catálogo de procesos productivos
// ============================================================
const PROCESOS = [
  { codigo: 'P1-EXT', nombre: 'Extrusión',         icono: '🔥', color: '#dc2626' },
  { codigo: 'P2-IMP', nombre: 'Impresión',          icono: '🎨', color: '#7c3aed' },
  { codigo: 'P3-BS',  nombre: 'Bolsa Suelta',       icono: '🛍️', color: '#3b82f6' },
  { codigo: 'P4-BR',  nombre: 'Bolsa en Rollo',     icono: '🌀', color: '#0891b2' },
  { codigo: 'P6-REF', nombre: 'Refilación/Embobinado', icono: '✂️', color: '#f59e0b' },
];
window.PROCESOS = PROCESOS;
const getProc = (cod) => PROCESOS.find(p => p.codigo === cod);
window.getProc = getProc;

// Sugerir ruta de procesos según tipo de producto (basado en código del tipo)
function sugerirRutaProcesos(producto) {
  if (!producto) return ['P1-EXT'];
  const tipo = producto.tipo || '';
  // Extrusión es base de TODO producto plástico
  const ruta = ['P1-EXT'];
  // Películas planas refiladas → P6-REF
  if (tipo.includes('REFILADA') || tipo === 'PELICULA PLANA REFILADA') {
    ruta.push('P6-REF');
  }
  // Bolsas en rollo → P4-BR
  if (tipo.includes('ROLLO') || tipo.includes('BR')) {
    ruta.push('P4-BR');
  } else if (tipo.includes('BOLSA') || tipo.includes('HOJA') || tipo.includes('CORTE') || tipo.includes('MANGA')) {
    // Bolsas sueltas y cortes → P3-BS
    ruta.push('P3-BS');
  }
  return ruta;
}
window.sugerirRutaProcesos = sugerirRutaProcesos;

// ============================================================
// UNIDADES DE MEDIDA
// ============================================================
const UM_OPCIONES = ['kg', 'pza', 'millar', 'rollo', 'm'];
const UM_LABELS = { kg: 'Kg', pza: 'Pieza', millar: 'Millar', rollo: 'Rollo', m: 'Metro lineal' };
const UM_ENTEROS = ['pza', 'millar', 'rollo']; // estas UM no aceptan decimales
window.UM_OPCIONES = UM_OPCIONES;
window.UM_LABELS = UM_LABELS;
window.UM_ENTEROS = UM_ENTEROS;

// ============================================================
// CONVERSIÓN UM ↔ KG (fórmula NewPack)
// peso_millar (kg) = (ancho + fuelle) × largo × 0.470 × calibre/10000
// (calibre 30 → 0.0030, calibre 100 → 0.0100, calibre 200 → 0.0200)
// peso_pieza (kg) = peso_millar / 1000
// ============================================================
const FACTOR_PESO = 0.470; // densidad efectiva del polietileno

function calcularPesoMillar(producto) {
  if (!producto) return 0;
  const ancho = Number(producto.ancho) || 0;
  const fuelle = Number(producto.fuelle) || 0;
  const largo = Number(producto.largo) || 0;
  const calibre = Number(producto.calibre) || 0;
  if (!ancho || !largo || !calibre) return 0;
  const calibreDecimal = calibre / 10000; // 30 → 0.0030, 100 → 0.0100
  return (ancho + fuelle) * largo * FACTOR_PESO * calibreDecimal;
}
window.calcularPesoMillar = calcularPesoMillar;

function calcularPesoPieza(producto) {
  return calcularPesoMillar(producto) / 1000;
}
window.calcularPesoPieza = calcularPesoPieza;

// Convierte una cantidad cualquiera a kg dado un producto
// Devuelve null si no se puede convertir (ej: rollo/metro)
function convertirAKg(cantidad, um, producto) {
  if (!cantidad || !producto) return null;
  const umLow = (um || 'kg').toLowerCase();
  const cant = Number(cantidad) || 0;
  if (umLow === 'kg') return cant;
  if (umLow === 'millar') return cant * calcularPesoMillar(producto);
  if (umLow === 'pza') return cant * calcularPesoPieza(producto);
  return null; // rollo/m no se convierten
}
window.convertirAKg = convertirAKg;

// Formatea una conversión UM→Kg para mostrar al lado: "5,000 Pieza ≈ 350 kg"
function fmtConversionKg(cantidad, um, producto) {
  const kg = convertirAKg(cantidad, um, producto);
  if (kg === null) return '';
  const umLow = (um || 'kg').toLowerCase();
  if (umLow === 'kg') return ''; // no se muestra conversión si ya está en kg
  return `≈ ${kg.toLocaleString('es-MX', { maximumFractionDigits: 2 })} kg`;
}
window.fmtConversionKg = fmtConversionKg;

// ============================================================
// HELPERS
// ============================================================
const $ = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));

window.$ = $;
window.$$ = $$;

function fmtFecha(f) {
  if (!f) return '';
  const d = f.toDate ? f.toDate() : new Date(f);
  return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
}
function fmtFechaHora(f) {
  if (!f) return '';
  const d = f.toDate ? f.toDate() : new Date(f);
  return d.toLocaleString('es-MX', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
}
function fmtNum(n) {
  return Number(n || 0).toLocaleString('es-MX', { maximumFractionDigits: 2 });
}
function fmtCantidadUM(n, um) {
  const umLow = (um || 'kg').toLowerCase();
  const label = UM_LABELS[umLow] || um || 'Kg';
  // Para UM enteras, no mostrar decimales
  const numStr = UM_ENTEROS.includes(umLow) 
    ? Number(n || 0).toLocaleString('es-MX', { maximumFractionDigits: 0 })
    : Number(n || 0).toLocaleString('es-MX', { maximumFractionDigits: 2 });
  return numStr + ' ' + label;
}
window.fmtCantidadUM = fmtCantidadUM;
function moneda(n) {
  return '$' + Number(n || 0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

window.fmtFecha = fmtFecha;
window.fmtFechaHora = fmtFechaHora;
window.fmtNum = fmtNum;
window.moneda = moneda;

function toast(msg, tipo = 'success') {
  const el = document.createElement('div');
  el.className = 'toast ' + tipo;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
window.toast = toast;

const ICONS = {
  home: '🏠', cart: '🛒', users: '👥', boxes: '📦', factory: '🏭',
  warehouse: '🏗️', file: '📄', chart: '📊', list: '📋', search: '🔍',
  plus: '➕', check: '✓', x: '✕', edit: '✏️', trash: '🗑️',
  send: '📤', shipping: '🚚', building: '🏢', alert: '⚠️', bell: '🔔'
};
window.ICONS = ICONS;

// ============================================================
// AUTH
// ============================================================
window.hacerLogin = async (correo, password) => {
  await signInWithEmailAndPassword(auth, correo, password);
};

window.hacerLogout = async () => {
  state.unsubscribers.forEach(u => u());
  state.unsubscribers = [];
  await signOut(auth);
};

// ============================================================
// CARGAR PERFIL Y DATOS
// ============================================================
async function cargarPerfil(uid) {
  const docSnap = await getDoc(doc(db, 'usuarios', uid));
  if (!docSnap.exists()) {
    throw new Error('Tu usuario no tiene perfil. Pídele al admin que lo cree.');
  }
  state.user = { id: uid, ...docSnap.data() };
  return state.user;
}

async function cargarTodo() {
  state.loadingInicial = true;
  try {
    const cargas = [
      getDocs(query(collection(db, 'almacenes'), where('activo', '==', true))).then(s => state.almacenes = s.docs.map(d => ({ id: d.id, ...d.data() }))),
      getDocs(query(collection(db, 'clientes'), where('activo', '==', true), orderBy('codigo'))).then(s => state.clientes = s.docs.map(d => ({ id: d.id, ...d.data() }))),
      getDocs(query(collection(db, 'productos_pt'), where('activo', '==', true))).then(s => state.productos_pt = s.docs.map(d => ({ id: d.id, ...d.data() }))),
      getDocs(query(collection(db, 'cliente_productos'), where('activo', '==', true))).then(s => state.cliente_productos = s.docs.map(d => ({ id: d.id, ...d.data() }))),
    ];
    await Promise.all(cargas);
    
    // Listeners de real-time para datos que cambian frecuentemente
    state.unsubscribers.push(
      onSnapshot(query(collection(db, 'pedidos'), orderBy('created_at', 'desc'), limit(200)), (snap) => {
        state.pedidos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (state.user) render();
      }),
      onSnapshot(query(collection(db, 'pedido_lineas')), (snap) => {
        state.pedido_lineas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (state.user) render();
      }),
      onSnapshot(query(collection(db, 'ordenes_venta'), orderBy('created_at', 'desc'), limit(200)), (snap) => {
        state.ordenes_venta = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (state.user) render();
      }),
      onSnapshot(query(collection(db, 'ordenes_produccion'), orderBy('created_at', 'desc'), limit(200)), (snap) => {
        state.ordenes_produccion = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (state.user) render();
      }),
      onSnapshot(query(collection(db, 'capturas_produccion'), orderBy('created_at', 'desc'), limit(500)), (snap) => {
        state.capturas_produccion = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (state.user) render();
      }),
      onSnapshot(query(collection(db, 'lotes'), orderBy('created_at', 'desc'), limit(500)), (snap) => {
        state.lotes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (state.user) render();
      }),
      onSnapshot(query(collection(db, 'tarimas'), orderBy('created_at', 'desc'), limit(1000)), (snap) => {
        state.tarimas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (state.user) render();
      }),
      onSnapshot(query(collection(db, 'packing_lists'), orderBy('created_at', 'desc'), limit(500)), (snap) => {
        state.packing_lists = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (state.user) render();
      }),
      onSnapshot(query(collection(db, 'comentarios_pedidos'), orderBy('created_at', 'desc'), limit(500)), (snap) => {
        state.comentarios_pedidos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (state.user) render();
      }),
      onSnapshot(query(collection(db, 'notificaciones'), orderBy('created_at', 'desc'), limit(50)), (snap) => {
        state.notificaciones = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (state.user) render();
      })
    );
  } catch (err) {
    console.error('Error:', err);
    toast('Error cargando datos: ' + err.message, 'error');
  } finally {
    state.loadingInicial = false;
  }
}

// ============================================================
// HELPERS DE DATOS
// ============================================================
window.getCliente = (codigo) => state.clientes.find(c => c.codigo === codigo);
window.getProductoPT = (codigo) => state.productos_pt.find(p => p.codigo === codigo);
window.productosDeCliente = (clienteCod) => 
  state.cliente_productos
    .filter(cp => cp.cliente_codigo === clienteCod)
    .map(cp => {
      const p = window.getProductoPT(cp.producto_codigo);
      return p ? { ...p, precio: Number(cp.precio) || 0, codigo_cliente_interno: cp.codigo_cliente_interno || '', cp_id: cp.id } : null;
    })
    .filter(Boolean);
window.pedidoLineas = (pedidoId) => state.pedido_lineas.filter(l => l.pedido_id === pedidoId);
window.ovsDePedido = (pedidoId) => state.ordenes_venta.filter(o => o.pedido_id === pedidoId);
window.odpsDePedido = (pedidoId) => state.ordenes_produccion.filter(o => o.pedido_id === pedidoId);

// ============================================================
// CONTADORES (folios secuenciales)
// ============================================================
async function siguienteFolio(tipo) {
  const ref = doc(db, 'contadores', tipo);
  let nuevo;
  await runTransaction(db, async (tx) => {
    const snap = await tx.get(ref);
    const actual = snap.exists() ? Number(snap.data().ultimo) || 0 : 0;
    nuevo = actual + 1;
    tx.set(ref, { ultimo: nuevo }, { merge: true });
  });
  return nuevo;
}
window.siguienteFolio = siguienteFolio;

// ============================================================
// RENDER
// ============================================================
function render() {
  const root = $('#app');
  if (!state.user) {
    root.innerHTML = renderLogin();
    attachLoginEvents();
    return;
  }
  if (state.loadingInicial) {
    root.innerHTML = `<div class="loading-overlay"><div class="loading-content"><div class="spinner"></div><div>Cargando...</div></div></div>`;
    return;
  }
  root.innerHTML = renderApp();
  attachAppEvents();
}
window.render = render;

function renderLogin() {
  return `
    <div class="login-bg">
      <div class="login-box">
        <div class="logo">NewPack ERP</div>
        <div class="subtitle">Sistema de gestión integral</div>
        <form id="login-form">
          <div class="field">
            <label class="field-label">Correo electrónico</label>
            <input class="input" type="email" id="login-email" required autocomplete="email" />
          </div>
          <div class="field">
            <label class="field-label">Contraseña</label>
            <input class="input" type="password" id="login-pass" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:12px;" id="login-btn">
            Iniciar sesión
          </button>
          <div id="login-error" style="margin-top:12px;color:#dc2626;font-size:13px;display:none;text-align:center;"></div>
        </form>
        <div style="margin-top:24px;padding-top:18px;border-top:1px solid #e2e8f0;font-size:11px;color:#94a3b8;text-align:center;">
          Powered by Firebase
        </div>
      </div>
    </div>
  `;
}

function attachLoginEvents() {
  $('#login-form').onsubmit = async (e) => {
    e.preventDefault();
    const btn = $('#login-btn');
    const err = $('#login-error');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Verificando...';
    err.style.display = 'none';
    try {
      await window.hacerLogin($('#login-email').value, $('#login-pass').value);
    } catch (e) {
      let mensaje = e.message;
      if (mensaje.includes('invalid-credential') || mensaje.includes('wrong-password') || mensaje.includes('user-not-found')) {
        mensaje = 'Correo o contraseña incorrectos';
      }
      err.textContent = mensaje;
      err.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'Iniciar sesión';
    }
  };
}

function renderProductosPT() {
  const filtro = (state.filtros.productos_pt || '').toLowerCase();
  const filtroUM = state.filtros.productos_pt_um || '';
  const filtroMat = state.filtros.productos_pt_material || '';
  const filtroTipo = state.filtros.productos_pt_tipo || '';
  
  let arr = state.productos_pt;
  if (filtro) arr = arr.filter(p => 
    (p.codigo + ' ' + (p.descripcion||'') + ' ' + (p.material||'') + ' ' + (p.tipo||'') + ' ' + (p.color||'') + ' ' + (p.aditivo||'')).toLowerCase().includes(filtro)
  );
  if (filtroUM) arr = arr.filter(p => (p.um || 'kg').toLowerCase() === filtroUM);
  if (filtroMat) arr = arr.filter(p => (p.material || '') === filtroMat);
  if (filtroTipo) arr = arr.filter(p => (p.tipo || '') === filtroTipo);
  
  // Estadísticas
  const statsUM = {};
  const materiales = new Set();
  const tipos = new Set();
  state.productos_pt.forEach(p => {
    const um = (p.um || 'kg').toLowerCase();
    statsUM[um] = (statsUM[um] || 0) + 1;
    if (p.material) materiales.add(p.material);
    if (p.tipo) tipos.add(p.tipo);
  });
  const matsOrdenados = [...materiales].sort();
  const tiposOrdenados = [...tipos].sort();
  
  const puedeEditar = ['CS','CEO','COMP','ADMIN'].includes(state.user.depto) || state.user.rol === 'admin';

      <select class="input" id="filtro-productos-pt-tipo" style="max-width:220px;">
        <option value="">Todos los tipos</option>
        ${tiposOrdenados.map(t => `<option value="${t}" ${filtroTipo === t ? 'selected' : ''}>${t}</option>`).join('')}
      </select>
      <select class="input" id="filtro-productos-pt-um" style="max-width:160px;">
        <option value="">Todas las UM</option>
        ${UM_OPCIONES.map(um => `<option value="${um}" ${filtroUM === um ? 'selected' : ''}>${UM_LABELS[um]} (${statsUM[um] || 0})</option>`).join('')}

      ${puedeEditar ? `<button class="btn-primary" onclick="abrirModal('crear-producto-pt')">${ICONS.plus} Nuevo PT</button>` : ''}
      <span style="font-size:12px;color:#64748b;width:100%;">${arr.length} de ${state.productos_pt.length} productos</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Código</th><th>Descripción</th><th>Material</th><th>Tipo</th><th>Medida</th><th>Cal.</th><th>Color</th><th>Aditivo</th><th style="text-align:center;">UM</th><th style="text-align:right;">Cli.</th><th></th></tr></thead>
        <tbody>
          ${arr.length === 0 ? `<tr><td colspan="11" style="padding:40px;text-align:center;color:#94a3b8;">Sin productos que coincidan</td></tr>` :

              const medida = p.fuelle > 0 ? `${p.ancho}+${p.fuelle}x${p.largo}` : `${p.ancho}x${p.largo}`;
              const clis = state.cliente_productos.filter(cp => cp.producto_codigo === p.codigo).length;
              const umActual = (p.um || 'kg').toLowerCase();
              const umBadgeColor = { kg: '#16a34a', pza: '#3b82f6', millar: '#8b5cf6', rollo: '#f59e0b', m: '#ec4899' }[umActual] || '#64748b';

              const aditivoColor = aditivo === 'NINGUNO' ? '#94a3b8' : aditivo === 'VCI' ? '#7c3aed' : aditivo === 'ANTIESTATICO' ? '#ec4899' : aditivo === 'ANTIDERRAPANTE' ? '#f97316' : '#0891b2';
              return `<tr>
                <td class="text-mono" style="font-size:11px;font-weight:700;">${p.codigo}</td>

                  ${aditivo === 'NINGUNO' ? `<span style="color:#94a3b8;">—</span>` : `<span style="font-weight:700;padding:2px 6px;border-radius:5px;background:${aditivoColor}22;color:${aditivoColor};">${aditivo}</span>`}

function renderProgramacion() {
  const subTab = state.tabs.programacion || 'pendientes';
  const odpsPend = state.ordenes_produccion.filter(o => o.estatus === 'pendiente_planeacion');
  const odpsProg = state.ordenes_produccion.filter(o => o.estatus === 'programada');
  const odpsEnProd = state.ordenes_produccion.filter(o => o.estatus === 'en_produccion');
  const odpsCompletadas = state.ordenes_produccion.filter(o => o.estatus === 'completada').slice(0, 30);
  
  const filtro = (state.filtros.programacion || '').toLowerCase();
  const filtroMaq = state.filtros.programacion_maquina || '';
  
  // Lista actual según tab
  let arr = [];
  if (subTab === 'pendientes') arr = odpsPend;
  else if (subTab === 'programadas') arr = odpsProg;
  else if (subTab === 'en_produccion') arr = odpsEnProd;
  else if (subTab === 'completadas') arr = odpsCompletadas;
  
  if (filtro) arr = arr.filter(o => 
    (o.folio + ' ' + (o.cliente_nombre||'') + ' ' + (o.producto_codigo||'')).toLowerCase().includes(filtro)
  );
  if (filtroMaq) arr = arr.filter(o => o.proceso_actual === filtroMaq);
  
  return `
    <div style="margin-bottom:18px;">
      <div style="display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid #e2e8f0;padding-bottom:8px;">
        <button class="tab-btn ${subTab === 'pendientes' ? 'active' : ''}" onclick="cambiarTab('programacion','pendientes')">⏳ Por programar (${odpsPend.length})</button>
        <button class="tab-btn ${subTab === 'programadas' ? 'active' : ''}" onclick="cambiarTab('programacion','programadas')">📅 Programadas (${odpsProg.length})</button>
        <button class="tab-btn ${subTab === 'en_produccion' ? 'active' : ''}" onclick="cambiarTab('programacion','en_produccion')">🔄 En producción (${odpsEnProd.length})</button>
        <button class="tab-btn ${subTab === 'completadas' ? 'active' : ''}" onclick="cambiarTab('programacion','completadas')">✅ Completadas (${state.ordenes_produccion.filter(o => o.estatus === 'completada').length})</button>
      </div>
    </div>
    
    <div class="toolbar" style="flex-wrap:wrap;">
      <input class="input" id="filtro-programacion" style="max-width:340px;flex:1;min-width:220px;" placeholder="Buscar por folio, cliente, producto..." value="${filtro}" autocomplete="off" />
      <select class="input" id="filtro-programacion-maquina" style="max-width:220px;">
        <option value="">Todos los procesos</option>
        ${PROCESOS.map(p => `<option value="${p.codigo}" ${filtroMaq === p.codigo ? 'selected' : ''}>${p.icono} ${p.codigo} — ${p.nombre}</option>`).join('')}
      </select>
      <span style="font-size:12px;color:#64748b;">${arr.length} ODPs</span>
    </div>
    
    ${arr.length === 0 ? `
      <div style="padding:60px;text-align:center;color:#94a3b8;background:#fff;border-radius:14px;border:1px solid #e2e8f0;">
        ${subTab === 'pendientes' ? '✨ No hay ODPs pendientes de programar' : 
          subTab === 'programadas' ? '📅 No hay ODPs programadas' :
          subTab === 'en_produccion' ? '🔄 No hay ODPs en producción' : 
          '✅ Sin ODPs completadas recientes'}
      </div>
    ` : `
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${arr.map(o => renderTarjetaODP(o, subTab)).join('')}
      </div>
    `}
  `;
}

function renderTarjetaODP(o, contexto) {
  const colores = {
    pendiente_planeacion: '#f59e0b',
    programada: '#3b82f6',
    en_produccion: '#8b5cf6',
    completada: '#16a34a',
    cancelada: '#dc2626'
  };
  const labels = {
    pendiente_planeacion: '⏳ Por programar',
    programada: '📅 Programada',
    en_produccion: '🔄 En producción',
    completada: '✅ Completada',
    cancelada: '❌ Cancelada'
  };
  const color = colores[o.estatus] || '#64748b';
  
  // Capturas y avance global
  const capturas = state.capturas_produccion.filter(c => c.odp_id === o.id);
  const lotesODP = state.lotes.filter(l => l.odp_id === o.id);
  const ruta = o.ruta_procesos || [];
  const procesosCompletados = o.procesos_completados || []; // [{codigo, fecha_inicio, fecha_fin, cantidad_producida, mermas}]
  const procActual = o.proceso_actual;
  
  // Calcular cantidad final producida (la del último proceso completado o capturas en proceso actual)
  let totalProducidoFinal = 0;
  let totalMermasFinal = 0;
  if (procesosCompletados.length > 0) {
    const ultimo = procesosCompletados[procesosCompletados.length - 1];
    totalProducidoFinal = Number(ultimo.cantidad_producida) || 0;
    totalMermasFinal = procesosCompletados.reduce((s, p) => s + (Number(p.mermas) || 0), 0);
  }
  const pct = o.cantidad > 0 ? Math.min(100, Math.round((totalProducidoFinal / o.cantidad) * 100)) : 0;
  
  return `
    <div class="panel" style="border-left:4px solid ${color};">
      <div style="padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
        <div style="flex:1;min-width:280px;">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;">
            <span class="text-mono" style="font-weight:800;font-size:15px;">${o.folio}</span>
            <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;background:${color}22;color:${color};">${labels[o.estatus]}</span>
            ${o.prioridad === 'alta' ? `<span style="font-size:10px;padding:2px 8px;border-radius:99px;background:#fee2e2;color:#dc2626;font-weight:700;">🔴 URGENTE</span>` : ''}
            ${o.pedido_folio ? `<span style="font-size:10px;color:#64748b;">desde ${o.pedido_folio}</span>` : ''}
          </div>
          <div style="font-size:13px;font-weight:600;">${o.cliente_nombre || '—'}</div>
          <div class="text-mono" style="font-size:11px;color:#64748b;margin-top:2px;">${o.producto_codigo}</div>
          <div style="font-size:11px;color:#475569;margin-top:2px;">${o.descripcion || ''}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:18px;font-weight:800;">${fmtCantidadUM(o.cantidad, o.um)}</div>
          ${o.cantidad_kg_produccion && (o.um === 'pza' || o.um === 'millar') ? `
            <div style="font-size:11px;color:#059669;font-weight:700;margin-top:2px;">🏭 ${fmtNum(o.cantidad_kg_produccion)} kg producción</div>
          ` : ''}
          ${totalProducidoFinal > 0 ? `
            <div style="font-size:11px;color:#475569;margin-top:2px;">Producido: <strong>${fmtCantidadUM(totalProducidoFinal, o.um)}</strong> (${pct}%)</div>
            ${totalMermasFinal > 0 ? `<div style="font-size:10px;color:#dc2626;">Mermas: ${fmtCantidadUM(totalMermasFinal, o.um)}</div>` : ''}
          ` : ''}
        </div>
      </div>
      
      ${ruta.length > 0 ? `
        <div style="padding:12px 18px;background:#f8fafc;border-top:1px solid #e2e8f0;">
          <div style="font-size:10px;font-weight:700;color:#64748b;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px;">Ruta de procesos</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;">
            ${ruta.map((codProc, i) => {
              const proc = getProc(codProc);
              if (!proc) return '';
              const completado = procesosCompletados.find(p => p.codigo === codProc);
              const enCurso = procActual === codProc && o.estatus === 'en_produccion';
              const pendiente = !completado && !enCurso;
              const bg = completado ? proc.color : (enCurso ? proc.color + '22' : '#f1f5f9');
              const txt = completado ? '#fff' : (enCurso ? proc.color : '#94a3b8');
              const border = enCurso ? `2px dashed ${proc.color}` : '1px solid transparent';
              return `
                <div style="display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:99px;background:${bg};color:${txt};font-size:11px;font-weight:700;border:${border};">
                  <span>${completado ? '✓' : enCurso ? '🔄' : '○'}</span>
                  <span>${proc.icono}</span>
                  <span>${proc.codigo}</span>
                </div>
                ${i < ruta.length - 1 ? `<span style="color:#cbd5e1;font-size:10px;">→</span>` : ''}
              `;
            }).join('')}
          </div>
          ${o.fecha_inicio_programada ? `<div style="font-size:11px;color:#475569;margin-top:8px;">📅 Inicio plan: ${o.fecha_inicio_programada}${o.fecha_entrega_programada ? ` • 🎯 Entrega: ${o.fecha_entrega_programada}` : ''}</div>` : ''}
        </div>
      ` : ''}
      
      ${pct > 0 ? `
        <div style="padding:0 18px 12px;">
          <div style="background:#e2e8f0;height:8px;border-radius:99px;overflow:hidden;">
            <div style="background:${color};height:100%;width:${pct}%;transition:width 0.3s;"></div>
          </div>
        </div>
      ` : ''}
      
      ${lotesODP.length > 0 ? `
        <div style="padding:8px 18px 12px;font-size:11px;color:#475569;">
          🏷️ Lotes: ${lotesODP.map(l => `<span class="text-mono" style="font-weight:600;background:#f1f5f9;padding:2px 6px;border-radius:4px;margin-right:4px;">${l.codigo}</span>`).join('')}
        </div>
      ` : ''}
      
      <div style="padding:10px 18px;border-top:1px solid #e2e8f0;display:flex;gap:8px;flex-wrap:wrap;">
        ${o.estatus === 'pendiente_planeacion' ? `
          <button class="btn-primary" onclick="abrirModal('programar-odp','${o.id}')" style="padding:8px 14px;">${ICONS.edit} Programar</button>
        ` : ''}
        ${o.estatus === 'programada' ? `
          <button class="btn-primary" onclick="iniciarProceso('${o.id}')" style="padding:8px 14px;background:#8b5cf6;">▶ Iniciar ${getProc(procActual)?.nombre || 'producción'}</button>
          <button class="btn-secondary" onclick="abrirModal('programar-odp','${o.id}')" style="padding:8px 14px;">${ICONS.edit} Reprogramar</button>
        ` : ''}
        ${o.estatus === 'en_produccion' ? `
          <button class="btn-primary" onclick="abrirModal('completar-proceso','${o.id}')" style="padding:8px 14px;background:#16a34a;">${ICONS.check} Terminar ${getProc(procActual)?.nombre || procActual}</button>
        ` : ''}
        <button class="btn-secondary" onclick="abrirModal('detalle-odp','${o.id}')" style="padding:8px 14px;margin-left:auto;">${ICONS.list} Detalle</button>
      </div>
    </div>
  `;
}

// ============================================================
// VISTA: CAPTURA DE PRODUCCIÓN (PRO/CEO/ADMIN)
// ============================================================
function renderCapturaProduccion() {
  const odpsActivas = state.ordenes_produccion.filter(o => 
    ['programada', 'en_produccion'].includes(o.estatus)
  );
  
  const filtro = (state.filtros.captura || '').toLowerCase();
  let arr = odpsActivas;
  if (filtro) arr = arr.filter(o => 
    (o.folio + ' ' + (o.cliente_nombre||'') + ' ' + (o.producto_codigo||'')).toLowerCase().includes(filtro)
  );
  
  // Agrupar por proceso actual
  const porProceso = {};
  arr.forEach(o => {
    const procCod = o.proceso_actual || 'sin-proceso';
    if (!porProceso[procCod]) porProceso[procCod] = [];
    porProceso[procCod].push(o);
  });
  
  return `
    <div class="toolbar">
      <input class="input" id="filtro-captura" style="max-width:380px;" placeholder="Buscar ODP, cliente, producto..." value="${filtro}" autocomplete="off" />
      <span style="font-size:12px;color:#64748b;">${arr.length} ODPs activas</span>
    </div>
    
    ${arr.length === 0 ? `
      <div style="padding:60px;text-align:center;color:#94a3b8;background:#fff;border-radius:14px;border:1px solid #e2e8f0;">
        🔄 No hay producción activa. PLN debe programar ODPs primero.
      </div>
    ` : Object.keys(porProceso).sort().map(procCod => {
      const proc = getProc(procCod);
      const titulo = proc ? `${proc.icono} ${proc.codigo} — ${proc.nombre}` : '⚪ Sin proceso definido';
      const color = proc?.color || '#64748b';
      return `
        <div style="margin-bottom:24px;">
          <div style="font-size:14px;font-weight:800;color:${color};margin-bottom:10px;display:flex;align-items:center;gap:8px;padding:8px 12px;background:${color}11;border-radius:8px;border-left:4px solid ${color};">
            ${titulo} <span style="font-size:11px;color:#94a3b8;font-weight:500;margin-left:auto;">${porProceso[procCod].length} ODP${porProceso[procCod].length === 1 ? '' : 's'}</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:12px;">
            ${porProceso[procCod].map(o => renderTarjetaODP(o, 'captura')).join('')}
          </div>
        </div>
      `;
    }).join('')}
  `;
}

// VISTA: LIBERACIÓN DE CALIDAD (CAL/CEO/ADMIN)

function renderCalidad() {
  const subTab = state.tabs.calidad || 'pendientes';
  const odpsPendientes = state.ordenes_produccion.filter(o => o.estatus === 'pendiente_calidad');
  const odpsLiberadas = state.ordenes_produccion.filter(o => 
    ['liberada_empaque','pendiente_almacen','en_almacen_planta','en_transito_cedis','en_cedis_mty','en_cedis_mex','embarcada','entregada'].includes(o.estatus)
  );
  const odpsRechazadas = state.ordenes_produccion.filter(o => o.estatus === 'rechazada');
  
  let arr = [];
  if (subTab === 'pendientes') arr = odpsPendientes;
  else if (subTab === 'liberadas') arr = odpsLiberadas.slice(0, 50);
  else if (subTab === 'rechazadas') arr = odpsRechazadas.slice(0, 30);
  
  const filtro = (state.filtros.calidad || '').toLowerCase();
  if (filtro) arr = arr.filter(o => 
    (o.folio + ' ' + (o.cliente_nombre||'') + ' ' + (o.producto_codigo||'')).toLowerCase().includes(filtro)
  );
  
  return `
    <div style="margin-bottom:18px;">
      <div style="display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid #e2e8f0;padding-bottom:8px;">
        <button class="tab-btn ${subTab === 'pendientes' ? 'active' : ''}" onclick="cambiarTab('calidad','pendientes')">🟡 Por liberar (${odpsPendientes.length})</button>
        <button class="tab-btn ${subTab === 'liberadas' ? 'active' : ''}" onclick="cambiarTab('calidad','liberadas')">✅ Liberadas (${odpsLiberadas.length})</button>
        <button class="tab-btn ${subTab === 'rechazadas' ? 'active' : ''}" onclick="cambiarTab('calidad','rechazadas')">❌ Rechazadas (${odpsRechazadas.length})</button>
      </div>
    </div>
    
    <div class="toolbar">
      <input class="input" id="filtro-calidad" style="max-width:380px;" placeholder="Buscar por folio, cliente, producto..." value="${filtro}" autocomplete="off" />
      <span style="font-size:12px;color:#64748b;">${arr.length} ODPs</span>
    </div>
    
    ${arr.length === 0 ? `
      <div style="padding:60px;text-align:center;color:#94a3b8;background:#fff;border-radius:14px;border:1px solid #e2e8f0;">
        ${subTab === 'pendientes' ? '🎉 No hay producción pendiente de liberación' : 
          subTab === 'liberadas' ? '✅ Sin liberaciones recientes' :
          '✓ Sin rechazos'}
      </div>
    ` : `
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${arr.map(o => renderTarjetaCalidad(o, subTab)).join('')}
      </div>
    `}
  `;
}

function renderTarjetaCalidad(o, contexto) {
  const um = (o.um || 'kg').toLowerCase();
  const ruta = o.ruta_procesos || [];
  const procesosCompletados = o.procesos_completados || [];
  const cantidadProducida = o.cantidad_producida_final || 0;
  const cantidadOriginal = o.cantidad || 0;
  const pctCalidad = cantidadOriginal > 0 ? (cantidadProducida / cantidadOriginal * 100).toFixed(1) : 0;
  const pctClass = pctCalidad >= 90 ? '#16a34a' : '#dc2626';
  const lote = state.lotes.find(l => l.odp_id === o.id);
  
  const colores = {
    pendiente_calidad: '#f59e0b',
    liberada_empaque: '#16a34a',
    rechazada: '#dc2626'
  };
  const labels = {
    pendiente_calidad: '🟡 Pendiente liberación',
    liberada_empaque: '🟢 Liberada → empaque',
    pendiente_almacen: '📦 Pendiente almacén',
    en_almacen_planta: '🏭 En almacén planta',
    rechazada: '❌ Rechazada'
  };
  const color = colores[o.estatus] || '#64748b';
  
  return `
    <div class="panel" style="border-left:4px solid ${color};">
      <div style="padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
        <div style="flex:1;min-width:280px;">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;">
            <span class="text-mono" style="font-weight:800;font-size:15px;">${o.folio}</span>
            <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;background:${color}22;color:${color};">${labels[o.estatus] || o.estatus}</span>
            ${lote ? `<span class="text-mono" style="font-size:11px;font-weight:700;background:#f1f5f9;padding:3px 8px;border-radius:6px;">🏷️ ${lote.codigo}</span>` : ''}
          </div>
          <div style="font-size:13px;font-weight:600;">${o.cliente_nombre || '—'}</div>
          <div class="text-mono" style="font-size:11px;color:#64748b;margin-top:2px;">${o.producto_codigo}</div>
          <div style="font-size:11px;color:#475569;margin-top:2px;">${o.descripcion || ''}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:11px;color:#64748b;">Solicitado:</div>
          <div style="font-size:14px;font-weight:600;">${fmtCantidadUM(cantidadOriginal, o.um)}</div>
          <div style="font-size:11px;color:#64748b;margin-top:6px;">Producido:</div>
          <div style="font-size:18px;font-weight:800;color:${pctClass};">${fmtCantidadUM(cantidadProducida, o.um)}</div>
          <div style="font-size:11px;color:${pctClass};font-weight:700;">${pctCalidad}% calidad</div>
        </div>
      </div>
      
      ${ruta.length > 0 ? `
        <div style="padding:10px 18px;background:#f8fafc;border-top:1px solid #e2e8f0;">
          <div style="font-size:10px;font-weight:700;color:#64748b;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:6px;">Procesos ejecutados</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;">
            ${ruta.map((codProc, i) => {
              const proc = getProc(codProc);
              if (!proc) return '';
              const pc = procesosCompletados.find(p => p.codigo === codProc);
              return `
                <div style="display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:99px;background:${proc.color};color:#fff;font-size:10px;font-weight:700;">
                  <span>${proc.icono}</span>
                  <span>${proc.codigo}</span>
                  ${pc ? `<span style="opacity:0.85;">${fmtNum(pc.cantidad_producida)}</span>` : ''}
                </div>
                ${i < ruta.length - 1 ? `<span style="color:#cbd5e1;font-size:9px;">→</span>` : ''}
              `;
            }).join('')}
          </div>
        </div>
      ` : ''}
      
      ${o.liberacion_calidad ? `
        <div style="padding:10px 18px;background:${o.liberacion_calidad.decision === 'liberado' ? '#f0fdf4' : o.liberacion_calidad.decision === 'parcial' ? '#fffbeb' : '#fee2e2'};border-top:1px solid #e2e8f0;font-size:11px;">
          <strong>Decisión:</strong> ${o.liberacion_calidad.decision.toUpperCase()} · 
          <strong>Por:</strong> ${o.liberacion_calidad.liberado_por_nombre} · 
          ${o.liberacion_calidad.notas ? `<em>"${o.liberacion_calidad.notas}"</em>` : ''}
          ${o.liberacion_calidad.tarimas ? ` · 📦 ${o.liberacion_calidad.tarimas} tarimas` : ''}
        </div>
      ` : ''}
      
      <div style="padding:10px 18px;border-top:1px solid #e2e8f0;display:flex;gap:8px;flex-wrap:wrap;">
        ${o.estatus === 'pendiente_calidad' ? `
          <button class="btn-primary" onclick="abrirModal('liberar-calidad','${o.id}')" style="padding:8px 14px;background:#16a34a;">${ICONS.check} Liberar calidad</button>
        ` : ''}
        <button class="btn-secondary" onclick="abrirModal('detalle-odp','${o.id}')" style="padding:8px 14px;margin-left:auto;">${ICONS.list} Detalle</button>
      </div>
    </div>
  `;
}

// VISTA: SEGUIMIENTO DE PEDIDOS (CS/KAM/CEO/ADMIN)
// ============================================================
function renderSeguimiento() {
  const filtro = (state.filtros.seguimiento || '').toLowerCase();
  const filtroEst = state.filtros.seguimiento_estatus || '';
  const filtroCli = state.filtros.seguimiento_cliente || '';
  
  let arr = state.pedidos;
  if (filtro) arr = arr.filter(p => 
    (p.folio + ' ' + (p.cliente_nombre||'') + ' ' + (p.cliente_codigo||'') + ' ' + (p.odc_cliente||'')).toLowerCase().includes(filtro)
  );
  if (filtroEst) arr = arr.filter(p => p.estatus === filtroEst);
  if (filtroCli) arr = arr.filter(p => p.cliente_codigo === filtroCli);
  
  // Lista única de clientes con pedidos
  const clientesConPedidos = [...new Set(state.pedidos.map(p => p.cliente_codigo))]
    .map(cod => state.clientes.find(c => c.codigo === cod))
    .filter(Boolean)
    .sort((a,b) => a.nombre.localeCompare(b.nombre));
  
  return `
    <div class="toolbar" style="flex-wrap:wrap;">
      <input class="input" id="filtro-seguimiento" style="max-width:280px;flex:1;min-width:200px;" placeholder="Buscar PI, cliente, ODC..." value="${filtro}" autocomplete="off" />
      <select class="input" id="filtro-seguimiento-cliente" style="max-width:240px;">
        <option value="">Todos los clientes</option>
        ${clientesConPedidos.map(c => `<option value="${c.codigo}" ${filtroCli === c.codigo ? 'selected' : ''}>${c.codigo} - ${c.nombre}</option>`).join('')}
      </select>
      <select class="input" id="filtro-seguimiento-estatus" style="max-width:200px;">
        <option value="">Todos los estatus</option>
        <option value="pendiente_aprobacion" ${filtroEst === 'pendiente_aprobacion' ? 'selected' : ''}>Por aprobar</option>
        <option value="aprobado" ${filtroEst === 'aprobado' ? 'selected' : ''}>Aprobados</option>
        <option value="en_proceso" ${filtroEst === 'en_proceso' ? 'selected' : ''}>En proceso</option>
        <option value="completado" ${filtroEst === 'completado' ? 'selected' : ''}>Completados</option>
        <option value="cancelado" ${filtroEst === 'cancelado' ? 'selected' : ''}>Cancelados</option>
      </select>
      <span style="font-size:12px;color:#64748b;">${arr.length} pedidos</span>
    </div>
    
    ${arr.length === 0 ? `
      <div style="padding:60px;text-align:center;color:#94a3b8;background:#fff;border-radius:14px;border:1px solid #e2e8f0;">
        📋 No hay pedidos que coincidan con los filtros
      </div>
    ` : `
      <div style="display:flex;flex-direction:column;gap:14px;">
        ${arr.slice(0, 50).map(renderTarjetaSeguimiento).join('')}
      </div>
      ${arr.length > 50 ? `<div style="padding:14px;text-align:center;color:#94a3b8;font-size:12px;">Mostrando 50 de ${arr.length} pedidos</div>` : ''}
    `}
  `;
}

function renderTarjetaSeguimiento(p) {
  const lineas = window.pedidoLineas(p.id);
  const odps = window.odpsDePedido(p.id);
  const ovs = window.ovsDePedido(p.id);
  const comentarios = state.comentarios_pedidos.filter(c => c.pedido_id === p.id);
  
  // Timeline de eventos
  const eventos = [];
  eventos.push({ icon: '📝', label: 'Capturado', fecha: p.created_at, by: p.creado_por_nombre, completado: true });
  eventos.push({ 
    icon: p.estatus === 'cancelado' ? '❌' : '✅', 
    label: p.estatus === 'cancelado' ? 'Cancelado' : 'Aprobado', 
    fecha: p.aprobado_at || p.updated_at, 
    by: p.aprobado_por_nombre, 
    completado: ['aprobado','en_proceso','completado','cancelado'].includes(p.estatus) 
  });
  
  // Estatus de cada ODP
  const odpsEnProgreso = odps.filter(o => o.estatus === 'en_produccion').length;
  const odpsCompletadas = odps.filter(o => o.estatus === 'completada').length;
  const odpsTotal = odps.length;
  
  if (odpsTotal > 0) {
    eventos.push({
      icon: odpsCompletadas === odpsTotal ? '✅' : odpsEnProgreso > 0 ? '🔄' : '📅',
      label: `Producción ${odpsCompletadas}/${odpsTotal}`,
      completado: odpsCompletadas === odpsTotal,
      en_curso: odpsEnProgreso > 0
    });
  }
  
  const ovsCompletadas = ovs.filter(o => o.estatus === 'completada').length;
  if (ovs.length > 0) {
    eventos.push({
      icon: ovsCompletadas === ovs.length ? '✅' : '📦',
      label: `Embarques ${ovsCompletadas}/${ovs.length}`,
      completado: ovsCompletadas === ovs.length
    });
  }
  
  const colorEst = { pendiente_aprobacion: '#f59e0b', aprobado: '#16a34a', en_proceso: '#3b82f6', completado: '#94a3b8', cancelado: '#dc2626' }[p.estatus];
  const lblEst = { pendiente_aprobacion: 'Por aprobar', aprobado: 'Aprobado', en_proceso: 'En proceso', completado: 'Completado', cancelado: 'Cancelado' }[p.estatus];
  
  return `
    <div class="panel" style="border-left:4px solid ${colorEst};">
      <div style="padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
        <div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <span class="text-mono" style="font-weight:800;font-size:16px;">${p.folio}</span>
            <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;background:${colorEst}22;color:${colorEst};">${lblEst}</span>
          </div>
          <div style="font-size:13px;font-weight:600;margin-top:4px;">${p.cliente_nombre} <span style="color:#64748b;font-size:11px;">(${p.cliente_codigo})</span></div>
          <div style="font-size:11px;color:#64748b;margin-top:2px;">
            ${fmtFechaHora(p.created_at)}
            ${p.odc_cliente ? ` • ODC: <span class="text-mono">${p.odc_cliente}</span>` : ''}
            ${p.fecha_requerida ? ` • Entrega: ${p.fecha_requerida}` : ''}
          </div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:14px;font-weight:700;">${lineas.length} líneas</div>
          ${odps.length > 0 ? `<div style="font-size:11px;color:#64748b;">${odps.length} ODP(s) · ${ovs.length} OV(s)</div>` : ''}
        </div>
      </div>
      
      <!-- Timeline -->
      <div style="padding:12px 18px;background:#f8fafc;border-top:1px solid #e2e8f0;display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:11px;">
        ${eventos.map((e, i) => `
          <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;background:${e.completado ? '#dcfce7' : e.en_curso ? '#dbeafe' : '#f1f5f9'};color:${e.completado ? '#166534' : e.en_curso ? '#1e40af' : '#64748b'};font-weight:600;">
            ${e.icon} ${e.label}
            ${e.by ? `<span style="opacity:0.7;font-weight:400;">· ${e.by}</span>` : ''}
          </span>
          ${i < eventos.length - 1 ? `<span style="color:#cbd5e1;">→</span>` : ''}
        `).join('')}
      </div>
      
      <!-- ODPs (si existen) con detalle de avance -->
      ${odps.length > 0 ? `
        <div style="padding:12px 18px;border-top:1px solid #e2e8f0;">
          <div style="font-size:11px;color:#64748b;font-weight:700;margin-bottom:8px;text-transform:uppercase;">Producción</div>
          ${odps.map(o => {
            const cap = state.capturas_produccion.filter(c => c.odp_id === o.id);
            const prod = cap.reduce((s, c) => s + (Number(c.cantidad_producida) || 0), 0);
            const pct = o.cantidad > 0 ? Math.min(100, Math.round((prod / o.cantidad) * 100)) : 0;
            const colorODP = { pendiente_planeacion: '#f59e0b', programada: '#3b82f6', en_produccion: '#8b5cf6', completada: '#16a34a' }[o.estatus] || '#64748b';
            return `
              <div style="font-size:12px;margin-bottom:8px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                  <div>
                    <span class="text-mono" style="font-weight:700;">${o.folio}</span>
                    <span class="text-mono" style="color:#64748b;margin-left:6px;">${o.producto_codigo}</span>
                    ${o.maquina_asignada ? `<span style="margin-left:6px;color:#475569;">· 🏭 ${o.maquina_asignada}</span>` : ''}
                  </div>
                  <span style="font-weight:600;color:${colorODP};">${fmtCantidadUM(prod, o.um)} / ${fmtCantidadUM(o.cantidad, o.um)} (${pct}%)</span>
                </div>
                <div style="background:#e2e8f0;height:6px;border-radius:99px;overflow:hidden;">
                  <div style="background:${colorODP};height:100%;width:${pct}%;transition:width 0.3s;"></div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      ` : ''}
      
      <!-- Comentarios -->
      ${comentarios.length > 0 ? `
        <div style="padding:10px 18px;border-top:1px solid #e2e8f0;background:#fffbeb;">
          <div style="font-size:11px;color:#92400e;font-weight:700;margin-bottom:6px;">💬 Comentarios (${comentarios.length})</div>
          ${comentarios.slice(0, 3).map(c => `
            <div style="font-size:12px;margin-bottom:4px;">
              <strong>${c.autor_nombre}:</strong> ${c.mensaje}
              <span style="color:#94a3b8;font-size:10px;margin-left:6px;">${fmtFechaHora(c.created_at)}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}
      
      <div style="padding:10px 18px;border-top:1px solid #e2e8f0;display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn-secondary" onclick="abrirModal('comentar-pedido','${p.id}')" style="padding:6px 12px;font-size:12px;">💬 Comentar</button>

  if (m === 'detalle-cliente') return modalDetalleCliente();
  if (m === 'programar-odp') return modalProgramarODP();
  if (m === 'completar-proceso') return modalCompletarProceso();
  if (m === 'liberar-calidad') return modalLiberarCalidad();

  const ruta = odp.ruta_procesos || [];

// MODAL: LIBERACIÓN DE CALIDAD (con regla del 90%)
// ============================================================
function modalLiberarCalidad() {
  const odp = state.ordenes_produccion.find(o => o.id === state.modalData);
  if (!odp) return '';
  
  const um = (odp.um || 'kg').toLowerCase();
  const stepCant = UM_ENTEROS.includes(um) ? '1' : '0.01';
  const cantidadProducida = Number(odp.cantidad_producida_final) || 0;
  const cantidadOriginal = Number(odp.cantidad) || 0;
  const procesosCompletados = odp.procesos_completados || [];
  const totalMermas = procesosCompletados.reduce((s, p) => s + (Number(p.mermas) || 0), 0);
  
  // Inicializar form
  if (!state.modalForm) {
    state.modalForm = {
      cantidad_aceptada: cantidadProducida,
      num_tarimas: 1,
      peso_tarima_unit: 25,
      // GLOBAL: contenido por paquete (numérico, en la UM del producto)
      contenido_por_paquete: '',
      // Lista de tarimas (cada una: paquetes completos + sueltos + pesos)
      tarimas_data: [],
      decision: 'pendiente',
      notas: ''
    };
  }
  const f = state.modalForm;
  
  // Si cambió num_tarimas, reinicializar lista
  const numT = Number(f.num_tarimas) || 1;
  if (!f.tarimas_data || f.tarimas_data.length !== numT) {
    const pesoUnit = Number(f.peso_tarima_unit) || 25;
    f.tarimas_data = Array.from({length: numT}, () => ({
      paquetes: 0,         // # paquetes completos
      sueltos: 0,          // cantidad suelta (no completa paquete)
      peso_bruto: 0,
      peso_tarima_vacia: pesoUnit
    }));
  }
  
  const cantAceptada = Number(f.cantidad_aceptada) || 0;
  const cantRechazada = Math.max(0, cantidadProducida - cantAceptada);
  const pctCalidadVsOriginal = cantidadOriginal > 0 ? (cantAceptada / cantidadOriginal * 100) : 0;
  
  // Determinar decisión según regla 90%
  let decision = 'pendiente';
  let decisionTexto = '';
  let decisionColor = '#94a3b8';
  let mensajeDecision = '';
  
  if (cantAceptada > 0) {
    if (pctCalidadVsOriginal >= 90) {
      decision = cantAceptada >= cantidadProducida ? 'liberado' : 'parcial';
      decisionTexto = decision === 'liberado' ? '✅ LIBERADO TOTAL' : '⚠️ LIBERADO PARCIAL';
      decisionColor = '#16a34a';
      mensajeDecision = decision === 'liberado'
        ? 'Toda la producción se libera. Cada tarima genera su propio LOTE.'
        : `Se libera ${fmtCantidadUM(cantAceptada, um)} (${pctCalidadVsOriginal.toFixed(1)}% del solicitado).<br><strong>El sistema generará un PI nuevo</strong> por la cantidad faltante (${fmtCantidadUM(cantidadOriginal - cantAceptada, um)}).`;
    } else {
      decision = 'rechazado';
      decisionTexto = '❌ RECHAZADO (< 90%)';
      decisionColor = '#dc2626';
      mensajeDecision = `Solo ${pctCalidadVsOriginal.toFixed(1)}% es aceptable. Se rechaza toda la ODP y <strong>el sistema generará un PI nuevo</strong> por la cantidad completa.`;
    }
  } else {
    decision = 'rechazado';
    decisionTexto = '❌ RECHAZADO TOTAL';
    decisionColor = '#dc2626';
    mensajeDecision = 'Toda la producción se rechaza. <strong>Se genera nuevo PI completo</strong>.';
  }
  
  // Cálculos automáticos del nuevo modelo
  const contPaq = Number(f.contenido_por_paquete) || 0;
  const totalPaquetes = f.tarimas_data.reduce((s, t) => s + (Number(t.paquetes) || 0), 0);
  const totalSueltos = f.tarimas_data.reduce((s, t) => s + (Number(t.sueltos) || 0), 0);
  const totalCantTarimas = (totalPaquetes * contPaq) + totalSueltos;
  const totalPesoBruto = f.tarimas_data.reduce((s, t) => s + (Number(t.peso_bruto) || 0), 0);
  const totalPesoVacio = f.tarimas_data.reduce((s, t) => s + (Number(t.peso_tarima_vacia) || 0), 0);
  const totalPesoNeto = totalPesoBruto - totalPesoVacio;
  const productoForPeso = state.productos_pt.find(p => p.codigo === odp.producto_codigo);
  const pesoTeoricoTotal = window.convertirAKg(cantAceptada, um, productoForPeso) || 0;
  const diffPeso = totalPesoNeto - pesoTeoricoTotal;
  const pctDiff = pesoTeoricoTotal > 0 ? Math.abs(diffPeso / pesoTeoricoTotal * 100) : 0;
  const colorPeso = pctDiff <= 5 ? '#16a34a' : (pctDiff <= 10 ? '#f59e0b' : '#dc2626');
  
  // Cálculos del autodistribuidor (sólo para preview)
  let paqTotalNec = 0, sueltosTotal = 0;
  if (contPaq > 0 && cantAceptada > 0) {
    paqTotalNec = Math.floor(cantAceptada / contPaq);
    sueltosTotal = cantAceptada - (paqTotalNec * contPaq);
  }
  
  return `
    <div class="modal-bg" onclick="if(event.target===this)cerrarModal()">
      <div class="modal" style="max-width:920px;max-height:92vh;">
        <div class="modal-header">
          <h2 style="font-size:18px;font-weight:800;">✅ Liberación de Calidad</h2>
          <button class="icon-btn" onclick="cerrarModal()">${ICONS.x}</button>
        </div>
        <div class="modal-body">
          
          <div style="padding:12px;background:#fffbeb;border-radius:10px;margin-bottom:14px;font-size:12px;border-left:4px solid #f59e0b;">
            <strong>${odp.folio}</strong> · ${odp.cliente_nombre} · <span class="text-mono" style="font-size:11px;">${odp.producto_codigo}</span><br>
            ${odp.descripcion || ''}
          </div>
          
          <!-- Resumen producción -->
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">
            <div style="padding:8px;background:#f8fafc;border-radius:8px;text-align:center;">
              <div style="font-size:9px;color:#64748b;font-weight:700;text-transform:uppercase;">Solicitado</div>
              <div style="font-size:14px;font-weight:800;">${fmtCantidadUM(cantidadOriginal, um)}</div>
            </div>
            <div style="padding:8px;background:#f0fdf4;border-radius:8px;text-align:center;">
              <div style="font-size:9px;color:#16a34a;font-weight:700;text-transform:uppercase;">Producido</div>
              <div style="font-size:14px;font-weight:800;color:#16a34a;">${fmtCantidadUM(cantidadProducida, um)}</div>
            </div>
            <div style="padding:8px;background:#fee2e2;border-radius:8px;text-align:center;">
              <div style="font-size:9px;color:#dc2626;font-weight:700;text-transform:uppercase;">Mermas</div>
              <div style="font-size:14px;font-weight:800;color:#dc2626;">${fmtCantidadUM(totalMermas, um)}</div>
            </div>
          </div>
          
          <!-- Cantidad aceptada -->
          <div class="field">
            <label class="field-label">Cantidad ACEPTADA por calidad (en ${UM_LABELS[um]}) *</label>
            <input class="input form-cal" data-field="cantidad_aceptada" type="number" min="0" max="${cantidadProducida}" step="${stepCant}" value="${f.cantidad_aceptada}" autocomplete="off" />
          </div>
          
          <div id="cal-rechazo-info" style="padding:10px;background:#fee2e2;border-radius:8px;margin-bottom:14px;font-size:12px;color:#dc2626;display:${cantRechazada > 0 ? 'block' : 'none'};">
            ${cantRechazada > 0 ? `⚠️ Se rechazarán <strong>${fmtCantidadUM(cantRechazada, um)}</strong> del producido` : ''}
          </div>
          
          <!-- Decisión -->
          <div id="cal-preview-box" style="padding:12px;background:${decisionColor}11;border:2px solid ${decisionColor};border-radius:10px;margin-bottom:14px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
              <strong id="cal-preview-texto" style="color:${decisionColor};font-size:13px;">${decisionTexto}</strong>
              <strong id="cal-preview-pct" style="color:${decisionColor};font-size:16px;">${pctCalidadVsOriginal.toFixed(1)}%</strong>
            </div>
            <div id="cal-preview-msg" style="font-size:11px;color:#475569;">${mensajeDecision}</div>
            <div style="margin-top:6px;background:#e2e8f0;height:5px;border-radius:99px;overflow:hidden;">
              <div id="cal-preview-bar" style="background:${decisionColor};height:100%;width:${Math.min(100, pctCalidadVsOriginal)}%;transition:width 0.3s;"></div>
            </div>
            <div style="font-size:10px;color:#94a3b8;margin-top:4px;">Regla: ≥90% del solicitado = LIBERA · &lt;90% = RECHAZA</div>
          </div>
          
          <!-- Tarimas individuales -->
          <div id="cal-tarimas-container" style="display:${(decision === 'liberado' || decision === 'parcial') ? 'block' : 'none'};">
            
            <!-- Configuración global de empaque -->
            <div style="padding:14px;background:#eff6ff;border-radius:10px;border:1px solid #bfdbfe;margin-bottom:14px;">
              <div style="font-size:12px;font-weight:700;color:#1e40af;margin-bottom:10px;">📦 Configuración de empaque</div>
              
              <div style="display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:8px;align-items:end;">
                <div>
                  <label class="field-label" style="font-size:10px;">Contenido por paquete (en ${UM_LABELS[um]})</label>
                  <input class="input form-cal" data-field="contenido_por_paquete" type="number" min="0" step="${stepCant}" value="${f.contenido_por_paquete}" placeholder="Ej: 2500" autocomplete="off" />
                </div>
                <div>
                  <label class="field-label" style="font-size:10px;">Núm. tarimas *</label>
                  <input class="input form-cal" data-field="num_tarimas" type="number" min="1" max="50" step="1" value="${f.num_tarimas}" autocomplete="off" />
                </div>
                <div>
                  <label class="field-label" style="font-size:10px;">Peso tarima vacía</label>
                  <input class="input form-cal" data-field="peso_tarima_unit" type="number" min="0" step="0.01" value="${f.peso_tarima_unit}" autocomplete="off" />
                </div>
              </div>
              
              ${contPaq > 0 ? `
                <div id="cal-empaque-info" style="margin-top:10px;padding:10px;background:#fff;border-radius:6px;font-size:11px;">
                  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;">
                    <div>
                      <div style="font-size:9px;color:#64748b;text-transform:uppercase;font-weight:700;">Total a empacar</div>
                      <div style="font-size:14px;font-weight:800;color:#1e40af;">${fmtCantidadUM(cantAceptada, um)}</div>
                    </div>
                    <div>
                      <div style="font-size:9px;color:#64748b;text-transform:uppercase;font-weight:700;">Paquetes completos</div>
                      <div style="font-size:14px;font-weight:800;color:#1e40af;">${paqTotalNec}</div>
                    </div>
                    <div>
                      <div style="font-size:9px;color:#64748b;text-transform:uppercase;font-weight:700;">Sueltos</div>
                      <div style="font-size:14px;font-weight:800;color:${sueltosTotal > 0 ? '#f59e0b' : '#16a34a'};">${fmtNum(sueltosTotal)} ${UM_LABELS[um]}</div>
                    </div>
                  </div>
                  <button onclick="autoDistribuir()" type="button" style="width:100%;margin-top:10px;padding:8px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-size:12px;">
                    🪄 Auto-distribuir entre ${f.num_tarimas} tarima${f.num_tarimas > 1 ? 's' : ''}
                  </button>
                </div>
              ` : `
                <div style="margin-top:10px;font-size:11px;color:#94a3b8;font-style:italic;">
                  💡 Captura el contenido por paquete para usar la auto-distribución.
                </div>
              `}
            </div>
            
            <!-- Tabla por tarima -->
            <div style="margin-bottom:14px;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                <strong style="font-size:12px;">📋 Detalle por tarima 
                  <span style="font-weight:400;color:#64748b;font-size:10px;">(captura paquetes y sueltos; cantidad se calcula auto)</span>
                </strong>
                <button onclick="resetTarimas()" type="button" style="font-size:10px;padding:4px 8px;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;border-radius:6px;cursor:pointer;">↺ Resetear</button>
              </div>
              <div style="border:1px solid #e2e8f0;border-radius:8px;overflow-x:auto;background:#fff;">
                <table style="width:100%;border-collapse:collapse;font-size:11px;min-width:780px;">
                  <thead>
                    <tr style="background:#f1f5f9;">
                      <th style="padding:8px;text-align:left;">Tar</th>
                      <th style="padding:8px;text-align:right;">Paquetes</th>
                      <th style="padding:8px;text-align:right;">Sueltos (${UM_LABELS[um]})</th>
                      <th style="padding:8px;text-align:right;">Cantidad total ${UM_LABELS[um]} (auto)</th>
                      <th style="padding:8px;text-align:right;">P. bruto (kg)</th>
                      <th style="padding:8px;text-align:right;">P. vacío (kg)</th>
                      <th style="padding:8px;text-align:right;">P. neto (kg)</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${f.tarimas_data.map((t, i) => {
                      const paq = Number(t.paquetes) || 0;
                      const suel = Number(t.sueltos) || 0;
                      const cantTar = (paq * contPaq) + suel;
                      const neto = (Number(t.peso_bruto) || 0) - (Number(t.peso_tarima_vacia) || 0);
                      return `
                        <tr style="border-top:1px solid #f1f5f9;">
                          <td style="padding:6px 8px;font-weight:700;color:#475569;">T${String(i+1).padStart(2,'0')}</td>
                          <td style="padding:4px;"><input class="input tarima-row" data-idx="${i}" data-field="paquetes" type="number" min="0" step="1" value="${t.paquetes || 0}" style="padding:4px 6px;font-size:11px;text-align:right;width:75px;" autocomplete="off" /></td>
                          <td style="padding:4px;"><input class="input tarima-row" data-idx="${i}" data-field="sueltos" type="number" min="0" step="${stepCant}" value="${t.sueltos || 0}" style="padding:4px 6px;font-size:11px;text-align:right;width:90px;" autocomplete="off" /></td>
                          <td id="tar-cant-${i}" style="padding:6px 8px;text-align:right;font-weight:700;color:#1e40af;">${fmtNum(cantTar)}</td>
                          <td style="padding:4px;"><input class="input tarima-row" data-idx="${i}" data-field="peso_bruto" type="number" min="0" step="0.01" value="${t.peso_bruto || 0}" style="padding:4px 6px;font-size:11px;text-align:right;width:80px;" autocomplete="off" /></td>
                          <td style="padding:4px;"><input class="input tarima-row" data-idx="${i}" data-field="peso_tarima_vacia" type="number" min="0" step="0.01" value="${t.peso_tarima_vacia || 0}" style="padding:4px 6px;font-size:11px;text-align:right;width:80px;" autocomplete="off" /></td>
                          <td id="tar-neto-${i}" style="padding:6px 8px;text-align:right;font-weight:700;color:#16a34a;">${neto.toFixed(2)}</td>
                        </tr>
                      `;
                    }).join('')}
                  </tbody>
                  <tfoot>
                    <tr style="background:#f8fafc;border-top:2px solid #e2e8f0;font-weight:700;">
                      <td style="padding:8px;">TOTAL</td>
                      <td id="tab-total-paq" style="padding:8px;text-align:right;">${fmtNum(totalPaquetes)}</td>
                      <td id="tab-total-suel" style="padding:8px;text-align:right;">${fmtNum(totalSueltos)}</td>
                      <td id="tab-total-cant" style="padding:8px;text-align:right;color:#1e40af;">${fmtNum(totalCantTarimas)} ${UM_LABELS[um]}</td>
                      <td id="tab-total-bruto" style="padding:8px;text-align:right;">${totalPesoBruto.toFixed(2)} kg</td>
                      <td id="tab-total-vacio" style="padding:8px;text-align:right;">${totalPesoVacio.toFixed(2)} kg</td>
                      <td id="tab-total-neto" style="padding:8px;text-align:right;color:#16a34a;">${totalPesoNeto.toFixed(2)} kg</td>
                    </tr>
                  </tfoot>
                </table>
              </div>
              
              <!-- Cuadre vs cantidad aceptada -->
              <div id="cal-cuadre-box" style="margin-top:8px;padding:8px 12px;background:${Math.abs(totalCantTarimas - cantAceptada) < 0.01 ? '#f0fdf4' : '#fef3c7'};border-radius:6px;font-size:11px;border:1px solid ${Math.abs(totalCantTarimas - cantAceptada) < 0.01 ? '#bbf7d0' : '#fde68a'};">
                <strong>Cuadre:</strong> Solicitado <strong>${fmtNum(cantAceptada)}</strong> ${UM_LABELS[um]} vs Total empacado <strong id="cal-cuadre-empacado">${fmtNum(totalCantTarimas)}</strong> ${UM_LABELS[um]}
                <span id="cal-cuadre-status" style="float:right;color:${Math.abs(totalCantTarimas - cantAceptada) < 0.01 ? '#16a34a' : '#92400e'};font-weight:700;">
                  ${Math.abs(totalCantTarimas - cantAceptada) < 0.01 ? '✓ Cuadra' : '⚠ Diferencia: ' + fmtNum(totalCantTarimas - cantAceptada)}
                </span>
              </div>
            </div>
            
            <!-- Verificación peso teórico -->
            ${pesoTeoricoTotal > 0 ? `
              <div id="cal-verif-box" style="padding:10px;background:${colorPeso}11;border-radius:8px;border:1px solid ${colorPeso}44;margin-bottom:14px;">
                <div style="font-size:11px;font-weight:700;color:${colorPeso};margin-bottom:4px;">⚖️ Verificación báscula vs teórico</div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:11px;">
                  <div>Peso neto báscula: <strong id="ver-neto">${totalPesoNeto.toFixed(2)} kg</strong></div>
                  <div>Peso teórico: <strong id="ver-teorico">${pesoTeoricoTotal.toFixed(2)} kg</strong></div>
                  <div style="text-align:right;">Diff: <strong id="ver-diff" style="color:${colorPeso};">${diffPeso >= 0 ? '+' : ''}${diffPeso.toFixed(2)} kg (${pctDiff.toFixed(1)}%)</strong></div>
                </div>
              </div>
            ` : ''}
          </div>
          
          <div class="field">
            <label class="field-label">Notas de calidad</label>
            <textarea class="input form-cal" data-field="notas" style="min-height:50px;" placeholder="Pruebas realizadas, observaciones, motivo de rechazo, etc.">${f.notas}</textarea>
          </div>
        </div>
        <div style="padding:14px 22px;border-top:1px solid #e2e8f0;display:flex;gap:10px;justify-content:flex-end;align-items:center;">
          ${(decision === 'liberado' || decision === 'parcial') ? `<span style="font-size:11px;color:#64748b;margin-right:auto;">Se generarán ${numT} lote(s) individuales + Packing List</span>` : ''}
          <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
          <button id="cal-btn-confirmar" class="btn-primary" onclick="confirmarLiberarCalidad('${odp.id}')" style="background:${decisionColor};">${ICONS.check} Confirmar ${decisionTexto}</button>
        </div>
      </div>
    </div>
  `;
}

// Generación de código según patrón NewPack: MM TT AAA FFF LLL CCCC CO AD S
// Ancho/Fuelle/Largo: 3 dígitos cada uno (cm directo)
// Calibre: 4 dígitos (calibre × 2 con padding, ej: 200 → 0400, 30 → 0060)
function generarCodigoPT({ material, tipo, ancho, fuelle, largo, calibre, color, aditivo, secuencia = 1 }) {
  const mat = MATERIALES_GEN.find(x => x.nombre === material);
  const tip = TIPOS_GEN.find(x => x.nombre === tipo);
  const col = COLORES_GEN.find(x => x.nombre === color);
  const adi = ADITIVOS_GEN.find(x => x.nombre === aditivo);
  if (!mat || !tip || !col || !adi) return '';
  const a = String(Math.round(Number(ancho) || 0)).padStart(3, '0').slice(0, 3);
  const f = String(Math.round(Number(fuelle) || 0)).padStart(3, '0').slice(0, 3);
  const l = String(Math.round(Number(largo) || 0)).padStart(3, '0').slice(0, 3);
  const c = String(Math.round((Number(calibre) || 0) * 2)).padStart(4, '0').slice(0, 4);
  return `${mat.codigo}${tip.codigo}${a}${f}${l}${c}${col.codigo}${adi.codigo}${secuencia}`;
}
window.generarCodigoPT = generarCodigoPT;

// Generación de descripción legible
function generarDescripcionPT({ material, tipo, ancho, fuelle, largo, calibre, color, aditivo, presentacion = '' }) {
  const med = (Number(fuelle) || 0) > 0 ? `${ancho}+${fuelle}X${largo}` : `${ancho}X${largo}`;
  const mat = (material || '').toUpperCase();
  const adi = aditivo && aditivo !== 'NINGUNO' ? ` ${aditivo}` : '';
  const pres = presentacion ? ` ${presentacion}` : '';
  return `${mat} ${tipo} ${med} CAL ${calibre} ${color}${adi}${pres}`.trim();
}
window.generarDescripcionPT = generarDescripcionPT;

            <div id="pt-preview-desc" style="font-size:11px;color:#475569;margin-top:6px;font-style:italic;">${(descGen && todoLleno) ? descGen : ''}</div>

          <!-- 1. Material y Tipo -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="field">
              <label class="field-label">Material *</label>
              <select class="input form-pt" data-field="material">
                ${MATERIALES_GEN.map(m => `<option value="${m.nombre}" ${f.material === m.nombre ? 'selected' : ''}>${m.nombre} (${m.codigo})</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label class="field-label">Tipo *</label>
              <select class="input form-pt" data-field="tipo">
                ${TIPOS_GEN.map(t => `<option value="${t.nombre}" ${f.tipo === t.nombre ? 'selected' : ''}>${t.nombre} (${t.codigo})</option>`).join('')}
              </select>
            </div>
          </div>
          
          <!-- 2. Medidas -->
