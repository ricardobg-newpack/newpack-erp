// SINCRONIZADOR: Activar OVs esperando_produccion que ya tienen material
// ============================================================
window.sincronizarOVsEsperando = async () => {
  // Buscar todas las OVs esperando produccion
  const ovsEsperando = (state.ordenes_venta || []).filter(o => o.estatus === 'esperando_produccion');
  if (ovsEsperando.length === 0) { toast('No hay OVs esperando producción', 'info'); return; }
  
  // Para cada una, verificar si su PI ya tiene tarimas disponibles (búsqueda flexible)
  const ovsActivables = [];
  ovsEsperando.forEach(ov => {
    const tarimasDelPI = (state.tarimas || []).filter(t => {
      const mismoProducto = t.producto_codigo === ov.producto_codigo;
      const mismoPI = t.pedido_id === ov.pedido_id || t.pedido_folio === ov.pedido_folio;
      const mismoCliente = t.cliente_codigo === ov.cliente_codigo;
      const enAlmacen = ['en_almacen_planta','en_cedis_mty','en_cedis_mex','en_transito_cedis_mty','en_transito_cedis_mex'].includes(t.estatus);
      const sinOV = !t.ov_id && !t.ov_folio;
      return mismoProducto && (mismoPI || mismoCliente) && enAlmacen && sinOV;
    });
    if (tarimasDelPI.length > 0) {
      ovsActivables.push({ ov, tarimasDisponibles: tarimasDelPI.length });
    }
  });
  
  if (ovsActivables.length === 0) {
    toast(`${ovsEsperando.length} OV(s) en espera, pero ninguna tiene material listo aún`, 'info');
    return;
  }
  
  if (!confirm(`Activar ${ovsActivables.length} OV(s) que ya tienen material listo?\n\n${ovsActivables.map(x => `• ${x.ov.folio} - ${x.ov.cliente_nombre} (${x.tarimasDisponibles} tarimas listas)`).join('\n')}\n\nPasarán de "esperando producción" → "pendiente asignar".`)) return;
  
  state.loadingAccion = true; render();
  try {
    const batch = writeBatch(db);
    ovsActivables.forEach(({ov}) => {
      batch.update(doc(db, 'ordenes_venta', ov.id), {
        estatus: 'pendiente_asignar',
        material_disponible_at: serverTimestamp(),
        sincronizado_manualmente: true,
        updated_at: serverTimestamp()
      });
      ['CS', 'KAM', 'CEDMTY', 'CEO'].forEach(depto => {
        const ref = doc(collection(db, 'notificaciones'));
        batch.set(ref, {
          titulo: `🟢 ${ov.folio} lista para asignar tarimas`,
          mensaje: `Material de ${ov.cliente_nombre} ya está disponible · ${ov.producto_codigo}`,
          depto_destino: depto, tipo: 'success', folio_ref: ov.folio,
          created_at: serverTimestamp()
        });
      });
    });
    await batch.commit();
    toast(`✅ ${ovsActivables.length} OV(s) activadas correctamente`);
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

// AUTO-SINCRONIZADOR: igual pero silencioso, ejecutado en background
window.autoSincronizarOVsEsperando = async () => {
  const ovsEsperando = (state.ordenes_venta || []).filter(o => o.estatus === 'esperando_produccion');
  if (ovsEsperando.length === 0) return;
  
  const ovsActivables = [];
  ovsEsperando.forEach(ov => {
    // Búsqueda más flexible: por pedido_id O pedido_folio O por producto+cliente O pool STOCK
    const tarimasDelPI = (state.tarimas || []).filter(t => {
      const mismoProducto = t.producto_codigo === ov.producto_codigo;
      const mismoPI = t.pedido_id === ov.pedido_id || t.pedido_folio === ov.pedido_folio;
      const mismoCliente = t.cliente_codigo === ov.cliente_codigo;
      const esStockGeneral = t.cliente_codigo === 'STOCK';
      const enAlmacen = ['en_almacen_planta','en_cedis_mty','en_cedis_mex','en_transito_cedis_mty','en_transito_cedis_mex'].includes(t.estatus);
      const sinOV = !t.ov_id && !t.ov_folio;
      return mismoProducto && (mismoPI || mismoCliente || esStockGeneral) && enAlmacen && sinOV;
    });
    if (tarimasDelPI.length > 0) {
      ovsActivables.push({ ov, tarimasDisponibles: tarimasDelPI.length });
    }
  });
  
  if (ovsActivables.length === 0) return;
  
  // Ejecutar en silencio (sin confirm)
  try {
    const batch = writeBatch(db);
    ovsActivables.forEach(({ov, tarimasDisponibles}) => {
      batch.update(doc(db, 'ordenes_venta', ov.id), {
        estatus: 'pendiente_asignar',
        material_disponible_at: serverTimestamp(),
        sincronizado_auto: true,
        updated_at: serverTimestamp()
      });
      ['CS', 'KAM', 'CEDMTY', 'CEO'].forEach(depto => {
        const ref = doc(collection(db, 'notificaciones'));
        batch.set(ref, {
          titulo: `🟢 ${ov.folio} lista para asignar tarimas`,
          mensaje: `Material de ${ov.cliente_nombre} ya está disponible · ${ov.producto_codigo} · ${tarimasDisponibles} tarima(s)`,
          depto_destino: depto, tipo: 'success', folio_ref: ov.folio,
          created_at: serverTimestamp()
        });
      });
    });
    await batch.commit();
    toast(`🟢 ${ovsActivables.length} OV(s) activadas automáticamente: ${ovsActivables.map(x => x.ov.folio).join(', ')}`);
  } catch (e) {
    console.error('Auto-sincronización OVs falló:', e);
  }
};

window.migrarOVsLegacy = async () => {
  const ovsLegacy = (state.ordenes_venta || []).filter(o => 
    o.estatus === 'pendiente' || 
    !['esperando_produccion','pendiente_asignar','preparando','lista_embarcar','por_cargar','enviada','entregada'].includes(o.estatus)
  );
  if (ovsLegacy.length === 0) { toast('No hay OVs legacy para migrar', 'info'); return; }
  if (!confirm(`Migrar ${ovsLegacy.length} OV(s) legacy?\n\nLas que tienen ODP vinculada → "esperando_produccion"\nLas demás → "pendiente_asignar"\n\nEsto las hará aparecer en el módulo Embarques.`)) return;
  
  state.loadingAccion = true; render();
  try {
    let countAsignar = 0, countEsperando = 0;
    for (let i = 0; i < ovsLegacy.length; i += 400) {
      const batch = writeBatch(db);
      const slice = ovsLegacy.slice(i, i + 400);
      slice.forEach(o => {
        // Buscar si tiene ODP vinculada en mismo PI con mismo producto
        const odp = state.ordenes_produccion.find(odp => 
          odp.pedido_id === o.pedido_id && 
          odp.producto_codigo === o.producto_codigo &&
          !['liberada_empaque','rechazada','en_almacen_planta','en_cedis_mty','en_cedis_mex','entregada'].includes(odp.estatus)
        );
        const tieneOdpAbierta = !!odp;
        
        const updates = {
          // Garantizar campos nuevos
          cantidad_solicitada: Number(o.cantidad_solicitada || o.cantidad) || 0,
          cantidad_enviada: Number(o.cantidad_enviada) || 0,
          tarimas_ids: o.tarimas_ids || [],
          tipo_origen: o.tipo_origen || (tieneOdpAbierta ? 'producir' : 'stock'),
          cedis: o.cedis || 'CEDIS-MTY',
          updated_at: serverTimestamp()
        };
        
        if (tieneOdpAbierta && updates.tipo_origen === 'producir') {
          updates.estatus = 'esperando_produccion';
          updates.odp_folio = odp.folio;
          countEsperando++;
        } else {
          updates.estatus = 'pendiente_asignar';
          countAsignar++;
        }
        
        batch.update(doc(db, 'ordenes_venta', o.id), updates);
      });
      await batch.commit();
    }
    
    toast(`✅ Migración completa: ${countAsignar} OVs por asignar, ${countEsperando} esperando producción`);
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

window.migrarPIaTarimasYLotes = async () => {
  if (!confirm('¿Migrar pedido_folio a tarimas, lotes, packing lists y OTIs antiguos?\n\nEsto buscará el PI correspondiente en cada ODP y lo asignará. Es seguro y no destructivo.')) return;
  
  state.loadingAccion = true; render();
  try {
    let countTarimas = 0, countLotes = 0, countPKLs = 0, countOTIs = 0;
    
    // Mapa rápido odp_folio → pedido_folio
    const mapaOdpAPedido = {};
    state.ordenes_produccion.forEach(odp => {
      if (odp.folio && odp.pedido_folio) {
        mapaOdpAPedido[odp.folio] = { pedido_folio: odp.pedido_folio, pedido_id: odp.pedido_id };
      }
    });
    
    // 1. Migrar tarimas
    const tarimasUpd = state.tarimas.filter(t => !t.pedido_folio && t.odp_folio && mapaOdpAPedido[t.odp_folio]);
    for (let i = 0; i < tarimasUpd.length; i += 400) {
      const batch = writeBatch(db);
      const slice = tarimasUpd.slice(i, i + 400);
      slice.forEach(t => {
        const info = mapaOdpAPedido[t.odp_folio];
        batch.update(doc(db, 'tarimas', t.id), {
          pedido_folio: info.pedido_folio,
          pedido_id: info.pedido_id || '',
          updated_at: serverTimestamp()
        });
      });
      await batch.commit();
      countTarimas += slice.length;
    }
    
    // 2. Migrar lotes
    const lotesUpd = state.lotes.filter(l => !l.pedido_folio && l.odp_folio && mapaOdpAPedido[l.odp_folio]);
    for (let i = 0; i < lotesUpd.length; i += 400) {
      const batch = writeBatch(db);
      const slice = lotesUpd.slice(i, i + 400);
      slice.forEach(l => {
        const info = mapaOdpAPedido[l.odp_folio];
        batch.update(doc(db, 'lotes', l.id), {
          pedido_folio: info.pedido_folio,
          pedido_id: info.pedido_id || '',
          updated_at: serverTimestamp()
        });
      });
      await batch.commit();
      countLotes += slice.length;
    }
    
    // 3. Migrar packing lists
    const pklsUpd = (state.packing_lists || []).filter(p => !p.pedido_folio && p.odp_folio && mapaOdpAPedido[p.odp_folio]);
    for (let i = 0; i < pklsUpd.length; i += 400) {
      const batch = writeBatch(db);
      const slice = pklsUpd.slice(i, i + 400);
      slice.forEach(p => {
        const info = mapaOdpAPedido[p.odp_folio];
        batch.update(doc(db, 'packing_lists', p.id), {
          pedido_folio: info.pedido_folio,
          pedido_id: info.pedido_id || '',
          updated_at: serverTimestamp()
        });
      });
      await batch.commit();
      countPKLs += slice.length;
    }
    
    // 4. Migrar OTIs (recalcular pedidos_folios desde sus tarimas)
    const otisUpd = state.oti.filter(o => !o.pedidos_folios || o.pedidos_folios.length === 0);
    for (const oti of otisUpd) {
      const tarimasOti = state.tarimas.filter(t => (oti.tarimas_ids || []).includes(t.id));
      // Combinar PI ya guardados + actualizar con la migración (en memoria, después de Firestore)
      const pedidosUnicos = [...new Set(tarimasOti.map(t => {
        return t.pedido_folio || (mapaOdpAPedido[t.odp_folio]?.pedido_folio) || '';
      }).filter(Boolean))];
      const odpsUnicas = [...new Set(tarimasOti.map(t => t.odp_folio).filter(Boolean))];
      const clientesUnicos = [...new Set(tarimasOti.map(t => t.cliente_nombre).filter(Boolean))];
      
      if (pedidosUnicos.length > 0) {
        await updateDoc(doc(db, 'oti', oti.id), {
          pedidos_folios: pedidosUnicos,
          odps_folios: odpsUnicas,
          clientes_nombres: clientesUnicos,
          updated_at: serverTimestamp()
        });
        countOTIs++;
      }
    }
    
    toast(`✅ Migración completa: ${countTarimas} tarimas, ${countLotes} lotes, ${countPKLs} PKLs, ${countOTIs} OTIs`);
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

window.confirmarCrearOTI = async () => {
  const f = state.formOTI;
  if (!f || !f.tarimas_seleccionadas || f.tarimas_seleccionadas.length === 0) {
    toast('Selecciona al menos 1 tarima', 'error'); return;
  }
  const transportista = ($('#oti-transportista')?.value || '').trim();
  const conductor = ($('#oti-conductor')?.value || '').trim();
  const placas = ($('#oti-placas')?.value || '').trim();
  const observaciones = ($('#oti-obs')?.value || '').trim();
  if (!transportista) { toast('Captura el transportista', 'error'); return; }
  
  state.loadingAccion = true; render();
  try {
    // 1. Generar folio OTI
    const contadorRef = doc(db, 'contadores', 'oti_planta_cedis');
    const folioNum = await runTransaction(db, async (tx) => {
      const snap = await tx.get(contadorRef);
      const actual = snap.exists() ? (snap.data().valor || 0) : 0;
      const nuevo = actual + 1;
      tx.set(contadorRef, { valor: nuevo }, { merge: true });
      return nuevo;
    });
    const folio = `OTI-2026-${String(folioNum).padStart(5, '0')}`;
    
    const tarimasSel = state.tarimas.filter(t => f.tarimas_seleccionadas.includes(t.id));
    const totalCant = tarimasSel.reduce((s, t) => s + (Number(t.cantidad) || 0), 0);
    const totalKg = tarimasSel.reduce((s, t) => s + (Number(t.peso_neto_kg || t.peso_neto) || 0), 0);
    
    // Resúmenes únicos (para búsqueda rápida)
    const pedidosUnicos = [...new Set(tarimasSel.map(t => t.pedido_folio).filter(Boolean))];
    const odpsUnicas = [...new Set(tarimasSel.map(t => t.odp_folio).filter(Boolean))];
    const clientesUnicos = [...new Set(tarimasSel.map(t => t.cliente_nombre).filter(Boolean))];
    
    // 2. Crear OTI (sanitizando undefined → string vacío o 0)
    const otiRef = await addDoc(collection(db, 'oti'), {
      folio,
      origen: 'PLANTA-MTY',
      destino: 'CEDIS-MTY',
      estatus: 'en_transito',
      tarimas_ids: f.tarimas_seleccionadas,
      pedidos_folios: pedidosUnicos,
      odps_folios: odpsUnicas,
      clientes_nombres: clientesUnicos,
      tarimas_resumen: tarimasSel.map(t => ({
        id: t.id || '',
        lote_codigo: t.lote_codigo || '',
        numero_tarima: Number(t.numero_tarima) || 0,
        cliente_nombre: t.cliente_nombre || '',
        cliente_codigo: t.cliente_codigo || '',
        producto_codigo: t.producto_codigo || '',
        odp_folio: t.odp_folio || '',
        pedido_folio: t.pedido_folio || '',
        cantidad: Number(t.cantidad) || 0,
        um: t.um || 'kg',
        peso_neto_kg: Number(t.peso_neto_kg || t.peso_neto) || 0
      })),
      num_tarimas: tarimasSel.length,
      peso_total_kg: Number(totalKg) || 0,
      cantidad_total: Number(totalCant) || 0,
      transportista: transportista || '',
      conductor: conductor || '',
      placas: placas || '',
      observaciones: observaciones || '',
      creado_por: state.user.id || '',
      creado_por_nombre: state.user.nombre || '',
      created_at: serverTimestamp(),
      updated_at: serverTimestamp()
    });
    
    // 3. Actualizar tarimas
    const batch = writeBatch(db);
    tarimasSel.forEach(t => {
      batch.update(doc(db, 'tarimas', t.id), {
        estatus: 'en_transito_cedis_mty',
        almacen_actual: 'EN_TRANSITO',
        oti_id: otiRef.id,
        oti_folio: folio,
        salida_planta_at: serverTimestamp(),
        updated_at: serverTimestamp()
      });
    });
    // Notificar a CEDMTY
    ['CEDMTY', 'CEO', 'CS'].forEach(depto => {
      const ref = doc(collection(db, 'notificaciones'));
      batch.set(ref, {
        titulo: `🚚 OTI ${folio} en tránsito a CEDIS-MTY`,
        mensaje: `${tarimasSel.length} tarima(s) · ${fmtNum(totalKg)} kg · ${transportista}`,
        depto_destino: depto, tipo: 'info', folio_ref: folio,
        created_at: serverTimestamp()
      });
    });
    await batch.commit();

      const t = state.tarimas.find(x => x.id === tid);
      if (t) {
        if (t.pedido_id) piIdsAfectados.add(t.pedido_id);
        if (t.pedido_folio) piFoliosAfectados.add(t.pedido_folio);
      }
    });
    
    // Buscar OVs que esperan producción de estos PIs
    const ovsActivar = state.ordenes_venta.filter(ov => 
      ov.estatus === 'esperando_produccion' &&
      (piIdsAfectados.has(ov.pedido_id) || piFoliosAfectados.has(ov.pedido_folio))
    );
    
    ovsActivar.forEach(ov => {
      batch.update(doc(db, 'ordenes_venta', ov.id), {
        estatus: 'pendiente_asignar',
        material_disponible_at: serverTimestamp(),
        updated_at: serverTimestamp()
      });
      // Notificar a CS y KAM y CEDIS
      ['CS', 'KAM', 'CEDMTY', 'CEO'].forEach(depto => {
        const ref = doc(collection(db, 'notificaciones'));
        batch.set(ref, {
          titulo: `🟢 ${ov.folio} lista para asignar tarimas`,
          mensaje: `Material de ${ov.cliente_nombre} ya está en CEDIS-MTY · ${ov.producto_codigo}`,
          depto_destino: depto, tipo: 'success', folio_ref: ov.folio,
          created_at: serverTimestamp()
        });
      });
    });
    
    await batch.commit();
    
    let msg = `✅ ${oti.folio} recibido · ${oti.num_tarimas} tarima(s) en CEDIS-MTY`;
    if (ovsActivar.length > 0) {
      msg += ` · ${ovsActivar.length} OV(s) activadas para asignar tarimas`;
    }
    toast(msg);
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

// MODAL: ASIGNAR TARIMAS A OV (CS/KAM)
// ============================================================
function modalAsignarTarimasOV() {
  const ov = state.ordenes_venta.find(x => x.id === state.modalData);
  if (!ov) return '';
  const f = state.formAsignarOV || { tarimas_seleccionadas: [] };
  
  // Tarimas disponibles según tipo:
  // - tipo 'producir': SOLO del mismo PI (vinculado a ODP)
  // - tipo 'stock': cualquier tarima del MISMO CLIENTE + MISMO PRODUCTO en CEDIS/Planta, sin OV
  const esTipoStock = ov.tipo_origen === 'stock' || !ov.tipo_origen;
  
  const disponibles = state.tarimas.filter(t => {
    // Mismo producto SIEMPRE
    if (t.producto_codigo !== ov.producto_codigo) return false;
    // Sin OV asignada
    if (t.ov_id || t.ov_folio) return false;
    // En almacén disponible
    if (!['en_cedis_mty','en_cedis_mex','en_almacen_planta'].includes(t.estatus)) return false;
    
    if (esTipoStock) {
      // STOCK: tarimas del mismo cliente O tarimas del pool STOCK INTERNO
      return t.cliente_codigo === ov.cliente_codigo || t.cliente_codigo === 'STOCK';
    } else {
      // PRODUCIR: del mismo PI específico
      return t.pedido_folio === ov.pedido_folio || t.pedido_id === ov.pedido_id;
    }
  });
  
  const seleccionadas = disponibles.filter(t => f.tarimas_seleccionadas.includes(t.id));
  const totalAsignado = seleccionadas.reduce((s, t) => s + (Number(t.cantidad) || 0), 0);
  const totalKg = seleccionadas.reduce((s, t) => s + (Number(t.peso_neto_kg || t.peso_neto) || 0), 0);
  const cantSol = Number(ov.cantidad_solicitada) || 0;
  const pendiente = Math.max(0, cantSol - totalAsignado);
  
  // Agrupar por ubicación
  const porUbicacion = {};
  disponibles.forEach(t => {
    const k = t.almacen_actual || (t.estatus === 'en_almacen_planta' ? 'PLANTA-MTY' : t.estatus);
    if (!porUbicacion[k]) porUbicacion[k] = [];
    porUbicacion[k].push(t);
  });
  
  return `
    <div class="modal-bg" onclick="if(event.target===this)cerrarModal()">
      <div class="modal" style="max-width:880px;max-height:92vh;">
        <div class="modal-header">
          <div>
            <h2 style="font-size:18px;font-weight:800;">📋 Asignar tarimas a <span style="color:#3b82f6;" class="text-mono">${ov.folio}</span></h2>
            <div style="font-size:12px;color:#64748b;margin-top:2px;">${ov.cliente_nombre} · PI ${ov.pedido_folio} · ${ov.producto_codigo}</div>
          </div>
          <button class="icon-btn" onclick="cerrarModal()">${ICONS.x}</button>
        </div>
        
        <div class="modal-body" style="padding:18px 22px;max-height:60vh;overflow-y:auto;">
          <!-- Resumen -->
          <div style="background:#dbeafe;padding:12px 14px;border-radius:10px;margin-bottom:14px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;">
            <div>
              <div style="font-size:11px;color:#1e40af;font-weight:700;text-transform:uppercase;">Cliente solicitó</div>
              <div style="font-size:18px;font-weight:800;color:#1e40af;">${fmtCantidadUM(cantSol, ov.um)}</div>
            </div>
            <div>
              <div style="font-size:11px;color:#16a34a;font-weight:700;text-transform:uppercase;">Asignado</div>
              <div style="font-size:18px;font-weight:800;color:#16a34a;">${fmtCantidadUM(totalAsignado, ov.um)}</div>
              <div style="font-size:10px;color:#64748b;">${fmtNum(totalKg)} kg · ${seleccionadas.length} tarima(s)</div>
            </div>
            <div>
              <div style="font-size:11px;color:${pendiente > 0 ? '#dc2626' : '#16a34a'};font-weight:700;text-transform:uppercase;">${pendiente > 0 ? 'Pendiente' : 'Completo ✓'}</div>
              <div style="font-size:18px;font-weight:800;color:${pendiente > 0 ? '#dc2626' : '#16a34a'};">${fmtCantidadUM(pendiente, ov.um)}</div>
            </div>
          </div>
          
          ${disponibles.length === 0 ? `
            <div style="padding:40px;text-align:center;color:#94a3b8;background:#f8fafc;border-radius:10px;">
              <div style="font-size:48px;margin-bottom:10px;">📦</div>
              <div style="font-weight:700;color:#475569;">No hay tarimas disponibles</div>
              <div style="font-size:12px;margin-top:6px;">
                ${esTipoStock 
                  ? `No hay tarimas en stock del producto <strong>${ov.producto_codigo}</strong> para <strong>${ov.cliente_nombre}</strong>. Verifica que existan tarimas en CEDIS-MTY/MEX o Almacén Planta sin OV asignada.`
                  : `Esperando que termine la producción y se reciban tarimas en CEDIS para PI <strong>${ov.pedido_folio}</strong>.`}
              </div>
            </div>
          ` : `
            <div style="background:${esTipoStock ? '#dcfce7' : '#fef3c7'};padding:8px 12px;border-radius:8px;font-size:11px;color:${esTipoStock ? '#166534' : '#92400e'};margin-bottom:10px;">
              ${esTipoStock 
                ? `📦 <strong>STOCK:</strong> Mostrando tarimas de cualquier PI del cliente con el mismo producto.`
                : `🏭 <strong>PRODUCIR:</strong> Mostrando solo tarimas del PI ${ov.pedido_folio}.`}
            </div>
            ${Object.entries(porUbicacion).map(([loc, tarimas]) => `
            <div style="margin-bottom:14px;">
              <div style="padding:8px 12px;background:#f1f5f9;font-weight:700;font-size:12px;color:#475569;border-radius:8px 8px 0 0;border:1px solid #e2e8f0;">
                📍 ${loc} (${tarimas.length} tarima(s))
              </div>
              <table style="width:100%;font-size:11px;border-collapse:collapse;border:1px solid #e2e8f0;border-top:none;">
                <thead>
                  <tr style="background:#f8fafc;">
                    <th style="padding:8px;text-align:center;width:40px;"></th>
                    <th style="padding:8px;text-align:left;">Tarima</th>
                    <th style="padding:8px;text-align:left;">PI origen</th>
                    <th style="padding:8px;text-align:left;">Lote</th>
                    <th style="padding:8px;text-align:left;">ODP</th>
                    <th style="padding:8px;text-align:right;">Cantidad</th>
                    <th style="padding:8px;text-align:right;">Kg</th>
                  </tr>
                </thead>
                <tbody>
                  ${tarimas.map(t => `
                    <tr style="border-top:1px solid #f1f5f9;${f.tarimas_seleccionadas.includes(t.id) ? 'background:#dcfce7;' : ''}">
                      <td style="padding:8px;text-align:center;"><input type="checkbox" ${f.tarimas_seleccionadas.includes(t.id) ? 'checked' : ''} onchange="asignarOVToggleTarima('${t.id}')" style="width:16px;height:16px;cursor:pointer;" /></td>
                      <td style="padding:8px;font-weight:700;">T${String(t.numero_tarima).padStart(2,'0')}</td>
                      <td style="padding:8px;" class="text-mono"><strong style="color:#3b82f6;">${t.pedido_folio || '—'}</strong></td>
                      <td style="padding:8px;" class="text-mono">${t.lote_codigo}</td>
                      <td style="padding:8px;" class="text-mono">${t.odp_folio || '—'}</td>
                      <td style="padding:8px;text-align:right;font-weight:600;color:#1e40af;">${fmtCantidadUM(t.cantidad, t.um)}</td>
                      <td style="padding:8px;text-align:right;">${fmtNum(t.peso_neto_kg || t.peso_neto || 0)} kg</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          `).join('')}
          `}
        </div>
        
        <div style="padding:14px 22px;border-top:1px solid #e2e8f0;display:flex;gap:10px;justify-content:flex-end;">
          <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
          <button class="btn-primary" onclick="confirmarAsignarTarimasOV()" ${seleccionadas.length === 0 ? 'disabled' : ''} style="background:#16a34a;${seleccionadas.length === 0 ? 'opacity:0.5;cursor:not-allowed;' : ''}">${ICONS.check} Asignar y enviar a preparar</button>
        </div>
      </div>
    </div>
  `;
}

// MODAL: LIBERACIÓN DE CALIDAD (con regla del 90%)
// ============================================================
function modalLiberarCalidad() {
  const odp = state.ordenes_produccion.find(o => o.id === state.modalData);
  if (!odp) return '';
  
  const um = (odp.um || 'kg').toLowerCase();
  const stepCant = UM_ENTEROS.includes(um) ? '1' : '0.01';
  const cantidadProducida = Number(odp.cantidad_producida_final) || 0;
  const cantidadOriginal = Number(odp.cantidad) || 0;
  const procesosCompletados = odp.procesos_completados || [];
  const totalMermas = procesosCompletados.reduce((s, p) => s + (Number(p.mermas) || 0), 0);
  
  // Inicializar form
  if (!state.modalForm) {
    state.modalForm = {
      cantidad_aceptada: cantidadProducida,
      num_tarimas: 1,
      peso_tarima_unit: 25,
      // GLOBAL: contenido por paquete (numérico, en la UM del producto)
      contenido_por_paquete: '',
      // Lista de tarimas (cada una: paquetes completos + sueltos + pesos)
      tarimas_data: [],
      decision: 'pendiente',
      notas: ''
    };
  }
  const f = state.modalForm;
  
  // Si cambió num_tarimas, reinicializar lista
  const numT = Number(f.num_tarimas) || 1;
  if (!f.tarimas_data || f.tarimas_data.length !== numT) {
    const pesoUnit = Number(f.peso_tarima_unit) || 25;
    f.tarimas_data = Array.from({length: numT}, () => ({
      paquetes: 0,         // # paquetes completos
      sueltos: 0,          // cantidad suelta (no completa paquete)
      peso_bruto: 0,
      peso_tarima_vacia: pesoUnit
    }));
  }
  
  const cantAceptada = Number(f.cantidad_aceptada) || 0;
  const cantRechazada = Math.max(0, cantidadProducida - cantAceptada);
  const pctCalidadVsOriginal = cantidadOriginal > 0 ? (cantAceptada / cantidadOriginal * 100) : 0;
  
  // Determinar decisión según regla 90%
  let decision = 'pendiente';
  let decisionTexto = '';
  let decisionColor = '#94a3b8';
  let mensajeDecision = '';
  
  // Rango aceptable de calidad final
  const calMinKg = cantidadOriginal * (1 - TOLERANCIAS.CAL_FALTANTE_PCT);
  const calMaxKg = cantidadOriginal * (1 + TOLERANCIAS.CAL_EXTRA_PCT);
  
  if (cantAceptada > 0) {
    if (cantAceptada >= calMinKg && cantAceptada <= calMaxKg) {
      // DENTRO DEL RANGO -3% a +5% → LIBERA TOTAL (sin reposición)
      decision = 'liberado';
      decisionTexto = '✅ LIBERADO TOTAL';
      decisionColor = '#16a34a';
      const dif = cantAceptada - cantidadOriginal;
      const pctDif = (dif / cantidadOriginal * 100);
      mensajeDecision = Math.abs(dif) < 0.5
        ? 'Toda la producción se libera (cantidad exacta). Cada tarima genera su propio LOTE.'
        : `Se libera dentro del rango aceptable (${pctDif >= 0 ? '+' : ''}${pctDif.toFixed(2)}%). <strong>NO se genera PI de reposición.</strong>`;
    } else if (cantAceptada < calMinKg) {
      // FALTANTE > 3% → PARCIAL con confirmación + PI reposición
      decision = 'parcial';
      decisionTexto = '⚠️ PARCIAL (faltante > 3%)';
      decisionColor = '#f59e0b';
      const faltante = cantidadOriginal - cantAceptada;
      const pctFalt = (faltante / cantidadOriginal * 100);
      mensajeDecision = `Faltante de ${fmtCantidadUM(faltante, um)} (${pctFalt.toFixed(2)}%) excede la tolerancia del ${(TOLERANCIAS.CAL_FALTANTE_PCT*100)}%.<br><strong>Se generará PI nuevo</strong> por la cantidad faltante. Pedirá confirmación + motivo.`;
    } else {
      // EXTRA > 5% → TOTAL con confirmación pero el extra registrado
      decision = 'liberado_extra';
      decisionTexto = '⚠️ LIBERADO con extra (>+5%)';
      decisionColor = '#f59e0b';
      const extra = cantAceptada - cantidadOriginal;
      const pctExtra = (extra / cantidadOriginal * 100);
      mensajeDecision = `Cantidad excede el +${(TOLERANCIAS.CAL_EXTRA_PCT*100)}% permitido en ${fmtCantidadUM(extra, um)} (+${pctExtra.toFixed(2)}%).<br>Se libera TODO. Pedirá confirmación + motivo del excedente.`;
    }
  } else {
    decision = 'rechazado';
    decisionTexto = '❌ RECHAZADO TOTAL';
    decisionColor = '#dc2626';
    mensajeDecision = 'Toda la producción se rechaza. <strong>Se genera nuevo PI completo</strong>.';
  }
  
  // Cálculos automáticos del nuevo modelo
  const contPaq = Number(f.contenido_por_paquete) || 0;
  const totalPaquetes = f.tarimas_data.reduce((s, t) => s + (Number(t.paquetes) || 0), 0);
  const totalSueltos = f.tarimas_data.reduce((s, t) => s + (Number(t.sueltos) || 0), 0);
  const totalCantTarimas = (totalPaquetes * contPaq) + totalSueltos;
  const totalPesoBruto = f.tarimas_data.reduce((s, t) => s + (Number(t.peso_bruto) || 0), 0);
  const totalPesoVacio = f.tarimas_data.reduce((s, t) => s + (Number(t.peso_tarima_vacia) || 0), 0);
  const totalPesoNeto = totalPesoBruto - totalPesoVacio;
  const productoForPeso = state.productos_pt.find(p => p.codigo === odp.producto_codigo);
  const pesoTeoricoTotal = window.convertirAKg(cantAceptada, um, productoForPeso) || 0;
  const diffPeso = totalPesoNeto - pesoTeoricoTotal;
  const pctDiff = pesoTeoricoTotal > 0 ? Math.abs(diffPeso / pesoTeoricoTotal * 100) : 0;
  const colorPeso = pctDiff <= 5 ? '#16a34a' : (pctDiff <= 10 ? '#f59e0b' : '#dc2626');
  
  // Cálculos del autodistribuidor (sólo para preview)
  let paqTotalNec = 0, sueltosTotal = 0;
  if (contPaq > 0 && cantAceptada > 0) {
    paqTotalNec = Math.floor(cantAceptada / contPaq);
    sueltosTotal = cantAceptada - (paqTotalNec * contPaq);
  }
  
  return `
    <div class="modal-bg" onclick="if(event.target===this)cerrarModal()">
      <div class="modal" style="max-width:920px;max-height:92vh;">
        <div class="modal-header">
          <h2 style="font-size:18px;font-weight:800;">✅ Liberación de Calidad</h2>
          <button class="icon-btn" onclick="cerrarModal()">${ICONS.x}</button>
        </div>
        <div class="modal-body">
          
          <div style="padding:12px;background:#fffbeb;border-radius:10px;margin-bottom:14px;font-size:12px;border-left:4px solid #f59e0b;">
            <strong>${odp.folio}</strong> · ${odp.cliente_nombre} · <span class="text-mono" style="font-size:11px;">${odp.producto_codigo}</span><br>
            ${odp.descripcion || ''}
          </div>
          
          <!-- Resumen producción -->
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">
            <div style="padding:8px;background:#f8fafc;border-radius:8px;text-align:center;">
              <div style="font-size:9px;color:#64748b;font-weight:700;text-transform:uppercase;">Solicitado</div>
              <div style="font-size:14px;font-weight:800;">${fmtCantidadUM(cantidadOriginal, um)}</div>
            </div>
            <div style="padding:8px;background:#f0fdf4;border-radius:8px;text-align:center;">
              <div style="font-size:9px;color:#16a34a;font-weight:700;text-transform:uppercase;">Producido</div>
              <div style="font-size:14px;font-weight:800;color:#16a34a;">${fmtCantidadUM(cantidadProducida, um)}</div>
            </div>
            <div style="padding:8px;background:#fee2e2;border-radius:8px;text-align:center;">
              <div style="font-size:9px;color:#dc2626;font-weight:700;text-transform:uppercase;">Mermas</div>
              <div style="font-size:14px;font-weight:800;color:#dc2626;">${fmtCantidadUM(totalMermas, um)}</div>
            </div>
          </div>
          
          <!-- Cantidad aceptada -->
          <div class="field">
            <label class="field-label">Cantidad ACEPTADA por calidad (en ${UM_LABELS[um]}) *</label>
            <input class="input form-cal" data-field="cantidad_aceptada" type="number" min="0" step="${stepCant}" value="${f.cantidad_aceptada}" autocomplete="off" />
          </div>
          
          <div id="cal-rechazo-info" style="padding:10px;background:#fee2e2;border-radius:8px;margin-bottom:14px;font-size:12px;color:#dc2626;display:${cantRechazada > 0 ? 'block' : 'none'};">
            ${cantRechazada > 0 ? `⚠️ Se rechazarán <strong>${fmtCantidadUM(cantRechazada, um)}</strong> del producido` : ''}
          </div>
          
          <!-- Decisión -->
          <div id="cal-preview-box" style="padding:12px;background:${decisionColor}11;border:2px solid ${decisionColor};border-radius:10px;margin-bottom:14px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
              <strong id="cal-preview-texto" style="color:${decisionColor};font-size:13px;">${decisionTexto}</strong>
              <strong id="cal-preview-pct" style="color:${decisionColor};font-size:16px;">${pctCalidadVsOriginal.toFixed(1)}%</strong>
            </div>
            <div id="cal-preview-msg" style="font-size:11px;color:#475569;">${mensajeDecision}</div>
            <div style="margin-top:6px;background:#e2e8f0;height:5px;border-radius:99px;overflow:hidden;">
              <div id="cal-preview-bar" style="background:${decisionColor};height:100%;width:${Math.min(100, pctCalidadVsOriginal)}%;transition:width 0.3s;"></div>
            </div>
            <div style="font-size:10px;color:#94a3b8;margin-top:4px;">Rango aceptable: <strong style="color:#16a34a;">${(TOLERANCIAS.CAL_FALTANTE_PCT*100)}% faltante</strong> a <strong style="color:#16a34a;">+${(TOLERANCIAS.CAL_EXTRA_PCT*100)}% extra</strong> = LIBERA TOTAL · Fuera del rango = pide motivo</div>
          </div>
          
          <!-- Tarimas individuales -->
          <div id="cal-tarimas-container" style="display:${(decision === 'liberado' || decision === 'parcial' || decision === 'liberado_extra') ? 'block' : 'none'};">
            
            <!-- Configuración global de empaque -->
            <div style="padding:14px;background:#eff6ff;border-radius:10px;border:1px solid #bfdbfe;margin-bottom:14px;">
              <div style="font-size:12px;font-weight:700;color:#1e40af;margin-bottom:10px;">📦 Configuración de empaque</div>
              
              <div style="display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:8px;align-items:end;">
                <div>
                  <label class="field-label" style="font-size:10px;">Contenido por paquete (en ${UM_LABELS[um]})</label>
                  <input class="input form-cal" data-field="contenido_por_paquete" type="number" min="0" step="${stepCant}" value="${f.contenido_por_paquete}" placeholder="${um === 'pza' ? 'Ej: 250 ó 2500' : um === 'millar' ? 'Ej: 1 (= 1 millar/paq)' : um === 'kg' ? 'Ej: 25 (= 25 kg/paq)' : ''}" autocomplete="off" />
                  <div style="font-size:9px;color:#94a3b8;margin-top:2px;">${um === 'pza' ? 'Cuántas piezas trae cada paquete' : um === 'millar' ? 'Cuántos millares trae cada paquete' : um === 'kg' ? 'Cuántos kg trae cada paquete' : ''}</div>
                </div>
                <div>
                  <label class="field-label" style="font-size:10px;">Núm. tarimas *</label>
                  <input class="input form-cal" data-field="num_tarimas" type="number" min="1" max="50" step="1" value="${f.num_tarimas}" autocomplete="off" />
                </div>
                <div>
                  <label class="field-label" style="font-size:10px;">Peso tarima vacía</label>
                  <input class="input form-cal" data-field="peso_tarima_unit" type="number" min="0" step="0.01" value="${f.peso_tarima_unit}" autocomplete="off" />
                </div>
              </div>
              
              <div id="cal-empaque-info" style="margin-top:10px;padding:10px;background:#fff;border-radius:6px;font-size:11px;">
                <!-- Modo CON paquetes -->
                <div id="cal-empaque-conpaq" style="display:${contPaq > 0 ? 'block' : 'none'};">
                  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;">
                    <div>
                      <div style="font-size:9px;color:#64748b;text-transform:uppercase;font-weight:700;">Total a empacar</div>
                      <div id="cal-info-total" style="font-size:14px;font-weight:800;color:#1e40af;">${fmtCantidadUM(cantAceptada, um)}</div>
                    </div>
                    <div>
                      <div style="font-size:9px;color:#64748b;text-transform:uppercase;font-weight:700;">Paquetes completos</div>
                      <div id="cal-info-paq" style="font-size:14px;font-weight:800;color:#1e40af;">${paqTotalNec}</div>
                    </div>
                    <div>
                      <div style="font-size:9px;color:#64748b;text-transform:uppercase;font-weight:700;">Sueltos</div>
                      <div id="cal-info-suel" style="font-size:14px;font-weight:800;color:${sueltosTotal > 0 ? '#f59e0b' : '#16a34a'};">${um === 'millar' ? Math.round(sueltosTotal * 1000) + ' pza' : fmtNum(sueltosTotal) + ' ' + UM_LABELS[um]}</div>
                    </div>
                  </div>
                  <button onclick="autoDistribuir()" type="button" style="width:100%;margin-top:10px;padding:8px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-size:12px;">
                    🪄 Auto-distribuir entre <span id="cal-btn-numt-1">${f.num_tarimas}</span> tarima<span id="cal-btn-plur-1">${f.num_tarimas > 1 ? 's' : ''}</span>
                  </button>
                </div>
                <!-- Modo SIN paquetes -->
                <div id="cal-empaque-sinpaq" style="display:${contPaq > 0 ? 'none' : 'block'};">
                  <div style="color:#475569;margin-bottom:6px;">
                    💡 Si no usas paquetes, captura directamente la <strong>cantidad por tarima</strong> en la tabla. Para distribuir equitativo:
                  </div>
                  <button onclick="autoDistribuirSinPaquetes()" type="button" style="width:100%;padding:8px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-size:12px;">
                    🪄 Auto-distribuir <span id="cal-btn-cant">${fmtCantidadUM(cantAceptada, um)}</span> entre <span id="cal-btn-numt-2">${f.num_tarimas}</span> tarima<span id="cal-btn-plur-2">${f.num_tarimas > 1 ? 's' : ''}</span>
                  </button>
                </div>
              </div>
            </div>
            
            <!-- Tabla por tarima -->
            <div style="margin-bottom:14px;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                <strong style="font-size:12px;">📋 Detalle por tarima 
                  <span style="font-weight:400;color:#64748b;font-size:10px;">${contPaq > 0 ? '(captura paquetes y sueltos; cantidad se calcula auto)' : '(captura cantidad por tarima)'}</span>
                </strong>
                <button onclick="resetTarimas()" type="button" style="font-size:10px;padding:4px 8px;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;border-radius:6px;cursor:pointer;">↺ Resetear</button>
              </div>
              <div style="border:1px solid #e2e8f0;border-radius:8px;overflow-x:auto;background:#fff;">
                <table style="width:100%;border-collapse:collapse;font-size:11px;min-width:780px;">
                  <thead>
                    <tr style="background:#f1f5f9;">
                      <th style="padding:8px;text-align:left;">Tar</th>
                      <th style="padding:8px;text-align:right;">Paquetes ${contPaq > 0 ? `<span style="font-weight:400;color:#94a3b8;font-size:9px;">×${fmtNum(contPaq)}</span>` : ''}</th>
                      <th style="padding:8px;text-align:right;">${contPaq > 0 ? (um === 'millar' ? 'Sueltos (pza)' : `Sueltos (${UM_LABELS[um]})`) : `Cantidad (${UM_LABELS[um]}) *`}</th>
                      <th style="padding:8px;text-align:right;">Total ${UM_LABELS[um]} ${contPaq > 0 ? '(auto)' : ''}</th>
                      <th style="padding:8px;text-align:right;">P. bruto (kg)</th>

                      <th style="padding:8px;text-align:right;">P. neto (kg)</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${f.tarimas_data.map((t, i) => {
                      const paq = Number(t.paquetes) || 0;
                      const suel = Number(t.sueltos) || 0;
                      const cantTar = (paq * contPaq) + suel;
                      const neto = (Number(t.peso_bruto) || 0) - (Number(t.peso_tarima_vacia) || 0);
                      // Si UM es millar, mostrar sueltos en piezas (multiplicar por 1000)
                      const sueltosVisible = um === 'millar' ? Math.round(suel * 1000) : suel;
                      const stepSueltos = um === 'millar' ? '1' : (um === 'pza' ? '1' : '0.01');
                      const minSueltos = '0';
                      return `

                      `;
                    }).join('')}
                  </tbody>
                  <tfoot>
                    <tr style="background:#f8fafc;border-top:2px solid #e2e8f0;font-weight:700;">

                <span id="cal-cuadre-status" style="float:right;color:${Math.abs(totalCantTarimas - cantAceptada) < 0.01 ? '#16a34a' : '#92400e'};font-weight:700;">

                </span>
              </div>
            </div>
            
            <!-- Verificación peso teórico -->
            ${pesoTeoricoTotal > 0 ? `
              <div id="cal-verif-box" style="padding:10px;background:${colorPeso}11;border-radius:8px;border:1px solid ${colorPeso}44;margin-bottom:14px;">

function renderTrazTimeline(p, lineas, odps, tarimasPI, otisPI, ovs) {
  const eventos = [];
  
  // PI capturado
  eventos.push({
    fecha: p.created_at,
    icono: '📝',
    titulo: 'PI capturado',
    detalle: `Por ${p.creado_por_nombre || '—'} · ${lineas.length} línea(s)`,
    estado: 'completado'
  });
  
  // Aprobación
  if (p.aprobado_at || ['aprobado','en_proceso','completado'].includes(p.estatus)) {
    eventos.push({
      fecha: p.aprobado_at || p.updated_at,
      icono: '✅',
      titulo: 'PI aprobado',
      detalle: `Por ${p.aprobado_por_nombre || '—'}`,
      estado: 'completado'
    });
  } else if (p.estatus === 'pendiente_aprobacion') {
    eventos.push({
      icono: '🟡',
      titulo: 'Pendiente aprobación',
      detalle: 'Esperando autorización',
      estado: 'pendiente'
    });
  } else if (p.estatus === 'cancelado') {
    eventos.push({
      fecha: p.updated_at,
      icono: '❌',
      titulo: 'PI CANCELADO',
      detalle: '',
      estado: 'cancelado'
    });
  }
  
  // ODPs cada una
  odps.forEach(odp => {
    eventos.push({
      fecha: odp.created_at,
      icono: '🏭',
      titulo: `${odp.folio} generada`,
      detalle: `${odp.producto_codigo} · ${fmtCantidadUM(odp.cantidad, odp.um)}`,
      estado: 'completado'
    });
    
    if (odp.fecha_inicio_real || odp.estatus === 'en_produccion' || ['pendiente_calidad','liberada_empaque','rechazada'].includes(odp.estatus)) {
      eventos.push({
        fecha: odp.fecha_inicio_real || odp.fecha_inicio_programada,
        icono: '🔄',
        titulo: `Producción iniciada en ${odp.folio}`,
        detalle: odp.maquina_asignada ? `Máquina: ${odp.maquina_asignada}` : '',
        estado: 'completado'
      });
    }
    
    // Procesos completados
    (odp.procesos_completados || []).forEach(pc => {
      eventos.push({
        fecha: pc.completado_at,
        icono: '✓',
        titulo: `${pc.codigo || ''} ${pc.nombre || ''} completado`,
        detalle: `${odp.folio} · Producido: ${fmtNum(pc.cantidad_producida_kg || pc.cantidad_producida || 0)} kg${pc.mermas_kg ? ` · Merma: ${fmtNum(pc.mermas_kg)} kg` : ''}`,
        estado: 'completado'
      });
    });
    
    if (odp.liberacion_calidad) {
      eventos.push({
        fecha: odp.produccion_terminada_at || odp.updated_at,
        icono: odp.liberacion_calidad.decision === 'liberado' ? '✅' : (odp.liberacion_calidad.decision === 'parcial' ? '⚠️' : (odp.liberacion_calidad.decision === 'liberado_extra' ? '⚠️' : '❌')),
        titulo: `Calidad: ${odp.liberacion_calidad.decision === 'liberado' ? 'LIBERADO TOTAL' : (odp.liberacion_calidad.decision === 'parcial' ? 'PARCIAL' : (odp.liberacion_calidad.decision === 'liberado_extra' ? 'LIBERADO con extra' : 'RECHAZADO'))}`,
        detalle: `${odp.folio} · ${odp.packing_list || ''}`,
        estado: 'completado'
      });
    }
  });
  
  // Tarimas: agrupar por momento de recepción/movimiento
  const fechasRecALP = new Map();
  tarimasPI.forEach(t => {
    if (t.recibido_alp_at) {
      const k = t.recibido_alp_at.seconds;
      if (!fechasRecALP.has(k)) fechasRecALP.set(k, { fecha: t.recibido_alp_at, count: 0 });
      fechasRecALP.get(k).count++;
    }
  });
  fechasRecALP.forEach(v => {
    eventos.push({
      fecha: v.fecha,
      icono: '🏭',
      titulo: `${v.count} tarima(s) recibidas en almacén planta`,
      detalle: 'PLANTA-MTY',
      estado: 'completado'
    });
  });
  
  // OTIs
  otisPI.forEach(oti => {
    eventos.push({
      fecha: oti.created_at,
      icono: '🚚',
      titulo: `${oti.folio} en tránsito`,
      detalle: `${oti.origen} → ${oti.destino} · ${oti.num_tarimas} tarima(s) · ${oti.transportista || ''}`,
      estado: oti.estatus === 'en_transito' ? 'en_curso' : 'completado'
    });
    if (oti.recibido_at) {
      eventos.push({
        fecha: oti.recibido_at,
        icono: '📦',
        titulo: `${oti.folio} recibido`,
        detalle: `${oti.destino} · ${oti.num_tarimas} tarima(s)`,
        estado: 'completado'
      });
    }
  });
  
  // OVs (eventos de embarque)
  ovs.forEach(ov => {
    eventos.push({
      fecha: ov.created_at,
      icono: ov.tipo_origen === 'producir' ? '🏭' : '📦',
      titulo: `${ov.folio} generada (${ov.tipo_origen === 'producir' ? 'producir' : 'stock'})`,
      detalle: `${ov.cliente_nombre} · ${fmtCantidadUM(ov.cantidad_solicitada || 0, ov.um)} · ${ov.cedis || '—'}`,
      estado: 'completado'
    });
    if (ov.asignada_at) {
      eventos.push({
        fecha: ov.asignada_at,
        icono: '📋',
        titulo: `${ov.folio} con tarimas asignadas`,
        detalle: `Por ${ov.asignada_por_nombre || '—'} · ${(ov.tarimas_ids || []).length} tarima(s)`,
        estado: 'completado'
      });
    }
    if (ov.lista_at) {
      eventos.push({
        fecha: ov.lista_at,
        icono: '✅',
        titulo: `${ov.folio} LISTA para embarcar`,
        detalle: `${ov.cedis} marcó listo · Por ${ov.lista_por_nombre || '—'}`,
        estado: 'completado'
      });
    }
    if (ov.remision_at) {
      eventos.push({
        fecha: ov.remision_at,
        icono: '📄',
        titulo: `${ov.folio} - Remisión emitida`,
        detalle: `Remisión: ${ov.remision || '—'} · Factura: ${ov.factura || '—'} · ${ov.transportista || '—'} ${ov.placas ? `· ${ov.placas}` : ''}`,
        estado: 'completado'
      });
    }
    if (ov.cargada_at) {
      eventos.push({
        fecha: ov.cargada_at,
        icono: '🚛',
        titulo: `${ov.folio} EN CAMINO al cliente`,
        detalle: `${ov.transportista || '—'} ${ov.placas ? `· ${ov.placas}` : ''} · Remisión ${ov.remision}`,
        estado: ov.estatus === 'enviada' ? 'en_curso' : 'completado'
      });
    }
    if (ov.entregada_at) {
      eventos.push({
        fecha: ov.entregada_at,
        icono: '🏁',
        titulo: `${ov.folio} ENTREGADA al cliente`,
        detalle: `Por ${ov.entregada_por_nombre || '—'}`,
        estado: 'completado'
      });
    }
    // Si está pendiente, agregar evento abierto
    if (ov.estatus === 'pendiente_asignar' || ov.estatus === 'esperando_produccion') {
      eventos.push({
        fecha: null,
        icono: ov.estatus === 'esperando_produccion' ? '⏳' : '🟡',
        titulo: `${ov.folio} pendiente`,
        detalle: ov.estatus === 'esperando_produccion' ? 'Esperando que termine producción' : 'CS debe asignar tarimas',
        estado: 'pendiente'
      });
    }
  });
  
  // Ordenar por fecha
  eventos.sort((a, b) => {
    const fa = a.fecha?.seconds ? a.fecha.seconds : 0;
    const fb = b.fecha?.seconds ? b.fecha.seconds : 0;
    return fa - fb;
  });
  
  if (eventos.length === 0) {
    return `<div style="text-align:center;padding:40px;color:#94a3b8;">Sin eventos registrados</div>`;
  }
  
  return `
    <div style="position:relative;padding-left:30px;">

      <div style="position:absolute;left:14px;top:0;bottom:0;width:2px;background:#e2e8f0;"></div>
      ${eventos.map((e, i) => {
        const colorE = e.estado === 'completado' ? '#16a34a' : (e.estado === 'en_curso' ? '#3b82f6' : (e.estado === 'cancelado' ? '#dc2626' : '#94a3b8'));
        const bgE = e.estado === 'completado' ? '#dcfce7' : (e.estado === 'en_curso' ? '#dbeafe' : (e.estado === 'cancelado' ? '#fee2e2' : '#f1f5f9'));
        return `
          <div style="position:relative;padding-bottom:14px;">
            <div style="position:absolute;left:-30px;top:0;width:30px;height:30px;border-radius:50%;background:${bgE};border:3px solid ${colorE};display:flex;align-items:center;justify-content:center;font-size:14px;">
              ${e.icono}
            </div>
            <div style="margin-left:8px;padding:10px 14px;background:#fff;border:1px solid #e2e8f0;border-left:4px solid ${colorE};border-radius:8px;">

              <div style="font-size:10px;color:#94a3b8;margin-top:4px;">${e.fecha ? fmtFechaHora(e.fecha) : 'Pendiente'}</div>

      }).join('')}

  `;
}

// ----------------------------------------
// TAB 2: Producción (ODPs en flujo)
// ----------------------------------------
function renderTrazProduccion(p, lineas, odps) {
  if (odps.length === 0) {
    return `<div style="text-align:center;padding:40px;color:#94a3b8;">📅 Aún no se han generado ODPs para este PI</div>`;
  }
  
  return odps.map(odp => {
    let prod = 0;
    if (odp.cantidad_producida_final !== undefined && odp.cantidad_producida_final !== null) {
      prod = Number(odp.cantidad_producida_final) || 0;
    } else if (odp.procesos_completados && odp.procesos_completados.length > 0) {
      const ultimo = odp.procesos_completados[odp.procesos_completados.length - 1];
      prod = Number(ultimo.cantidad_producida) || 0;
    }
    const pct = odp.cantidad > 0 ? Math.min(100, Math.round((prod / odp.cantidad) * 100)) : 0;
    const colorODP = { pendiente_planeacion: '#f59e0b', programada: '#3b82f6', en_produccion: '#8b5cf6', pendiente_calidad: '#f59e0b', liberada_empaque: '#16a34a', rechazada: '#dc2626' }[odp.estatus] || '#64748b';
    const ruta = odp.ruta_procesos || [];
    const procCompletos = (odp.procesos_completados || []).map(pc => pc.codigo);
    const procActualIdx = odp.proceso_actual_idx ?? -1;
    
    return `
      <div class="panel" style="margin-bottom:14px;border-left:4px solid ${colorODP};">
        <div style="padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
          <div>
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
              <span class="text-mono" style="font-weight:800;font-size:15px;">${odp.folio}</span>
              <span style="background:${colorODP}22;color:${colorODP};padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase;">${odp.estatus.replace('_',' ')}</span>
              ${odp.maquina_asignada ? `<span style="font-size:11px;color:#64748b;">🏭 ${odp.maquina_asignada}</span>` : ''}
            </div>
            <div class="text-mono" style="font-size:11px;color:#64748b;margin-top:4px;">${odp.producto_codigo}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:18px;font-weight:800;color:${colorODP};">${pct}%</div>
            <div style="font-size:11px;color:#64748b;">${fmtCantidadUM(prod, odp.um)} / ${fmtCantidadUM(odp.cantidad, odp.um)}</div>
          </div>
        </div>
        
        <!-- Flujo de procesos -->
        ${ruta.length > 0 ? `
          <div style="padding:14px 18px;background:#f8fafc;border-top:1px solid #e2e8f0;">
            <div style="font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;margin-bottom:8px;">🔄 Ruta de producción</div>
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
              ${ruta.map((proc, i) => {
                const procInfo = getProc(proc);
                const completo = procCompletos.includes(proc);
                const enCurso = i === procActualIdx && odp.estatus === 'en_produccion';
                const colorP = completo ? '#16a34a' : (enCurso ? '#3b82f6' : '#cbd5e1');
                const bgP = completo ? '#dcfce7' : (enCurso ? '#dbeafe' : '#f1f5f9');
                return `
                  <div style="text-align:center;">
                    <div style="padding:8px 14px;background:${bgP};border:2px solid ${colorP};border-radius:10px;font-weight:700;font-size:12px;color:${colorP};${enCurso?'animation:pulse 1.5s ease-in-out infinite;':''}">
                      ${procInfo?.icono || ''} ${proc}
                    </div>
                    <div style="font-size:9px;color:#64748b;margin-top:2px;">${procInfo?.nombre || ''}</div>
                  </div>
                  ${i < ruta.length - 1 ? `<div style="font-size:18px;color:${completo ? '#16a34a' : '#cbd5e1'};">→</div>` : ''}
                `;
              }).join('')}
            </div>
          </div>
        ` : ''}
        
        <!-- Procesos completados detalle -->
        ${(odp.procesos_completados || []).length > 0 ? `
          <div style="padding:10px 18px;border-top:1px solid #e2e8f0;font-size:11px;">
            <div style="color:#64748b;font-weight:700;text-transform:uppercase;margin-bottom:6px;">📋 Capturas</div>
            ${odp.procesos_completados.map(pc => `
              <div style="display:flex;justify-content:space-between;padding:4px 0;">
                <span>${pc.codigo} · ${pc.operador || '—'} · ${pc.completado_at ? new Date(pc.completado_at).toLocaleString('es-MX') : ''}</span>
                <span style="font-weight:600;color:#16a34a;">${fmtNum(pc.cantidad_producida_kg || pc.cantidad_producida || 0)} kg ${pc.mermas_kg ? `· -${fmtNum(pc.mermas_kg)} merma` : ''}</span>
              </div>
            `).join('')}
          </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

      <div style="padding:10px 16px;">

// TAB 4: Embarques (OVs vinculadas al PI)
// ----------------------------------------
function renderTrazEmbarques(p, ovs) {
  if (ovs.length === 0) {
    return `<div style="text-align:center;padding:40px;color:#94a3b8;">🚚 Aún no hay órdenes de venta para este PI</div>`;
  }
  
  return ovs.map(ov => {
    const tarimas = state.tarimas.filter(t => (ov.tarimas_ids || []).includes(t.id));
    const totalEnviado = tarimas.reduce((s, t) => s + (Number(t.cantidad) || 0), 0);
    const totalKg = tarimas.reduce((s, t) => s + (Number(t.peso_neto_kg || t.peso_neto) || 0), 0);
    const cantSol = Number(ov.cantidad_solicitada) || 0;
    const pendiente = Math.max(0, cantSol - totalEnviado);
    const pct = cantSol > 0 ? Math.min(100, Math.round((totalEnviado / cantSol) * 100)) : 0;
    
    const colorEst = {
      esperando_produccion: '#94a3b8', pendiente_asignar: '#f59e0b', preparando: '#8b5cf6',
      lista_embarcar: '#16a34a', por_cargar: '#3b82f6', enviada: '#06b6d4', entregada: '#15803d'
    }[ov.estatus] || '#64748b';
    
    // Línea visual de fases OV
    const fases = [
      { id: 'asignada', icon: '📋', label: 'Asignada', completada: !!ov.asignada_at || ['preparando','lista_embarcar','por_cargar','enviada','entregada'].includes(ov.estatus) },
      { id: 'lista', icon: '✅', label: 'Lista', completada: !!ov.lista_at || ['lista_embarcar','por_cargar','enviada','entregada'].includes(ov.estatus) },
      { id: 'remision', icon: '📄', label: 'Remisión', completada: !!ov.remision_at || ['por_cargar','enviada','entregada'].includes(ov.estatus) },
      { id: 'cargada', icon: '🚛', label: 'En camino', completada: !!ov.cargada_at || ['enviada','entregada'].includes(ov.estatus) },
      { id: 'entregada', icon: '🏁', label: 'Entregada', completada: !!ov.entregada_at || ov.estatus === 'entregada' },
    ];
    
    return `
      <div class="panel" style="margin-bottom:14px;border-left:4px solid ${colorEst};">
        <div style="padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
          <div style="flex:1;min-width:280px;">
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
              <span class="text-mono" style="font-weight:800;font-size:15px;">${ov.folio}</span>
              <span style="background:${colorEst};color:#fff;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;">${ov.estatus.replace(/_/g,' ').toUpperCase()}</span>
              ${ov.tipo_origen === 'producir' ? '<span style="background:#fde68a;color:#92400e;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;">🏭 PRODUCIR</span>' : '<span style="background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;">📦 STOCK</span>'}
            </div>
            <div style="font-size:11px;color:#64748b;margin-top:4px;">
              ${ov.cedis || '—'} ${ov.odp_folio ? ` · ODP: <span class="text-mono">${ov.odp_folio}</span>` : ''}
            </div>
            ${ov.remision ? `<div style="font-size:11px;color:#475569;margin-top:3px;">📄 Remisión: <strong>${ov.remision}</strong>${ov.factura ? ` · Factura: <strong>${ov.factura}</strong>` : ''}${ov.transportista ? ` · 🚛 ${ov.transportista}` : ''}${ov.placas ? ` · ${ov.placas}` : ''}</div>` : ''}
          </div>
          <div style="text-align:right;">
            <div style="font-size:18px;font-weight:800;color:${colorEst};">${pct}%</div>
            <div style="font-size:11px;color:#64748b;">${fmtCantidadUM(totalEnviado, ov.um)} / ${fmtCantidadUM(cantSol, ov.um)}</div>
            ${pendiente > 0 ? `<div style="font-size:10px;color:#dc2626;font-weight:700;">⚠ Pendiente: ${fmtCantidadUM(pendiente, ov.um)}</div>` : ''}
          </div>
        </div>
        
        <!-- Fases visuales OV -->
        <div style="padding:12px 18px;background:#f8fafc;border-top:1px solid #e2e8f0;">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:6px;">
            ${fases.map((f, i) => {
              const colorF = f.completada ? '#16a34a' : '#cbd5e1';
              const bgF = f.completada ? '#dcfce7' : '#f1f5f9';
              return `
                <div style="flex:1;text-align:center;">
                  <div style="width:36px;height:36px;border-radius:50%;background:${bgF};border:2px solid ${colorF};display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:16px;">
                    ${f.completada ? '✓' : f.icon}
                  </div>
                  <div style="font-size:9px;font-weight:700;color:${colorF};margin-top:3px;">${f.label}</div>
                </div>
                ${i < fases.length - 1 ? `<div style="flex:0.5;height:2px;background:${f.completada ? '#16a34a' : '#cbd5e1'};margin-bottom:14px;"></div>` : ''}
              `;
            }).join('')}
          </div>
        </div>
        
        ${tarimas.length > 0 ? `
          <div style="padding:10px 18px;border-top:1px solid #e2e8f0;font-size:11px;">
            <div style="color:#64748b;font-weight:700;text-transform:uppercase;margin-bottom:6px;">📦 ${tarimas.length} tarima(s) asignadas</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              ${tarimas.map(t => `<span style="padding:3px 8px;background:#f1f5f9;border-radius:4px;font-size:10px;"><strong>T${String(t.numero_tarima).padStart(2,'0')}</strong> ${t.lote_codigo} · ${fmtCantidadUM(t.cantidad, t.um)}</span>`).join('')}
            </div>
          </div>
        ` : ''}
        
        <div style="padding:8px 18px;border-top:1px solid #e2e8f0;background:#fafafa;font-size:10px;color:#94a3b8;display:flex;gap:14px;flex-wrap:wrap;">
          <span>📅 Creada: ${fmtFechaHora(ov.created_at)}</span>
          ${ov.asignada_at ? `<span>📋 Asignada: ${fmtFechaHora(ov.asignada_at)}</span>` : ''}
          ${ov.lista_at ? `<span>✅ Lista: ${fmtFechaHora(ov.lista_at)}</span>` : ''}
          ${ov.remision_at ? `<span>📄 Remisión: ${fmtFechaHora(ov.remision_at)}</span>` : ''}
          ${ov.cargada_at ? `<span>🚛 En camino: ${fmtFechaHora(ov.cargada_at)}</span>` : ''}
          ${ov.entregada_at ? `<span>🏁 Entregada: ${fmtFechaHora(ov.entregada_at)}</span>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

// Generación de código según patrón NewPack: MM TT AAA FFF LLL CCCC CO AD S
// Ancho/Fuelle/Largo: 3 dígitos cada uno (cm directo)
// Calibre: 4 dígitos (calibre × 2 con padding, ej: 200 → 0400, 30 → 0060)
function generarCodigoPT({ material, tipo, ancho, fuelle, largo, calibre, color, aditivo, secuencia = 1 }) {
  const mat = MATERIALES_GEN.find(x => x.nombre === material);
  const tip = TIPOS_GEN.find(x => x.nombre === tipo);
  const col = COLORES_GEN.find(x => x.nombre === color);
  const adi = ADITIVOS_GEN.find(x => x.nombre === aditivo);
  if (!mat || !tip || !col || !adi) return '';
  const a = String(Math.round(Number(ancho) || 0)).padStart(3, '0').slice(0, 3);
  const f = String(Math.round(Number(fuelle) || 0)).padStart(3, '0').slice(0, 3);
  const l = String(Math.round(Number(largo) || 0)).padStart(3, '0').slice(0, 3);
  const c = String(Math.round((Number(calibre) || 0) * 2)).padStart(4, '0').slice(0, 4);
  return `${mat.codigo}${tip.codigo}${a}${f}${l}${c}${col.codigo}${adi.codigo}${secuencia}`;
}
window.generarCodigoPT = generarCodigoPT;

// Generación de descripción legible
function generarDescripcionPT({ material, tipo, ancho, fuelle, largo, calibre, color, aditivo, presentacion = '' }) {
  const med = (Number(fuelle) || 0) > 0 ? `${ancho}+${fuelle}X${largo}` : `${ancho}X${largo}`;
  const mat = (material || '').toUpperCase();
  const adi = aditivo && aditivo !== 'NINGUNO' ? ` ${aditivo}` : '';
  const pres = presentacion ? ` ${presentacion}` : '';
  return `${mat} ${tipo} ${med} CAL ${calibre} ${color}${adi}${pres}`.trim();
}
window.generarDescripcionPT = generarDescripcionPT;
