<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewPack ERP</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #0f172a; min-height: 100vh; }
.text-mono { font-family: 'SF Mono', Monaco, Consolas, monospace; }

/* LOGIN */
.login-bg { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #16a34a 0%, #0891b2 100%); padding: 20px; }
.login-box { background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 25px 50px rgba(0,0,0,.15); width: 100%; max-width: 420px; }
.logo { font-size: 28px; font-weight: 900; color: #16a34a; margin-bottom: 4px; letter-spacing: -1px; }
.subtitle { font-size: 13px; color: #64748b; margin-bottom: 30px; }

/* APP LAYOUT */
.app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
.sidebar { background: #0f172a; color: #fff; padding: 20px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.sidebar-logo { font-size: 18px; font-weight: 900; color: #4ade80; padding: 0 20px 18px; border-bottom: 1px solid #1e293b; margin-bottom: 14px; }
.sidebar-section { font-size: 9px; color: #64748b; padding: 12px 20px 4px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: #cbd5e1; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-size: 13px; transition: all 0.15s; }
.nav-item:hover { background: #1e293b; color: #fff; }
.nav-item.active { background: #16a34a; color: #fff; font-weight: 600; }

.main { padding: 0; }
.topbar { background: #fff; padding: 14px 28px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
.topbar h1 { font-size: 20px; font-weight: 800; }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.user-info { font-size: 12px; color: #475569; text-align: right; }
.content { padding: 24px 28px; }

/* COMPONENTS */
.field { margin-bottom: 14px; }
.field-label { display: block; font-size: 11px; font-weight: 700; color: #475569; margin-bottom: 5px; letter-spacing: 0.05em; text-transform: uppercase; }
.input { width: 100%; padding: 10px 12px; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 14px; transition: border-color 0.15s; background: #fff; font-family: inherit; }
.input:focus { outline: none; border-color: #16a34a; }
.btn-primary { background: #16a34a; color: #fff; padding: 10px 18px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; }
.btn-primary:hover { background: #15803d; }
.btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
.btn-secondary { background: #f1f5f9; color: #0f172a; padding: 10px 18px; border: 1px solid #cbd5e1; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
.btn-secondary:hover { background: #e2e8f0; }
.icon-btn { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 6px 8px; border-radius: 6px; cursor: pointer; color: #475569; }
.icon-btn:hover { background: #e2e8f0; }

.grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
.stat-card { background: #fff; padding: 18px; border-radius: 12px; border: 1px solid #e2e8f0; }
.stat-icon { font-size: 24px; margin-bottom: 8px; }
.stat-value { font-size: 26px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.stat-label { font-size: 12px; color: #64748b; }

.panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
.panel-header { padding: 14px 18px; border-bottom: 1px solid #e2e8f0; font-weight: 700; font-size: 13px; background: #f8fafc; }

.tabs { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; }
.tab { padding: 10px 16px; border: none; background: none; cursor: pointer; font-size: 13px; color: #64748b; font-weight: 600; border-bottom: 3px solid transparent; margin-bottom: -1px; }
.tab.active { color: #16a34a; border-bottom-color: #16a34a; }
.tab:hover { color: #16a34a; }

.table-wrap { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: auto; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px 14px; background: #f8fafc; font-size: 11px; font-weight: 700; color: #475569; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; }
td { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
tr:hover td { background: #f8fafc; }

.toolbar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.dept-tag { display: inline-block; padding: 3px 8px; background: #f1f5f9; color: #475569; border-radius: 6px; font-size: 11px; font-weight: 600; }

.modal-bg { position: fixed; inset: 0; background: rgba(15,23,42,.6); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal { background: #fff; border-radius: 14px; width: 100%; max-width: 520px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,.25); }
.modal-header { padding: 18px 22px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
.modal-body { padding: 22px; overflow-y: auto; flex: 1; }

.toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 20px; border-radius: 10px; color: #fff; font-weight: 600; font-size: 14px; box-shadow: 0 10px 25px rgba(0,0,0,.15); z-index: 1000; max-width: 380px; animation: slideIn 0.3s; }
.toast.success { background: #16a34a; }
.toast.error { background: #dc2626; }
.toast.info { background: #3b82f6; }
@keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #e2e8f0; border-top-color: #16a34a; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.loading-content { text-align: center; }
.loading-content .spinner { width: 40px; height: 40px; border-width: 3px; margin-bottom: 12px; }

@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}
</style>
</head>
<body>

<div id="app"></div>

<!-- Firebase desde CDN (no necesitas instalar nada) -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { 
  getFirestore, collection, doc, setDoc, addDoc, updateDoc, getDoc, getDocs, 
  query, where, orderBy, limit, onSnapshot, serverTimestamp, runTransaction, writeBatch, increment
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

// ============================================================
// CONFIGURACIÓN — REEMPLAZA CON LA TUYA
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyAR0YilcqTuDHs109pKmAXT_fceW_lXhI0",
  authDomain: "newpack-erp.firebaseapp.com",
  projectId: "newpack-erp",
  storageBucket: "newpack-erp.firebasestorage.app",
  messagingSenderId: "16389080236",
  appId: "1:16389080236:web:ce374561ef84b79adc8b09",
  measurementId: "G-5887FYNLC8"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

// Hacer disponible globalmente para acciones de UI
window.fb = { auth, db, signInWithEmailAndPassword, signOut, doc, setDoc, addDoc, updateDoc, getDoc, getDocs, collection, query, where, orderBy, limit, onSnapshot, runTransaction, writeBatch, increment, serverTimestamp };

// ============================================================
// ESTADO GLOBAL
// ============================================================
const state = {
  user: null,
  vista: 'dashboard',
  almacenes: [],
  clientes: [],
  productos_pt: [],
  cliente_productos: [],
  pedidos: [],
  pedido_lineas: [],
  ordenes_venta: [],
  ordenes_produccion: [],
  notificaciones: [],
  modal: null,
  modalData: null,
  filtros: {},
  tabs: {},
  pedidoData: null,
  busqProd: '',
  loadingInicial: true,
  loadingAccion: false,
  unsubscribers: [] // listeners de real-time para limpiar al cerrar sesión
};
window.state = state;

// ============================================================
// UNIDADES DE MEDIDA
// ============================================================
const UM_OPCIONES = ['kg', 'pza', 'millar', 'rollo', 'm'];
const UM_LABELS = { kg: 'Kg', pza: 'Pieza', millar: 'Millar', rollo: 'Rollo', m: 'Metro lineal' };
const UM_ENTEROS = ['pza', 'millar', 'rollo']; // estas UM no aceptan decimales
window.UM_OPCIONES = UM_OPCIONES;
window.UM_LABELS = UM_LABELS;
window.UM_ENTEROS = UM_ENTEROS;

// ============================================================
// HELPERS
// ============================================================
const $ = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));

window.$ = $;
window.$$ = $$;

function fmtFecha(f) {
  if (!f) return '';
  const d = f.toDate ? f.toDate() : new Date(f);
  return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
}
function fmtFechaHora(f) {
  if (!f) return '';
  const d = f.toDate ? f.toDate() : new Date(f);
  return d.toLocaleString('es-MX', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
}
function fmtNum(n) {
  return Number(n || 0).toLocaleString('es-MX', { maximumFractionDigits: 2 });
}
function fmtCantidadUM(n, um) {
  const umLow = (um || 'kg').toLowerCase();
  const label = UM_LABELS[umLow] || um || 'Kg';
  // Para UM enteras, no mostrar decimales
  const numStr = UM_ENTEROS.includes(umLow) 
    ? Number(n || 0).toLocaleString('es-MX', { maximumFractionDigits: 0 })
    : Number(n || 0).toLocaleString('es-MX', { maximumFractionDigits: 2 });
  return numStr + ' ' + label;
}
window.fmtCantidadUM = fmtCantidadUM;
function moneda(n) {
  return '$' + Number(n || 0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

window.fmtFecha = fmtFecha;
window.fmtFechaHora = fmtFechaHora;
window.fmtNum = fmtNum;
window.moneda = moneda;

function toast(msg, tipo = 'success') {
  const el = document.createElement('div');
  el.className = 'toast ' + tipo;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
window.toast = toast;

const ICONS = {
  home: '🏠', cart: '🛒', users: '👥', boxes: '📦', factory: '🏭',
  warehouse: '🏗️', file: '📄', chart: '📊', list: '📋', search: '🔍',
  plus: '➕', check: '✓', x: '✕', edit: '✏️', trash: '🗑️',
  send: '📤', shipping: '🚚', building: '🏢', alert: '⚠️', bell: '🔔'
};
window.ICONS = ICONS;

// ============================================================
// AUTH
// ============================================================
window.hacerLogin = async (correo, password) => {
  await signInWithEmailAndPassword(auth, correo, password);
};

window.hacerLogout = async () => {
  state.unsubscribers.forEach(u => u());
  state.unsubscribers = [];
  await signOut(auth);
};

// ============================================================
// CARGAR PERFIL Y DATOS
// ============================================================
async function cargarPerfil(uid) {
  const docSnap = await getDoc(doc(db, 'usuarios', uid));
  if (!docSnap.exists()) {
    throw new Error('Tu usuario no tiene perfil. Pídele al admin que lo cree.');
  }
  state.user = { id: uid, ...docSnap.data() };
  return state.user;
}

async function cargarTodo() {
  state.loadingInicial = true;
  try {
    const cargas = [
      getDocs(query(collection(db, 'almacenes'), where('activo', '==', true))).then(s => state.almacenes = s.docs.map(d => ({ id: d.id, ...d.data() }))),
      getDocs(query(collection(db, 'clientes'), where('activo', '==', true), orderBy('codigo'))).then(s => state.clientes = s.docs.map(d => ({ id: d.id, ...d.data() }))),
      getDocs(query(collection(db, 'productos_pt'), where('activo', '==', true))).then(s => state.productos_pt = s.docs.map(d => ({ id: d.id, ...d.data() }))),
      getDocs(query(collection(db, 'cliente_productos'), where('activo', '==', true))).then(s => state.cliente_productos = s.docs.map(d => ({ id: d.id, ...d.data() }))),
    ];
    await Promise.all(cargas);
    
    // Listeners de real-time para datos que cambian frecuentemente
    state.unsubscribers.push(
      onSnapshot(query(collection(db, 'pedidos'), orderBy('created_at', 'desc'), limit(200)), (snap) => {
        state.pedidos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (state.user) render();
      }),
      onSnapshot(query(collection(db, 'pedido_lineas')), (snap) => {
        state.pedido_lineas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (state.user) render();
      }),
      onSnapshot(query(collection(db, 'ordenes_venta'), orderBy('created_at', 'desc'), limit(200)), (snap) => {
        state.ordenes_venta = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (state.user) render();
      }),
      onSnapshot(query(collection(db, 'ordenes_produccion'), orderBy('created_at', 'desc'), limit(200)), (snap) => {
        state.ordenes_produccion = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (state.user) render();
      }),
      onSnapshot(query(collection(db, 'notificaciones'), orderBy('created_at', 'desc'), limit(50)), (snap) => {
        state.notificaciones = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (state.user) render();
      })
    );
  } catch (err) {
    console.error('Error:', err);
    toast('Error cargando datos: ' + err.message, 'error');
  } finally {
    state.loadingInicial = false;
  }
}

// ============================================================
// HELPERS DE DATOS
// ============================================================
window.getCliente = (codigo) => state.clientes.find(c => c.codigo === codigo);
window.getProductoPT = (codigo) => state.productos_pt.find(p => p.codigo === codigo);
window.productosDeCliente = (clienteCod) => 
  state.cliente_productos
    .filter(cp => cp.cliente_codigo === clienteCod)
    .map(cp => {
      const p = window.getProductoPT(cp.producto_codigo);
      return p ? { ...p, precio: Number(cp.precio) || 0, codigo_cliente_interno: cp.codigo_cliente_interno || '', cp_id: cp.id } : null;
    })
    .filter(Boolean);
window.pedidoLineas = (pedidoId) => state.pedido_lineas.filter(l => l.pedido_id === pedidoId);
window.ovsDePedido = (pedidoId) => state.ordenes_venta.filter(o => o.pedido_id === pedidoId);
window.odpsDePedido = (pedidoId) => state.ordenes_produccion.filter(o => o.pedido_id === pedidoId);

// ============================================================
// CONTADORES (folios secuenciales)
// ============================================================
async function siguienteFolio(tipo) {
  const ref = doc(db, 'contadores', tipo);
  let nuevo;
  await runTransaction(db, async (tx) => {
    const snap = await tx.get(ref);
    const actual = snap.exists() ? Number(snap.data().ultimo) || 0 : 0;
    nuevo = actual + 1;
    tx.set(ref, { ultimo: nuevo }, { merge: true });
  });
  return nuevo;
}
window.siguienteFolio = siguienteFolio;

// ============================================================
// RENDER
// ============================================================
function render() {
  const root = $('#app');
  if (!state.user) {
    root.innerHTML = renderLogin();
    attachLoginEvents();
    return;
  }
  if (state.loadingInicial) {
    root.innerHTML = `<div class="loading-overlay"><div class="loading-content"><div class="spinner"></div><div>Cargando...</div></div></div>`;
    return;
  }
  root.innerHTML = renderApp();
  attachAppEvents();
}
window.render = render;

// ============================================================
// LOGIN
// ============================================================
function renderLogin() {
  return `
    <div class="login-bg">
      <div class="login-box">
        <div class="logo">NewPack ERP</div>
        <div class="subtitle">Sistema de gestión integral</div>
        <form id="login-form">
          <div class="field">
            <label class="field-label">Correo electrónico</label>
            <input class="input" type="email" id="login-email" required autocomplete="email" />
          </div>
          <div class="field">
            <label class="field-label">Contraseña</label>
            <input class="input" type="password" id="login-pass" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:12px;" id="login-btn">
            Iniciar sesión
          </button>
          <div id="login-error" style="margin-top:12px;color:#dc2626;font-size:13px;display:none;text-align:center;"></div>
        </form>
        <div style="margin-top:24px;padding-top:18px;border-top:1px solid #e2e8f0;font-size:11px;color:#94a3b8;text-align:center;">
          Powered by Firebase
        </div>
      </div>
    </div>
  `;
}

function attachLoginEvents() {
  $('#login-form').onsubmit = async (e) => {
    e.preventDefault();
    const btn = $('#login-btn');
    const err = $('#login-error');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Verificando...';
    err.style.display = 'none';
    try {
      await window.hacerLogin($('#login-email').value, $('#login-pass').value);
    } catch (e) {
      let mensaje = e.message;
      if (mensaje.includes('invalid-credential') || mensaje.includes('wrong-password') || mensaje.includes('user-not-found')) {
        mensaje = 'Correo o contraseña incorrectos';
      }
      err.textContent = mensaje;
      err.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'Iniciar sesión';
    }
  };
}

// ============================================================
// APP LAYOUT
// ============================================================
function renderApp() {
  const u = state.user;
  return `
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-logo">📦 NewPack ERP</div>
        
        <div class="sidebar-section">General</div>
        <button class="nav-item ${state.vista === 'dashboard' ? 'active' : ''}" data-vista="dashboard">${ICONS.home} Dashboard</button>
        
        <div class="sidebar-section">Comercial</div>
        ${(['CS','CEO','ADMIN','COMP'].includes(u.depto) || u.rol === 'admin') ? `
          <button class="nav-item ${state.vista === 'clientes' ? 'active' : ''}" data-vista="clientes">${ICONS.users} Clientes</button>
        ` : ''}
        <button class="nav-item ${state.vista === 'pedidos' ? 'active' : ''}" data-vista="pedidos">${ICONS.cart} Pedidos (PI/OV/ODP)</button>
        
        <div class="sidebar-section">Catálogos</div>
        <button class="nav-item ${state.vista === 'productos_pt' ? 'active' : ''}" data-vista="productos_pt">${ICONS.boxes} Productos PT</button>
      </aside>
      
      <main class="main">
        <div class="topbar">
          <h1>${tituloVista()}</h1>
          <div class="topbar-right">
            <div class="user-info">
              <div style="font-weight:600;">${u.nombre}</div>
              <div style="font-size:11px;color:#94a3b8;">${u.depto} • ${u.rol}</div>
            </div>
            <button class="icon-btn" onclick="hacerLogout()" title="Cerrar sesión">${ICONS.x}</button>
          </div>
        </div>
        <div class="content">
          ${renderVista()}
        </div>
      </main>
    </div>
    
    ${state.modal ? renderModal() : ''}
    ${state.loadingAccion ? `<div class="loading-overlay"><div class="loading-content"><div class="spinner"></div><div>Procesando...</div></div></div>` : ''}
  `;
}

function tituloVista() {
  return ({
    dashboard: 'Panel de control',
    clientes: 'Clientes y Productos',
    pedidos: 'Pedidos Internos (PI/OV/ODP)',
    productos_pt: 'Catálogo Productos PT'
  })[state.vista] || '';
}

function renderVista() {
  const v = state.vista;
  if (v === 'dashboard') return renderDashboard();
  if (v === 'clientes') return renderClientes();
  if (v === 'pedidos') return renderPedidos();
  if (v === 'productos_pt') return renderProductosPT();
  return '';
}

function renderDashboard() {
  const pedidosPend = state.pedidos.filter(p => p.estatus === 'pendiente_aprobacion').length;
  const pedidosAprob = state.pedidos.filter(p => p.estatus === 'aprobado').length;
  const ovsPend = state.ordenes_venta.filter(o => o.estatus === 'pendiente').length;
  const odpsPend = state.ordenes_produccion.filter(o => o.estatus === 'pendiente_planeacion').length;
  
  return `
    <div class="grid-stats" style="margin-bottom:24px;">
      <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-value">${pedidosPend}</div><div class="stat-label">Pedidos por aprobar</div></div>
      <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value">${pedidosAprob}</div><div class="stat-label">Pedidos aprobados</div></div>
      <div class="stat-card"><div class="stat-icon">📤</div><div class="stat-value">${ovsPend}</div><div class="stat-label">OVs por preparar</div></div>
      <div class="stat-card"><div class="stat-icon">🏭</div><div class="stat-value">${odpsPend}</div><div class="stat-label">ODPs por programar</div></div>
      <div class="stat-card"><div class="stat-icon">${ICONS.users}</div><div class="stat-value">${state.clientes.length}</div><div class="stat-label">Clientes activos</div></div>
      <div class="stat-card"><div class="stat-icon">${ICONS.boxes}</div><div class="stat-value">${state.productos_pt.length}</div><div class="stat-label">Productos PT</div></div>
    </div>
    <div class="panel">
      <div class="panel-header">${ICONS.bell} Últimas notificaciones</div>
      <div>
        ${state.notificaciones.slice(0, 10).length === 0 ? `
          <div style="padding:40px;text-align:center;color:#94a3b8;">Sin notificaciones recientes</div>
        ` : state.notificaciones.slice(0, 10).map(n => `
          <div style="padding:12px 18px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;">
            <div>
              <div style="font-weight:600;font-size:13px;">${n.titulo}</div>

            <div style="text-align:right;">

              <span class="dept-tag">${n.depto_destino}</span>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderProductosPT() {
  const filtro = (state.filtros.productos_pt || '').toLowerCase();
  const filtroUM = state.filtros.productos_pt_um || '';
  const filtroMat = state.filtros.productos_pt_material || '';
  const filtroTipo = state.filtros.productos_pt_tipo || '';
  
  let arr = state.productos_pt;
  if (filtro) arr = arr.filter(p => 
    (p.codigo + ' ' + (p.descripcion||'') + ' ' + (p.material||'') + ' ' + (p.tipo||'') + ' ' + (p.color||'') + ' ' + (p.aditivo||'')).toLowerCase().includes(filtro)
  );
  if (filtroUM) arr = arr.filter(p => (p.um || 'kg').toLowerCase() === filtroUM);
  if (filtroMat) arr = arr.filter(p => (p.material || '') === filtroMat);
  if (filtroTipo) arr = arr.filter(p => (p.tipo || '') === filtroTipo);
  
  // Estadísticas
  const statsUM = {};
  const materiales = new Set();
  const tipos = new Set();
  state.productos_pt.forEach(p => {
    const um = (p.um || 'kg').toLowerCase();
    statsUM[um] = (statsUM[um] || 0) + 1;
    if (p.material) materiales.add(p.material);
    if (p.tipo) tipos.add(p.tipo);
  });
  const matsOrdenados = [...materiales].sort();
  const tiposOrdenados = [...tipos].sort();
  
  const puedeEditar = ['CS','CEO','COMP','ADMIN'].includes(state.user.depto) || state.user.rol === 'admin';
  
  return `
    <div class="toolbar" style="flex-wrap:wrap;gap:10px;">
      <input class="input" id="filtro-productos-pt" style="max-width:340px;flex:1;min-width:240px;" placeholder="Buscar por código, descripción, color, aditivo..." value="${filtro}" autocomplete="off" />
      <select class="input" id="filtro-productos-pt-material" style="max-width:200px;">
        <option value="">Todos los materiales</option>
        ${matsOrdenados.map(m => `<option value="${m}" ${filtroMat === m ? 'selected' : ''}>${m}</option>`).join('')}
      </select>
      <select class="input" id="filtro-productos-pt-tipo" style="max-width:220px;">
        <option value="">Todos los tipos</option>
        ${tiposOrdenados.map(t => `<option value="${t}" ${filtroTipo === t ? 'selected' : ''}>${t}</option>`).join('')}
      </select>
      <select class="input" id="filtro-productos-pt-um" style="max-width:160px;">
        <option value="">Todas las UM</option>
        ${UM_OPCIONES.map(um => `<option value="${um}" ${filtroUM === um ? 'selected' : ''}>${UM_LABELS[um]} (${statsUM[um] || 0})</option>`).join('')}
      </select>
      ${(filtro || filtroUM || filtroMat || filtroTipo) ? `<button class="btn-secondary" onclick="limpiarFiltrosProductos()" style="padding:8px 12px;font-size:12px;">${ICONS.x} Limpiar</button>` : ''}
      ${puedeEditar ? `<button class="btn-primary" onclick="abrirModal('crear-producto-pt')">${ICONS.plus} Nuevo PT</button>` : ''}
      <span style="font-size:12px;color:#64748b;width:100%;">${arr.length} de ${state.productos_pt.length} productos</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Código</th><th>Descripción</th><th>Material</th><th>Tipo</th><th>Medida</th><th>Cal.</th><th>Color</th><th>Aditivo</th><th style="text-align:center;">UM</th><th style="text-align:right;">Cli.</th></tr></thead>
        <tbody>
          ${arr.length === 0 ? `<tr><td colspan="10" style="padding:40px;text-align:center;color:#94a3b8;">Sin productos que coincidan</td></tr>` :
            arr.slice(0, 100).map(p => {
              const medida = p.fuelle > 0 ? `${p.ancho}+${p.fuelle}x${p.largo}` : `${p.ancho}x${p.largo}`;
              const clis = state.cliente_productos.filter(cp => cp.producto_codigo === p.codigo).length;
              const umActual = (p.um || 'kg').toLowerCase();
              const umBadgeColor = { kg: '#16a34a', pza: '#3b82f6', millar: '#8b5cf6', rollo: '#f59e0b', m: '#ec4899' }[umActual] || '#64748b';
              const aditivo = p.aditivo || 'NINGUNO';
              const aditivoColor = aditivo === 'NINGUNO' ? '#94a3b8' : aditivo === 'VCI' ? '#7c3aed' : aditivo === 'ANTIESTATICO' ? '#ec4899' : aditivo === 'ANTIDERRAPANTE' ? '#f97316' : '#0891b2';
              return `<tr>
                <td class="text-mono" style="font-size:11px;font-weight:700;">${p.codigo}</td>
                <td style="font-size:11px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.descripcion}</td>
                <td style="font-size:11px;">${p.material || '—'}</td>
                <td style="font-size:11px;">${p.tipo || '—'}</td>
                <td style="font-size:11px;">${medida}</td>
                <td style="font-size:11px;">${p.calibre || '—'}</td>
                <td style="font-size:11px;">${p.color || '—'}</td>
                <td style="font-size:10px;">
                  ${aditivo === 'NINGUNO' ? `<span style="color:#94a3b8;">—</span>` : `<span style="font-weight:700;padding:2px 6px;border-radius:5px;background:${aditivoColor}22;color:${aditivoColor};">${aditivo}</span>`}
                </td>
                <td style="text-align:center;">
                  ${puedeEditar ? `
                    <select class="input prod-um-select" data-codigo="${p.codigo}" style="padding:3px 5px;font-size:10px;font-weight:700;color:${umBadgeColor};border-color:${umBadgeColor}33;background:${umBadgeColor}11;width:auto;min-width:70px;">
                      ${UM_OPCIONES.map(um => `<option value="${um}" ${umActual === um ? 'selected' : ''}>${UM_LABELS[um]}</option>`).join('')}
                    </select>
                  ` : `
                    <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:${umBadgeColor}22;color:${umBadgeColor};">${UM_LABELS[umActual]}</span>
                  `}
                </td>
                <td style="text-align:right;font-size:11px;">${clis}</td>
              </tr>`;
            }).join('')
          }
        </tbody>
      </table>
      ${arr.length > 100 ? `<div style="padding:14px;text-align:center;color:#94a3b8;font-size:12px;">Mostrando 100 de ${arr.length}.</div>` : ''}
    </div>
  `;
}

function renderPedidos() {
  const tab = state.tabs.pedidos || 'pendientes';
  const pendientes = state.pedidos.filter(p => p.estatus === 'pendiente_aprobacion');
  const aprobados = state.pedidos.filter(p => p.estatus === 'aprobado');
  const ovsPend = state.ordenes_venta.filter(o => o.estatus === 'pendiente');
  const odpsActivas = state.ordenes_produccion.filter(o => ['pendiente_planeacion','programada','en_produccion'].includes(o.estatus));
  
  const ovsParaMi = state.user.almacen_asignado ? ovsPend.filter(o => o.cedis === state.user.almacen_asignado) : ovsPend;
  const puedeCrearPI = ['CS','CEO','ADMIN','COMP'].includes(state.user.depto) || state.user.rol === 'admin';
  const puedeAprobar = ['CEO','ADMIN'].includes(state.user.depto) || state.user.rol === 'admin';
  
  return `
    <div class="tabs">
      ${puedeCrearPI ? `<button class="tab ${tab === 'nuevo' ? 'active' : ''}" onclick="state.tabs.pedidos='nuevo';state.pedidoData=null;render();">${ICONS.plus} Nuevo PI</button>` : ''}
      <button class="tab ${tab === 'pendientes' ? 'active' : ''}" onclick="state.tabs.pedidos='pendientes';render();">⏳ Por aprobar (${pendientes.length})</button>
      <button class="tab ${tab === 'aprobados' ? 'active' : ''}" onclick="state.tabs.pedidos='aprobados';render();">✅ Aprobados (${aprobados.length})</button>
      <button class="tab ${tab === 'ovs' ? 'active' : ''}" onclick="state.tabs.pedidos='ovs';render();">${ICONS.send} OVs (${ovsParaMi.length})</button>
      <button class="tab ${tab === 'odps' ? 'active' : ''}" onclick="state.tabs.pedidos='odps';render();">${ICONS.factory} ODPs (${odpsActivas.length})</button>
    </div>
    ${tab === 'nuevo' ? renderFormPedido() :
      tab === 'pendientes' ? renderListaPedidos(pendientes, puedeAprobar) :
      tab === 'aprobados' ? renderListaPedidos(aprobados, puedeAprobar) :
      tab === 'ovs' ? renderListaOVs(ovsParaMi) :
      renderListaODPs(odpsActivas)
    }
  `;
}

function renderFormPedido() {
  const datos = state.pedidoData || { cliente_codigo: '', cliente_nombre: '', odc_cliente: '', fecha_requerida: '', cedis_asignado: '', observaciones: '', lineas: [] };
  state.pedidoData = datos;
  
  const productosCli = datos.cliente_codigo ? window.productosDeCliente(datos.cliente_codigo) : [];
  const busq = (state.busqProd || '').toLowerCase();
  let prodsFiltrados = busq ? productosCli.filter(p => (p.codigo + ' ' + p.descripcion).toLowerCase().includes(busq)) : productosCli;
  
  return `
    <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:20px;align-items:start;">
      <div class="panel">
        <div class="panel-header">${ICONS.cart} Datos del pedido</div>
        <div style="padding:18px;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="field">
              <label class="field-label">Cliente *</label>
              <select class="input" id="ped-cliente">
                <option value="">— Selecciona —</option>
                ${state.clientes.map(c => `<option value="${c.codigo}" ${datos.cliente_codigo === c.codigo ? 'selected' : ''}>${c.codigo} — ${c.nombre.slice(0,40)}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label class="field-label">CEDIS *</label>
              <select class="input" id="ped-cedis">
                ${state.almacenes.filter(a => a.tipo === 'cedis').map(a => `<option value="${a.codigo}" ${datos.cedis_asignado === a.codigo ? 'selected' : ''}>${a.nombre}</option>`).join('')}
              </select>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="field"><label class="field-label">ODC del cliente</label><input class="input" id="ped-odc" value="${datos.odc_cliente || ''}" /></div>
            <div class="field"><label class="field-label">Fecha requerida</label><input class="input" id="ped-fecha" type="date" value="${datos.fecha_requerida || ''}" /></div>
          </div>
          
          ${!datos.cliente_codigo ? `
            <div style="padding:30px;text-align:center;color:#94a3b8;background:#f8fafc;border-radius:10px;">
              👈 Selecciona un cliente para ver sus productos
            </div>
          ` : `
            <div class="field" style="margin-top:14px;">
              <label class="field-label">Buscar producto del cliente</label>
              <input class="input" id="ped-busq" placeholder="Código o descripción..." value="${state.busqProd || ''}" autocomplete="off" />
            </div>
            <div style="max-height:340px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:10px;">
              ${prodsFiltrados.length === 0 ? `
                <div style="padding:30px;text-align:center;color:#94a3b8;font-size:13px;">
                  ${productosCli.length === 0 ? 'Cliente sin productos asignados' : 'No se encontraron productos'}
                </div>
              ` : prodsFiltrados.slice(0, 50).map(p => {
                const yaAgregado = datos.lineas.some(l => l.producto_codigo === p.codigo);
                return `
                  <div style="padding:12px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px;${yaAgregado ? 'background:#f0fdf4;' : ''}">
                    <div style="flex:1;min-width:0;">
                      <div class="text-mono" style="font-size:11px;font-weight:700;">${p.codigo}</div>
                      <div style="font-size:12px;color:#475569;margin-top:2px;">${p.descripcion}</div>
                    </div>
                    ${yaAgregado ? `<span style="padding:5px 8px;background:#16a34a;color:#fff;border-radius:6px;font-size:10px;font-weight:700;">✓</span>` :
                      `<button class="btn-primary" onclick="agregarLineaPedido('${p.codigo}')" style="padding:6px 10px;font-size:11px;">${ICONS.plus}</button>`}
                  </div>
                `;
              }).join('')}
            </div>
          `}

      </div>
      
      <div class="panel" style="position:sticky;top:80px;">
        <div class="panel-header">🛒 Líneas (${datos.lineas.length})</div>
        <div style="padding:18px;">
          ${datos.lineas.length === 0 ? `
            <div style="padding:40px 20px;text-align:center;color:#94a3b8;background:#f8fafc;border-radius:10px;">
              🛒 Aún no agregas productos
            </div>

            <div style="display:flex;flex-direction:column;gap:10px;max-height:360px;overflow-y:auto;">
              ${datos.lineas.map((l, i) => {
                const umLinea = (l.um || 'kg').toLowerCase();

                const stepCant = esEntera ? '1' : '0.01';
                const umBadgeColor = { kg: '#16a34a', pza: '#3b82f6', millar: '#8b5cf6', rollo: '#f59e0b', m: '#ec4899' }[umLinea] || '#64748b';
                return `
                <div style="padding:12px;border:1px solid #e2e8f0;border-radius:10px;background:#f8fafc;">
                  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">

                      <div style="font-size:12px;color:#475569;margin-top:2px;">${l.descripcion}</div>

                  </div>
                  <div class="field" style="margin-bottom:8px;">
                    <label class="field-label">Cantidad en ${UM_LABELS[umLinea]} *</label>
                    <input class="input ped-cant" data-idx="${i}" type="number" min="0" step="${stepCant}" value="${l.cantidad_solicitada || ''}" placeholder="${esEntera ? 'Solo enteros' : '0.00'}" />
                  </div>
                  <div class="field" style="margin-bottom:0;">
                    <label class="field-label">Origen *</label>
                    <select class="input ped-origen" data-idx="${i}">
                      <option value="stock" ${l.tipo_origen === 'stock' ? 'selected' : ''}>📦 De Stock</option>
                      <option value="producir" ${l.tipo_origen === 'producir' ? 'selected' : ''}>🏭 Producir</option>
                      <option value="mixto" ${l.tipo_origen === 'mixto' ? 'selected' : ''}>🔀 Mixto</option>
                    </select>
                  </div>
                  ${l.tipo_origen === 'mixto' ? `
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
                      <input class="input ped-stock" data-idx="${i}" type="number" min="0" step="${stepCant}" placeholder="Stock" value="${l.cantidad_stock || ''}" />
                      <input class="input ped-prod" data-idx="${i}" type="number" min="0" step="${stepCant}" placeholder="Producir" value="${l.cantidad_producir || ''}" />
                    </div>
                  ` : ''}
                </div>
              `;}).join('')}
            </div>
            <div class="field" style="margin-top:14px;">
              <label class="field-label">Observaciones</label>
              <textarea class="input" id="ped-obs" style="min-height:60px;">${datos.observaciones || ''}</textarea>
            </div>
            <div style="display:flex;gap:8px;margin-top:14px;">
              <button class="btn-secondary" onclick="cancelarPedido()" style="flex:1;justify-content:center;">Cancelar</button>
              <button class="btn-primary" onclick="enviarPedido()" style="flex:2;justify-content:center;">${ICONS.send} Enviar PI</button>
            </div>
          `}
        </div>
      </div>
    </div>
  `;
}

function renderListaPedidos(pedidos, puedeAprobar) {
  if (pedidos.length === 0) {
    return `<div style="padding:60px;text-align:center;color:#94a3b8;background:#fff;border-radius:14px;border:1px solid #e2e8f0;">📋 Sin pedidos en esta vista</div>`;
  }
  
  return `
    <div style="display:flex;flex-direction:column;gap:12px;">
      ${pedidos.map(p => {
        const lineas = window.pedidoLineas(p.id);
        const ovs = window.ovsDePedido(p.id);
        const odps = window.odpsDePedido(p.id);
        const colorEst = { pendiente_aprobacion: '#f59e0b', aprobado: '#16a34a', en_proceso: '#3b82f6', completado: '#94a3b8', cancelado: '#dc2626' }[p.estatus];
        const lblEst = { pendiente_aprobacion: 'Por aprobar', aprobado: 'Aprobado', en_proceso: 'En proceso', completado: 'Completado', cancelado: 'Cancelado' }[p.estatus] || p.estatus;
        const tipoBadge = { stock: { l: '📦 Stock', c: '#16a34a' }, producir: { l: '🏭 Producir', c: '#f59e0b' }, mixto: { l: '🔀 Mixto', c: '#3b82f6' } }[p.tipo] || { l: p.tipo, c: '#64748b' };
        
        return `
          <div class="panel" style="border:2px solid ${colorEst};">
            <div style="padding:14px 18px;background:${colorEst}11;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
              <div>
                <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                  <span class="text-mono" style="font-weight:800;font-size:16px;">${p.folio}</span>
                  <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;background:${colorEst}22;color:${colorEst};">${lblEst}</span>
                  <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;background:${tipoBadge.c}22;color:${tipoBadge.c};">${tipoBadge.l}</span>
                </div>
                <div style="font-size:13px;font-weight:600;margin-top:4px;">${p.cliente_nombre} <span style="color:#64748b;font-size:11px;">(${p.cliente_codigo})</span></div>
                <div style="font-size:11px;color:#64748b;margin-top:2px;">
                  ${fmtFechaHora(p.created_at)} • Por ${p.creado_por_nombre || '—'}
                  ${p.odc_cliente ? ` • ODC: <span class="text-mono">${p.odc_cliente}</span>` : ''}

              </div>

                <div style="font-size:18px;font-weight:800;">${lineas.length}</div>
                <div style="font-size:10px;color:#64748b;">líneas</div>

              <table style="width:100%;border:none;">

                <tbody>
                  ${lineas.map(l => {

                    const odpsLinea = odps.filter(o => o.producto_codigo === l.producto_codigo);
                    return `<tr style="border-bottom:1px solid #f1f5f9;">
                      <td style="padding:10px 0;font-size:12px;">
                        <div class="text-mono" style="font-size:11px;font-weight:700;">${l.producto_codigo}</div>
                        <div style="color:#64748b;">${l.descripcion}</div>

function attachAppEvents() {
  $$('.nav-item').forEach(btn => {
    btn.onclick = () => {
      state.vista = btn.dataset.vista;
      state.filtros = {};
      render();
    };
  });
  
  if ($('#filtro-clientes')) {
    $('#filtro-clientes').oninput = (e) => {
      const pos = e.target.selectionStart;
      state.filtros.clientes = e.target.value;
      render();
      const inp = $('#filtro-clientes');
      if (inp) { inp.focus(); inp.setSelectionRange(pos, pos); }
    };
  }
  if ($('#filtro-productos-pt')) {
    $('#filtro-productos-pt').oninput = (e) => {
      const pos = e.target.selectionStart;
      state.filtros.productos_pt = e.target.value;
      render();
      const inp = $('#filtro-productos-pt');
      if (inp) { inp.focus(); inp.setSelectionRange(pos, pos); }
    };
  }
  if ($('#filtro-productos-pt-material')) {
    $('#filtro-productos-pt-material').onchange = (e) => { state.filtros.productos_pt_material = e.target.value; render(); };
  }
  if ($('#filtro-productos-pt-tipo')) {
    $('#filtro-productos-pt-tipo').onchange = (e) => { state.filtros.productos_pt_tipo = e.target.value; render(); };
  }
  if ($('#filtro-productos-pt-um')) {
    $('#filtro-productos-pt-um').onchange = (e) => { state.filtros.productos_pt_um = e.target.value; render(); };
  }
  $$('.prod-um-select').forEach(sel => {
    sel.onchange = async (e) => {
      const codigo = sel.dataset.codigo;
      const nuevaUM = sel.value;
      await window.actualizarUMProducto(codigo, nuevaUM);
    };
  });
  
  if ($('#ped-cliente')) $('#ped-cliente').onchange = () => { capturarPedido(); render(); };
  if ($('#ped-cedis')) $('#ped-cedis').onchange = () => { capturarPedido(); };
  if ($('#ped-busq')) $('#ped-busq').oninput = (e) => {
    const pos = e.target.selectionStart;
    state.busqProd = e.target.value;
    render();
    const inp = $('#ped-busq');
    if (inp) { inp.focus(); inp.setSelectionRange(pos, pos); }
  };
  ['ped-odc','ped-fecha','ped-obs'].forEach(id => { const el = $('#' + id); if (el) el.onblur = () => capturarPedido(); });
  $$('.ped-cant, .ped-stock, .ped-prod').forEach(inp => { inp.onblur = () => { capturarPedido(); render(); }; });
  $$('.ped-origen').forEach(sel => { sel.onchange = () => { capturarPedido(); render(); }; });
}

function capturarPedido() {
  if (!state.pedidoData) state.pedidoData = { lineas: [] };
  const d = state.pedidoData;
  if ($('#ped-cliente')) {
    const cod = $('#ped-cliente').value;
    if (cod !== d.cliente_codigo) {
      d.cliente_codigo = cod;
      const c = window.getCliente(cod);
      d.cliente_nombre = c?.nombre || '';
      d.cedis_asignado = c?.cedis_asignado || 'CEDIS-MTY';
      d.lineas = [];
      state.busqProd = '';
    }
  }
  if ($('#ped-cedis')) d.cedis_asignado = $('#ped-cedis').value;
  if ($('#ped-odc')) d.odc_cliente = $('#ped-odc').value;
  if ($('#ped-fecha')) d.fecha_requerida = $('#ped-fecha').value;
  if ($('#ped-obs')) d.observaciones = $('#ped-obs').value;
  
  $$('.ped-cant').forEach(inp => { const i = +inp.dataset.idx; if (d.lineas[i]) d.lineas[i].cantidad_solicitada = inp.value; });
  $$('.ped-origen').forEach(sel => { const i = +sel.dataset.idx; if (d.lineas[i]) d.lineas[i].tipo_origen = sel.value; });
  $$('.ped-stock').forEach(inp => { const i = +inp.dataset.idx; if (d.lineas[i]) d.lineas[i].cantidad_stock = inp.value; });
  $$('.ped-prod').forEach(inp => { const i = +inp.dataset.idx; if (d.lineas[i]) d.lineas[i].cantidad_producir = inp.value; });
}

// ============================================================
// FUNCIONES WINDOW (acciones)
// ============================================================
window.abrirModal = (m, data) => { state.modal = m; state.modalData = data; render(); };
window.cerrarModal = () => { state.modal = null; state.modalData = null; render(); };

window.crearCliente = async () => {
  const cod = $('#cli-cod').value.trim().toUpperCase();
  const nom = $('#cli-nom').value.trim();
  if (!cod || !nom) { toast('Código y nombre son obligatorios', 'error'); return; }
  
  state.loadingAccion = true; render();
  try {
    // Verificar duplicado
    const existing = await getDoc(doc(db, 'clientes', cod));
    if (existing.exists()) { toast('Ya existe ese código', 'error'); state.loadingAccion = false; render(); return; }
    
    await setDoc(doc(db, 'clientes', cod), {
      codigo: cod, nombre: nom,
      contacto: $('#cli-cont').value,
      correo: $('#cli-correo').value,
      telefono: $('#cli-tel').value,
      cedis_asignado: $('#cli-cedis').value,
      activo: true,
      created_at: serverTimestamp()
    });
    
    // Refrescar
    const snap = await getDocs(query(collection(db, 'clientes'), where('activo', '==', true), orderBy('codigo')));
    state.clientes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    
    cerrarModal();
    toast('✅ Cliente creado');
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

window.agregarLineaPedido = (codigo) => {
  capturarPedido();
  const d = state.pedidoData;
  if (d.lineas.some(l => l.producto_codigo === codigo)) return;
  const p = window.getProductoPT(codigo);
  if (!p) return;
  d.lineas.push({
    producto_codigo: p.codigo,
    descripcion: p.descripcion,
    um: (p.um || 'kg').toLowerCase(),
    cantidad_solicitada: '',
    tipo_origen: 'stock',
    cantidad_stock: 0,
    cantidad_producir: 0,
    precio_unitario: 0,
    observaciones: ''
  });
  render();
};

window.actualizarUMProducto = async (codigo, nuevaUM) => {
  state.loadingAccion = true; render();
  try {
    await updateDoc(doc(db, 'productos_pt', codigo), { um: nuevaUM });
    // Actualizar localmente sin refetch
    const idx = state.productos_pt.findIndex(p => p.codigo === codigo);
    if (idx >= 0) state.productos_pt[idx].um = nuevaUM;
    toast(`✅ UM actualizada: ${codigo} → ${UM_LABELS[nuevaUM]}`);
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

window.crearProductoPT = async () => {
  const codigo = $('#prod-codigo').value.trim().toUpperCase();
  const desc = $('#prod-desc').value.trim();
  const material = $('#prod-material').value;
  const tipo = $('#prod-tipo').value;
  const ancho = Number($('#prod-ancho').value) || 0;
  const fuelle = Number($('#prod-fuelle').value) || 0;
  const largo = Number($('#prod-largo').value) || 0;
  const calibre = Number($('#prod-calibre').value) || 0;
  const color = $('#prod-color').value;
  const aditivo = $('#prod-aditivo').value;
  const um = $('#prod-um').value;
  const tipo_empaque = $('#prod-empaque').value || '';
  const cant_empaque = Number($('#prod-cant-emp').value) || 0;
  const um_empaque = $('#prod-um-emp').value || '';
  
  if (!codigo) { toast('El código es obligatorio', 'error'); return; }
  if (!desc) { toast('La descripción es obligatoria', 'error'); return; }
  
  state.loadingAccion = true; render();
  try {
    // Verificar duplicado
    const existing = await getDoc(doc(db, 'productos_pt', codigo));
    if (existing.exists()) { 
      toast('Ya existe un producto con ese código', 'error'); 
      state.loadingAccion = false; render(); 
      return; 
    }
    
    const presentacion = (tipo_empaque && cant_empaque) ? `${tipo_empaque.toUpperCase()} DE ${cant_empaque} ${um_empaque}` : 'DE';
    
    const producto = {
      codigo, descripcion: desc,
      material, tipo,
      ancho, fuelle, largo, calibre,
      color, aditivo,
      um,
      tipo_empaque, cant_empaque, um_empaque,
      presentacion,
      activo: true,
      created_at: serverTimestamp()
    };
    
    await setDoc(doc(db, 'productos_pt', codigo), producto);
    
    // Refrescar localmente
    state.productos_pt.push(producto);
    state.productos_pt.sort((a, b) => a.codigo.localeCompare(b.codigo));
    
    cerrarModal();
    toast('✅ Producto ' + codigo + ' creado');
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

window.quitarLineaPedido = (i) => {
  capturarPedido();

window.cancelarPedido = () => {
  if (state.pedidoData?.lineas?.length > 0) {
    if (!confirm('¿Descartar el pedido?')) return;
  }
  state.pedidoData = null;
  state.tabs.pedidos = 'pendientes';
  state.busqProd = '';
  render();
};

window.enviarPedido = async () => {
  capturarPedido();
  const d = state.pedidoData;
  if (!d.cliente_codigo) { toast('Selecciona un cliente', 'error'); return; }
  
  const validas = d.lineas.filter(l => l.producto_codigo && Number(l.cantidad_solicitada) > 0);
  if (validas.length === 0) { toast('Captura al menos una línea con cantidad', 'error'); return; }
  
  // Validación: UM enteras (pza, millar, rollo) no aceptan decimales
  for (const l of validas) {
    const um = (l.um || 'kg').toLowerCase();
    if (UM_ENTEROS.includes(um)) {
      const cant = Number(l.cantidad_solicitada);
      if (!Number.isInteger(cant)) {
        toast(`Producto ${l.producto_codigo}: ${UM_LABELS[um]} requiere cantidad entera (${cant} no es válido)`, 'error');
        return;
      }
      if (l.tipo_origen === 'mixto') {
        if (!Number.isInteger(Number(l.cantidad_stock || 0)) || !Number.isInteger(Number(l.cantidad_producir || 0))) {
          toast(`Producto ${l.producto_codigo}: cantidades de stock y producir deben ser enteras`, 'error');
          return;
        }
      }
    }
  }
  state.loadingAccion = true; render();
  try {
    const folioNum = await siguienteFolio('pedido');
    const folio = 'PI-' + String(folioNum).padStart(5, '0');
    
    const tipos = new Set(validas.map(l => l.tipo_origen));
    const tipo = tipos.size === 1 ? [...tipos][0] : 'mixto';
    
    // Crear pedido
    const pedidoRef = await addDoc(collection(db, 'pedidos'), {
      folio,
      cliente_codigo: d.cliente_codigo,
      cliente_nombre: d.cliente_nombre,
      odc_cliente: d.odc_cliente || '',
      fecha_requerida: d.fecha_requerida || null,
      cedis_asignado: d.cedis_asignado,
      estatus: 'pendiente_aprobacion',
      tipo,
      observaciones: d.observaciones || '',
      creado_por: state.user.id,
      creado_por_nombre: state.user.nombre,
      created_at: serverTimestamp(),
      updated_at: serverTimestamp()
    });
    
    // Crear líneas en batch
    const batch = writeBatch(db);
    validas.forEach(l => {
      const ref = doc(collection(db, 'pedido_lineas'));
      batch.set(ref, {
        pedido_id: pedidoRef.id,
        pedido_folio: folio,
        producto_codigo: l.producto_codigo,
        descripcion: l.descripcion,
        cantidad_solicitada: Number(l.cantidad_solicitada),
        um: (l.um || 'kg').toLowerCase(),
        tipo_origen: l.tipo_origen,
        precio_unitario: Number(l.precio_unitario) || 0,
        cantidad_stock: Number(l.cantidad_stock) || 0,
        cantidad_producir: Number(l.cantidad_producir) || 0,
        observaciones: l.observaciones || '',
        created_at: serverTimestamp()
      });
    });
    
    // Notificación
    const notifRef = doc(collection(db, 'notificaciones'));
    batch.set(notifRef, {
      titulo: 'Nuevo PI ' + folio,
      mensaje: d.cliente_nombre + ' • ' + validas.length + ' línea(s)',
      depto_destino: 'CEO',
      tipo: 'info',
      folio_ref: folio,
      created_at: serverTimestamp()
    });
    
    await batch.commit();
    
    state.pedidoData = null;
    state.busqProd = '';
    state.tabs.pedidos = 'pendientes';
    toast('✅ Pedido ' + folio + ' enviado');
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

window.aprobarPedido = async (pedidoId, folio) => {
  if (!confirm('¿Aprobar pedido ' + folio + '?\n\nSe generarán automáticamente las OVs y ODPs.')) return;
  
  state.loadingAccion = true; render();
  try {
    const pedidoSnap = await getDoc(doc(db, 'pedidos', pedidoId));
    if (!pedidoSnap.exists()) throw new Error('Pedido no encontrado');
    const pedido = pedidoSnap.data();
    if (pedido.estatus !== 'pendiente_aprobacion') throw new Error('Ya fue procesado');
    
    const lineas = window.pedidoLineas(pedidoId);
    const ovs = [], odps = [];
    
    // Generar folios
    for (const l of lineas) {
      const cantStock = l.tipo_origen === 'stock' ? Number(l.cantidad_solicitada) : (Number(l.cantidad_stock) || 0);
      const cantProd = l.tipo_origen === 'producir' ? Number(l.cantidad_solicitada) : (Number(l.cantidad_producir) || 0);
      
      if (cantStock > 0) {
        const num = await siguienteFolio('ov');
        const folioOV = 'OV-' + String(num).padStart(5, '0');
        await addDoc(collection(db, 'ordenes_venta'), {
          folio: folioOV, pedido_id: pedidoId, pedido_folio: pedido.folio,
          cliente_codigo: pedido.cliente_codigo, cliente_nombre: pedido.cliente_nombre,
          cedis: pedido.cedis_asignado,
          producto_codigo: l.producto_codigo, descripcion: l.descripcion,
          cantidad: cantStock, um: l.um, estatus: 'pendiente',
          observaciones: l.observaciones || '',
          created_at: serverTimestamp()
        });
        ovs.push(folioOV);
      }
      
      if (cantProd > 0) {
        const num = await siguienteFolio('odp');
        const folioODP = 'ODP-' + String(num).padStart(5, '0');
        await addDoc(collection(db, 'ordenes_produccion'), {
          folio: folioODP, pedido_id: pedidoId, pedido_folio: pedido.folio,
          cliente_codigo: pedido.cliente_codigo, cliente_nombre: pedido.cliente_nombre,
          producto_codigo: l.producto_codigo, descripcion: l.descripcion,
          cantidad: cantProd, um: l.um, estatus: 'pendiente_planeacion',
          fecha_entrega_programada: pedido.fecha_requerida || null,
          observaciones: l.observaciones || '',
          created_at: serverTimestamp()
        });
        odps.push(folioODP);
      }
    }
    
    // Actualizar pedido
    await updateDoc(doc(db, 'pedidos', pedidoId), {
      estatus: 'aprobado',
      aprobado_por: state.user.id,
      aprobado_por_nombre: state.user.nombre,
      fecha_aprobacion: serverTimestamp(),
      updated_at: serverTimestamp()
    });
    
    // Notificaciones
    const batch = writeBatch(db);
    if (ovs.length > 0) {
      batch.set(doc(collection(db, 'notificaciones')), {
        titulo: 'OVs generadas',
        mensaje: ovs.join(', ') + ' • ' + pedido.cliente_nombre,
        depto_destino: 'ALP-' + pedido.cedis_asignado,
        tipo: 'info', folio_ref: pedido.folio,
        created_at: serverTimestamp()
      });
    }
    if (odps.length > 0) {
      batch.set(doc(collection(db, 'notificaciones')), {
        titulo: 'ODPs generadas',
        mensaje: odps.join(', ') + ' • ' + pedido.cliente_nombre,
        depto_destino: 'PLN',
        tipo: 'info', folio_ref: pedido.folio,
        created_at: serverTimestamp()
      });
    }
    await batch.commit();
    
    let msg = '✅ Pedido aprobado';
    if (ovs.length) msg += ' • OVs: ' + ovs.join(', ');
    if (odps.length) msg += ' • ODPs: ' + odps.join(', ');
    toast(msg);
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

      await cargarPerfil(firebaseUser.uid);
      await cargarTodo();
      render();
    } catch (e) {
      toast('Error: ' + e.message, 'error');
      await signOut(auth);

    state.user = null;
    state.unsubscribers.forEach(u => u());
    state.unsubscribers = [];
    render();
  }
});
