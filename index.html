// ============================================================
// HELPER: Calcular fase actual del PI (para semáforo visual)
// Devuelve: { fase: 0-5, label, porcentaje, color }
// ============================================================
function calcularFasePI(p) {
  // 6 fases: Captura → Aprobación → Producción → Calidad → Almacén → Embarque
  const lineas = window.pedidoLineas(p.id);
  const odps = window.odpsDePedido(p.id);
  const ovs = window.ovsDePedido(p.id);
  
  // Fases
  const fases = [
    { id: 'captura',     icon: '📝', label: 'Captura',    completada: true },
    { id: 'aprobacion',  icon: '✅', label: 'Aprobación', completada: false },
    { id: 'produccion',  icon: '🏭', label: 'Producción', completada: false, en_curso: false },
    { id: 'calidad',     icon: '✅', label: 'Calidad',    completada: false, en_curso: false },
    { id: 'almacen',     icon: '📦', label: 'Almacén',    completada: false, en_curso: false },
    { id: 'embarque',    icon: '🚚', label: 'Embarque',   completada: false, en_curso: false },
  ];
  
  // Aprobación
  if (['aprobado','en_proceso','completado'].includes(p.estatus)) fases[1].completada = true;
  if (p.estatus === 'cancelado') {
    return { fases, fase_actual: 1, porcentaje: 0, color: '#dc2626', label: '❌ CANCELADO', cancelado: true };
  }
  if (p.estatus === 'pendiente_aprobacion') {
    return { fases, fase_actual: 1, porcentaje: 5, color: '#f59e0b', label: '🟡 Por aprobar' };
  }
  
  // ===== EMBARQUE primero (porque puede determinar el resto si está completo) =====
  // OV completada: estatus 'enviada' o 'entregada' o 'completada' (legacy)
  const ovsTotales = ovs.length;
  const ovsCompletadas = ovs.filter(o => 
    ['enviada','entregada','completada'].includes(o.estatus)
  ).length;
  const ovsEnProgreso = ovs.filter(o => 
    ['preparando','lista_embarcar','por_cargar','pendiente_asignar'].includes(o.estatus)
  ).length;
  
  if (ovsTotales > 0 && ovsCompletadas === ovsTotales) {
    fases[5].completada = true;
  } else if (ovsEnProgreso > 0 || ovsCompletadas > 0) {
    fases[5].en_curso = true;
  }
  
  // ===== Si las OVs están completadas, marcar todo lo anterior como completado también =====
  // Porque significa que el material se entregó al cliente (todo el flujo se cumplió)
  const todoEntregado = ovsTotales > 0 && ovsCompletadas === ovsTotales;
  
  // Producción
  if (todoEntregado) {
    fases[2].completada = true;
  } else {
    const odpsCompletas = odps.filter(o => 
      ['pendiente_calidad','liberada_empaque','rechazada','en_almacen_planta','en_transito_cedis_mty','en_cedis_mty','en_cedis_mex','embarcada','entregada','completada'].includes(o.estatus)
    ).length;
    const odpsEnCurso = odps.filter(o => o.estatus === 'en_produccion').length;
    if (odps.length > 0 && odpsCompletas === odps.length) {
      fases[2].completada = true;
    } else if (odpsEnCurso > 0 || odps.some(o => o.estatus === 'programada')) {
      fases[2].en_curso = true;
    } else if (odps.length === 0 && lineas.every(l => l.tipo_origen === 'stock')) {
      // Si todo es de stock, no hay producción que esperar — marcar como N/A completada
      fases[2].completada = true;
      fases[2].label = 'Stock (sin producir)';
      fases[2].icon = '📦';
    }
  }
  
  // Calidad
  if (todoEntregado) {
    fases[3].completada = true;
  } else {
    const odpsLiberadas = odps.filter(o => 
      o.estatus === 'liberada_empaque' || o.liberacion_calidad ||
      ['en_almacen_planta','en_transito_cedis_mty','en_cedis_mty','en_cedis_mex','embarcada','entregada','completada'].includes(o.estatus)
    ).length;
    if (odps.length > 0 && odpsLiberadas === odps.length) {
      fases[3].completada = true;
    } else if (odpsLiberadas > 0) {
      fases[3].en_curso = true;
    } else if (odps.length === 0 && lineas.every(l => l.tipo_origen === 'stock')) {
      // Stock no requiere calidad nueva
      fases[3].completada = true;
      fases[3].label = 'Stock (calidad previa)';
      fases[3].icon = '📦';
    }
  }
  
  // Almacén
  const tarimasPI = state.tarimas.filter(t => t.pedido_folio === p.folio || t.pedido_id === p.id);
  const enPlanta = tarimasPI.filter(t => t.estatus === 'en_almacen_planta').length;
  const enTransitoMTY = tarimasPI.filter(t => t.estatus === 'en_transito_cedis_mty').length;
  const enCedisMTY = tarimasPI.filter(t => t.estatus === 'en_cedis_mty').length;
  const enTransitoMEX = tarimasPI.filter(t => t.estatus === 'en_transito_cedis_mex').length;
  const enCedisMEX = tarimasPI.filter(t => t.estatus === 'en_cedis_mex').length;
  const embarcadas = tarimasPI.filter(t => ['embarcada','entregada'].includes(t.estatus)).length;
  const tarimasEnAlmacenOPosterior = enPlanta + enTransitoMTY + enCedisMTY + enTransitoMEX + enCedisMEX + embarcadas;
  
  if (todoEntregado) {
    fases[4].completada = true;
  } else if (tarimasPI.length > 0 && tarimasEnAlmacenOPosterior === tarimasPI.length) {
    fases[4].completada = true;
  } else if (tarimasEnAlmacenOPosterior > 0) {
    fases[4].en_curso = true;
  }
  
  // Etiqueta dinámica según donde están la mayoría (de las que aún están en almacén físico)
  const enAlmacenAhora = enPlanta + enTransitoMTY + enCedisMTY + enTransitoMEX + enCedisMEX;
  if (todoEntregado) {
    fases[4].label = 'Entregado';
    fases[4].icon = '✅';
  } else if (enAlmacenAhora > 0) {
    if (enCedisMEX === enAlmacenAhora) {
      fases[4].label = 'CEDIS-MEX';
      fases[4].icon = '🇲🇽';
    } else if (enCedisMTY === enAlmacenAhora) {
      fases[4].label = 'CEDIS-MTY';
      fases[4].icon = '📦';
    } else if (enPlanta === enAlmacenAhora) {
      fases[4].label = 'Planta-MTY';
      fases[4].icon = '🏭';
    } else if (enTransitoMTY > 0 && enCedisMTY === 0 && enCedisMEX === 0) {
      fases[4].label = '→ CEDIS-MTY';
      fases[4].icon = '🚚';
    } else if (enTransitoMEX > 0) {
      fases[4].label = '→ CEDIS-MEX';
      fases[4].icon = '🚚';
    } else {
      if (enCedisMEX > 0) { fases[4].label = `Mixto → MEX`; fases[4].icon = '🇲🇽'; }
      else if (enCedisMTY > 0) { fases[4].label = `Mixto → MTY`; fases[4].icon = '📦'; }
      else { fases[4].label = `Distribuido`; fases[4].icon = '🔀'; }
    }
  } else if (embarcadas > 0 && embarcadas < tarimasPI.length) {
    fases[4].label = 'Parc. embarcado';
    fases[4].icon = '🚛';
  }
  
  // Calcular porcentaje y fase actual
  let faseActual = 0;
  let completadas = 0;
  fases.forEach((f, i) => { if (f.completada) completadas = i + 1; if (f.completada || f.en_curso) faseActual = i; });
  const porcentaje = Math.round((completadas / fases.length) * 100);
  
  let color = '#94a3b8';
  let label = 'En proceso';
  if (porcentaje === 100) { color = '#16a34a'; label = '🏁 COMPLETADO'; }
  else if (porcentaje >= 80) { color = '#3b82f6'; label = `${porcentaje}% — ${fases[faseActual].label}`; }
  else if (porcentaje >= 50) { color = '#f59e0b'; label = `${porcentaje}% — ${fases[faseActual].label}`; }
  else if (porcentaje >= 20) { color = '#8b5cf6'; label = `${porcentaje}% — ${fases[faseActual].label}`; }
  else { color = '#f59e0b'; label = `${porcentaje}% — ${fases[faseActual].label}`; }
  
  return { fases, fase_actual: faseActual, porcentaje, color, label };
}

function renderTarjetaSeguimiento(p, fasesData) {
  const lineas = window.pedidoLineas(p.id);
  const odps = window.odpsDePedido(p.id);
  const tarimasPI = state.tarimas.filter(t => t.pedido_folio === p.folio || t.pedido_id === p.id);
  if (!fasesData) fasesData = calcularFasePI(p);
  
  // Resumen ubicación tarimas
  const ubicaciones = {
    pendiente: tarimasPI.filter(t => ['pendiente_empaque','pendiente_almacen'].includes(t.estatus)).length,
    planta: tarimasPI.filter(t => t.estatus === 'en_almacen_planta').length,
    transito: tarimasPI.filter(t => t.estatus === 'en_transito_cedis_mty').length,
    cedis_mty: tarimasPI.filter(t => t.estatus === 'en_cedis_mty').length,
    cedis_mex: tarimasPI.filter(t => t.estatus === 'en_cedis_mex').length,
    embarcada: tarimasPI.filter(t => ['embarcada','entregada'].includes(t.estatus)).length,
  };
  
  // Comentarios sin leer
  const comentarios = state.comentarios_pedidos.filter(c => c.pedido_id === p.id);
  
  // Fecha entrega

          </div>
          <div style="font-weight:700;font-size:14px;color:#475569;">${p.cliente_nombre} <span style="color:#64748b;font-weight:400;font-size:12px;">(${p.cliente_codigo})</span></div>
          <div style="font-size:12px;color:#64748b;margin-top:3px;display:flex;gap:12px;flex-wrap:wrap;">
            ${p.odc_cliente ? `<span>🛒 ODC: <strong>${p.odc_cliente}</strong></span>` : ''}
            ${fechaEntrega ? `<span style="${urgente?'color:#dc2626;font-weight:700;':''}">📅 Entrega: <strong>${fechaEntrega}</strong></span>` : ''}
            <span>📦 ${lineas.length} línea(s)</span>
            ${odps.length > 0 ? `<span>🏭 ${odps.length} ODP(s)</span>` : ''}
          </div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:11px;color:#64748b;text-transform:uppercase;font-weight:700;">Avance</div>
          <div style="font-size:28px;font-weight:800;color:${fasesData.color};line-height:1;">${fasesData.porcentaje}%</div>
        </div>
      </div>
      
      <!-- SEMÁFORO DE FASES (visual principal) -->
      <div style="padding:14px 18px;border-top:1px solid #e2e8f0;background:#fff;">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:6px;">
          ${fasesData.fases.map((f, i) => {
            const colorF = f.completada ? '#16a34a' : (f.en_curso ? '#3b82f6' : '#cbd5e1');
            const bgF = f.completada ? '#dcfce7' : (f.en_curso ? '#dbeafe' : '#f1f5f9');
            return `
              <div style="flex:1;text-align:center;">
                <div style="width:42px;height:42px;border-radius:50%;background:${bgF};border:2px solid ${colorF};display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:18px;${f.en_curso?'animation:pulse 1.5s ease-in-out infinite;':''}">
                  ${f.completada ? '✓' : (f.en_curso ? f.icon : '○')}
                </div>
                <div style="font-size:10px;font-weight:700;color:${colorF};margin-top:4px;">${f.label}</div>
              </div>
              ${i < fasesData.fases.length - 1 ? `<div style="flex:0.5;height:3px;background:${f.completada ? '#16a34a' : '#cbd5e1'};margin-bottom:18px;"></div>` : ''}
            `;
          }).join('')}
        </div>
      </div>
      
      ${tarimasPI.length > 0 ? `
        <!-- UBICACIÓN ACTUAL DE TARIMAS -->
        <div style="padding:10px 18px;border-top:1px solid #e2e8f0;background:#f8fafc;">
          <div style="font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;margin-bottom:6px;">📍 Dónde están las ${tarimasPI.length} tarima(s)</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            ${ubicaciones.pendiente > 0 ? `<span style="padding:4px 10px;background:#fef3c7;color:#92400e;border-radius:6px;font-size:11px;font-weight:700;">⏳ Pendiente recibir: ${ubicaciones.pendiente}</span>` : ''}
            ${ubicaciones.planta > 0 ? `<span style="padding:4px 10px;background:#e0e7ff;color:#4338ca;border-radius:6px;font-size:11px;font-weight:700;">🏭 Planta: ${ubicaciones.planta}</span>` : ''}
            ${ubicaciones.transito > 0 ? `<span style="padding:4px 10px;background:#fde68a;color:#92400e;border-radius:6px;font-size:11px;font-weight:700;">🚚 En tránsito: ${ubicaciones.transito}</span>` : ''}
            ${ubicaciones.cedis_mty > 0 ? `<span style="padding:4px 10px;background:#dbeafe;color:#1e40af;border-radius:6px;font-size:11px;font-weight:700;">📦 CEDIS-MTY: ${ubicaciones.cedis_mty}</span>` : ''}
            ${ubicaciones.cedis_mex > 0 ? `<span style="padding:4px 10px;background:#bbf7d0;color:#166534;border-radius:6px;font-size:11px;font-weight:700;">📦 CEDIS-MEX: ${ubicaciones.cedis_mex}</span>` : ''}
            ${ubicaciones.embarcada > 0 ? `<span style="padding:4px 10px;background:#dcfce7;color:#15803d;border-radius:6px;font-size:11px;font-weight:700;">✅ Entregadas: ${ubicaciones.embarcada}</span>` : ''}
          </div>
        </div>
      ` : ''}
      
      <!-- ACCIONES -->
      <div style="padding:10px 18px;border-top:1px solid #e2e8f0;display:flex;gap:8px;flex-wrap:wrap;background:#fafafa;">
        <button class="btn-primary" onclick="event.stopPropagation();abrirModal('trazabilidad-pi','${p.id}')" style="padding:8px 14px;background:#3b82f6;font-size:13px;">🔍 Ver trazabilidad completa</button>
        <button class="btn-secondary" onclick="event.stopPropagation();abrirModal('comentar-pedido','${p.id}')" style="padding:6px 12px;font-size:12px;">💬 Comentar (${comentarios.length})</button>
        <button class="btn-secondary" onclick="event.stopPropagation();abrirModal('detalle-pedido','${p.id}')" style="padding:6px 12px;font-size:12px;margin-left:auto;">${ICONS.list} Detalle PI</button>
      </div>
    </div>
  `;
}

function renderModal() {
  const m = state.modal;
  if (m === 'crear-cliente') return modalCrearCliente();
  if (m === 'editar-cliente') return modalEditarCliente();
  if (m === 'detalle-cliente') return modalDetalleCliente();
  if (m === 'programar-odp') return modalProgramarODP();
  if (m === 'completar-proceso') return modalCompletarProceso();
  if (m === 'liberar-calidad') return modalLiberarCalidad();
  if (m === 'crear-oti') return modalCrearOTI();
  if (m === 'asignar-tarimas-ov') return modalAsignarTarimasOV();
  if (m === 'generar-remision-ov') return modalGenerarRemisionOV();
  if (m === 'detalle-ov') return modalDetalleOV();
  if (m === 'detalle-odp') return modalDetalleODP();
  if (m === 'detalle-pedido') return modalDetallePedido();
  if (m === 'trazabilidad-pi') return modalTrazabilidadPI();
  if (m === 'comentar-pedido') return modalComentarPedido();
  if (m === 'crear-producto-pt') return modalCrearProductoPT();
  if (m === 'editar-producto-pt') return modalEditarProductoPT();
  if (m === 'pdf-preview') return modalPdfPreview();
  if (m === 'crear-maquina') return modalMaquina(false);
  if (m === 'editar-maquina') return modalMaquina(true);
  if (m === 'crear-personal') return modalPersonal(false);
  if (m === 'editar-personal') return modalPersonal(true);
  if (m === 'capturar-turno') return modalCapturarTurno();
  if (m === 'crear-usuario') return modalUsuario(false);
  if (m === 'editar-usuario') return modalUsuario(true);
  return '';
}

function modalCrearCliente() {
  return modalFormCliente(null);
}
function modalEditarCliente() {
  const c = window.getCliente(state.modalData);
  if (!c) return '';
  return modalFormCliente(c);
}

            <h2 style="font-size:18px;font-weight:800;">${c.codigo} — ${c.nombre}</h2>

function modalProgramarODP() {
  const odp = state.ordenes_produccion.find(o => o.id === state.modalData);
  if (!odp) return '';
  const hoy = new Date().toISOString().split('T')[0];
  
  // Inicializar form con ruta sugerida si no existe
  if (!state.modalForm) {
    const producto = state.productos_pt.find(p => p.codigo === odp.producto_codigo);
    state.modalForm = {
      ruta_procesos: odp.ruta_procesos && odp.ruta_procesos.length > 0 
        ? [...odp.ruta_procesos]
        : window.sugerirRutaProcesos(producto),
      maquinas_asignadas: odp.maquinas_asignadas || {}
    };
  }
  const f = state.modalForm;
  if (!f.maquinas_asignadas) f.maquinas_asignadas = {};
  
  // Máquinas disponibles por proceso
  const maquinasActivas = (state.maquinas || []).filter(m => m.activa !== false);
  
  return `
    <div class="modal-bg" onclick="if(event.target===this)cerrarModal()">
      <div class="modal" style="max-width:700px;">
        <div class="modal-header">
          <h2 style="font-size:18px;font-weight:800;">Programar ${odp.folio}</h2>
          <button class="icon-btn" onclick="cerrarModal()">${ICONS.x}</button>
        </div>
        <div class="modal-body">
          <div style="padding:14px;background:#fffbeb;border-radius:10px;margin-bottom:14px;font-size:12px;">
            <strong>Cliente:</strong> ${odp.cliente_nombre}<br>
            <strong>Producto:</strong> <span class="text-mono">${odp.producto_codigo}</span><br>
            <strong>${odp.descripcion || ''}</strong><br>
            <strong>Cantidad a producir:</strong> ${fmtCantidadUM(odp.cantidad, odp.um)}
          </div>
          
          <!-- Ruta de procesos -->
          <div class="field">
            <label class="field-label">Ruta de procesos * <span style="font-weight:400;color:#64748b;">(en orden de ejecución)</span></label>
            <div style="padding:12px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0;">
              <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px;min-height:36px;">
                ${f.ruta_procesos.length === 0 ? `<span style="font-size:11px;color:#94a3b8;">Selecciona los procesos abajo →</span>` : 
                  f.ruta_procesos.map((p, i) => {
                    const proc = getProc(p);
                    if (!proc) return '';
                    return `
                      <div style="display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:99px;background:${proc.color}22;color:${proc.color};font-size:12px;font-weight:700;">
                        <span>${i+1}.</span>
                        <span>${proc.icono}</span>
                        <span>${proc.nombre}</span>
                        <button onclick="quitarProcesoRuta(${i})" style="background:none;border:none;color:${proc.color};font-size:14px;cursor:pointer;padding:0 2px;font-weight:700;">×</button>
                      </div>
                      ${i < f.ruta_procesos.length - 1 ? `<span style="color:#94a3b8;">→</span>` : ''}
                    `;
                  }).join('')
                }
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:6px;border-top:1px solid #e2e8f0;padding-top:10px;">
                ${PROCESOS.map(p => {
                  const yaEsta = f.ruta_procesos.includes(p.codigo);
                  return `
                    <button onclick="agregarProcesoRuta('${p.codigo}')" ${yaEsta ? 'disabled' : ''}
                      style="padding:6px 10px;border-radius:8px;border:1px solid ${p.color}44;background:${yaEsta ? '#f1f5f9' : '#fff'};color:${yaEsta ? '#94a3b8' : p.color};font-size:11px;font-weight:600;cursor:${yaEsta ? 'not-allowed' : 'pointer'};">
                      ${yaEsta ? '✓' : '+'} ${p.icono} ${p.codigo}
                    </button>
                  `;
                }).join('')}
              </div>
            </div>
          </div>
          
          <!-- ⭐ ASIGNACIÓN DE MÁQUINAS POR PROCESO -->
          ${f.ruta_procesos.length > 0 ? `
            <div class="field">
              <label class="field-label">🛠️ Máquinas asignadas * <span style="font-weight:400;color:#64748b;">(elige una máquina por cada proceso)</span></label>
              <div style="padding:12px;background:#eff6ff;border-radius:10px;border:1px solid #3b82f6;">
                ${f.ruta_procesos.map((procCod, i) => {
                  const proc = getProc(procCod);
                  if (!proc) return '';
                  const maqsDeProceso = maquinasActivas.filter(m => m.proceso_codigo === procCod);
                  const maqSel = f.maquinas_asignadas[procCod] || '';
                  return `
                    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
                      <div style="min-width:140px;display:flex;align-items:center;gap:5px;">
                        <span style="background:${proc.color}22;color:${proc.color};padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;">${i+1}. ${proc.icono} ${proc.codigo}</span>
                      </div>
                      ${maqsDeProceso.length === 0 ? `
                        <div style="flex:1;padding:6px 10px;background:#fef3c7;border:1px solid #f59e0b;border-radius:6px;font-size:11px;color:#92400e;">
                          ⚠ No hay máquinas para este proceso. <a href="#" onclick="state.vista='maquinas';cerrarModal();render();return false;" style="color:#dc2626;font-weight:700;">Crear una →</a>
                        </div>
                      ` : `
                        <select onchange="asignarMaquinaProceso('${procCod}', this.value)" style="flex:1;padding:6px 10px;border:2px solid ${maqSel?'#16a34a':'#cbd5e1'};border-radius:6px;font-size:12px;font-weight:600;background:#fff;">
                          <option value="">— Selecciona máquina —</option>
                          ${maqsDeProceso.map(m => `<option value="${m.codigo}" ${maqSel === m.codigo ? 'selected' : ''}>${m.codigo} ${m.nombre ? '· '+m.nombre : ''}${m.capacidad_kg_hr ? ' · '+m.capacidad_kg_hr+'kg/h' : ''}</option>`).join('')}
                        </select>
                      `}
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          ` : ''}
          
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="field">
              <label class="field-label">Fecha inicio</label>
              <input class="input" id="podp-fini" type="date" value="${odp.fecha_inicio_programada || hoy}" />
            </div>
            <div class="field">
              <label class="field-label">Fecha de entrega comprometida</label>
              <input class="input" id="podp-fent" type="date" value="${odp.fecha_entrega_programada || ''}" />
            </div>
          </div>
          
          <div class="field">
            <label class="field-label">Prioridad</label>
            <select class="input" id="podp-prioridad">
              <option value="normal" ${(odp.prioridad || 'normal') === 'normal' ? 'selected' : ''}>Normal</option>
              <option value="alta" ${odp.prioridad === 'alta' ? 'selected' : ''}>🔴 Alta (urgente)</option>
              <option value="baja" ${odp.prioridad === 'baja' ? 'selected' : ''}>🟢 Baja (cuando se pueda)</option>
            </select>
          </div>
          
          <div class="field">
            <label class="field-label">Notas para producción</label>
            <textarea class="input" id="podp-notas" style="min-height:70px;" placeholder="Indicaciones especiales, requisitos del cliente, etc.">${odp.planeacion_notas || ''}</textarea>
          </div>
        </div>
        <div style="padding:16px 22px;border-top:1px solid #e2e8f0;display:flex;gap:10px;justify-content:flex-end;">

}

// Silenciosa: para inputs (no provoca render, no pierde cursor)
window.modalFormSetSilent = (key, val) => {
  if (!state.modalForm) state.modalForm = {};
  state.modalForm[key] = val;
};

// Con render: para botones y selects (sí provoca re-render)
window.modalFormSet = (key, val) => {
  if (!state.modalForm) state.modalForm = {};
  state.modalForm[key] = val;
  render();
};

window.modalFormSetGrupo = (g) => {
  if (!state.modalForm) state.modalForm = {};

  // Limpiar operador y supervisor cuando cambia el grupo
  state.modalForm.operador_id = '';
  state.modalForm.supervisor_id = '';

window.guardarCapturaTurno = async (odpId) => {
  const f = state.modalForm || {};
  
  // Leer también del DOM por si los inputs silenciosos no actualizaron state
  const prodDom = ($('#ct-prod')?.value || '').trim();
  const mermDom = ($('#ct-merm')?.value || '').trim();
  const notasDom = ($('#ct-notas')?.value || '').trim();
  const fechaDom = ($('#ct-fecha')?.value || '').trim();
  
  if (prodDom) f.producido_kg = prodDom;
  if (mermDom) f.mermas_kg = mermDom;
  if (notasDom) f.notas = notasDom;
  if (fechaDom) f.fecha = fechaDom;
  
  const odp = state.ordenes_produccion.find(o => o.id === odpId);
  if (!odp) { toast('ODP no encontrada', 'error'); return; }
  
  const ruta = odp.ruta_procesos || [];
  const idx = odp.proceso_actual_idx ?? 0;
  const procActual = ruta[idx];
  
  // Validaciones
  if (!f.fecha) { toast('Selecciona fecha', 'error'); return; }
  if (!f.turno) { toast('Selecciona turno (Día o Noche)', 'error'); return; }
  if (!f.grupo) { toast('Selecciona grupo (A, B, C o D)', 'error'); return; }
  if (!f.operador_id) { toast('Selecciona operador', 'error'); return; }
  if (!f.supervisor_id) { toast('Selecciona supervisor', 'error'); return; }
  const prodKg = Number(f.producido_kg) || 0;
  if (prodKg <= 0) { toast('Captura kg producidos (debe ser mayor a 0)', 'error'); return; }
  
  const op = (state.operadores || []).find(o => o.id === f.operador_id);
  const sup = (state.supervisores || []).find(s => s.id === f.supervisor_id);
  
  state.loadingAccion = true; render();
  try {
    const maquinaAsignada = (odp.maquinas_asignadas && odp.maquinas_asignadas[procActual]) || odp.maquina_codigo || '';
    
    // 1. Crear captura
    await addDoc(collection(db, 'capturas_produccion'), {
      odp_id: odpId,
      odp_folio: odp.folio,
      proceso: procActual,
      proceso_nombre: getProc(procActual)?.nombre || procActual,
      maquina: maquinaAsignada,
      fecha: f.fecha,
      turno: f.turno,
      grupo: f.grupo,
      operador_id: f.operador_id,
      operador: op?.nombre || '',
      supervisor_id: f.supervisor_id,
      supervisor: sup?.nombre || '',
      producido_kg: prodKg,
      mermas_kg: Number(f.mermas_kg) || 0,
      notas: f.notas || '',
      capturado_por: state.user.id,
      capturado_por_nombre: state.user.nombre || state.user.email,
      created_at: serverTimestamp()
    });
    
    // 2. Si la ODP está en programada, pasar a en_produccion
    if (odp.estatus === 'programada') {
      await updateDoc(doc(db, 'ordenes_produccion', odpId), {
        estatus: 'en_produccion',
        fecha_inicio_real: serverTimestamp(),
        proceso_actual_inicio: serverTimestamp(),
        updated_at: serverTimestamp()
      });
    }
    
    cerrarModal();
    toast(`✅ Turno guardado: ${fmtNum(prodKg)} kg · ${op?.nombre || ''} · Grupo ${f.grupo}`);
  } catch (e) {
    console.error('Error guardar turno:', e);
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

// ============================================================
// MODAL: TERMINAR PROCESO ACTUAL
// ============================================================
function modalCompletarProceso() {
  const odp = state.ordenes_produccion.find(o => o.id === state.modalData);
  if (!odp) return '';
  
  const ruta = odp.ruta_procesos || [];
  const idx = odp.proceso_actual_idx ?? 0;
  const procActual = getProc(ruta[idx]);
  if (!procActual) return '';
  
  const esUltimo = idx === ruta.length - 1;
  const procesosCompletados = odp.procesos_completados || [];
  const procesoAnterior = procesosCompletados[procesosCompletados.length - 1];
  
  const um = (odp.um || 'kg').toLowerCase();
  const producto = state.productos_pt.find(p => p.codigo === odp.producto_codigo);
  
  // ⭐ ACUMULAR desde las capturas por turno del proceso actual
  const capturasProcActual = (state.capturas_produccion || []).filter(c => 
    c.odp_id === odp.id && c.proceso === ruta[idx]
  );
  
  const totalProducidoKg = capturasProcActual.reduce((s, c) => s + (Number(c.producido_kg) || 0), 0);
  const totalMermasKg = capturasProcActual.reduce((s, c) => s + (Number(c.mermas_kg) || 0), 0);
  
  // Entrada al proceso (kg de referencia para calcular %)
  let entradaKg;
  if (procesoAnterior) {
    entradaKg = Number(procesoAnterior.cantidad_producida_kg) || 
                window.convertirAKg(procesoAnterior.cantidad_producida, um, producto) || 
                Number(procesoAnterior.cantidad_producida) || 0;
  } else {
    entradaKg = Number(odp.cantidad_kg_produccion) || 
                window.convertirAKg(odp.cantidad, um, producto) || 
                Number(odp.cantidad) || 0;
  }
  
  // Mermas acumuladas en kg (de procesos anteriores)
  const mermasAcumAnterioresKg = procesosCompletados.reduce((s, pc) => 
    s + (Number(pc.mermas_kg) || 0), 0);
  
  // Cálculos automáticos
  const totalKg = totalProducidoKg + totalMermasKg;
  const pctProducido = entradaKg > 0 ? (totalProducidoKg / entradaKg * 100) : 0;
  const pctMerma = entradaKg > 0 ? (totalMermasKg / entradaKg * 100) : 0;
  
  // Validaciones según tipo de proceso
  const esExtrusion = ruta[idx] === 'P1-EXT';
  let cuadra = true, colorCuadre = '#16a34a', statusTxt = '', warningTxt = '';
  
  if (totalProducidoKg === 0 && totalMermasKg === 0) {
    cuadra = false;
    colorCuadre = '#94a3b8';
    statusTxt = '⚠ Sin capturas todavía';
    warningTxt = 'Captura al menos un turno antes de cerrar el proceso';
  } else if (esExtrusion) {
    const limiteSuperior = entradaKg * (1 + TOLERANCIAS.EXTRUSION_MAX_PCT);
    const limiteInferior = entradaKg * (1 - TOLERANCIAS.EXTRUSION_MIN_PCT);
    if (totalProducidoKg > limiteSuperior) {
      colorCuadre = '#f59e0b';
      statusTxt = `⚠ Producido excede +${(TOLERANCIAS.EXTRUSION_MAX_PCT*100)}%`;
      warningTxt = `Acumulado supera el máximo recomendado (${fmtNum(limiteSuperior)} kg). Puedes continuar.`;
    } else if (totalProducidoKg < limiteInferior) {
      colorCuadre = '#f59e0b';
      statusTxt = `⚠ Producido bajo el -${(TOLERANCIAS.EXTRUSION_MIN_PCT*100)}%`;
      warningTxt = `Acumulado está bajo el mínimo (${fmtNum(limiteInferior)} kg).`;
    } else {
      colorCuadre = '#16a34a';
      statusTxt = `✓ Dentro del rango (${pctProducido >= 0 ? '+' : ''}${(pctProducido - 100).toFixed(2)}%)`;
    }
  } else {
    // Procesos posteriores: merma máxima 3%
    const mermaMaxKg = entradaKg * TOLERANCIAS.MERMA_MAX_PCT;
    if (totalMermasKg > mermaMaxKg) {
      colorCuadre = '#f59e0b';
      statusTxt = `⚠ Merma > ${(TOLERANCIAS.MERMA_MAX_PCT*100)}%`;
      warningTxt = `Mermas (${fmtNum(totalMermasKg)} kg) exceden el máximo permitido (${fmtNum(mermaMaxKg)} kg = ${(TOLERANCIAS.MERMA_MAX_PCT*100)}% de entrada).`;
    } else {
      colorCuadre = '#16a34a';
      statusTxt = `✓ Mermas dentro de tolerancia (${pctMerma.toFixed(2)}%)`;
    }
  }
  
  // Agrupación de capturas por turno

                <th style="padding:6px;text-align:left;">Tarima</th>
                <th style="padding:6px;text-align:left;">PI</th>
                <th style="padding:6px;text-align:left;">ODP</th>
                <th style="padding:6px;text-align:left;">Lote</th>

    return `<div class="panel" style="padding:40px;text-align:center;color:#94a3b8;">
      <div style="font-size:48px;margin-bottom:12px;">${esTransito ? '🚚' : '📚'}</div>

    </div>`;

  return otis.map(o => {
    const color = o.estatus === 'en_transito' ? '#f59e0b' : (o.estatus === 'recibido' ? '#16a34a' : '#dc2626');
    const numTarimas = (o.tarimas_ids || []).length;
    return `
      <div class="panel" style="margin-bottom:12px;border-left:4px solid ${color};">
        <div style="padding:12px 18px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
          <div style="flex:1;min-width:280px;">
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;">
              <span class="text-mono" style="font-size:14px;font-weight:800;">${o.folio}</span>
              <span style="background:${color}22;color:${color};padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase;">${o.estatus.replace('_',' ')}</span>
              <span style="font-size:11px;color:#64748b;">${o.origen} → ${o.destino}</span>
            </div>
            ${(o.pedidos_folios && o.pedidos_folios.length > 0) ? `
              <div style="font-size:11px;color:#475569;margin-bottom:4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
                <span style="color:#64748b;">📋 PI(s):</span>
                ${o.pedidos_folios.map(pi => `<span class="text-mono" style="background:#dbeafe;color:#1e40af;padding:2px 6px;border-radius:4px;font-weight:700;">${pi}</span>`).join('')}
              </div>
            ` : ''}
            ${(o.clientes_nombres && o.clientes_nombres.length > 0) ? `
              <div style="font-size:11px;color:#475569;margin-bottom:4px;">
                ${ICONS.users} ${o.clientes_nombres.join(' · ')}
              </div>
            ` : ''}
            <div style="font-size:11px;color:#64748b;">
              📅 ${o.created_at ? new Date(o.created_at.seconds*1000).toLocaleString('es-MX') : '-'}
              · 🚛 ${o.transportista || '-'} · ${o.placas || ''}
            </div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:11px;color:#94a3b8;text-transform:uppercase;font-weight:700;">${numTarimas} tarima(s)</div>
            <div style="font-size:16px;font-weight:800;color:${color};">${fmtNum(o.peso_total_kg || 0)} kg</div>

        ${o.estatus === 'en_transito' && (state.user.depto === 'CEDMTY' || state.user.depto === 'CEO' || state.user.rol === 'admin') ? `
          <div style="padding:0 18px 12px;">
            <button class="btn-primary" onclick='abrirRecepcionOTI("${o.id}")' style="padding:8px 14px;background:#16a34a;">${ICONS.check} Recibir en CEDIS-MTY</button>
          </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

window.setSubTabOTI = (tab) => { state.subTabOTI = tab; render(); };
window.otiToggleTarima = (id) => {
  if (!state.formOTI) state.formOTI = { tarimas_seleccionadas: [], transportista: '', conductor: '', placas: '', observaciones: '' };
  const idx = state.formOTI.tarimas_seleccionadas.indexOf(id);
  if (idx >= 0) state.formOTI.tarimas_seleccionadas.splice(idx, 1);
  else state.formOTI.tarimas_seleccionadas.push(id);
  render();
};
window.otiSeleccionarTodos = () => {
  if (!state.formOTI) state.formOTI = { tarimas_seleccionadas: [], transportista: '', conductor: '', placas: '', observaciones: '' };
  const disponibles = state.tarimas.filter(t => t.estatus === 'en_almacen_planta' && (t.almacen_actual === 'PLANTA-MTY' || !t.almacen_actual));
  state.formOTI.tarimas_seleccionadas = disponibles.map(t => t.id);
  render();
};
window.otiDeseleccionarTodos = () => {
  if (state.formOTI) state.formOTI.tarimas_seleccionadas = [];
  render();
};

function renderCedisMTY() {

  // Tarimas en stock CEDIS-MTY (cualquiera que esté en CEDIS-MTY)

    t.estatus === 'en_cedis_mty' || t.almacen_actual === 'CEDIS-MTY'
  );

      <button class="btn-tab ${subTab === 'stock' ? 'active' : ''}" onclick="setSubTabCedis('stock')" style="padding:10px 16px;${subTab==='stock'?'background:#1e40af;color:#fff;':'background:#fff;color:#475569;border:1px solid #e2e8f0;'};border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;">

window.setSubTabCedis = (tab) => { state.subTabCedis = tab; render(); };

// ============================================================
// VISTA: EMBARQUES (Órdenes de Venta) - CS/KAM/CEDMTY/CEDMEX/CEO/ADMIN
// ============================================================
function renderEmbarques() {
  const u = state.user || {};
  const esCEO = u.depto === 'CEO' || u.rol === 'admin' || u.depto === 'ADMIN';
  const esCS = ['CS','KAM'].includes(u.depto) || esCEO;
  const esCEDIS = ['CEDMTY','CEDMEX'].includes(u.depto) || esCEO;
  
  // ⭐ Definir qué tabs ve cada área
  const tabsDisponibles = [];
  const tabsAll = [
    { id: 'esperando_produccion', lbl: '⏳ Esperando producción', color: '#94a3b8', verCS: true, verCEDIS: false },
    { id: 'pendiente_asignar', lbl: '🟡 Por asignar tarimas', color: '#f59e0b', verCS: true, verCEDIS: false },
    { id: 'preparando', lbl: '🔄 Preparando', color: '#8b5cf6', verCS: true, verCEDIS: true },
    { id: 'lista_embarcar', lbl: '✅ Lista embarcar', color: '#16a34a', verCS: true, verCEDIS: true },
    { id: 'por_cargar', lbl: '📦 Por cargar', color: '#3b82f6', verCS: true, verCEDIS: true },
    { id: 'enviada', lbl: '🚚 En camino', color: '#06b6d4', verCS: true, verCEDIS: false },
    { id: 'entregada', lbl: '🏁 Entregadas', color: '#15803d', verCS: true, verCEDIS: false },
  ];
  
  tabsAll.forEach(t => {
    if (esCEO) tabsDisponibles.push(t);
    else if (esCS && t.verCS) tabsDisponibles.push(t);
    else if (esCEDIS && t.verCEDIS) tabsDisponibles.push(t);
  });
  
  // Tab default según área
  let subTabDefault = 'pendiente_asignar';
  if (esCEDIS && !esCS) subTabDefault = 'preparando';
  const subTab = state.subTabEmbarques || subTabDefault;
  
  // Verificar que el tab seleccionado esté disponible para este usuario
  if (!tabsDisponibles.find(t => t.id === subTab)) {
    state.subTabEmbarques = tabsDisponibles[0]?.id || 'pendiente_asignar';
    return renderEmbarques();
  }
  
  const filtro = (state.filtros.embarques || '').toLowerCase();
  
  // 🔄 AUTO-SINCRONIZAR OVs en esperando_produccion (silencioso, sin confirm)
  if (!state._yaIntentoSincOVs) {
    state._yaIntentoSincOVs = true;
    setTimeout(() => window.autoSincronizarOVsEsperando(), 500);
  }
  
  let arr = state.ordenes_venta || [];
  
  // ⭐ FILTRO POR ÁREA: si es solo CEDIS, no muestra ni esperando_produccion ni entregadas
  if (esCEDIS && !esCS && !esCEO) {
    arr = arr.filter(o => ['preparando','lista_embarcar','por_cargar'].includes(o.estatus));
  }
  
  if (filtro) arr = arr.filter(o => 
    (o.folio + ' ' + o.pedido_folio + ' ' + o.cliente_nombre + ' ' + o.cliente_codigo + ' ' + o.producto_codigo + ' ' + (o.remision || '') + ' ' + (o.factura || ''))
    .toLowerCase().includes(filtro)
  );
  
  // OVs legacy (sin estatus nuevo) - normalizar a pendiente_asignar
  const ovsLegacy = arr.filter(o => 
    o.estatus === 'pendiente' || 
    !['esperando_produccion','pendiente_asignar','preparando','lista_embarcar','por_cargar','enviada','entregada','cancelada'].includes(o.estatus)
  );
  
  // Contadores
  const cnt = {
    pendiente_asignar: arr.filter(o => o.estatus === 'pendiente_asignar' || o.estatus === 'pendiente').length,
    esperando_produccion: arr.filter(o => o.estatus === 'esperando_produccion').length,
    preparando: arr.filter(o => o.estatus === 'preparando').length,
    lista_embarcar: arr.filter(o => o.estatus === 'lista_embarcar').length,
    por_cargar: arr.filter(o => o.estatus === 'por_cargar').length,
    enviada: arr.filter(o => o.estatus === 'enviada').length,
    entregada: arr.filter(o => o.estatus === 'entregada').length,
  };
  
  // Filtrado por tab incluyendo legacy
  let filtered;
  if (subTab === 'pendiente_asignar') {
    filtered = arr.filter(o => o.estatus === 'pendiente_asignar' || o.estatus === 'pendiente');
  } else {
    filtered = arr.filter(o => o.estatus === subTab);
  }
  
  return `
    <!-- ROL DEL USUARIO -->
    <div style="padding:10px 14px;background:${esCEDIS && !esCS ? '#eff6ff' : '#fef3c7'};border:1px solid ${esCEDIS && !esCS ? '#3b82f6' : '#f59e0b'};border-radius:10px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <div style="font-size:12px;color:#475569;">
        <strong style="color:${esCEDIS && !esCS ? '#1e40af' : '#92400e'};">${esCEO ? '👑 CEO/ADMIN' : esCEDIS && !esCS ? '📦 CEDIS' : esCS ? '👥 CS / KAM' : '👁️ Lectura'}:</strong>
        ${esCEO ? 'Ves toda la operación de embarques' : 
          esCEDIS && !esCS ? 'Ves OVs en tu área de trabajo (Preparando, Lista embarcar, Por cargar). Las OVs en camino y entregadas son responsabilidad de CS.' :
          esCS ? 'Coordinas asignaciones, remisiones y confirmas entregas. CEDIS prepara y carga físicamente.' : 'Solo lectura'}
      </div>
    </div>
    
    <!-- Búsqueda -->
    <div style="padding:14px;background:#fff;border:2px solid #3b82f6;border-radius:14px;margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:20px;">🔍</span>
        <input class="input" id="filtro-embarques" style="flex:1;padding:10px;font-size:14px;font-weight:600;" placeholder="Buscar OV-XXXXX, PI-XXXXX, cliente, remisión, factura..." value="${filtro}" autocomplete="off" />
      </div>
    </div>
    
    ${esCEO && ovsLegacy.length > 0 ? `
      <div style="padding:12px 14px;background:#fef3c7;border:1px solid #fcd34d;border-radius:10px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <div>
          <div style="font-weight:700;color:#92400e;font-size:13px;">⚠️ ${ovsLegacy.length} OV(s) con estatus legacy</div>
          <div style="font-size:11px;color:#475569;margin-top:2px;">Estas OVs se generaron antes del módulo Embarques. Migrarlas las hace aparecer en "Por asignar tarimas".</div>
        </div>
        <button onclick="migrarOVsLegacy()" style="padding:8px 14px;background:#f59e0b;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;">🔧 Migrar OVs legacy</button>
      </div>
    ` : ''}
    
    ${(() => {
      // Detectar OVs esperando_produccion que YA tienen material disponible (solo CS y CEO)
      if (!esCS && !esCEO) return '';
      const ovsActivables = (state.ordenes_venta || []).filter(ov => {
        if (ov.estatus !== 'esperando_produccion') return false;
        const tarimasDelPI = (state.tarimas || []).filter(t => {
          const mismoProducto = t.producto_codigo === ov.producto_codigo;
          const mismoPI = t.pedido_id === ov.pedido_id || t.pedido_folio === ov.pedido_folio;
          const mismoCliente = t.cliente_codigo === ov.cliente_codigo;
          const enAlmacen = ['en_almacen_planta','en_cedis_mty','en_cedis_mex','en_transito_cedis_mty','en_transito_cedis_mex'].includes(t.estatus);
          const sinOV = !t.ov_id && !t.ov_folio;
          return mismoProducto && (mismoPI || mismoCliente) && enAlmacen && sinOV;
        });
        return tarimasDelPI.length > 0;
      });
      if (ovsActivables.length === 0) return '';
      return `
        <div style="padding:12px 14px;background:#dcfce7;border:1px solid #86efac;border-radius:10px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
          <div>
            <div style="font-weight:700;color:#166534;font-size:13px;">🟢 ${ovsActivables.length} OV(s) listas para activarse</div>
            <div style="font-size:11px;color:#475569;margin-top:2px;">Estas OVs están en "Esperando producción" pero su material ya está disponible.</div>
          </div>
          <button onclick="sincronizarOVsEsperando()" style="padding:8px 14px;background:#16a34a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;">🟢 Activar ${ovsActivables.length} OV(s)</button>
        </div>
      `;
    })()}
    
    <!-- Tabs (solo los que ve el usuario) -->
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;">
      ${tabsDisponibles.map(t => `
        <button onclick="setSubTabEmbarques('${t.id}')" style="padding:8px 14px;background:${subTab === t.id ? t.color : '#fff'};color:${subTab === t.id ? '#fff' : '#475569'};border:1px solid ${subTab === t.id ? t.color : '#e2e8f0'};border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;">
          ${t.lbl} (${cnt[t.id] || 0})
        </button>
      `).join('')}
    </div>
    
    <!-- Lista OVs -->
    ${filtered.length === 0 ? `
      <div style="padding:60px;text-align:center;color:#94a3b8;background:#fff;border-radius:14px;border:1px solid #e2e8f0;">
        <div style="font-size:48px;margin-bottom:12px;">📭</div>
        <div style="font-weight:700;color:#475569;">Sin órdenes de venta en este estado</div>
      </div>
    ` : filtered.map(o => renderTarjetaOV(o, subTab)).join('')}
  `;
}

function renderTarjetaOV(o, subTab) {
  const tarimas = state.tarimas.filter(t => (o.tarimas_ids || []).includes(t.id));
  const totalEnviado = tarimas.reduce((s, t) => s + (Number(t.cantidad) || 0), 0);
  const totalKgEnviado = tarimas.reduce((s, t) => s + (Number(t.peso_neto_kg || t.peso_neto) || 0), 0);
  const cantSolicitada = Number(o.cantidad_solicitada || o.cantidad) || 0;
  const pendiente = Math.max(0, cantSolicitada - totalEnviado);
  const pct = cantSolicitada > 0 ? Math.min(100, Math.round((totalEnviado / cantSolicitada) * 100)) : 0;
  
  const colorEst = {
    esperando_produccion: '#94a3b8',
    pendiente_asignar: '#f59e0b',
    preparando: '#8b5cf6',
    lista_embarcar: '#16a34a',
    por_cargar: '#3b82f6',
    enviada: '#06b6d4',
    entregada: '#15803d',
  }[o.estatus] || '#64748b';
  
  // Permisos
  const u = state.user;
  const esCEO = u.depto === 'CEO' || u.rol === 'admin';
  const esCS = u.depto === 'CS' || u.depto === 'KAM' || esCEO;
  const esCEDIS = ['CEDMTY','CEDMEX'].includes(u.depto) || esCEO;
  
  // Acciones según estado
  let acciones = '';
  if (o.estatus === 'pendiente_asignar' && esCS) {
    acciones += `<button class="btn-primary" onclick="abrirAsignarTarimasOV('${o.id}')" style="padding:8px 14px;background:#f59e0b;">📋 Asignar tarimas</button>`;
  }
  if (o.estatus === 'preparando' && esCEDIS) {
    acciones += `<button class="btn-primary" onclick="marcarOVLista('${o.id}')" style="padding:8px 14px;background:#16a34a;">${ICONS.check} Marcar como LISTA</button>`;
  }
  if (o.estatus === 'lista_embarcar' && esCS) {
    acciones += `<button class="btn-primary" onclick="abrirModal('generar-remision-ov','${o.id}')" style="padding:8px 14px;background:#3b82f6;">📄 Generar remisión/factura</button>`;
  }
  if (o.estatus === 'por_cargar' && esCEDIS) {
    acciones += `<button class="btn-primary" onclick="confirmarCargaOV('${o.id}')" style="padding:8px 14px;background:#06b6d4;">🚚 Confirmar carga y enviar</button>`;
  }
  if (o.estatus === 'enviada' && (esCS || esCEO)) {
    acciones += `<button class="btn-primary" onclick="marcarOVEntregada('${o.id}')" style="padding:8px 14px;background:#15803d;">✅ Marcar entregada</button>`;
  }
  
  // Botones PDF (disponibles desde que se genera remisión en adelante)
  if (['por_cargar','enviada','entregada'].includes(o.estatus) || o.remision) {
    acciones += `<button onclick="imprimirRemisionPDF('${o.id}')" style="padding:8px 14px;background:#fff;color:#1e40af;border:1px solid #1e40af;border-radius:6px;cursor:pointer;font-weight:700;font-size:12px;">📄 Imprimir Remisión</button>`;
    acciones += `<button onclick="imprimirListaCargaPDF('${o.id}')" style="padding:8px 14px;background:#fff;color:#f59e0b;border:1px solid #f59e0b;border-radius:6px;cursor:pointer;font-weight:700;font-size:12px;">📋 Imprimir Lista de Carga</button>`;
  } else if (o.estatus === 'lista_embarcar' && (o.tarimas_ids || []).length > 0) {
    // Aún sin remisión pero ya con tarimas asignadas: solo lista de carga (preparación CEDIS)
    acciones += `<button onclick="imprimirListaCargaPDF('${o.id}')" style="padding:8px 14px;background:#fff;color:#f59e0b;border:1px solid #f59e0b;border-radius:6px;cursor:pointer;font-weight:700;font-size:12px;">📋 Lista de Carga (preparación)</button>`;
  }
  
  acciones += `<button class="btn-secondary" onclick="abrirModal('detalle-ov','${o.id}')" style="padding:8px 14px;margin-left:auto;">${ICONS.list} Ver detalle</button>`;
  
  return `
    <div class="panel" style="border-left:4px solid ${colorEst};margin-bottom:14px;">
      <div style="padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
        <div style="flex:1;min-width:280px;">

// VISTA: STOCK POR PRODUCTO EN CEDIS (CS/KAM/CEDMTY/CEDMEX/ALP/CEO)
// ============================================================
function renderStockProducto() {
  const filtro = (state.filtros.stock_producto || '').toLowerCase();
  const filtroCli = state.filtros.stock_producto_cliente || '';
  const filtroAlm = state.filtros.stock_producto_almacen || '';
  
  // Tarimas en stock (cualquier almacén con material)
  let tarimasStock = state.tarimas.filter(t => 
    ['en_almacen_planta','en_cedis_mty','en_cedis_mex','en_transito_cedis_mty','en_transito_cedis_mex'].includes(t.estatus)
  );
  
  // Aplicar filtros
  if (filtroCli) tarimasStock = tarimasStock.filter(t => t.cliente_codigo === filtroCli);
  if (filtroAlm) {
    tarimasStock = tarimasStock.filter(t => {
      const almReal = t.almacen_actual || (t.estatus === 'en_almacen_planta' ? 'PLANTA-MTY' : '');
      return almReal === filtroAlm;
    });
  }
  
  // Agrupar por producto + cliente (clave única)
  const agrupado = {};
  tarimasStock.forEach(t => {
    const key = `${t.producto_codigo}|${t.cliente_codigo}`;
    if (!agrupado[key]) {
      agrupado[key] = {
        producto_codigo: t.producto_codigo,
        descripcion: t.descripcion || '',
        cliente_codigo: t.cliente_codigo,
        cliente_nombre: t.cliente_nombre,
        um: t.um,
        tarimas: [],
        pedidos: new Set()
      };
    }
    agrupado[key].tarimas.push(t);
    if (t.pedido_folio) agrupado[key].pedidos.add(t.pedido_folio);
  });
  
  // Filtrar por búsqueda libre
  let productos = Object.values(agrupado);
  if (filtro) {
    productos = productos.filter(p => 
      (p.producto_codigo + ' ' + p.descripcion + ' ' + p.cliente_nombre + ' ' + p.cliente_codigo + ' ' + Array.from(p.pedidos).join(' '))
      .toLowerCase().includes(filtro)
    );
  }
  
  // Ordenar por cliente y producto
  productos.sort((a, b) => {
    const cmpCli = (a.cliente_nombre || '').localeCompare(b.cliente_nombre || '');
    if (cmpCli !== 0) return cmpCli;
    return (a.producto_codigo || '').localeCompare(b.producto_codigo || '');
  });
  
  // Stats agregados
  const totalTarimas = tarimasStock.length;
  const totalKg = tarimasStock.reduce((s, t) => s + (Number(t.peso_neto_kg || t.peso_neto) || 0), 0);
  const clientesUnicos = new Set(tarimasStock.map(t => t.cliente_codigo)).size;
  const productosUnicos = productos.length;
  
  // Lista de clientes con stock
  const clientesConStock = [...new Set(tarimasStock.map(t => t.cliente_codigo).filter(Boolean))]
    .map(cod => state.clientes.find(c => c.codigo === cod))
    .filter(Boolean)
    .sort((a, b) => a.nombre.localeCompare(b.nombre));
  
  return `
    <!-- Búsqueda y filtros -->
    <div style="padding:14px;background:#fff;border:2px solid #3b82f6;border-radius:14px;margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <span style="font-size:20px;">🔍</span>
        <input class="input" id="filtro-stock-producto" style="flex:1;padding:10px;font-size:14px;font-weight:600;" placeholder="Buscar código, descripción, cliente, PI..." value="${filtro}" autocomplete="off" />
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <select class="input" id="filtro-stock-producto-cliente" style="max-width:280px;font-size:13px;">
          <option value="">📋 Todos los clientes (${clientesConStock.length})</option>
          ${clientesConStock.map(c => `<option value="${c.codigo}" ${filtroCli === c.codigo ? 'selected' : ''}>${c.codigo} - ${c.nombre}</option>`).join('')}
        </select>
        <select class="input" id="filtro-stock-producto-almacen" style="max-width:200px;font-size:13px;">
          <option value="">🏭 Todos los almacenes</option>
          <option value="PLANTA-MTY" ${filtroAlm === 'PLANTA-MTY' ? 'selected' : ''}>🏭 Planta-MTY</option>
          <option value="CEDIS-MTY" ${filtroAlm === 'CEDIS-MTY' ? 'selected' : ''}>📦 CEDIS-MTY</option>
          <option value="CEDIS-MEX" ${filtroAlm === 'CEDIS-MEX' ? 'selected' : ''}>🇲🇽 CEDIS-MEX</option>
          <option value="EN_TRANSITO" ${filtroAlm === 'EN_TRANSITO' ? 'selected' : ''}>🚚 En tránsito</option>
        </select>
        <span style="font-size:13px;color:#64748b;font-weight:600;margin-left:auto;">📊 ${productosUnicos} producto(s) · ${totalTarimas} tarima(s)</span>
      </div>
    </div>
    
    <!-- Stats -->
    <div class="grid-stats" style="margin-bottom:14px;">
      <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-value">${productosUnicos}</div><div class="stat-label">Productos en stock</div></div>
      <div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-value">${totalTarimas}</div><div class="stat-label">Tarimas totales</div></div>
      <div class="stat-card"><div class="stat-icon">⚖️</div><div class="stat-value">${fmtNum(totalKg)}</div><div class="stat-label">Kg en stock</div></div>
      <div class="stat-card"><div class="stat-icon">${ICONS.users}</div><div class="stat-value">${clientesUnicos}</div><div class="stat-label">Clientes</div></div>
    </div>
    
    ${productos.length === 0 ? `
      <div style="padding:60px;text-align:center;color:#94a3b8;background:#fff;border-radius:14px;border:1px solid #e2e8f0;">
        <div style="font-size:48px;margin-bottom:12px;">📭</div>
        <div style="font-weight:700;color:#475569;">Sin stock disponible</div>
        <div style="font-size:12px;margin-top:6px;">No hay productos con tarimas en almacenes con los filtros actuales.</div>
      </div>
    ` : productos.map(renderTarjetaStockProducto).join('')}
  `;
}

function renderTarjetaStockProducto(p) {
  // Subdivision por almacén
  const planta = p.tarimas.filter(t => t.estatus === 'en_almacen_planta');
  const transitoMTY = p.tarimas.filter(t => t.estatus === 'en_transito_cedis_mty');
  const cedisMTY = p.tarimas.filter(t => t.estatus === 'en_cedis_mty');
  const transitoMEX = p.tarimas.filter(t => t.estatus === 'en_transito_cedis_mex');
  const cedisMEX = p.tarimas.filter(t => t.estatus === 'en_cedis_mex');
  
  // Disponible vs asignada a OV
  const asignadasOV = p.tarimas.filter(t => t.ov_id || t.ov_folio);
  const disponibles = p.tarimas.filter(t => !t.ov_id && !t.ov_folio);
  
  const totalCant = p.tarimas.reduce((s, t) => s + (Number(t.cantidad) || 0), 0);
  const totalKg = p.tarimas.reduce((s, t) => s + (Number(t.peso_neto_kg || t.peso_neto) || 0), 0);
  const cantDisp = disponibles.reduce((s, t) => s + (Number(t.cantidad) || 0), 0);
  const cantAsig = asignadasOV.reduce((s, t) => s + (Number(t.cantidad) || 0), 0);
  
  // Color según disponibilidad
  const pctDisp = totalCant > 0 ? Math.round((cantDisp / totalCant) * 100) : 0;
  const colorBorder = pctDisp > 50 ? '#16a34a' : (pctDisp > 0 ? '#f59e0b' : '#dc2626');
  
  return `
    <div class="panel" style="border-left:4px solid ${colorBorder};margin-bottom:12px;">
      <!-- HEADER: Producto + Cliente -->

          <div class="text-mono" style="font-size:14px;font-weight:800;color:#1e293b;">${p.producto_codigo}</div>
          ${p.descripcion ? `<div style="font-size:12px;color:#475569;margin-top:2px;">${p.descripcion}</div>` : ''}
          <div style="font-size:12px;color:#64748b;margin-top:6px;">
            ${ICONS.users} <strong>${p.cliente_nombre}</strong> <span style="color:#94a3b8;">(${p.cliente_codigo})</span>
          </div>
          ${p.pedidos.size > 0 ? `
            <div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap;">
              <span style="font-size:10px;color:#64748b;">Origen:</span>
              ${Array.from(p.pedidos).map(pi => `<span class="text-mono" style="background:#dbeafe;color:#1e40af;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;">${pi}</span>`).join('')}
            </div>
          ` : ''}
        </div>
        <div style="text-align:right;">
          <div style="font-size:11px;color:#64748b;text-transform:uppercase;font-weight:700;">Stock total</div>
          <div style="font-size:22px;font-weight:800;color:${colorBorder};">${fmtCantidadUM(totalCant, p.um)}</div>
          <div style="font-size:11px;color:#64748b;">${p.tarimas.length} tarima(s) · ${fmtNum(totalKg)} kg</div>
        </div>
      </div>
      
      <!-- DESGLOSE POR ALMACÉN -->
      <div style="padding:12px 18px;border-top:1px solid #e2e8f0;display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:8px;">
        ${planta.length > 0 ? `
          <div style="padding:8px 10px;background:#e0e7ff;border-radius:8px;text-align:center;">
            <div style="font-size:10px;color:#4338ca;font-weight:700;">🏭 PLANTA-MTY</div>
            <div style="font-size:16px;font-weight:800;color:#4338ca;">${fmtCantidadUM(planta.reduce((s,t)=>s+(Number(t.cantidad)||0),0), p.um)}</div>
            <div style="font-size:10px;color:#64748b;">${planta.length} tar · ${fmtNum(planta.reduce((s,t)=>s+(Number(t.peso_neto_kg||t.peso_neto)||0),0))} kg</div>
          </div>
        ` : ''}
        ${transitoMTY.length > 0 ? `
          <div style="padding:8px 10px;background:#fde68a;border-radius:8px;text-align:center;">
            <div style="font-size:10px;color:#92400e;font-weight:700;">🚚 → CEDIS-MTY</div>
            <div style="font-size:16px;font-weight:800;color:#92400e;">${fmtCantidadUM(transitoMTY.reduce((s,t)=>s+(Number(t.cantidad)||0),0), p.um)}</div>
            <div style="font-size:10px;color:#64748b;">${transitoMTY.length} tar · ${fmtNum(transitoMTY.reduce((s,t)=>s+(Number(t.peso_neto_kg||t.peso_neto)||0),0))} kg</div>
          </div>

        ${cedisMTY.length > 0 ? `

            <div style="font-size:10px;color:#64748b;">${cedisMTY.length} tar · ${fmtNum(cedisMTY.reduce((s,t)=>s+(Number(t.peso_neto_kg||t.peso_neto)||0),0))} kg</div>
          </div>
        ` : ''}
        ${transitoMEX.length > 0 ? `

        ${cedisMEX.length > 0 ? `

            <div style="font-size:10px;color:#64748b;">${cedisMEX.length} tar · ${fmtNum(cedisMEX.reduce((s,t)=>s+(Number(t.peso_neto_kg||t.peso_neto)||0),0))} kg</div>

      <!-- DISPONIBLE vs ASIGNADO -->

          <div style="font-size:10px;color:#16a34a;font-weight:700;text-transform:uppercase;">✓ Disponible para OV</div>

      <!-- DETALLE TARIMAS (colapsable) -->
      ${state.stockDetalleAbierto && state.stockDetalleAbierto[`${p.producto_codigo}|${p.cliente_codigo}`] ? `
        <div style="padding:10px 18px;border-top:1px solid #e2e8f0;background:#fff;">
          <table style="width:100%;font-size:11px;border-collapse:collapse;">
            <thead>
              <tr style="background:#f1f5f9;">

window.toggleDetalleStock = (key) => {
  if (!state.stockDetalleAbierto) state.stockDetalleAbierto = {};
  state.stockDetalleAbierto[key] = !state.stockDetalleAbierto[key];
  render();
};

// VISTA: MÁQUINAS DE PRODUCCIÓN (CRUD)

function renderMaquinas() {
  const u = state.user || {};
  const puedeEditar = ['PLN','CEO','ADMIN'].includes(u.depto) || u.rol === 'admin';
  const filtro = (state.filtros.maquinas || '').toLowerCase();
  
  let maquinas = state.maquinas || [];
  if (filtro) maquinas = maquinas.filter(m => 
    (m.codigo + ' ' + (m.nombre||'') + ' ' + (m.proceso_codigo||'')).toLowerCase().includes(filtro)
  );
  
  // Agrupar por proceso
  const porProceso = {};
  maquinas.forEach(m => {
    const k = m.proceso_codigo || 'sin_proceso';
    if (!porProceso[k]) porProceso[k] = [];
    porProceso[k].push(m);
  });
  
  // Ordenar
  Object.keys(porProceso).forEach(k => {
    porProceso[k].sort((a, b) => (a.codigo || '').localeCompare(b.codigo || ''));
  });
  
  const sinCargar = (state.maquinas || []).length === 0;
  
  // Detectar máquinas con códigos antiguos
  const CODIGOS_ANTIGUOS = ['E01', 'E02', 'E03', 'BR1500', 'GLOW', 'SANTO', 'VENTA', 'G4', 'SB', 'FOAM'];
  const tieneCodAntiguos = (state.maquinas || []).some(m => CODIGOS_ANTIGUOS.includes(m.codigo));
  
  return `

window.actualizarCodigosMaquinas = async () => {
  if (!confirm('⚠️ ¿Reemplazar máquinas con códigos antiguos por los nuevos?\n\nSe ELIMINARÁN las máquinas con códigos: E01, E02, E03, BR1500, GLOW, SANTO, VENTA, G4, SB, FOAM\n\nSe CREARÁN las nuevas: COEX01-03, BS01-2000, BS02-1400, BS03-600, BS04-FOAM, BR01-900, BR02-1400, BR03-1500, DESDO, PELET01\n\nLas ODPs ya programadas seguirán mostrando el código que tenían.\n\n¿Continuar?')) return;
  
  const CODIGOS_ANTIGUOS = ['E01', 'E02', 'E03', 'BR1500', 'GLOW', 'SANTO', 'VENTA', 'G4', 'SB', 'FOAM'];
  
  state.loadingAccion = true; render();
  try {
    const batch = writeBatch(db);
    
    // 1. Eliminar antiguas
    const antiguas = (state.maquinas || []).filter(m => CODIGOS_ANTIGUOS.includes(m.codigo));
    antiguas.forEach(m => batch.delete(doc(db, 'maquinas', m.id)));
    
    // 2. Crear nuevas (sin duplicar si ya existen)
    const codigosExistentes = new Set((state.maquinas || []).filter(m => !CODIGOS_ANTIGUOS.includes(m.codigo)).map(m => m.codigo));
    
    const MAQS_NUEVAS = [
      { codigo: 'COEX01', nombre: 'Coextrusora 01', nombre_anterior: 'E01', proceso_codigo: 'P1-EXT', capacidad_kg_hr: 62 },
      { codigo: 'COEX02', nombre: 'Coextrusora 02', nombre_anterior: 'E02', proceso_codigo: 'P1-EXT', capacidad_kg_hr: 58 },
      { codigo: 'COEX03', nombre: 'Coextrusora 03', nombre_anterior: 'E03', proceso_codigo: 'P1-EXT', capacidad_kg_hr: 153 },
      { codigo: 'BS01-2000', nombre: 'Bolsa Suelta 2000', nombre_anterior: 'BS01-2000', proceso_codigo: 'P3-BS', capacidad_kg_hr: 0 },
      { codigo: 'BS02-1400', nombre: 'Bolsa Suelta 1400', nombre_anterior: 'BS02-1400', proceso_codigo: 'P3-BS', capacidad_kg_hr: 0 },
      { codigo: 'BS03-600', nombre: 'Bolsa Suelta 600', nombre_anterior: 'SANTO', proceso_codigo: 'P3-BS', capacidad_kg_hr: 0 },
      { codigo: 'BS04-FOAM', nombre: 'Bolsa Suelta FOAM', nombre_anterior: 'FOAM', proceso_codigo: 'P3-BS', capacidad_kg_hr: 0 },
      { codigo: 'BR01-900', nombre: 'Bolsa en Rollo 900', nombre_anterior: 'G4', proceso_codigo: 'P4-BR', capacidad_kg_hr: 0 },
      { codigo: 'BR02-1400', nombre: 'Bolsa en Rollo 1400', nombre_anterior: 'GLOW', proceso_codigo: 'P4-BR', capacidad_kg_hr: 0 },
      { codigo: 'BR03-1500', nombre: 'Bolsa en Rollo 1500', nombre_anterior: 'BR1500', proceso_codigo: 'P4-BR', capacidad_kg_hr: 0 },
      { codigo: 'DESDO', nombre: 'Desdobladora', nombre_anterior: 'DESDOBLADORA', proceso_codigo: 'P6-REF', capacidad_kg_hr: 0 },
      { codigo: 'PELET01', nombre: 'Peletizadora 01', nombre_anterior: 'Peletizadora1', proceso_codigo: 'P5-PEL', capacidad_kg_hr: 0 }
    ];
    
    let creadas = 0;
    MAQS_NUEVAS.forEach(m => {
      if (!codigosExistentes.has(m.codigo)) {
        const ref = doc(collection(db, 'maquinas'));
        batch.set(ref, {
          ...m,
          activa: true,
          observaciones: m.nombre_anterior && m.nombre_anterior !== m.codigo ? `Código anterior: ${m.nombre_anterior}` : '',
          created_at: serverTimestamp(),
          updated_at: serverTimestamp()
        });
        creadas++;
      }
    });
    
    await batch.commit();
    toast(`✅ ${antiguas.length} máquinas eliminadas y ${creadas} máquinas nuevas creadas`);
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

    </div>

window.confirmarMaquina = async (id) => {
  const codigo = ($('#maq-codigo')?.value || '').trim().toUpperCase();
  const nombre = ($('#maq-nombre')?.value || '').trim();
  const proceso = ($('#maq-proceso')?.value || '').trim();
  const cap = Number($('#maq-cap')?.value) || 0;
  const obs = ($('#maq-obs')?.value || '').trim();
  
  if (!codigo) { toast('Código de máquina obligatorio', 'error'); return; }
  if (!proceso) { toast('Selecciona el proceso', 'error'); return; }
  
  // Validar código único
  if (!id) {
    const existe = (state.maquinas || []).find(m => m.codigo === codigo);
    if (existe) { toast(`Ya existe una máquina con código ${codigo}`, 'error'); return; }
  }
  
  state.loadingAccion = true; render();
  try {
    const data = {
      codigo,
      nombre,
      proceso_codigo: proceso,
      capacidad_kg_hr: cap,
      observaciones: obs,
      updated_at: serverTimestamp()
    };
    if (id) {
      await updateDoc(doc(db, 'maquinas', id), data);
      toast(`Máquina ${codigo} actualizada`);
    } else {
      data.activa = true;
      data.created_at = serverTimestamp();
      await addDoc(collection(db, 'maquinas'), data);
      toast(`✅ Máquina ${codigo} creada`);
    }
    cerrarModal();
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

window.togglePersonalActivo = async (tipo, id) => {
  const arr = tipo === 'operadores' ? state.operadores : state.supervisores;
  const p = arr.find(x => x.id === id);
  if (!p) return;
  try {
    await updateDoc(doc(db, tipo, id), {
      activo: !p.activo,
      updated_at: serverTimestamp()
    });
    toast(`${p.nombre} ${!p.activo ? 'activado' : 'desactivado'}`);
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  }
};

function modalPersonal(esEdicion) {
  // state.modalData format: "operadores:id" o "supervisores" (creando)
  const data = state.modalData || 'operadores';
  let tipo, id, p;
  if (esEdicion) {
    [tipo, id] = data.split(':');
    p = (tipo === 'operadores' ? state.operadores : state.supervisores).find(x => x.id === id);
    if (!p) return '';
  } else {
    tipo = data;
  }
  
  if (!state.modalForm) {
    state.modalForm = p ? { ...p } : { nombre: '', grupo: '', puesto: '', activo: true };
  }
  const f = state.modalForm;
  const tituloTipo = tipo === 'operadores' ? 'operador' : 'supervisor';
  
  return `
    <div class="modal-bg" onclick="if(event.target===this)cerrarModal()">
      <div class="modal" style="max-width:520px;">
        <div class="modal-header">
          <h2 style="font-size:18px;font-weight:800;">${esEdicion ? '✏️ Editar' : '➕ Nuevo'} ${tituloTipo}</h2>
          <button class="icon-btn" onclick="cerrarModal()">${ICONS.x}</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label class="field-label">Nombre completo *</label>

          </div>
          <div class="field">
            <label class="field-label">Grupo (turno rotativo) *</label>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              ${TURNOS.map(t => `
                <button onclick="seleccionarGrupo('${t.codigo}')" style="padding:10px 18px;border:2px solid ${f.grupo === t.codigo ? t.color : '#cbd5e1'};background:${f.grupo === t.codigo ? t.color : '#fff'};color:${f.grupo === t.codigo ? '#fff' : t.color};border-radius:8px;font-weight:800;font-size:14px;cursor:pointer;">
                  ${t.codigo}
                </button>
              `).join('')}
            </div>
            <div style="font-size:10px;color:#94a3b8;margin-top:6px;">Los 4 grupos rotan en turnos de día (7AM-7PM) y noche (7PM-7AM)</div>
          </div>
          <div class="field">
            <label class="field-label">Puesto / función <span style="font-weight:400;color:#94a3b8;">(opcional)</span></label>
            <input class="input" id="per-puesto" value="${f.puesto || ''}" placeholder="${tipo === 'operadores' ? 'Operador de extrusora, etc.' : 'Supervisor de planta, etc.'}" />
          </div>
        </div>
        <div style="padding:16px 22px;border-top:1px solid #e2e8f0;display:flex;gap:10px;justify-content:flex-end;">
          <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
          <button class="btn-primary" onclick="confirmarPersonal('${tipo}',${esEdicion ? `'${id}'` : 'null'})">${ICONS.check} ${esEdicion ? 'Guardar' : 'Crear'}</button>
        </div>
      </div>
    </div>
  `;
}

window.seleccionarGrupo = (g) => {
  if (!state.modalForm) state.modalForm = {};
  state.modalForm.grupo = g;
  render();
};

window.confirmarPersonal = async (tipo, id) => {
  const nombre = ($('#per-nombre')?.value || '').trim();
  const grupo = state.modalForm?.grupo || '';
  const puesto = ($('#per-puesto')?.value || '').trim();
  
  if (!nombre) { toast('Nombre obligatorio', 'error'); return; }
  if (!grupo) { toast('Selecciona un grupo (A, B, C o D)', 'error'); return; }
  
  state.loadingAccion = true; render();
  try {
    const data = { nombre, grupo, puesto, updated_at: serverTimestamp() };
    if (id) {
      await updateDoc(doc(db, tipo, id), data);
      toast(`${nombre} actualizado`);
    } else {
      data.activo = true;
      data.created_at = serverTimestamp();
      await addDoc(collection(db, tipo), data);
      toast(`✅ ${nombre} agregado al grupo ${grupo}`);
    }
    cerrarModal();
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

window.crearUsuarioNuevo = async () => {
  const nombre = ($('#usr-nombre')?.value || '').trim();
  const email = ($('#usr-email')?.value || '').trim().toLowerCase();
  const telefono = ($('#usr-tel')?.value || '').trim();
  const depto = state.modalForm?.depto || '';
  const ubicacion = state.modalForm?.ubicacion || '';
  const rol = state.modalForm?.rol || 'usuario';
  
  // Validaciones
  if (!nombre) { toast('Nombre obligatorio', 'error'); return; }
  if (!email || !email.includes('@')) { toast('Correo válido obligatorio', 'error'); return; }
  if (!depto) { toast('Selecciona departamento', 'error'); return; }
  if (!ubicacion) { toast('Selecciona ubicación', 'error'); return; }
  
  // Confirmar acción
  const confirma = confirm(
    `¿Crear cuenta para ${nombre}?\n\n` +
    `📧 Email: ${email}\n` +
    `📍 ${depto} · ${ubicacion}\n` +
    `🔑 Rol: ${rol === 'admin' ? '👑 ADMIN' : '👤 Usuario'}\n\n` +
    `Se le enviará un correo a ${email} con instrucciones para crear su contraseña e iniciar sesión.`
  );
  if (!confirma) return;
  
  state.loadingAccion = true; render();
  
  try {
    // Generar contraseña temporal aleatoria (el usuario nunca la usará, recibirá email para crear la propia)
    const passwordTemporal = 'Temp' + Math.random().toString(36).slice(2, 10) + '!' + Math.floor(Math.random() * 1000);
    
    // 1. Crear cuenta en Firebase Auth usando la app SECUNDARIA
    // (esto NO desconecta al admin actual)
    const { authSecundaria, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut } = window.fb;
    
    let userCredential;
    try {
      userCredential = await createUserWithEmailAndPassword(authSecundaria, email, passwordTemporal);
    } catch (authError) {
      console.error('Error Auth:', authError);
      if (authError.code === 'auth/email-already-in-use') {
        toast('❌ Este correo ya tiene una cuenta registrada', 'error');
      } else if (authError.code === 'auth/invalid-email') {
        toast('❌ Correo inválido', 'error');
      } else {
        toast('Error creando cuenta: ' + authError.message, 'error');
      }
      state.loadingAccion = false; render();
      return;
    }
    
    const nuevoUid = userCredential.user.uid;
    
    // 2. Crear perfil en Firestore con el MISMO UID que Auth
    try {
      await setDoc(doc(db, 'usuarios', nuevoUid), {
        email: email,
        nombre: nombre,
        telefono: telefono,
        depto: depto,
        ubicacion: ubicacion,
        rol: rol,
        activo: true,
        pendiente_activacion: true, // hasta que cree su propia contraseña
        creado_por: state.user.id,
        creado_por_nombre: state.user.nombre || state.user.email,
        created_at: serverTimestamp(),
        updated_at: serverTimestamp()
      });
    } catch (fsError) {
      console.error('Error Firestore:', fsError);
      toast('Error guardando perfil: ' + fsError.message, 'error');
      state.loadingAccion = false; render();
      return;
    }
    
    // 3. Cerrar sesión de la app secundaria (importante para limpiar)
    try {
      await signOut(authSecundaria);
    } catch (e) { console.warn('signOut secundaria:', e); }
    
    // 4. Enviar email de "reset password" — el usuario lo usará para crear su contraseña
    let emailEnviado = false;
    let errorEmail = '';
    try {
      await sendPasswordResetEmail(auth, email);
      emailEnviado = true;
    } catch (resetError) {
      console.error('Error enviar email:', resetError);
      errorEmail = resetError.message || resetError.code;
    }
    
    cerrarModal();
    
    // Mostrar instrucciones detalladas al admin
    setTimeout(() => {
      alert(
        `✅ USUARIO CREADO CORRECTAMENTE\n\n` +
        `👤 ${nombre}\n` +
        `📧 ${email}\n` +
        `📍 ${depto} · ${ubicacion}\n\n` +
        `${emailEnviado 
          ? `✉️ EMAIL DE ACTIVACIÓN ENVIADO\n\n` +
            `Pídele al usuario que:\n` +
            `1. Revise su correo (también SPAM/No deseado)\n` +
            `2. Click en "Restablecer contraseña"\n` +
            `3. Cree su nueva contraseña\n` +
            `4. Inicie sesión en NewPack ERP con su correo\n\n` +
            `Si NO llega el correo en 5 minutos:\n` +
            `• Revisa carpeta SPAM\n` +
            `• Click "🔑 Reenviar" en su tarjeta\n` +
            `• Verifica plantillas en Firebase Console`
          : `⚠️ EMAIL NO SE PUDO ENVIAR\n\n` +
            `Error: ${errorEmail}\n\n` +
            `OPCIONES:\n` +
            `1. Click "🔑 Reenviar" en su tarjeta para intentar de nuevo\n` +
            `2. Avisa al usuario que use "Olvidé mi contraseña" en login\n` +
            `3. Verifica en Firebase Console que la plantilla de email esté activa`
        }`
      );
    }, 100);
    
  } catch (e) {
    console.error('Error crear usuario:', e);
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

// COLORES CORPORATIVOS (RGB para jsPDF)
const _COL_VERDE = [63, 211, 75];     // #3fd34b
const _COL_AZUL  = [56, 182, 255];    // #38b6ff
const _COL_AZUL_OSCURO = [14, 116, 165]; // azul más oscuro para textos
const _COL_GRIS_TEXTO = [55, 65, 81];
const _COL_GRIS_CLARO = [243, 244, 246];
const _COL_GRIS_MEDIO = [156, 163, 175];

// Helper: Rectángulo con sombra
function _pdfRectSombra(doc, x, y, w, h, fillRgb) {
  // Sombra suave
  doc.setFillColor(220, 220, 220);
  doc.roundedRect(x + 0.4, y + 0.4, w, h, 1.5, 1.5, 'F');
  // Rectángulo principal
  doc.setFillColor(fillRgb[0], fillRgb[1], fillRgb[2]);
  doc.roundedRect(x, y, w, h, 1.5, 1.5, 'F');
}

// Header corporativo elegante
function _pdfHeaderEmpresa(doc, tituloDoc, folioDoc) {
  // Banda superior verde gruesa
  doc.setFillColor(_COL_VERDE[0], _COL_VERDE[1], _COL_VERDE[2]);
  doc.rect(0, 0, 210, 4, 'F');
  
  // Banda blanca con datos
  doc.setFillColor(255, 255, 255);
  doc.rect(0, 4, 210, 38, 'F');
  
  // Logo (más grande y visible)
  if (DATOS_EMPRESA.logo_url) {
    try {
      doc.addImage(DATOS_EMPRESA.logo_url, 'JPEG', 12, 8, 42, 26);
    } catch(e) { /* sigue sin logo */ }
  }
  
  // Datos empresa lado derecho del logo
  doc.setTextColor(_COL_GRIS_TEXTO[0], _COL_GRIS_TEXTO[1], _COL_GRIS_TEXTO[2]);
  doc.setFontSize(8.5);
  doc.setFont('helvetica', 'bold');
  doc.text(DATOS_EMPRESA.razon_social, 60, 13);
  
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7.5);
  doc.text(`RFC: ${DATOS_EMPRESA.rfc}`, 60, 18);
  doc.text(`Tel: ${DATOS_EMPRESA.telefono}  ·  ${DATOS_EMPRESA.email}`, 60, 22);
  const dirSplit = doc.splitTextToSize(DATOS_EMPRESA.direccion, 87);
  doc.text(dirSplit, 60, 26);
  
  // Recuadro del documento (esquina derecha) - verde
  _pdfRectSombra(doc, 152, 10, 50, 28, _COL_VERDE);
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7);
  doc.text(tituloDoc.toUpperCase(), 177, 16, { align: 'center' });
  
  doc.setFontSize(15);
  doc.text(folioDoc, 177, 26, { align: 'center' });
  
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7);
  doc.text(new Date().toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' }), 177, 33, { align: 'center' });
  
  // Banda inferior azul delgada (decoración)
  doc.setFillColor(_COL_AZUL[0], _COL_AZUL[1], _COL_AZUL[2]);
  doc.rect(0, 42, 210, 2, 'F');
  
  doc.setTextColor(0, 0, 0);
  return 50; // Y donde sigue
}

// Pie de página
function _pdfPiePagina(doc) {
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    
    // Línea decorativa verde
    doc.setDrawColor(_COL_VERDE[0], _COL_VERDE[1], _COL_VERDE[2]);
    doc.setLineWidth(0.5);
    doc.line(14, 283, 196, 283);
    
    doc.setFontSize(7);
    doc.setTextColor(_COL_GRIS_MEDIO[0], _COL_GRIS_MEDIO[1], _COL_GRIS_MEDIO[2]);
    doc.setFont('helvetica', 'normal');
    doc.text(`Generado: ${new Date().toLocaleString('es-MX')}`, 14, 288);
    doc.setFont('helvetica', 'bold');
    doc.text(`NewPack ERP`, 105, 288, { align: 'center' });
    doc.setFont('helvetica', 'normal');
    doc.text(`Página ${i} de ${pageCount}`, 196, 288, { align: 'right' });
  }
}

// Sección título estilizada
function _pdfSeccionTitulo(doc, y, texto, color) {
  const c = color || _COL_AZUL;
  doc.setFillColor(c[0], c[1], c[2]);
  doc.rect(14, y, 4, 6, 'F');
  doc.setFontSize(10);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(c[0], c[1], c[2]);
  doc.text(texto, 21, y + 4.5);
  doc.setTextColor(0, 0, 0);
  return y + 8;
}

function _mostrarVistaPreviaPDF(docPDF, filename, titulo) {
  // Generar blob URL del PDF
  const blob = docPDF.output('blob');
  const blobUrl = URL.createObjectURL(blob);
  
  // Guardar en state para que el modal lo use
  state.pdfPreview = {
    blobUrl,
    filename,
    titulo,
    docPDF // referencia para descarga
  };
  state.modal = 'pdf-preview';
  render();
}

            <button onclick="imprimirVistaPreviaPDF()" style="padding:9px 16px;background:#3b82f6;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;">🖨️ Imprimir</button>
            <button onclick="descargarVistaPreviaPDF()" style="padding:9px 16px;background:#16a34a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;">📥 Descargar</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

window.cerrarVistaPreviaPDF = () => {
  if (state.pdfPreview && state.pdfPreview.blobUrl) {
    URL.revokeObjectURL(state.pdfPreview.blobUrl);
  }
  state.pdfPreview = null;
  state.modal = null;
  render();
};

window.descargarVistaPreviaPDF = () => {
  const p = state.pdfPreview;
  if (!p || !p.docPDF) return;
  p.docPDF.save(p.filename);
  toast(`📥 Descargado: ${p.filename}`);
};

window.imprimirVistaPreviaPDF = () => {
  const p = state.pdfPreview;
  if (!p || !p.blobUrl) return;
  // Abrir en nueva ventana e imprimir
  const w = window.open(p.blobUrl, '_blank');
  if (w) {
    w.addEventListener('load', () => {
      setTimeout(() => w.print(), 500);
    });
  } else {
    toast('Permite ventanas emergentes para imprimir', 'error');
  }
};

// Helper: dibujar checkbox (cuadrado vacío) en PDF
function _pdfCheckbox(doc, x, y, size) {
  size = size || 3.5;
  doc.setDrawColor(80, 80, 80);
  doc.setLineWidth(0.4);
  doc.setFillColor(255, 255, 255);
  doc.rect(x, y, size, size, 'FD');
}

// Helper: dibujar flecha derecha simple (triángulo)
function _pdfFlechaDerecha(doc, cx, cy, size, color) {
  size = size || 6;
  const c = color || [80, 80, 80];
  doc.setFillColor(c[0], c[1], c[2]);
  // Triángulo apuntando a la derecha
  doc.triangle(cx - size/2, cy - size/2, cx - size/2, cy + size/2, cx + size/2, cy, 'F');
}

window.imprimirPackingListPDF = (odpId) => {
  try {
    const odp = (state.ordenes_produccion || state.odps || []).find(x => x.id === odpId);
    if (!odp) { toast('ODP no encontrada', 'error'); return; }
    if (!window.jspdf) { toast('jsPDF no cargó. Refresca la página.', 'error'); return; }
  
  // Buscar PI, producto, packing list y tarimas (con fallbacks)
  const pi = (state.pedidos || []).find(p => p.id === odp.pedido_id);
  const producto = (state.productos_pt || []).find(p => p.codigo === odp.producto_codigo);
  const tarimas = (state.tarimas || []).filter(t => t.odp_id === odpId)
    .sort((a, b) => (a.numero_tarima || 0) - (b.numero_tarima || 0));
