            <div class="field"><label class="field-label">Ancho (cm) *</label><input class="input form-pt" data-field="ancho" type="number" min="0" max="999" step="1" value="${f.ancho}" /></div>
            <div class="field"><label class="field-label">Fuelle (cm)</label><input class="input form-pt" data-field="fuelle" type="number" min="0" max="999" step="1" value="${f.fuelle}" /></div>
            <div class="field"><label class="field-label">Largo (cm) *</label><input class="input form-pt" data-field="largo" type="number" min="0" max="999" step="1" value="${f.largo}" /></div>
            <div class="field"><label class="field-label">Calibre *</label><input class="input form-pt" data-field="calibre" type="number" min="0" max="9999" step="1" value="${f.calibre}" /></div>
            <div class="field"><label class="field-label">Sec.</label><input class="input form-pt" data-field="secuencia" type="number" min="1" max="9" step="1" value="${f.secuencia}" /></div>
          </div>
          
          <!-- 3. Color y Aditivo -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="field">
              <label class="field-label">Color *</label>
              <select class="input form-pt" data-field="color">
                ${COLORES_GEN.map(c => `<option value="${c.nombre}" ${f.color === c.nombre ? 'selected' : ''}>${c.nombre} (${c.codigo})</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label class="field-label">Aditivo *</label>
              <select class="input form-pt" data-field="aditivo">
                ${ADITIVOS_GEN.map(a => `<option value="${a.nombre}" ${f.aditivo === a.nombre ? 'selected' : ''}>${a.nombre} (${a.codigo})</option>`).join('')}
              </select>
            </div>
          </div>
          
          <!-- 4. UM y Empaque -->
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;">
            <div class="field">
              <label class="field-label">UM venta *</label>
              <select class="input form-pt" data-field="um">
                ${UM_OPCIONES.map(u => `<option value="${u}" ${f.um === u ? 'selected' : ''}>${UM_LABELS[u]}</option>`).join('')}
              </select>
            </div>
            <div class="field"><label class="field-label">Empaque</label><input class="input form-pt" data-field="tipo_empaque" placeholder="Bultos" value="${f.tipo_empaque}" /></div>
            <div class="field"><label class="field-label">Cant.</label><input class="input form-pt" data-field="cant_empaque" type="number" placeholder="25" value="${f.cant_empaque}" /></div>
            <div class="field"><label class="field-label">UM emp.</label><input class="input form-pt" data-field="um_empaque" placeholder="KG." value="${f.um_empaque}" /></div>
          </div>
          
          <!-- 5. Asignación a clientes -->
          <div style="margin-top:18px;padding:14px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <strong style="font-size:13px;">${ICONS.users} Asignar a clientes</strong>
              <span style="font-size:11px;color:#64748b;">${numAsignados} cliente(s) seleccionado(s)</span>
            </div>
            <input class="input" id="pt-busq-cli" placeholder="Buscar cliente por código o nombre..." value="${f.busqClientes}" autocomplete="off" />
            <div style="max-height:240px;overflow-y:auto;margin-top:10px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;">
              ${clientesFiltrados.length === 0 ? `
                <div style="padding:20px;text-align:center;color:#94a3b8;font-size:12px;">No se encontraron clientes</div>
              ` : clientesFiltrados.slice(0, 80).map(c => {
                const asignado = !!f.clientesAsignados[c.codigo];
                const asign = f.clientesAsignados[c.codigo] || {};
                return `
                  <div style="padding:8px 10px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:8px;${asignado ? 'background:#f0fdf4;' : ''}">
                    <input type="checkbox" class="cli-asign-check" data-cliente="${c.codigo}" ${asignado ? 'checked' : ''} style="cursor:pointer;width:16px;height:16px;" />
                    <div style="flex:1;min-width:0;">
                      <div style="font-weight:600;font-size:12px;">${c.codigo} <span style="color:#475569;font-weight:400;">— ${c.nombre}</span></div>
                    </div>
                    ${asignado ? `
                      <input type="number" class="cli-asign-precio" data-cliente="${c.codigo}" placeholder="Precio" min="0" step="0.01" value="${asign.precio || ''}" style="width:90px;padding:4px 6px;font-size:11px;border:1px solid #cbd5e1;border-radius:4px;" />
                      <input type="text" class="cli-asign-codint" data-cliente="${c.codigo}" placeholder="Cód. cli." value="${asign.codigo_cliente_interno || ''}" style="width:90px;padding:4px 6px;font-size:11px;border:1px solid #cbd5e1;border-radius:4px;" />
                    ` : ''}
                  </div>
                `;
              }).join('')}
            </div>
            ${clientesFiltrados.length > 80 ? `<div style="margin-top:6px;font-size:11px;color:#94a3b8;text-align:center;">Mostrando 80 de ${clientesFiltrados.length}, refina la búsqueda</div>` : ''}
          </div>
          
        </div>
        <div style="padding:14px 22px;border-top:1px solid #e2e8f0;display:flex;gap:10px;justify-content:flex-end;align-items:center;flex-wrap:wrap;">
          ${numAsignados > 0 ? `<span style="font-size:11px;color:#64748b;margin-right:auto;">Se crearán ${numAsignados} relación(es) cliente-producto</span>` : ''}
          <button class="btn-secondary" onclick="cerrarModalPT()">Cancelar</button>
          <button class="btn-primary" id="pt-btn-crear" onclick="crearProductoPT()" ${(!todoLleno || yaExiste) ? 'disabled' : ''}>${ICONS.check} Crear producto</button>
        </div>
      </div>
    </div>
  `;
}

// ============================================================
// EVENT HANDLERS
// ============================================================
function attachAppEvents() {
  $$('.nav-item').forEach(btn => {
    btn.onclick = () => {
      state.vista = btn.dataset.vista;
      state.filtros = {};
      render();
    };
  });
  
  if ($('#filtro-clientes')) {

  }
  if ($('#filtro-productos-pt')) {
    $('#filtro-productos-pt').oninput = (e) => {

  }
  if ($('#filtro-productos-pt-material')) {
    $('#filtro-productos-pt-material').onchange = (e) => { state.filtros.productos_pt_material = e.target.value; render(); };
  }
  if ($('#filtro-productos-pt-tipo')) {
    $('#filtro-productos-pt-tipo').onchange = (e) => { state.filtros.productos_pt_tipo = e.target.value; render(); };

  if ($('#filtro-productos-pt-um')) {
    $('#filtro-productos-pt-um').onchange = (e) => { state.filtros.productos_pt_um = e.target.value; render(); };
  }
  
  // Filtros de Programación de Producción
  if ($('#filtro-programacion')) {
    $('#filtro-programacion').oninput = (e) => {
      const pos = e.target.selectionStart;
      state.filtros.programacion = e.target.value;
      render();
      const inp = $('#filtro-programacion');
      if (inp) { inp.focus(); inp.setSelectionRange(pos, pos); }

  }
  if ($('#filtro-programacion-maquina')) {
    $('#filtro-programacion-maquina').onchange = (e) => { state.filtros.programacion_maquina = e.target.value; render(); };
  }
  
  // Filtros de Captura de Producción
  if ($('#filtro-captura')) {
    $('#filtro-captura').oninput = (e) => {
      const pos = e.target.selectionStart;
      state.filtros.captura = e.target.value;
      render();
      const inp = $('#filtro-captura');
      if (inp) { inp.focus(); inp.setSelectionRange(pos, pos); }
    };
  }
  
  // Filtro Calidad
  if ($('#filtro-calidad')) {
    $('#filtro-calidad').oninput = (e) => {
      const pos = e.target.selectionStart;
      state.filtros.calidad = e.target.value;
      render();
      const inp = $('#filtro-calidad');
      if (inp) { inp.focus(); inp.setSelectionRange(pos, pos); }
    };
  }
  
  // Modal Liberar Calidad: live update SIN re-render (preserva cursor)
  function actualizarPreviewCalidad() {
    if (!state.modalForm) return;
    const odp = state.ordenes_produccion.find(o => o.id === state.modalData);
    if (!odp) return;
    
    const um = (odp.um || 'kg').toLowerCase();
    const cantidadProducida = Number(odp.cantidad_producida_final) || 0;
    const cantidadOriginal = Number(odp.cantidad) || 0;
    const cantAceptada = Number(state.modalForm.cantidad_aceptada) || 0;
    const cantRechazada = Math.max(0, cantidadProducida - cantAceptada);
    const pctCalidadVsOriginal = cantidadOriginal > 0 ? (cantAceptada / cantidadOriginal * 100) : 0;
    
    let decision = 'pendiente', decisionTexto = '', decisionColor = '#94a3b8', mensajeDecision = '';
    if (cantAceptada > 0) {
      if (pctCalidadVsOriginal >= 90) {
        decision = cantAceptada >= cantidadProducida ? 'liberado' : 'parcial';
        decisionTexto = decision === 'liberado' ? '✅ LIBERADO TOTAL' : '⚠️ LIBERADO PARCIAL';
        decisionColor = '#16a34a';
        mensajeDecision = decision === 'liberado'
          ? 'Toda la producción se libera. Cada tarima genera su propio LOTE.'
          : `Se libera ${fmtCantidadUM(cantAceptada, um)} (${pctCalidadVsOriginal.toFixed(1)}% del solicitado).<br><strong>El sistema generará un PI nuevo</strong> por la cantidad faltante (${fmtCantidadUM(cantidadOriginal - cantAceptada, um)}).`;
      } else {
        decision = 'rechazado';
        decisionTexto = '❌ RECHAZADO (< 90%)';
        decisionColor = '#dc2626';
        mensajeDecision = `Solo ${pctCalidadVsOriginal.toFixed(1)}% es aceptable. Se rechaza toda la ODP y <strong>el sistema generará un PI nuevo</strong> por la cantidad completa.`;
      }
    } else {
      decision = 'rechazado';
      decisionTexto = '❌ RECHAZADO TOTAL';
      decisionColor = '#dc2626';
      mensajeDecision = 'Toda la producción se rechaza. <strong>Se genera nuevo PI completo</strong>.';
    }
    
    const box = $('#cal-preview-box');
    const txt = $('#cal-preview-texto');
    const pct = $('#cal-preview-pct');
    const msg = $('#cal-preview-msg');
    const bar = $('#cal-preview-bar');
    const rechazo = $('#cal-rechazo-info');
    const tarimasContainer = $('#cal-tarimas-container');
    const btn = $('#cal-btn-confirmar');
    
    if (box) { box.style.background = decisionColor + '11'; box.style.borderColor = decisionColor; }
    if (txt) { txt.style.color = decisionColor; txt.textContent = decisionTexto; }
    if (pct) { pct.style.color = decisionColor; pct.textContent = pctCalidadVsOriginal.toFixed(1) + '%'; }
    if (msg) msg.innerHTML = mensajeDecision;
    if (bar) { bar.style.background = decisionColor; bar.style.width = Math.min(100, pctCalidadVsOriginal) + '%'; }
    if (rechazo) {
      rechazo.style.display = cantRechazada > 0 ? 'block' : 'none';
      if (cantRechazada > 0) rechazo.innerHTML = `⚠️ Se rechazarán <strong>${fmtCantidadUM(cantRechazada, um)}</strong> del producido`;
    }
    if (tarimasContainer) {
      tarimasContainer.style.display = (decision === 'liberado' || decision === 'parcial') ? 'block' : 'none';
    }
    
    // Recalcular totales con nuevo modelo: cantidad = paquetes×contenido + sueltos
    if (state.modalForm.tarimas_data && state.modalForm.tarimas_data.length > 0) {
      const contPaq = Number(state.modalForm.contenido_por_paquete) || 0;
      const tot_paq = state.modalForm.tarimas_data.reduce((s, t) => s + (Number(t.paquetes) || 0), 0);
      const tot_suel = state.modalForm.tarimas_data.reduce((s, t) => s + (Number(t.sueltos) || 0), 0);
      const tot_cant = (tot_paq * contPaq) + tot_suel;
      const tot_bruto = state.modalForm.tarimas_data.reduce((s, t) => s + (Number(t.peso_bruto) || 0), 0);
      const tot_vacio = state.modalForm.tarimas_data.reduce((s, t) => s + (Number(t.peso_tarima_vacia) || 0), 0);
      const tot_neto = tot_bruto - tot_vacio;
      
      const e_paq = $('#tab-total-paq');
      const e_suel = $('#tab-total-suel');
      const e_cant = $('#tab-total-cant');
      const e_bruto = $('#tab-total-bruto');
      const e_vacio = $('#tab-total-vacio');
      const e_neto = $('#tab-total-neto');
      if (e_paq) e_paq.textContent = `${fmtNum(tot_paq)}`;
      if (e_suel) e_suel.textContent = `${fmtNum(tot_suel)}`;
      if (e_cant) e_cant.textContent = `${fmtNum(tot_cant)} ${UM_LABELS[um]}`;
      if (e_bruto) e_bruto.textContent = `${tot_bruto.toFixed(2)} kg`;
      if (e_vacio) e_vacio.textContent = `${tot_vacio.toFixed(2)} kg`;
      if (e_neto) e_neto.textContent = `${tot_neto.toFixed(2)} kg`;
      
      // Cuadre vs cantidad aceptada
      const cuadreBox = $('#cal-cuadre-box');
      const cuadreEmp = $('#cal-cuadre-empacado');
      const cuadreStat = $('#cal-cuadre-status');
      const diffCant = tot_cant - cantAceptada;
      const cuadra = Math.abs(diffCant) < 0.01;
      if (cuadreBox) {
        cuadreBox.style.background = cuadra ? '#f0fdf4' : '#fef3c7';
        cuadreBox.style.borderColor = cuadra ? '#bbf7d0' : '#fde68a';
      }
      if (cuadreEmp) cuadreEmp.textContent = fmtNum(tot_cant);
      if (cuadreStat) {
        cuadreStat.style.color = cuadra ? '#16a34a' : '#92400e';
        cuadreStat.textContent = cuadra ? '✓ Cuadra' : `⚠ Diferencia: ${fmtNum(diffCant)}`;
      }
      
      // Verificación báscula vs teórico
      const producto = state.productos_pt.find(p => p.codigo === odp.producto_codigo);
      const pesoTeorico = window.convertirAKg(cantAceptada, um, producto) || 0;
      const diff = tot_neto - pesoTeorico;
      const pctD = pesoTeorico > 0 ? Math.abs(diff / pesoTeorico * 100) : 0;
      const colorP = pctD <= 5 ? '#16a34a' : (pctD <= 10 ? '#f59e0b' : '#dc2626');
      const e_neto_v = $('#ver-neto');
      const e_teo_v = $('#ver-teorico');
      const e_dif_v = $('#ver-diff');
      if (e_neto_v) e_neto_v.textContent = `${tot_neto.toFixed(2)} kg`;
      if (e_teo_v) e_teo_v.textContent = `${pesoTeorico.toFixed(2)} kg`;
      if (e_dif_v) {
        e_dif_v.textContent = `${diff >= 0 ? '+' : ''}${diff.toFixed(2)} kg (${pctD.toFixed(1)}%)`;
        e_dif_v.style.color = colorP;
      }
      
      // Actualizar cantidad y peso neto por fila individual
      state.modalForm.tarimas_data.forEach((t, i) => {
        const paq = Number(t.paquetes) || 0;
        const suel = Number(t.sueltos) || 0;
        const cantTar = (paq * contPaq) + suel;
        const cellCant = $(`#tar-cant-${i}`);
        if (cellCant) cellCant.textContent = fmtNum(cantTar);
        
        const neto = (Number(t.peso_bruto) || 0) - (Number(t.peso_tarima_vacia) || 0);
        const cell = $(`#tar-neto-${i}`);
        if (cell) cell.textContent = neto.toFixed(2);
      });
    }
    
    if (btn) {
      btn.style.background = decisionColor;
      btn.textContent = '✓ Confirmar ' + decisionTexto;
      const necesitaTarimas = (decision === 'liberado' || decision === 'parcial');
      const tarimasOk = !necesitaTarimas || ((Number(state.modalForm.num_tarimas) > 0) && state.modalForm.tarimas_data && state.modalForm.tarimas_data.length === Number(state.modalForm.num_tarimas));
      btn.disabled = !tarimasOk;
    }
  }
  window.actualizarPreviewCalidad = actualizarPreviewCalidad;
  
  // Handlers form-cal (nivel modal)
  $$('.form-cal').forEach(el => {
    const handler = () => {
      if (!state.modalForm) return;
      const oldVal = state.modalForm[el.dataset.field];
      state.modalForm[el.dataset.field] = el.value;
      // Si cambió num_tarimas, reset tarimas_data y RE-RENDER
      if (el.dataset.field === 'num_tarimas' && Number(oldVal) !== Number(el.value)) {
        state.modalForm.tarimas_data = []; // forzar reinicialización
        render();
        return;
      }
      // Si cambió peso_tarima_unit, propagar a todas las tarimas (sólo a las que tengan 0)
      if (el.dataset.field === 'peso_tarima_unit' && state.modalForm.tarimas_data) {
        const nuevoP = Number(el.value) || 0;
        state.modalForm.tarimas_data.forEach(t => { 
          if (!Number(t.peso_tarima_vacia)) t.peso_tarima_vacia = nuevoP;
        });
        // No re-render, solo actualizar preview
        actualizarPreviewCalidad();
        return;
      }
      // Si cambió contenido_por_paquete, re-render para mostrar la info de auto-distribución
      // (la sección cal-empaque-info aparece/desaparece y necesita re-render)
      if (el.dataset.field === 'contenido_por_paquete') {
        const tieneInfo = !!$('#cal-empaque-info');
        const ahoraTiene = Number(el.value) > 0;
        if (tieneInfo !== ahoraTiene) {
          // estado cambió → necesita re-render para mostrar/ocultar info
          render();
          // Después del re-render, restaurar foco en el input
          setTimeout(() => {
            const inp = document.querySelector('input[data-field="contenido_por_paquete"]');
            if (inp) inp.focus();
          }, 0);
          return;
        }
        // El bloque info ya existe, solo actualizar valores sin re-render
        const e_total = $('#cal-empaque-info');
        if (e_total) {
          const cAcep = Number(state.modalForm.cantidad_aceptada) || 0;
          const cPaq = Number(el.value) || 0;
          if (cPaq > 0) {
            const paqT = Math.floor(cAcep / cPaq);
            const suel = cAcep - (paqT * cPaq);
            // Buscar y actualizar los divs específicos (los segundos en cada bloque)
            const divs = e_total.querySelectorAll('div > div:nth-child(2)');
            if (divs[1]) divs[1].textContent = paqT;
            if (divs[2]) {
              divs[2].textContent = `${fmtNum(suel)} ${UM_LABELS[(odp.um || 'kg').toLowerCase()]}`;
              divs[2].style.color = suel > 0 ? '#f59e0b' : '#16a34a';
            }
          }
        }
        actualizarPreviewCalidad();
        return;
      }
      // Si cambió cantidad_aceptada
      if (el.dataset.field === 'cantidad_aceptada' && state.modalForm.tarimas_data && state.modalForm.tarimas_data.length > 0) {
        actualizarPreviewCalidad();
        return;
      }
      actualizarPreviewCalidad();
    };
    el.oninput = handler;
  });
  
  // Handlers para inputs de cada tarima (paquetes, sueltos, peso bruto, peso vacío)
  $$('.tarima-row').forEach(inp => {
    inp.oninput = () => {
      if (!state.modalForm || !state.modalForm.tarimas_data) return;
      const idx = Number(inp.dataset.idx);
      const field = inp.dataset.field;
      if (state.modalForm.tarimas_data[idx]) {
        state.modalForm.tarimas_data[idx][field] = inp.value;
        actualizarPreviewCalidad();
      }
    };
  });
  
  // Filtros de Seguimiento
  if ($('#filtro-seguimiento')) {
    $('#filtro-seguimiento').oninput = (e) => {
      const pos = e.target.selectionStart;
      state.filtros.seguimiento = e.target.value;
      render();
      const inp = $('#filtro-seguimiento');
      if (inp) { inp.focus(); inp.setSelectionRange(pos, pos); }
    };
  }
  if ($('#filtro-seguimiento-cliente')) {
    $('#filtro-seguimiento-cliente').onchange = (e) => { state.filtros.seguimiento_cliente = e.target.value; render(); };
  }
  if ($('#filtro-seguimiento-estatus')) {
    $('#filtro-seguimiento-estatus').onchange = (e) => { state.filtros.seguimiento_estatus = e.target.value; render(); };
  }
  $$('.prod-um-select').forEach(sel => {
    sel.onchange = async (e) => {
      const codigo = sel.dataset.codigo;
      const nuevaUM = sel.value;
      await window.actualizarUMProducto(codigo, nuevaUM);
    };
  });
  
  // ===== Modal crear producto PT: live update sin re-renderizar inputs =====
  // Estrategia: actualizar solo el preview del código sin destruir los inputs
  function actualizarPreviewPT() {
    if (!state.modalForm) return;
    const codigoGen = window.generarCodigoPT({
      material: state.modalForm.material, tipo: state.modalForm.tipo,
      ancho: state.modalForm.ancho, fuelle: state.modalForm.fuelle, largo: state.modalForm.largo, calibre: state.modalForm.calibre,
      color: state.modalForm.color, aditivo: state.modalForm.aditivo, secuencia: state.modalForm.secuencia
    });
    const descGen = window.generarDescripcionPT({
      material: state.modalForm.material, tipo: state.modalForm.tipo,
      ancho: state.modalForm.ancho, fuelle: state.modalForm.fuelle, largo: state.modalForm.largo, calibre: state.modalForm.calibre,
      color: state.modalForm.color, aditivo: state.modalForm.aditivo
    });
    const todoLleno = state.modalForm.ancho && state.modalForm.largo && state.modalForm.calibre;
    const yaExiste = codigoGen && state.productos_pt.some(p => p.codigo === codigoGen);
    
    const previewBox = $('#pt-preview-box');
    const previewCod = $('#pt-preview-codigo');
    const previewDesc = $('#pt-preview-desc');
    const previewWarn = $('#pt-preview-warn');
    const btnCrear = $('#pt-btn-crear');
    
    if (previewCod) previewCod.textContent = codigoGen || '— captura los datos abajo —';
    if (previewDesc) previewDesc.textContent = (descGen && todoLleno) ? descGen : '';
    if (previewBox) {
      const bg = (codigoGen && todoLleno) ? (yaExiste ? '#fee2e2' : '#dcfce7') : '#f1f5f9';
      const border = (codigoGen && todoLleno) ? (yaExiste ? '#dc2626' : '#16a34a') : '#e2e8f0';
      previewBox.style.background = bg;
      previewBox.style.borderColor = border;
    }
    if (previewCod) previewCod.style.color = yaExiste ? '#dc2626' : '#0f172a';
    if (previewWarn) previewWarn.style.display = yaExiste ? 'block' : 'none';
    if (btnCrear) btnCrear.disabled = !todoLleno || yaExiste;
  }
  window.actualizarPreviewPT = actualizarPreviewPT;
  
  $$('.form-pt').forEach(el => {
    const handler = () => {
      if (!state.modalForm) return;
      state.modalForm[el.dataset.field] = el.value;
      actualizarPreviewPT();
    };
    if (el.tagName === 'SELECT') el.onchange = handler;
    else el.oninput = handler;
  });
  
  // Inputs del modal de editar producto (no afectan código generado)
  $$('.form-pt-edit').forEach(el => {
    const handler = () => {
      if (!state.modalForm) return;
      state.modalForm[el.dataset.field] = el.value;
    };
    if (el.tagName === 'SELECT') el.onchange = handler;
    else el.oninput = handler;
  });
  
  if ($('#pt-busq-cli')) {
    $('#pt-busq-cli').oninput = (e) => {
      if (!state.modalForm) return;
      const pos = e.target.selectionStart;
      state.modalForm.busqClientes = e.target.value;
      render();
      const inp = $('#pt-busq-cli');
      if (inp) { inp.focus(); inp.setSelectionRange(pos, pos); }
    };
  }
  
  $$('.cli-asign-check').forEach(chk => {
    chk.onchange = (e) => {
      if (!state.modalForm) return;
      const cod = chk.dataset.cliente;
      if (chk.checked) {
        state.modalForm.clientesAsignados[cod] = state.modalForm.clientesAsignados[cod] || { precio: '', codigo_cliente_interno: '' };
      } else {
        delete state.modalForm.clientesAsignados[cod];
      }
      render();
    };
  });
  
  $$('.cli-asign-precio').forEach(inp => {
    inp.onblur = (e) => {
      if (!state.modalForm) return;
      const cod = inp.dataset.cliente;
      if (state.modalForm.clientesAsignados[cod]) {
        state.modalForm.clientesAsignados[cod].precio = inp.value;
      }
    };
  });
  
  $$('.cli-asign-codint').forEach(inp => {
    inp.onblur = (e) => {
      if (!state.modalForm) return;
      const cod = inp.dataset.cliente;
      if (state.modalForm.clientesAsignados[cod]) {
        state.modalForm.clientesAsignados[cod].codigo_cliente_interno = inp.value;
      }
    };
  });
  
  if ($('#ped-cliente')) $('#ped-cliente').onchange = () => { capturarPedido(); render(); };
  if ($('#ped-cedis')) $('#ped-cedis').onchange = () => { capturarPedido(); };
  if ($('#ped-busq')) $('#ped-busq').oninput = (e) => {
    const pos = e.target.selectionStart;
    state.busqProd = e.target.value;
    render();
    const inp = $('#ped-busq');
    if (inp) { inp.focus(); inp.setSelectionRange(pos, pos); }
  };
  ['ped-odc','ped-fecha','ped-obs'].forEach(id => { const el = $('#' + id); if (el) el.onblur = () => capturarPedido(); });
  $$('.ped-cant, .ped-stock, .ped-prod').forEach(inp => { inp.onblur = () => { capturarPedido(); render(); }; });
  $$('.ped-origen').forEach(sel => { sel.onchange = () => { capturarPedido(); render(); }; });
}

function capturarPedido() {
  if (!state.pedidoData) state.pedidoData = { lineas: [] };
  const d = state.pedidoData;
  if ($('#ped-cliente')) {
    const cod = $('#ped-cliente').value;
    if (cod !== d.cliente_codigo) {
      d.cliente_codigo = cod;
      const c = window.getCliente(cod);
      d.cliente_nombre = c?.nombre || '';
      d.cedis_asignado = c?.cedis_asignado || 'CEDIS-MTY';
      d.lineas = [];
      state.busqProd = '';
    }
  }
  if ($('#ped-cedis')) d.cedis_asignado = $('#ped-cedis').value;
  if ($('#ped-odc')) d.odc_cliente = $('#ped-odc').value;
  if ($('#ped-fecha')) d.fecha_requerida = $('#ped-fecha').value;
  if ($('#ped-obs')) d.observaciones = $('#ped-obs').value;
  
  $$('.ped-cant').forEach(inp => { const i = +inp.dataset.idx; if (d.lineas[i]) d.lineas[i].cantidad_solicitada = inp.value; });
  $$('.ped-origen').forEach(sel => { const i = +sel.dataset.idx; if (d.lineas[i]) d.lineas[i].tipo_origen = sel.value; });
  $$('.ped-stock').forEach(inp => { const i = +inp.dataset.idx; if (d.lineas[i]) d.lineas[i].cantidad_stock = inp.value; });
  $$('.ped-prod').forEach(inp => { const i = +inp.dataset.idx; if (d.lineas[i]) d.lineas[i].cantidad_producir = inp.value; });
}

    await setDoc(doc(db, 'clientes', cod), {

window.crearProductoPT = async () => {
  const f = state.modalForm;
  if (!f) return;
  
  const codigo = window.generarCodigoPT({
    material: f.material, tipo: f.tipo,
    ancho: f.ancho, fuelle: f.fuelle, largo: f.largo, calibre: f.calibre,
    color: f.color, aditivo: f.aditivo, secuencia: f.secuencia
  });
  
  if (!codigo) { toast('Falta llenar campos para generar el código', 'error'); return; }
  if (!f.ancho || !f.largo || !f.calibre) { toast('Ancho, Largo y Calibre son obligatorios', 'error'); return; }
  
  const desc = window.generarDescripcionPT({
    material: f.material, tipo: f.tipo,
    ancho: f.ancho, fuelle: f.fuelle, largo: f.largo, calibre: f.calibre,
    color: f.color, aditivo: f.aditivo
  });
  
  state.loadingAccion = true; render();
  try {
    // Verificar duplicado
    const existing = await getDoc(doc(db, 'productos_pt', codigo));
    if (existing.exists()) { 
      toast('Ya existe un producto con ese código. Cambia la secuencia.', 'error'); 
      state.loadingAccion = false; render(); 
      return; 
    }
    
    const tipoEmp = f.tipo_empaque || '';
    const cantEmp = Number(f.cant_empaque) || 0;
    const umEmp = f.um_empaque || '';
    const presentacion = (tipoEmp && cantEmp) ? `${tipoEmp.toUpperCase()} DE ${cantEmp} ${umEmp}` : 'DE';
    
    const producto = {
      codigo, descripcion: desc,
      material: f.material, tipo: f.tipo,
      ancho: Number(f.ancho) || 0,
      fuelle: Number(f.fuelle) || 0,
      largo: Number(f.largo) || 0,
      calibre: Number(f.calibre) || 0,
      color: f.color, aditivo: f.aditivo,
      um: f.um,
      tipo_empaque: tipoEmp, cant_empaque: cantEmp, um_empaque: umEmp,
      presentacion,
      activo: true,
      created_at: serverTimestamp()
    };
    
    await setDoc(doc(db, 'productos_pt', codigo), producto);
    state.productos_pt.push(producto);
    state.productos_pt.sort((a, b) => a.codigo.localeCompare(b.codigo));
    
    // Crear relaciones cliente-producto si hay clientes asignados
    const asignaciones = Object.entries(f.clientesAsignados);
    if (asignaciones.length > 0) {
      const batch = writeBatch(db);
      asignaciones.forEach(([clienteCod, datos]) => {
        const ref = doc(collection(db, 'cliente_productos'));
        batch.set(ref, {
          cliente_codigo: clienteCod,
          producto_codigo: codigo,
          precio: Number(datos.precio) || 0,
          codigo_cliente_interno: datos.codigo_cliente_interno || '',
          activo: true,
          created_at: serverTimestamp()
        });
      });
      await batch.commit();
      // Refrescar localmente
      const snap = await getDocs(query(collection(db, 'cliente_productos'), where('activo', '==', true)));
      state.cliente_productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }
    
    cerrarModalPT();
    toast(`✅ Producto ${codigo} creado` + (asignaciones.length > 0 ? ` y asignado a ${asignaciones.length} cliente(s)` : ''));
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

window.guardarProductoPT = async (codigo) => {
  const f = state.modalForm;
  if (!f) return;
  
  state.loadingAccion = true; render();
  try {
    // Actualizar producto
    const updates = {
      descripcion: f.descripcion,
      um: f.um,
      tipo_empaque: f.tipo_empaque,
      cant_empaque: Number(f.cant_empaque) || 0,
      um_empaque: f.um_empaque,
      updated_at: serverTimestamp()
    };
    await updateDoc(doc(db, 'productos_pt', codigo), updates);
    
    // Actualizar localmente
    const idx = state.productos_pt.findIndex(p => p.codigo === codigo);
    if (idx >= 0) state.productos_pt[idx] = { ...state.productos_pt[idx], ...updates };
    
    // Sincronizar relaciones cliente-producto
    const originales = f.relacionesOriginales || {};
    const actuales = f.clientesAsignados || {};
    const batch = writeBatch(db);
    let cambios = 0;
    
    // 1. Desactivar las relaciones que ya no están
    for (const clienteCod of Object.keys(originales)) {
      if (!actuales[clienteCod]) {
        batch.update(doc(db, 'cliente_productos', originales[clienteCod].cp_id), { activo: false });
        cambios++;
      }
    }
    
    // 2. Actualizar precio/código de las que siguen Y crear las nuevas
    for (const [clienteCod, datos] of Object.entries(actuales)) {
      const orig = originales[clienteCod];
      if (orig) {
        // Existía → actualizar si cambió precio o código
        const precioCambia = String(orig.precio) !== String(datos.precio);
        const codCambia = String(orig.codigo_cliente_interno) !== String(datos.codigo_cliente_interno);
        if (precioCambia || codCambia) {
          batch.update(doc(db, 'cliente_productos', datos.cp_id || orig.cp_id), {
            precio: Number(datos.precio) || 0,
            codigo_cliente_interno: datos.codigo_cliente_interno || '',
            updated_at: serverTimestamp()
          });
          cambios++;
        }
      } else {
        // Nuevo → crear
        const ref = doc(collection(db, 'cliente_productos'));
        batch.set(ref, {
          cliente_codigo: clienteCod,
          producto_codigo: codigo,
          precio: Number(datos.precio) || 0,
          codigo_cliente_interno: datos.codigo_cliente_interno || '',
          activo: true,
          created_at: serverTimestamp()
        });
        cambios++;
      }
    }
    
    if (cambios > 0) {
      await batch.commit();
      // Refrescar relaciones
      const snap = await getDocs(query(collection(db, 'cliente_productos'), where('activo', '==', true)));
      state.cliente_productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }
    
    cerrarModalPT();
    toast('✅ Producto actualizado' + (cambios > 0 ? ` (${cambios} relación(es) modificadas)` : ''));
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

window.enviarPedido = async () => {
  capturarPedido();
  const d = state.pedidoData;
  if (!d.cliente_codigo) { toast('Selecciona un cliente', 'error'); return; }
  
  const validas = d.lineas.filter(l => l.producto_codigo && Number(l.cantidad_solicitada) > 0);
  if (validas.length === 0) { toast('Captura al menos una línea con cantidad', 'error'); return; }
  
  // Validación: UM enteras (pza, millar, rollo) no aceptan decimales
  for (const l of validas) {
    const um = (l.um || 'kg').toLowerCase();
    if (UM_ENTEROS.includes(um)) {
      const cant = Number(l.cantidad_solicitada);
      if (!Number.isInteger(cant)) {
        toast(`Producto ${l.producto_codigo}: ${UM_LABELS[um]} requiere cantidad entera (${cant} no es válido)`, 'error');
        return;
      }
      if (l.tipo_origen === 'mixto') {
        if (!Number.isInteger(Number(l.cantidad_stock || 0)) || !Number.isInteger(Number(l.cantidad_producir || 0))) {
          toast(`Producto ${l.producto_codigo}: cantidades de stock y producir deben ser enteras`, 'error');
          return;
        }
      }
    }
  }
  state.loadingAccion = true; render();
  try {
    const folioNum = await siguienteFolio('pedido');
    const folio = 'PI-' + String(folioNum).padStart(5, '0');
    
    const tipos = new Set(validas.map(l => l.tipo_origen));
    const tipo = tipos.size === 1 ? [...tipos][0] : 'mixto';
    
    // Crear pedido
    const pedidoRef = await addDoc(collection(db, 'pedidos'), {
      folio,
      cliente_codigo: d.cliente_codigo,
      cliente_nombre: d.cliente_nombre,
      odc_cliente: d.odc_cliente || '',
      fecha_requerida: d.fecha_requerida || null,
      cedis_asignado: d.cedis_asignado,
      estatus: 'pendiente_aprobacion',
      tipo,
      observaciones: d.observaciones || '',
      creado_por: state.user.id,
      creado_por_nombre: state.user.nombre,
      created_at: serverTimestamp(),
      updated_at: serverTimestamp()
    });
    
    // Crear líneas en batch
    const batch = writeBatch(db);
    validas.forEach(l => {
      const ref = doc(collection(db, 'pedido_lineas'));
      batch.set(ref, {
        pedido_id: pedidoRef.id,
        pedido_folio: folio,
        producto_codigo: l.producto_codigo,
        descripcion: l.descripcion,
        cantidad_solicitada: Number(l.cantidad_solicitada),
        um: (l.um || 'kg').toLowerCase(),
        tipo_origen: l.tipo_origen,
        precio_unitario: Number(l.precio_unitario) || 0,
        cantidad_stock: Number(l.cantidad_stock) || 0,
        cantidad_producir: Number(l.cantidad_producir) || 0,
        observaciones: l.observaciones || '',
        created_at: serverTimestamp()
      });
    });
    
    // Notificación
    const notifRef = doc(collection(db, 'notificaciones'));
    batch.set(notifRef, {
      titulo: 'Nuevo PI ' + folio,
      mensaje: d.cliente_nombre + ' • ' + validas.length + ' línea(s)',
      depto_destino: 'CEO',
      tipo: 'info',
      folio_ref: folio,
      created_at: serverTimestamp()
    });
    
    await batch.commit();
    
    state.pedidoData = null;
    state.busqProd = '';
    state.tabs.pedidos = 'pendientes';
    toast('✅ Pedido ' + folio + ' enviado');
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

window.aprobarPedido = async (pedidoId, folio) => {
  if (!confirm('¿Aprobar pedido ' + folio + '?\n\nSe generarán automáticamente las OVs y ODPs.')) return;
  
  state.loadingAccion = true; render();
  try {
    const pedidoSnap = await getDoc(doc(db, 'pedidos', pedidoId));
    if (!pedidoSnap.exists()) throw new Error('Pedido no encontrado');
    const pedido = pedidoSnap.data();
    if (pedido.estatus !== 'pendiente_aprobacion') throw new Error('Ya fue procesado');
    
    const lineas = window.pedidoLineas(pedidoId);
    const ovs = [], odps = [];
    
    // Generar folios
    for (const l of lineas) {
      const cantStock = l.tipo_origen === 'stock' ? Number(l.cantidad_solicitada) : (Number(l.cantidad_stock) || 0);
      const cantProd = l.tipo_origen === 'producir' ? Number(l.cantidad_solicitada) : (Number(l.cantidad_producir) || 0);
      
      if (cantStock > 0) {
        const num = await siguienteFolio('ov');
        const folioOV = 'OV-' + String(num).padStart(5, '0');
        await addDoc(collection(db, 'ordenes_venta'), {
          folio: folioOV, pedido_id: pedidoId, pedido_folio: pedido.folio,
          cliente_codigo: pedido.cliente_codigo, cliente_nombre: pedido.cliente_nombre,
          cedis: pedido.cedis_asignado,
          producto_codigo: l.producto_codigo, descripcion: l.descripcion,
          cantidad: cantStock, um: l.um, estatus: 'pendiente',
          observaciones: l.observaciones || '',
          created_at: serverTimestamp()
        });
        ovs.push(folioOV);
      }
      
      if (cantProd > 0) {
        const num = await siguienteFolio('odp');
        const folioODP = 'ODP-' + String(num).padStart(5, '0');
        const productoODP = window.getProductoPT(l.producto_codigo);
        const cantidadKg = window.convertirAKg(cantProd, l.um, productoODP);
        const pesoMillar = window.calcularPesoMillar(productoODP);
        const pesoPieza = window.calcularPesoPieza(productoODP);
        await addDoc(collection(db, 'ordenes_produccion'), {
          folio: folioODP, pedido_id: pedidoId, pedido_folio: pedido.folio,
          cliente_codigo: pedido.cliente_codigo, cliente_nombre: pedido.cliente_nombre,
          producto_codigo: l.producto_codigo, descripcion: l.descripcion,
          cantidad: cantProd, um: l.um, estatus: 'pendiente_planeacion',
          // Conversión a kg para producción (cuando el cliente pide en pza/millar)
          cantidad_kg_produccion: cantidadKg,
          peso_teorico_millar: pesoMillar, // kg/millar
          peso_teorico_pieza: pesoPieza,    // kg/pieza
          fecha_entrega_programada: pedido.fecha_requerida || null,
          observaciones: l.observaciones || '',
          created_at: serverTimestamp()
        });
        odps.push(folioODP);
      }
    }
    
    // Actualizar pedido
    await updateDoc(doc(db, 'pedidos', pedidoId), {
      estatus: 'aprobado',
      aprobado_por: state.user.id,
      aprobado_por_nombre: state.user.nombre,
      fecha_aprobacion: serverTimestamp(),
      updated_at: serverTimestamp()
    });
    
    // Notificaciones
    const batch = writeBatch(db);
    if (ovs.length > 0) {
      batch.set(doc(collection(db, 'notificaciones')), {
        titulo: 'OVs generadas',
        mensaje: ovs.join(', ') + ' • ' + pedido.cliente_nombre,
        depto_destino: 'ALP-' + pedido.cedis_asignado,
        tipo: 'info', folio_ref: pedido.folio,
        created_at: serverTimestamp()
      });
    }
    if (odps.length > 0) {
      batch.set(doc(collection(db, 'notificaciones')), {
        titulo: 'ODPs generadas',
        mensaje: odps.join(', ') + ' • ' + pedido.cliente_nombre,
        depto_destino: 'PLN',
        tipo: 'info', folio_ref: pedido.folio,
        created_at: serverTimestamp()
      });
    }
    await batch.commit();
    
    let msg = '✅ Pedido aprobado';
    if (ovs.length) msg += ' • OVs: ' + ovs.join(', ');
    if (odps.length) msg += ' • ODPs: ' + odps.join(', ');
    toast(msg);
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

// Confirmar completar proceso actual (avanza al siguiente o termina la ODP)
window.confirmarCompletarProceso = async (odpId) => {
  const cantidad = Number($('#comp-cantidad').value);
  if (!cantidad || cantidad <= 0) { toast('Captura una cantidad válida', 'error'); return; }
  
  const odp = state.ordenes_produccion.find(o => o.id === odpId);
  if (!odp) return;
  const ruta = odp.ruta_procesos || [];
  const idx = odp.proceso_actual_idx ?? 0;
  const proc = getProc(ruta[idx]);
  if (!proc) { toast('Error en la ruta del proceso', 'error'); return; }
  
  const um = (odp.um || 'kg').toLowerCase();
  if (UM_ENTEROS.includes(um) && !Number.isInteger(cantidad)) {
    toast(`${UM_LABELS[um]} requiere cantidad entera`, 'error'); return;
  }
  
  const mermas = Number($('#comp-mermas').value) || 0;
  const operador = ($('#comp-operador').value || '').trim();
  const turno = $('#comp-turno').value || '';
  const notas = ($('#comp-notas').value || '').trim();
  const esUltimo = idx === ruta.length - 1;
  
  state.loadingAccion = true; render();
  try {
    // 1. Crear captura del proceso
    await addDoc(collection(db, 'capturas_produccion'), {
      odp_id: odpId, odp_folio: odp.folio,
      cliente_codigo: odp.cliente_codigo, cliente_nombre: odp.cliente_nombre,
      producto_codigo: odp.producto_codigo,
      proceso: ruta[idx],
      proceso_nombre: proc.nombre,
      cantidad_producida: cantidad,
      mermas, um, operador, turno, notas,
      capturado_por: state.user.id,
      capturado_por_nombre: state.user.nombre,
      created_at: serverTimestamp()
    });
    
    // 2. Actualizar array procesos_completados
    const procesosCompletados = [...(odp.procesos_completados || []), {
      codigo: ruta[idx],
      nombre: proc.nombre,
      cantidad_producida: cantidad,
      mermas, operador, turno, notas,
      completado_at: new Date().toISOString(),
      completado_por: state.user.nombre
    }];
    
    if (esUltimo) {
      // 3a. Es el último proceso → enviar a Calidad para liberación
      const totalMermas = procesosCompletados.reduce((s, p) => s + (Number(p.mermas) || 0), 0);
      
      await updateDoc(doc(db, 'ordenes_produccion', odpId), {
        estatus: 'pendiente_calidad',
        proceso_actual: null,
        procesos_completados: procesosCompletados,
        cantidad_producida_final: cantidad, // lo que sale del último proceso
        mermas_finales: totalMermas,
        produccion_terminada_at: serverTimestamp(),
        produccion_terminada_por: state.user.id,
        produccion_terminada_por_nombre: state.user.nombre,
        notas_produccion_finales: notas,
        updated_at: serverTimestamp()
      });
      
      // Notificar a CALIDAD
      const batch = writeBatch(db);
      ['CAL', 'CEO'].forEach(depto => {
        const ref = doc(collection(db, 'notificaciones'));
        batch.set(ref, {
          titulo: '🟡 Pendiente liberación calidad ' + odp.folio,
          mensaje: `${odp.cliente_nombre} · ${odp.producto_codigo} · ${fmtCantidadUM(cantidad, um)} producidos`,
          depto_destino: depto, tipo: 'warning', folio_ref: odp.folio,
          created_at: serverTimestamp()
        });
      });
      await batch.commit();
      
      cerrarModal();
      toast(`🟡 ODP enviada a Liberación de Calidad`);
    } else {
      // 3b. Avanzar al siguiente proceso
      const siguienteIdx = idx + 1;
      const siguienteProc = getProc(ruta[siguienteIdx]);
      
      await updateDoc(doc(db, 'ordenes_produccion', odpId), {
        estatus: 'programada', // queda lista para iniciar el siguiente
        procesos_completados: procesosCompletados,
        proceso_actual_idx: siguienteIdx,
        proceso_actual: ruta[siguienteIdx],
        proceso_actual_inicio: null,
        updated_at: serverTimestamp()
      });
      
      // Notificar avance
      await addDoc(collection(db, 'notificaciones'), {
        titulo: `${proc.icono} ${proc.nombre} terminado en ${odp.folio}`,
        mensaje: `Lista para iniciar ${siguienteProc?.icono || ''} ${siguienteProc?.nombre || ruta[siguienteIdx]}`,
        depto_destino: 'PRO', tipo: 'info', folio_ref: odp.folio,
        created_at: serverTimestamp()
      });
      
      cerrarModal();
      toast(`✅ ${proc.nombre} terminado · Siguiente: ${siguienteProc?.nombre || ''}`);
    }
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

// ============================================================
// LIBERACIÓN DE CALIDAD: aplica regla del 90%
// ============================================================
window.confirmarLiberarCalidad = async (odpId) => {
  const f = state.modalForm;
  if (!f) return;
  
  const odp = state.ordenes_produccion.find(o => o.id === odpId);
  if (!odp) return;
  
  const cantAceptada = Number(f.cantidad_aceptada) || 0;
  const cantidadProducida = Number(odp.cantidad_producida_final) || 0;
  const cantidadOriginal = Number(odp.cantidad) || 0;
  const um = (odp.um || 'kg').toLowerCase();
  const numTarimas = Number(f.num_tarimas) || 0;
  const notas = (f.notas || '').trim();
  
  if (cantAceptada < 0 || cantAceptada > cantidadProducida) {
    toast('La cantidad aceptada debe estar entre 0 y ' + fmtCantidadUM(cantidadProducida, um), 'error'); return;
  }
  
  // Calcular decisión
  const pctCalidad = cantidadOriginal > 0 ? (cantAceptada / cantidadOriginal * 100) : 0;
  let decision;
  if (cantAceptada === 0) decision = 'rechazado';
  else if (pctCalidad >= 90) decision = cantAceptada >= cantidadProducida ? 'liberado' : 'parcial';
  else decision = 'rechazado';
  
  // Validar tarimas si libera
  if ((decision === 'liberado' || decision === 'parcial')) {
    if (!numTarimas) { toast('Captura el número de tarimas', 'error'); return; }
    if (!f.tarimas_data || f.tarimas_data.length !== numTarimas) {
      toast('Falta detalle de tarimas individuales', 'error'); return;
    }
    // Validar que sumas cuadren más o menos
    const sumCant = f.tarimas_data.reduce((s, t) => s + (Number(t.cantidad) || 0), 0);
    if (Math.abs(sumCant - cantAceptada) > 0.01) {
      if (!confirm(`La suma de las tarimas (${sumCant} ${UM_LABELS[um]}) no coincide con la cantidad aceptada (${cantAceptada} ${UM_LABELS[um]}). ¿Continuar igualmente?`)) return;
    }
  }
  
  state.loadingAccion = true; render();
  try {
    const productoForLib = state.productos_pt.find(p => p.codigo === odp.producto_codigo);
    const pesoTeoricoEsperado = window.convertirAKg(cantAceptada, um, productoForLib);
    const totalPesoBruto = (f.tarimas_data || []).reduce((s, t) => s + (Number(t.peso_bruto) || 0), 0);
    const totalPesoVacio = (f.tarimas_data || []).reduce((s, t) => s + (Number(t.peso_tarima_vacia) || 0), 0);
    const totalPesoNeto = totalPesoBruto - totalPesoVacio;
    
    const liberacionData = {
      decision,
      cantidad_aceptada: cantAceptada,
      cantidad_rechazada: cantidadProducida - cantAceptada,
      pct_calidad: Number(pctCalidad.toFixed(2)),
      num_tarimas: numTarimas,
      contenido_por_paquete: Number(f.contenido_por_paquete) || 0,
      total_paquetes: f.tarimas_data.reduce((s,t) => s + (Number(t.paquetes)||0), 0),
      total_sueltos: f.tarimas_data.reduce((s,t) => s + (Number(t.sueltos)||0), 0),
      // Doble verificación báscula (totales)
      peso_bruto_total: Number(totalPesoBruto.toFixed(2)),
      peso_tarima_vacia_total: Number(totalPesoVacio.toFixed(2)),
      peso_neto_calculado: Number(totalPesoNeto.toFixed(2)),
      peso_teorico_esperado: pesoTeoricoEsperado !== null ? Number(pesoTeoricoEsperado.toFixed(2)) : null,
      diferencia_peso: pesoTeoricoEsperado !== null ? Number((totalPesoNeto - pesoTeoricoEsperado).toFixed(2)) : null,
      notas,
      liberado_por: state.user.id,
      liberado_por_nombre: state.user.nombre,
      liberado_at: new Date().toISOString()
    };
    
    if (decision === 'liberado' || decision === 'parcial') {
      const year = new Date().getFullYear();
      const totalMermas = (odp.procesos_completados || []).reduce((s, p) => s + (Number(p.mermas) || 0), 0);
      
      // Generar Packing List folio
      const pklNum = await siguienteFolio('pkl');
      const codigoPKL = `PKL-${year}-${String(pklNum).padStart(5, '0')}`;
      
      // POR CADA TARIMA: generar 1 lote único + 1 etiqueta de tarima
      const lotesGenerados = []; // {codigo_lote, tarima_codigo, lote_id, tarima_id, ...}
      const batchOps = writeBatch(db);
      const contPaqGlobal = Number(f.contenido_por_paquete) || 0;
      
      for (let i = 0; i < numTarimas; i++) {
        const t = f.tarimas_data[i];
        const paqT = Number(t.paquetes) || 0;
        const sueltosT = Number(t.sueltos) || 0;
        const cantTarima = (paqT * contPaqGlobal) + sueltosT;
        const pesoBrutoT = Number(t.peso_bruto) || 0;
        const pesoVacioT = Number(t.peso_tarima_vacia) || 0;
        const pesoNetoT = pesoBrutoT - pesoVacioT;
        
        // Folio de lote individual para esta tarima
        const loteNum = await siguienteFolio('lote');
        const codigoLote = `L-${year}-${String(loteNum).padStart(5, '0')}`;
        const numTarimaStr = String(i+1).padStart(2,'0');
        const codigoTarima = `${codigoLote}-T${numTarimaStr}`;
        
        const loteRef = doc(collection(db, 'lotes'));
        batchOps.set(loteRef, {
          codigo: codigoLote,
          tarima_codigo: codigoTarima,
          numero_tarima: i + 1,
          total_tarimas_lote_padre: numTarimas,
          odp_id: odpId, odp_folio: odp.folio,
          packing_list: codigoPKL,
          pedido_id: odp.pedido_id, pedido_folio: odp.pedido_folio,
          cliente_codigo: odp.cliente_codigo, cliente_nombre: odp.cliente_nombre,
          producto_codigo: odp.producto_codigo, descripcion: odp.descripcion,
          cantidad: cantTarima,
          cantidad_disponible: cantTarima,
          um,
          peso_bruto: pesoBrutoT,
          peso_tarima_vacia: pesoVacioT,
          peso_neto: pesoNetoT,
          paquetes: paqT,
          sueltos: sueltosT,
          contenido_paquete: contPaqGlobal,
          almacen: 'PENDIENTE-EMPAQUE',
          ruta_procesos_ejecutados: odp.ruta_procesos || [],
          liberacion_calidad: liberacionData,
          estatus_lote: 'liberado_pendiente_empaque',
          fecha_produccion: new Date().toISOString().split('T')[0],
          fecha_liberacion: new Date().toISOString().split('T')[0],
          notas, activo: true,
          creado_por: state.user.id,
          creado_por_nombre: state.user.nombre,
          created_at: serverTimestamp()
        });
        
        // Tarima con QR
        const tarimaRef = doc(collection(db, 'tarimas'));
        const qrData = JSON.stringify({
          tarima: codigoTarima,
          lote: codigoLote,
          odp: odp.folio,
          pkl: codigoPKL,
          producto: odp.producto_codigo,
          cliente: odp.cliente_codigo,
          cantidad: cantTarima,
          um,
          peso_neto: pesoNetoT
        });
        batchOps.set(tarimaRef, {
          codigo: codigoTarima,
          lote_id: loteRef.id,
          lote_codigo: codigoLote,
          packing_list: codigoPKL,
          odp_id: odpId,
          odp_folio: odp.folio,
          numero_tarima: i + 1,
          total_tarimas: numTarimas,
          producto_codigo: odp.producto_codigo,
          descripcion: odp.descripcion,
          cliente_codigo: odp.cliente_codigo,
          cliente_nombre: odp.cliente_nombre,
          cantidad: cantTarima,
          um,
          peso_bruto: pesoBrutoT,
          peso_tarima_vacia: pesoVacioT,
          peso_neto: pesoNetoT,
          paquetes: paqT,
          sueltos: sueltosT,
          contenido_por_paquete: contPaqGlobal,
          qr_data: qrData,
          estatus: 'pendiente_empaque',
          almacen_actual: 'PENDIENTE-EMPAQUE',
          activo: true,
          created_at: serverTimestamp()
        });
        
        lotesGenerados.push({ codigo_lote: codigoLote, tarima_codigo: codigoTarima, cantidad: cantTarima });
      }
      
      // Crear Packing List
      const pklRef = doc(collection(db, 'packing_lists'));
      batchOps.set(pklRef, {
        codigo: codigoPKL,
        odp_id: odpId, odp_folio: odp.folio,
        pedido_id: odp.pedido_id, pedido_folio: odp.pedido_folio,
        cliente_codigo: odp.cliente_codigo, cliente_nombre: odp.cliente_nombre,
        producto_codigo: odp.producto_codigo, descripcion: odp.descripcion,
        um,
        num_tarimas: numTarimas,
        cantidad_total: cantAceptada,
        peso_bruto_total: Number(totalPesoBruto.toFixed(2)),
        peso_tarima_total: Number(totalPesoVacio.toFixed(2)),
        peso_neto_total: Number(totalPesoNeto.toFixed(2)),
        contenido_por_paquete: Number(f.contenido_por_paquete) || 0,
        total_paquetes: f.tarimas_data.reduce((s,t) => s + (Number(t.paquetes)||0), 0),
        total_sueltos: f.tarimas_data.reduce((s,t) => s + (Number(t.sueltos)||0), 0),
        decision_calidad: decision,
        pct_calidad: Number(pctCalidad.toFixed(2)),
        liberado_por: state.user.id,
        liberado_por_nombre: state.user.nombre,
        notas, activo: true,
        created_at: serverTimestamp()
      });
      
      await batchOps.commit();
      
      // Actualizar ODP
      await updateDoc(doc(db, 'ordenes_produccion', odpId), {
        estatus: 'liberada_empaque',
        liberacion_calidad: liberacionData,
        packing_list: codigoPKL,
        lotes_generados: lotesGenerados.map(l => l.codigo_lote),
        cantidad_liberada: cantAceptada,
        num_tarimas_generadas: numTarimas,
        updated_at: serverTimestamp()
      });
      
      // Si parcial, PI nuevo
      let mensajePI = '';
      if (decision === 'parcial') {
        const faltante = cantidadOriginal - cantAceptada;
        await generarPIDesdeRechazo(odp, faltante, `Reposición por ODP ${odp.folio}: liberado ${cantAceptada}/${cantidadOriginal} ${UM_LABELS[um]}, faltan ${fmtCantidadUM(faltante, um)} (decisión: PARCIAL)`);
        mensajePI = ` · PI nuevo generado por ${fmtCantidadUM(faltante, um)} faltante`;
      }
      
      // Notificar
      const batchNotif = writeBatch(db);
      ['CS', 'CEO', 'KAM', 'ALP', 'PRO'].forEach(depto => {
        const ref = doc(collection(db, 'notificaciones'));
        batchNotif.set(ref, {
          titulo: `${decision === 'liberado' ? '✅' : '⚠️'} Calidad liberó ${odp.folio}`,
          mensaje: `${odp.cliente_nombre} · ${codigoPKL} · ${numTarimas} tarima(s) con sus lotes individuales · ${fmtCantidadUM(cantAceptada, um)}${mensajePI}`,
          depto_destino: depto, tipo: 'success', folio_ref: odp.folio,
          created_at: serverTimestamp()
        });
      });
      await batchNotif.commit();
      
      cerrarModal();
      toast(`✅ Liberado · ${codigoPKL} · ${numTarimas} lotes individuales generados${mensajePI ? ' (+ PI reposición)' : ''}`);
      
      // Abrir Packing List automáticamente para imprimir
      setTimeout(() => window.imprimirPackingList(codigoPKL), 800);
    } else {
      // RECHAZADO
      await updateDoc(doc(db, 'ordenes_produccion', odpId), {
        estatus: 'rechazada',
        liberacion_calidad: liberacionData,
        rechazada_at: serverTimestamp(),
        updated_at: serverTimestamp()
      });
      
      await generarPIDesdeRechazo(odp, cantidadOriginal, `RECHAZADA por calidad - ODP ${odp.folio}: ${pctCalidad.toFixed(1)}% calidad (regla 90%). Reposición completa requerida.`);
      
      const batchNotif = writeBatch(db);
      ['CS', 'CEO', 'KAM', 'PRO', 'PLN'].forEach(depto => {
        const ref = doc(collection(db, 'notificaciones'));
        batchNotif.set(ref, {
          titulo: `❌ Calidad RECHAZÓ ${odp.folio}`,
          mensaje: `${odp.cliente_nombre} · ${pctCalidad.toFixed(1)}% calidad · Nuevo PI generado por ${fmtCantidadUM(cantidadOriginal, um)}`,
          depto_destino: depto, tipo: 'error', folio_ref: odp.folio,
          created_at: serverTimestamp()
        });
      });
      await batchNotif.commit();
      
      cerrarModal();
      toast(`❌ ODP rechazada · PI nuevo generado por reposición completa`);
    }
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    state.loadingAccion = false; render();
  }
};

// ============================================================
// AUTO-DISTRIBUCIÓN inteligente de paquetes + sueltos entre tarimas
// ============================================================
window.autoDistribuir = () => {
  if (!state.modalForm || !state.modalForm.tarimas_data) return;
  const numT = state.modalForm.tarimas_data.length;
  if (numT === 0) return;
  
  const odp = state.ordenes_produccion.find(o => o.id === state.modalData);
  if (!odp) return;
  
  const cantTotal = Number(state.modalForm.cantidad_aceptada) || 0;
  const contPaq = Number(state.modalForm.contenido_por_paquete) || 0;
  if (!contPaq || contPaq <= 0) {
    toast('Captura el contenido por paquete primero', 'error');
    return;
  }
  if (!cantTotal || cantTotal <= 0) {
    toast('Captura la cantidad aceptada', 'error');
    return;
  }
  
  // Calcular paquetes totales y sueltos sobrantes
  const paqTotales = Math.floor(cantTotal / contPaq);
  const sueltosTotal = cantTotal - (paqTotales * contPaq);
  
  // Distribuir paquetes equitativo entre tarimas
  // Si paqTotales = 100 y numT = 4 → 25 c/u
  // Si paqTotales = 99 y numT = 4 → 25,25,25,24
  const paqPorT = Math.floor(paqTotales / numT);
  const sobrante = paqTotales - (paqPorT * numT);
  
  const um = (odp.um || 'kg').toLowerCase();
  const producto = state.productos_pt.find(p => p.codigo === odp.producto_codigo);
  const pesoVacio = Number(state.modalForm.peso_tarima_unit) || 25;
  
  state.modalForm.tarimas_data = state.modalForm.tarimas_data.map((_, i) => {
    // Las primeras 'sobrante' tarimas reciben 1 paquete extra
    const paq = paqPorT + (i < sobrante ? 1 : 0);
    // Los sueltos van todos en la última tarima
    const suel = (i === numT - 1) ? sueltosTotal : 0;
    const cantTar = (paq * contPaq) + suel;
    const pesoTeoricoUnit = window.convertirAKg(cantTar, um, producto) || 0;
    return {
      paquetes: paq,
      sueltos: suel,
      peso_bruto: Number((pesoTeoricoUnit + pesoVacio).toFixed(2)),
      peso_tarima_vacia: pesoVacio
    };
  });
  render();
  
  if (sueltosTotal > 0) {
    toast(`✅ Distribuido: ${paqTotales} paquetes + ${sueltosTotal} sueltos en T${numT}`);
  } else {
    toast(`✅ Distribuido: ${paqTotales} paquetes (sin sobrantes)`);
  }
};

// Helper: generar PI nuevo desde un rechazo de calidad
async function generarPIDesdeRechazo(odpOriginal, cantidad, motivo) {
  const folioNum = await siguienteFolio('pedido');
  const folio = 'PI-' + String(folioNum).padStart(5, '0');
  
  // Obtener cliente y CEDIS
  const cliente = state.clientes.find(c => c.codigo === odpOriginal.cliente_codigo);
  const cedis = cliente?.cedis_asignado || 'CEDIS-MTY';
  const um = (odpOriginal.um || 'kg').toLowerCase();
  
  // Crear nuevo pedido
  const pedidoRef = await addDoc(collection(db, 'pedidos'), {
    folio,
    cliente_codigo: odpOriginal.cliente_codigo,
    cliente_nombre: odpOriginal.cliente_nombre,
    odc_cliente: '',
    fecha_requerida: null,
    cedis_asignado: cedis,
    estatus: 'pendiente_aprobacion',
    tipo: 'producir',
    observaciones: motivo,
    es_reposicion: true,
    odp_origen_rechazo: odpOriginal.folio,
    creado_por: state.user.id,
    creado_por_nombre: state.user.nombre + ' (auto-rechazo CAL)',
    created_at: serverTimestamp(),
    updated_at: serverTimestamp()
  });
  
  // Crear línea
  await addDoc(collection(db, 'pedido_lineas'), {
    pedido_id: pedidoRef.id,
    pedido_folio: folio,
    producto_codigo: odpOriginal.producto_codigo,
    descripcion: odpOriginal.descripcion,
    cantidad_solicitada: cantidad,
    um,
    tipo_origen: 'producir',
    precio_unitario: 0,
    cantidad_stock: 0,
    cantidad_producir: cantidad,
    observaciones: motivo,
    created_at: serverTimestamp()
  });
  
  // Notificar
  await addDoc(collection(db, 'notificaciones'), {
    titulo: '🔄 PI auto-generado por reposición ' + folio,
    mensaje: `Reposición de ${odpOriginal.folio} · ${cliente?.nombre} · ${fmtCantidadUM(cantidad, um)}`,
    depto_destino: 'CS', tipo: 'warning', folio_ref: folio,
    created_at: serverTimestamp()
  });
  
  return folio;
}
